<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAL_KOEN Gateway · Vectra Arch</title>
  <script src="/VAL_KOEN/auth-guard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
  <link rel="stylesheet" href="/shared/VAL_KOEN.css"/>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect } = React;
  const App = () => {
    useEffect(() => {
      const user = localStorage.getItem('user');
      if (user) { window.location.replace('/VAL_KOEN/app.html'); }
      else { window.location.replace('/VAL_KOEN/login.html'); }
    }, []);
    return <div style={{color:'var(--text-dim)',fontFamily:'monospace',padding:'20px'}}>Routing context initializing...</div>;
  };
  ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
