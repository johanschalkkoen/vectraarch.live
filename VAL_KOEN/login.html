<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Access · VAL_KOEN · VectraArch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/shared/VAL_KOEN.css"/>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-eyebrow">§ Vectra Arch · VAL_KOEN Workspace</div>
    <div class="auth-title">Access Console</div>
    <div id="auth-error" class="auth-error" style="display:none; color: #b84040; margin-bottom: 15px;"></div>
    <div class="auth-field">
      <label class="auth-label" for="username">Username</label>
      <input class="auth-input" id="username" type="text" placeholder="username" required autofocus/>
    </div>
    <div class="auth-field">
      <label class="auth-label" for="password">Security Key</label>
      <input class="auth-input" id="password" type="password" placeholder="········" required/>
    </div>
    <div id="twofa-field" class="auth-field" style="display:none;">
      <label class="auth-label" for="twofa">Verification Code</label>
      <input class="auth-input" id="twofa" type="text" placeholder="000000" maxlength="6"/>
    </div>
    <button class="auth-submit" id="submit-btn" onclick="doLogin()">Authenticate ↗</button>
  </div>
</div>
<script>
  var pendingUsername = null;
  async function doLogin() {
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;
    var twofa    = document.getElementById('twofa').value.trim();
    var errEl    = document.getElementById('auth-error');
    var btn      = document.getElementById('submit-btn');
    errEl.style.display = 'none';

    if (pendingUsername) {
      if (!twofa) { errEl.textContent = '⚠ Code required.'; errEl.style.display = 'block'; return; }
      try {
        var r = await fetch('/VAL_KOEN/api/verify-2fa', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: pendingUsername, token: twofa }) });
        var d = await r.json();
        if (r.ok && d.success) { localStorage.setItem('user', JSON.stringify(d)); window.location.replace('/VAL_KOEN/app.html'); }
        else { errEl.textContent = '⚠ ' + (d.message || 'Invalid code.'); errEl.style.display = 'block'; }
      } catch (e) { errEl.textContent = '⚠ Connection failure.'; errEl.style.display = 'block'; }
      return;
    }

    if (!username || !password) { errEl.textContent = '⚠ Fields mandatory.'; errEl.style.display = 'block'; return; }
    try {
      var res = await fetch('/VAL_KOEN/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
      var data = await res.json();
      if (!res.ok || !data.success) { errEl.textContent = '⚠ Invalid credentials.'; errEl.style.display = 'block'; return; }
      if (data.requires2FA) { pendingUsername = username; document.getElementById('twofa-field').style.display = 'flex'; document.getElementById('twofa').focus(); return; }
      localStorage.setItem('user', JSON.stringify(data)); window.location.replace('/VAL_KOEN/app.html');
    } catch (e) { errEl.textContent = '⚠ Connection failure.'; errEl.style.display = 'block'; }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
