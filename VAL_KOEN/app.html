<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>VAL_KOEN Workspace</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
  <script src="/VAL_KOEN/auth-guard.js"></script>
  <link rel="stylesheet" href="/shared/VAL_KOEN.css"/>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useCallback } = React;
  const API = '/VAL_KOEN/api';

  const App = () => {
    const [user, setUser] = useState(null);
    useEffect(() => {
      const stored = localStorage.getItem('user');
      if (stored) { setUser(JSON.parse(stored)); }
      else { window.location.replace('/VAL_KOEN/login.html'); }
    }, []);

    const logout = () => {
      localStorage.removeItem('user');
      window.location.replace('/VAL_KOEN/login.html');
    };

    if (!user) return <div style={{padding:'20px', color:'#fff'}}>Loading workspace mapping profile...</div>;

    return (
      <div style={{padding:'20px', fontFamily:'sans-serif'}}>
        <h2 style={{color:'var(--accent, #00ff41)'}}>VAL_KOEN Secure Node Connected</h2>
        <p style={{color:'#aaa'}}>Operator: {user.displayName || user.username}</p>
        <button onClick={logout} style={{padding:'10px 20px', background:'#b84040', color:'#fff', border:'none', cursor:'pointer', marginTop:'20px'}}>Terminate Session ×</button>
      </div>
    );
  };

  ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
