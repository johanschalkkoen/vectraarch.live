                    <div style={{flex:1}}>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:16,color:ac,letterSpacing:'0.06em',textTransform:'uppercase'}}>
                        {(owner.displayName||(owner.firstName&&owner.lastName?`${owner.firstName} ${owner.lastName}`:null)||owner.username||'').toUpperCase()}
                      </div>
                    </div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'rgba(255,255,255,0.35)',letterSpacing:'0.1em'}}>
                      <span style={{color:ac,fontWeight:600}}>{allUCycles.length}</span> CYCLE{allUCycles.length!==1?'S':''}
                    </div>
                  </div>

                  {/* Conf ring + predictions */}
                  <div style={{display:'flex',alignItems:'stretch',gap:0}}>
                    {/* Confidence ring */}
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'16px 14px',borderRight:`1px solid rgba(255,255,255,0.06)`,minWidth:80}}>
                      {(()=>{
                        const R=28,stroke=4,norm=2*Math.PI*R,dash=(conf/100)*norm;
                        return (
                          <div style={{position:'relative',width:64,height:64}}>
                            <svg viewBox="0 0 64 64" width="64" height="64">
                              <circle cx="32" cy="32" r={R} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={stroke}/>
                              <circle cx="32" cy="32" r={R} fill="none" stroke={ac} strokeWidth={stroke}
                                strokeDasharray={`${dash.toFixed(2)} ${norm.toFixed(2)}`}
                                strokeLinecap="round" transform="rotate(-90 32 32)"
                                style={{filter:`drop-shadow(0 0 4px ${ac}99)`}}/>
                            </svg>
                            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                              <span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:13,color:ac,lineHeight:1}}>{conf}%</span>
                            </div>
                          </div>
                        );
                      })()}
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.12em',color:'rgba(255,255,255,0.4)',marginTop:6,textAlign:'center'}}>CONF</div>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:'rgba(255,255,255,0.25)',textAlign:'center'}}>±1d</div>
                    </div>

                    {/* Predictions */}
                    <div style={{flex:1,padding:'14px 16px',display:'flex',flexDirection:'column',gap:8}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:'0.14em',color:'rgba(255,255,255,0.4)'}}>NEXT PERIOD</span>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'#e91e8c',fontWeight:600}}>
                          {nextPeriodStr}{deltaDays!==null?' ±1d':''}
                        </span>
                      </div>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:'0.14em',color:'rgba(255,255,255,0.4)'}}>FERTILE WINDOW</span>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'#1de9b6',fontWeight:600}}>{fertile}</span>
                      </div>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:'0.14em',color:'rgba(255,255,255,0.4)'}}>BASIS</span>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'rgba(255,255,255,0.35)'}}>
                          {allUCycles.length} CYCLE{allUCycles.length!==1?'S':''} · σ {sigma}
                        </span>
                      </div>
                    </div>
                  </div>
                </div>
                {/* ── Goals row ── */}
                {isOwn&&(
                  <div style={{background:'#0d0d0b',border:`1px solid rgba(255,255,255,0.07)`,borderRadius:12,padding:'12px 14px',marginBottom:10}}>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:'0.18em',color:ac}}>GOALS</span>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:0,background:'rgba(255,255,255,0.04)',borderRadius:8,overflow:'hidden'}}>
                      {[
                        {label:'AVG LENGTH',  val:`${avgLenAll}d`, target:'28d', delta:avgLenAll-28},
                        {label:'DURATION',    val:`${avgDur}d`,   target:'5d',  delta:avgDur-5},
                        {label:'REGULARITY',  val:`${regularity}%`, target:'85%', delta:null, pct:regularity},
                      ].map((g,i)=>(
                        <div key={g.label} style={{padding:'10px 12px',borderRight:i<2?'1px solid rgba(255,255,255,0.06)':'none'}}>
                          <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.12em',color:'rgba(255,255,255,0.3)',marginBottom:4}}>{g.label}</div>
                          <div style={{display:'flex',alignItems:'baseline',gap:4,marginBottom:4}}>
                            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:16,color:ac}}>{g.val}</span>
                            <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:'rgba(255,255,255,0.25)'}}>{' / '}{g.target}</span>
                          </div>
                          <div style={{height:3,background:'rgba(255,255,255,0.07)',borderRadius:2,marginBottom:4,overflow:'hidden'}}>
                            <div style={{height:'100%',width:`${g.pct!==undefined?g.pct:Math.min(100,100-(Math.abs(g.delta||0)/5)*20)}%`,background:ac,borderRadius:2,transition:'width 0.4s'}}/>
                          </div>
                          {g.delta!==null&&g.delta!==undefined&&(
                            <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:g.delta===0?'var(--green)':Math.abs(g.delta)<=2?ac:'rgba(255,255,255,0.3)'}}>
                              {g.delta>=0?'+':''}{g.delta.toFixed(1)}d Δ
                            </div>
                          )}
                          {g.pct!==undefined&&(
                            <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:g.pct>=85?'#00e676':g.pct>=70?ac:'#ff3b3b'}}>{g.pct}%</div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* ── Trends: phase breakdown + regularity ring ── */}
                {allUCycles.length>0&&(
                  <div style={{background:'#0d0d0b',border:`1px solid rgba(255,255,255,0.07)`,borderRadius:12,padding:'12px 14px',marginBottom:10}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:'0.16em',color:'rgba(255,255,255,0.4)',marginBottom:12}}>
                      TRENDS · LAST {Math.min(allUCycles.length,6)} CYCLE{allUCycles.length!==1?'S':''}
                    </div>
                    <div style={{display:'flex',gap:12,alignItems:'center'}}>
                      {/* Phase donut */}
                      <div style={{flexShrink:0}}>
                        {(()=>{
                          const R=40,r=26,CX=50,CY=50;
                          let ca=-Math.PI/2;
                          const slices=phaseBreakdown.map(p=>{
                            const angle=(p.days/avgLen)*2*Math.PI;
                            const x1=CX+R*Math.cos(ca),y1=CY+R*Math.sin(ca);
                            ca+=angle;
                            const x2=CX+R*Math.cos(ca),y2=CY+R*Math.sin(ca);
                            const xi1=CX+r*Math.cos(ca-angle),yi1=CY+r*Math.sin(ca-angle);
                            const xi2=CX+r*Math.cos(ca),yi2=CY+r*Math.sin(ca);
                            const lg=angle>Math.PI?1:0;
                            return {color:p.color,path:`M${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${lg},1 ${x2.toFixed(2)},${y2.toFixed(2)} L${xi2.toFixed(2)},${yi2.toFixed(2)} A${r},${r} 0 ${lg},0 ${xi1.toFixed(2)},${yi1.toFixed(2)} Z`};
                          });
                          const cur = dayOfCycle<=mensDays?'MENSTRUAL':dayOfCycle<=mensDays+follDays?'FOLLICULAR':dayOfCycle<=mensDays+follDays+ovDays?'OVULATION':'LUTEAL';
                          return (
                            <div style={{position:'relative',width:100,height:100}}>
                              <svg viewBox="0 0 100 100" width="100" height="100">
                                {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} opacity="0.9"/>)}
                              </svg>
                              <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
                                <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:'rgba(255,255,255,0.35)',letterSpacing:'0.1em'}}>PHASE</div>
                                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,color:ac,letterSpacing:'0.04em'}}>{cur}</div>
                              </div>
                            </div>
                          );
                        })()}
                      </div>
                      {/* Phase list */}
                      <div style={{flex:1,display:'flex',flexDirection:'column',gap:8}}>
                        {phaseBreakdown.map(p=>(
                          <div key={p.label} style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                            <div style={{display:'flex',alignItems:'center',gap:6}}>
                              <div style={{width:8,height:8,borderRadius:'50%',background:p.color,boxShadow:`0 0 4px ${p.color}88`}}/>
                              <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:p.color,letterSpacing:'0.1em',fontWeight:600}}>{p.label}</span>
                            </div>
                            <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'rgba(255,255,255,0.5)'}}>{p.days}d</span>
                          </div>
                        ))}
                      </div>
                      {/* Regularity ring */}
                      {(()=>{
                        const R=32,stroke=5,norm=2*Math.PI*R,dash=(regularity/100)*norm;
                        const rc = regularity>=85?'#00e676':regularity>=70?ac:'#ff3b3b';
                        return (
                          <div style={{flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                            <div style={{position:'relative',width:72,height:72}}>
                              <svg viewBox="0 0 72 72" width="72" height="72">
                                <circle cx="36" cy="36" r={R} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={stroke}/>
                                <circle cx="36" cy="36" r={R} fill="none" stroke={rc} strokeWidth={stroke}
                                  strokeDasharray={`${dash.toFixed(2)} ${norm.toFixed(2)}`}
                                  strokeLinecap="round" transform="rotate(-90 36 36)"
                                  style={{filter:`drop-shadow(0 0 5px ${rc}99)`}}/>
                              </svg>
                              <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                                <span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:13,color:rc}}>{regularity}%</span>
                              </div>
                            </div>
                            <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:rc,letterSpacing:'0.1em',fontWeight:600}}>{regularity>=85?'REGULAR':regularity>=70?'VARIABLE':'IRREGULAR'}</div>
                            <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:'rgba(255,255,255,0.3)'}}>AVG {avgLenAll}d</div>
                          </div>
                        );
                      })()}
                    </div>
                  </div>
                )}

                {/* ── Phase Wheel ── */}
                {allUCycles.length>0&&(
                  <div style={{background:'#0d0d0b',border:`1px solid rgba(255,255,255,0.07)`,borderRadius:12,padding:'12px 14px',marginBottom:10}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:'0.16em',color:ac,marginBottom:4}}>
                      PHASE WHEEL <span style={{color:'rgba(255,255,255,0.4)',fontWeight:400}}>· DAY {dayOfCycle} OF {avgLen}</span>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
                      <PhaseWheel dayOfCycle={dayOfCycle} cycleLength={avgLen} accentColor={ac}/>
                      <div style={{display:'flex',gap:16,justifyContent:'center',marginTop:8,flexWrap:'wrap'}}>
                        {[
                          {color:'#e91e8c', label:`MENSTRUATION · 1-5`},
                          {color:'#00e676', label:`OVULATION · ${Math.max(avgLen-14-4,6)}-${Math.min(avgLen-14+1,avgLen-1)}`},
                        ].map(({color,label})=>(
                          <div key={label} style={{display:'flex',alignItems:'center',gap:6}}>
                            <div style={{width:8,height:8,borderRadius:'50%',background:color,boxShadow:`0 0 4px ${color}88`}}/>
                            <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:'rgba(255,255,255,0.5)',letterSpacing:'0.1em'}}>{label}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* ── Bottom: cycle length sparkline + period duration bars ── */}
                {sorted6.length>0&&(
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>

                    {/* Cycle length sparkline */}
                    <div style={{background:'#0d0d0b',border:`1px solid rgba(255,255,255,0.07)`,borderRadius:12,padding:'12px 12px 10px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.12em',color:'rgba(255,255,255,0.3)'}}>CYCLE LENGTH</div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:ac,fontWeight:600}}>{avgLenAll}d</div>
                      </div>
                      {(()=>{
                        const W=120,H=44,P=4;
                        const vals=clVals.length>=2?clVals:[...clVals,...clVals].slice(0,2);
                        const mn=Math.min(...vals)-2,mx=Math.max(...vals)+2,rng=mx-mn||1;
                        const pts=vals.map((v,i)=>{
                          const x=P+(i/(vals.length-1||1))*(W-P*2);
                          const y=P+(1-(v-mn)/rng)*(H-P*2);
                          return `${x.toFixed(1)},${y.toFixed(1)}`;
                        });
                        return (
                          <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:44,display:'block'}} preserveAspectRatio="none">
                            <defs>
                              <linearGradient id={`clGrad_${u.username}`} x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor={ac} stopOpacity="0.3"/>
                                <stop offset="100%" stopColor={ac} stopOpacity="0.02"/>
                              </linearGradient>
                            </defs>
                            <polygon points={`${pts[0]} ${pts.join(' ')} ${W-P},${H} ${P},${H}`} fill={`url(#clGrad_${u.username})`}/>
                            <polyline points={pts.join(' ')} fill="none" stroke={ac} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
                            {pts.map((p,i)=>{const [x,y]=p.split(',');return <circle key={i} cx={x} cy={y} r={i===pts.length-1?3:1.8} fill={ac} opacity={i===pts.length-1?1:0.6}/>;})}
                            {vals.map((_,i)=>{const x=P+(i/(vals.length-1||1))*(W-P*2);return <text key={i} x={x} y={H-1} textAnchor="middle" fontFamily="DM Mono" fontSize="6" fill="rgba(255,255,255,0.25)">C{i+1}</text>;})}
                          </svg>
                        );
                      })()}
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:'rgba(255,255,255,0.2)',marginTop:4}}>last {sorted6.length} cycles</div>
                    </div>

                    {/* Period duration bars */}
                    <div style={{background:'#0d0d0b',border:`1px solid rgba(255,255,255,0.07)`,borderRadius:12,padding:'12px 12px 10px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.12em',color:'rgba(255,255,255,0.3)'}}>PERIOD DURATION</div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'#e91e8c',fontWeight:600}}>{avgDur}d</div>
                      </div>
                      <div style={{display:'flex',alignItems:'flex-end',gap:3,height:44}}>
                        {durations.map((d,i)=>{
                          const maxD=Math.max(...durations,7);
                          const h=Math.max((d/maxD)*36,4);
                          return (
                            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                              <div style={{width:'100%',height:36,display:'flex',alignItems:'flex-end'}}>
                                <div style={{width:'100%',height:h,background:'#e91e8c',borderRadius:'3px 3px 0 0',opacity:i===durations.length-1?1:0.6,boxShadow:i===durations.length-1?'0 0 8px #e91e8c88':'none'}}/>
                              </div>
                              <div style={{fontFamily:"'DM Mono',monospace",fontSize:6,color:'rgba(255,255,255,0.25)'}}>C{i+1}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                )}

                {/* close hasData block */}
                </>)}

                {/* ── Cycle records (collapsible list) ── */}
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:'0.16em',color:'rgba(255,255,255,0.35)',marginBottom:8,marginTop:4}}>
                  CYCLES · {uCycles.length} RECORD{uCycles.length!==1?'S':''}
                </div>
                {uCycles.map(cyc=>{
                  const dur = cyc.endDate ? Math.floor((new Date(cyc.endDate)-new Date(cyc.startDate))/86400000)+'d' : '—';
                  return (
                    <div key={cyc.id} className="meal-card" style={{marginBottom:8,borderLeft:`3px solid ${ac}`,cursor:isOwn&&!isMale?'pointer':'default'}}
                      onClick={()=>isOwn&&!isMale&&setActionCycle(cyc)}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                        <ItemAvatar username={u.username} user={user} partner={partner} partners={partners} size={36}/>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:'0.12em',padding:'3px 8px',borderRadius:3,textTransform:'uppercase',flexShrink:0,background:`${ac}22`,color:ac,border:`1px solid ${ac}55`}}>🩸 CYCLE</span>
                      </div>
                      <div className="meal-name" style={{marginBottom:8}}>START: {fmtDate(cyc.startDate).toUpperCase()}</div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                        <div><div className="cycle-record-label">End</div><div className="cycle-record-value">{fmtDate(cyc.endDate)||'—'}</div></div>
                        <div><div className="cycle-record-label">Length</div><div className="cycle-record-value">{cyc.cycleLength}d</div></div>
                        <div><div className="cycle-record-label">Duration</div><div className="cycle-record-value">{dur}</div></div>
                      </div>
                      {cyc.symptoms&&cyc.symptoms.length>0&&(
                        <div className="symptom-tags" style={{marginTop:8}}>
                          {cyc.symptoms.split(',').filter(Boolean).map(s=>(
                            <span key={s} className="symptom-tag">§ {s.trim()}</span>
                          ))}
                        </div>
                      )}
                      {isOwn&&!isMale&&<div style={{color:'var(--text3)',fontSize:10,textAlign:'right',marginTop:4}}>tap to manage ›</div>}
                    </div>
                  );
                })}
                {uCycles.length===0&&<div className="no-events" style={{padding:'20px 0'}}><div className="no-events-text">No cycles logged for this month</div></div>}

                {ui<allUsers.length-1&&<div style={{height:1,background:'var(--border)',margin:'16px 0'}}/>}
              </div>
            );
          })}

          <div style={{height:'80px'}}/>
        </div>
      </div>
      {!isMale&&<button className="fab" style={{background:tabColor,boxShadow:`0 4px 20px ${tabColor}55`}} onClick={()=>setShowForm(true)}>+ ADD CYCLE</button>}
      <ActionSheet open={!!actionCycle} title={actionCycle?`Cycle · ${fmtDate(actionCycle.startDate)}`:''} tabColor={tabColor}
        onEdit={()=>startEditCycle(actionCycle)}
        onDelete={()=>setConfirmDelCyc(actionCycle?.id)}
        onClose={()=>setActionCycle(null)}/>
      <ConfirmModal open={!!confirmDelCyc} message="Delete cycle record?" detail={actionCycle?`Started ${fmtDate(actionCycle.startDate)}`:''}
        onConfirm={async()=>{await handleCycleDelete(confirmDelCyc);setConfirmDelCyc(null);setActionCycle(null);}}
        onCancel={()=>setConfirmDelCyc(null)}/>

      {showForm&&(
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal-sheet" style={{"--page-color":tabColor}} onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">{editCycleId?'Edit':'Log'} Cycle</div>
            <div className="form-field">
              <label className="form-label">Start Date</label>
              <input className="form-input" type="date" value={form.startDate} onChange={e=>setForm(p=>({...p,startDate:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">End Date (optional)</label>
              <input className="form-input" type="date" value={form.endDate} onChange={e=>setForm(p=>({...p,endDate:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Cycle Length (days)</label>
              <input className="form-input" type="number" value={form.cycleLength} onChange={e=>setForm(p=>({...p,cycleLength:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Symptoms</label>
              <div className="type-toggle" style={{flexWrap:'wrap'}}>
                {SYMPTOMS.map(s=><button key={s} className={`type-toggle-btn ${form.symptoms.includes(s)?'active':''}`} onClick={()=>setForm(p=>({...p,symptoms:p.symptoms.includes(s)?p.symptoms.filter(x=>x!==s):[...p.symptoms,s]}))}>{s}</button>)}
              </div>
            </div>
            <button className="form-submit" style={{background:tabColor}} onClick={handleSave}>{editCycleId?'UPDATE':'SAVE'} CYCLE</button>
            <button className="form-cancel" onClick={()=>{setShowForm(false);setEditCycleId(null);}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── PROFILE PAGE ── */
const ProfilePage = ({user, setUser, partner, setPartner, partners=[], sharingConfig, setSharingConfig, onLogout, tabColor='#b06aff'}) => {
  const [form, setForm] = useState({
    firstName:   user.firstName||'',
    lastName:    user.lastName||'',
    email:       user.email||'',
    phone:       user.phone||'',
    gender:      user.gender||'',
    dob:         user.dob||'',         // date of birth → age
    weight:      user.weight||'',      // kg
    height:      user.height||'',      // cm
  });
  const [selectedColor, setSelectedColor]   = useState(user.eventColor||'#00e676');
  const [picPreview, setPicPreview]         = useState(user.profilePicUrl||DP);
  const [showBmiWarning, setShowBmiWarning] = useState(()=>{
    try { const v=localStorage.getItem('legacyBmiWarning'); return v===null?true:v==='true'; } catch { return true; }
  });
  const toggleBmiWarning = () => setShowBmiWarning(p=>{ const n=!p; try{localStorage.setItem('legacyBmiWarning',String(n));}catch{} return n; });
  const [picFile, setPicFile]               = useState(null);
  const [partnerLinked, setPartnerLinked]   = useState(false);
  const [alert, setAlert]                   = useState({msg:'',type:''});
  const fileInputRef = useRef();

  const COLORS = ['#00e676','#ff3b3b','#448aff','#ffd600','#e91e8c','#e040fb'];
  const msg = (m,t='ok') => { setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };
  const sharingItems = ['Finances','Calendar','Budget','Gym','Meals','Cycle'];

  // Re-sync form when user prop updates (after App reloads profile)
  useEffect(()=>{
    setForm({
      firstName: user.firstName||'',
      lastName:  user.lastName||'',
      email:     user.email||'',
      phone:     user.phone||'',
      gender:    user.gender||'',
      dob:       user.dob||'',
      weight:    user.weight||'',
      height:    user.height||'',
    });
    setSelectedColor(user.eventColor||'#00e676');
    setPicPreview(user.profilePicUrl||DP);
  },[user.username]);

  // Load partner access link status — populate sharingConfig per partner
  useEffect(()=>{
    if(!partner) return;
    axios.get(`${API}/get-access`,{params:{viewer:user.username,adminUsername:user.username}})
      .then(r=>{
        if(r.data.success){
          const allPartners2=partners.length>0?partners:[partner];
          allPartners2.forEach(p=>{
            const linked=(r.data.accessList||[]).some(a=>a.viewer===user.username&&a.target===p.username);
            if(linked){
              setSharingConfig(prev=>{
                // Merge: keep existing per-item choices, add missing items as true
                const existing=prev[p.username]||{};
                const merged=Object.fromEntries(sharingItems.map(i=>[i,existing[i]!==undefined?existing[i]:true]));
                return {...prev,[p.username]:merged};
              });
            }
          });
        }
      }).catch(()=>{});
  },[partner?.username]);

  // Profile picture file selection
  const handlePicChange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 2*1024*1024){ msg('Image must be under 2 MB','err'); return; }
    setPicFile(file);
    const reader = new FileReader();
    reader.onload = ev => setPicPreview(ev.target.result);
    reader.readAsDataURL(file);
  };

  // Save all profile changes
  const handleSave = async() => {
    try {
      const displayName = form.firstName&&form.lastName ? `${form.firstName} ${form.lastName}` : (user.displayName||user.username);
      // If a new picture was selected, convert to base64 and send
      let profilePicUrl = user.profilePicUrl||DP;
      if(picFile){
        profilePicUrl = picPreview; // base64 data URL
      }
      await axios.post(`${API}/profile-pictures`,{
        username:    user.username,
        firstName:   form.firstName,
        lastName:    form.lastName,
        displayName: displayName,
        email:       form.email,
        phone:       form.phone,
        gender:      form.gender,
        dob:         form.dob||undefined,
        weight:      form.weight||undefined,
        height:      form.height||undefined,
        eventColor:  selectedColor,
        profilePicUrl: profilePicUrl !== DP ? profilePicUrl : undefined,
      });
      const updated = {...user,...form,displayName,eventColor:selectedColor,profilePicUrl:profilePicUrl!==DP?profilePicUrl:user.profilePicUrl,gender:form.gender,dob:form.dob,weight:form.weight,height:form.height};
      setUser(updated);
      localStorage.setItem('user',JSON.stringify(updated));
      setPicFile(null);
      msg('Changes saved.');
    } catch(e) { msg('Error saving.','err'); }
  };



  const fullName = form.firstName&&form.lastName ? `${form.firstName} ${form.lastName}` : (user.displayName||user.username);

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span style={{color:user?.eventColor||'#00e676'}}>§ VECTRA ARCH</span> · LEGACY · PROFILE</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">PROFILE</div>
            <div className="page-sub">ACCOUNT · SHARING · PREFERENCES</div>
          </div>
          <Alert {...alert}/>

          {/* ── Profile picture + name card ── */}
          <div className="profile-user-card" style={{flexDirection:'column',alignItems:'center',gap:12,padding:'20px 16px'}}>
            {/* Avatar with tap-to-change */}
            <div style={{position:'relative',cursor:'pointer'}} onClick={()=>fileInputRef.current.click()}>
              <img src={picPreview} alt="avatar"
                style={{width:80,height:80,borderRadius:'50%',objectFit:'cover',border:`3px solid ${selectedColor}`,display:'block'}}/>
              <div style={{position:'absolute',bottom:0,right:0,width:26,height:26,borderRadius:'50%',background:'var(--bg3)',border:'2px solid var(--border2)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              </div>
              <input ref={fileInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePicChange}/>
            </div>
            <div style={{textAlign:'center'}}>
              <div className="profile-user-name" style={{fontSize:20,marginBottom:4}}>{fullName}</div>
              <div className="profile-user-email">{form.email||user.username}</div>
              {form.gender&&<span className={`profile-user-badge ${form.gender.toLowerCase()}`} style={{marginTop:6,display:'inline-block'}}>{form.gender.toUpperCase()}</span>}
            </div>
            {picFile&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--green)',letterSpacing:'0.1em'}}>NEW PHOTO — SAVE TO APPLY</div>}
          </div>

          {/* ── Account Details ── */}
          <div className="profile-section">
            <div className="profile-section-title">§ ACCOUNT DETAILS</div>
            <div className="profile-field">
              <div className="profile-field-label">First Name</div>
              <input className="profile-field-input" placeholder="First name" value={form.firstName}
                onChange={e=>setForm(p=>({...p,firstName:e.target.value}))}/>
            </div>
            <div className="profile-field">
              <div className="profile-field-label">Last Name</div>
              <input className="profile-field-input" placeholder="Last name" value={form.lastName}
                onChange={e=>setForm(p=>({...p,lastName:e.target.value}))}/>
            </div>
            <div className="profile-field">
              <div className="profile-field-label">Email</div>
              <input className="profile-field-input" type="email" value={form.email}
                onChange={e=>setForm(p=>({...p,email:e.target.value}))}/>
            </div>
            <div className="profile-field">
              <div className="profile-field-label">Phone</div>
              <input className="profile-field-input" type="tel" value={form.phone}
                onChange={e=>setForm(p=>({...p,phone:e.target.value}))}/>
            </div>
            <div className="profile-field">
              <div className="profile-field-label">Gender</div>
              <div style={{display:'flex',gap:10,paddingTop:6}}>
                {['male','female'].map(g=>(
                  <button key={g}
                    onClick={()=>setForm(p=>({...p,gender:g}))}
                    style={{
                      fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:'0.12em',
                      textTransform:'uppercase',padding:'8px 20px',borderRadius:4,cursor:'pointer',
                      border: form.gender===g
                        ? `1px solid ${g==='female'?'var(--pink)':'var(--blue)'}`
                        : '1px solid var(--border2)',
                      color: form.gender===g ? (g==='female'?'var(--pink)':'var(--blue)') : 'var(--text3)',
                      background: form.gender===g
                        ? (g==='female'?'rgba(233,30,140,0.12)':'rgba(68,138,255,0.12)')
                        : 'transparent',
                    }}>
                    {g==='male'?'♂ Male':'♀ Female'}
                  </button>
                ))}
              </div>
            </div>
            <div className="profile-field">
              <div className="profile-field-label">Date of Birth</div>
              <input className="profile-field-input" type="date" value={form.dob}
                onChange={e=>setForm(p=>({...p,dob:e.target.value}))}/>
              {form.dob&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--text3)',marginTop:4}}>
                Age: {Math.floor((new Date()-new Date(form.dob))/31557600000)} years
              </div>}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}}>
              <div className="profile-field" style={{borderRight:'1px solid var(--border)'}}>
                <div className="profile-field-label">Weight (kg)</div>
                <input className="profile-field-input" type="number" min="30" max="300" step="0.1"
                  placeholder="e.g. 65" value={form.weight}
                  onChange={e=>setForm(p=>({...p,weight:e.target.value}))}/>
              </div>
              <div className="profile-field">
                <div className="profile-field-label">Height (cm)</div>
                <input className="profile-field-input" type="number" min="100" max="250" step="1"
                  placeholder="e.g. 168" value={form.height}
                  onChange={e=>setForm(p=>({...p,height:e.target.value}))}/>
              </div>
            </div>
            {form.weight&&form.height&&(()=>{
              const bmi = parseFloat(form.weight)/Math.pow(parseFloat(form.height)/100,2);
              const w   = parseFloat(form.weight);
              const h   = parseFloat(form.height)/100;
              // Healthy weight range for this height (BMI 18.5–24.9)
              const minW = (18.5 * h * h).toFixed(1);
              const maxW = (24.9 * h * h).toFixed(1);
              // Daily calorie estimates (Mifflin-St Jeor, sedentary baseline)
              const age  = form.dob ? Math.floor((new Date()-new Date(form.dob))/31557600000) : 30;
              const isFemale = (form.gender||'').toLowerCase()==='female';
              const bmr  = isFemale
                ? 10*w + 6.25*(parseFloat(form.height)) - 5*age - 161
                : 10*w + 6.25*(parseFloat(form.height)) - 5*age + 5;
              const tdee = Math.round(bmr * 1.4); // light activity
              // Advice per category
              const cfg = bmi<16   ? {cat:'SEVERELY UNDERWEIGHT', color:'#ff3b3b', icon:'⚠️',
                  advice:'Critical: you need significantly more calories. Consult a doctor immediately.',
                  detail:`Eat ${tdee+700}–${tdee+1000} kcal/day. Focus on calorie-dense foods: nuts, avocado, whole grains, lean protein. Aim to gain 0.5 kg/week.`}
                : bmi<18.5 ? {cat:'UNDERWEIGHT', color:'#ff9800', icon:'⚡',
                  advice:'You need to eat more to reach a healthy weight.',
                  detail:`Target ${tdee+400}–${tdee+600} kcal/day. Add healthy calorie-dense snacks and increase portion sizes. Your healthy range is ${minW}–${maxW} kg.`}
                : bmi<25   ? {cat:'HEALTHY', color:'#00e676', icon:'✓',
                  advice:'Your weight is in the healthy range. Maintain your current habits.',
                  detail:`Maintain ${tdee-100}–${tdee+100} kcal/day. Keep balanced meals with protein, complex carbs and healthy fats.`}
                : bmi<30   ? {cat:'OVERWEIGHT', color:'#ffd600', icon:'⚠',
                  advice:'A moderate calorie reduction will help reach a healthy weight.',
                  detail:`Target ${tdee-400}–${tdee-500} kcal/day. Reduce processed foods and added sugars. Aim to lose 0.25–0.5 kg/week. Healthy range is ${minW}–${maxW} kg.`}
                : bmi<35   ? {cat:'OBESE', color:'#ff3b3b', icon:'⚠️',
                  advice:'A meaningful calorie deficit with medical guidance is recommended.',
                  detail:`Target ${tdee-500}–${tdee-600} kcal/day. Prioritise whole foods, reduce refined carbs and saturated fats. Consider consulting a dietitian.`}
                :            {cat:'SEVERELY OBESE', color:'#ff3b3b', icon:'🚨',
                  advice:'Please consult a doctor or dietitian for a structured plan.',
                  detail:`Medical supervision is recommended. A very low calorie diet should not be started without professional guidance.`};
              return (
                <div style={{marginTop:2}}>
                  {/* BMI value row */}
                  <div className="profile-field" style={{background:'var(--bg3)',borderBottom:'none'}}>
                    <div className="profile-field-label">BMI</div>
                    <div style={{display:'flex',alignItems:'baseline',gap:10,paddingTop:4}}>
                      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:22,color:cfg.color}}>
                        {bmi.toFixed(1)}
                      </span>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,
                        letterSpacing:'0.12em',padding:'2px 8px',borderRadius:3,
                        background:`${cfg.color}20`,color:cfg.color,border:`1px solid ${cfg.color}55`}}>
                        {cfg.cat}
                      </span>
                    </div>
                  </div>
                  {/* Toggle + Warning / advice card */}
                  <div style={{display:'flex',justifyContent:'flex-end',padding:'4px 14px 0'}}>
                    <button onClick={toggleBmiWarning} style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text3)',background:'transparent',border:'none',cursor:'pointer',padding:'2px 0'}}>
                      {showBmiWarning ? '▲ Hide advice' : '▼ Show advice'}
                    </button>
                  </div>
                  {showBmiWarning&&<div style={{margin:'0 0 0 0',padding:'12px 14px',
                    background:`${cfg.color}10`,
                    borderLeft:`3px solid ${cfg.color}`,
                    borderRadius:'0 0 6px 6px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                      <span style={{fontSize:14}}>{cfg.icon}</span>
                      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,
                        fontSize:13,letterSpacing:'0.04em',color:cfg.color,textTransform:'uppercase'}}>
                        {cfg.advice}
                      </span>
                    </div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--text3)',
                      lineHeight:1.7,letterSpacing:'0.04em'}}>
                      {cfg.detail}
                    </div>
                    <div style={{marginTop:8,display:'flex',gap:12,flexWrap:'wrap'}}>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--text3)'}}>
                        <span style={{color:'var(--text2)'}}>Est. daily needs: </span>
                        <span style={{color:cfg.color,fontWeight:600}}>{tdee} kcal</span>
                      </div>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--text3)'}}>
                        <span style={{color:'var(--text2)'}}>Healthy range: </span>
                        <span style={{color:'var(--green)',fontWeight:600}}>{minW}–{maxW} kg</span>
                      </div>
                    </div>
                  </div>}
                </div>
              );
            })()}
          </div>

          {/* ── Event Color ── */}
          <div className="profile-section">
            <div className="profile-section-title">§ EVENT COLOR</div>
            <div style={{padding:'12px 14px',fontFamily:"'DM Mono',monospace",fontSize:'10px',color:'var(--text3)'}}>Your personal event color for the calendar</div>
            <div className="color-palette">
              {COLORS.map(col=>(
                <div key={col} className={`color-swatch ${selectedColor===col?'selected':''}`}
                  style={{background:col}} onClick={()=>setSelectedColor(col)}/>
              ))}
            </div>
          </div>

          <button className="save-btn" onClick={handleSave}>SAVE CHANGES</button>

          {/* ── Partner sharing — moved to bottom ── */}
          {(partners.length===0&&!partner)&&(
            <div style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:6,padding:'14px 16px',marginBottom:16,marginTop:8}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--pink)',marginBottom:6}}>§ PARTNER SHARING</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--text3)',lineHeight:1.6}}>No partners linked yet. An admin can set up access links at <strong style={{color:'var(--text2)'}}>vectraarch.live/conduit/users</strong></div>
            </div>
          )}
          {(partners.length>0?partners:partner?[partner]:[]).length>0&&(
            <div className="partner-sharing-card" style={{marginTop:8}}>
              <div className="profile-section-title">§ PARTNER SHARING</div>
              <div className="partner-hint" style={{marginBottom:12}}>Enable shared view per section. Each partner is controlled independently.</div>

              {(partners.length>0?partners:[partner]).map((p,pi)=>{
                const pun    = p.username;
                const pCfg   = sharingConfig[pun] || {};
                const pAll   = sharingItems.every(i=>pCfg[i]);

                const toggleItem = (item) => setSharingConfig(prev=>({
                  ...prev,
                  [pun]: { ...(prev[pun]||{}), [item]: !(prev[pun]?.[item]) }
                }));

                const shareAll = async() => {
                  const next = !pAll;
                  setSharingConfig(prev=>({
                    ...prev,
                    [pun]: Object.fromEntries(sharingItems.map(i=>[i,next]))
                  }));
                  try {
                    if(next) await axios.post(`${API}/grant-access`,{viewer:user.username,target:pun,adminUsername:user.username});
                    else     await axios.post(`${API}/revoke-access`,{viewer:user.username,target:pun,adminUsername:user.username});
                    msg(next?`Sharing enabled with ${pun}.`:`Sharing disabled with ${pun}.`);
                  } catch {}
                };

                return (
                  <div key={pun} style={pi>0?{marginTop:16,paddingTop:16,borderTop:'1px solid var(--border)'}:{}}>
                    <div className="partner-row" style={{marginBottom:10}}>
                      <img className="partner-avatar" src={p.profilePicUrl||DP} alt=""
                        style={{border:`2px solid ${p.eventColor||'#448aff'}`}}/>
                      <div style={{flex:1}}>
                        <div className="partner-info-name">{p.displayName||(p.firstName&&p.lastName?`${p.firstName} ${p.lastName}`:null)||p.username}</div>
                        <div className="partner-info-status">Partner · linked</div>
                      </div>
                      <button className={`share-all-btn ${pAll?'sharing':'not-sharing'}`} onClick={shareAll}>
                        {pAll?'✓ SHARING ALL':'SHARE ALL'}
                      </button>
                    </div>
                    <div className="sharing-grid">
                      {sharingItems.map(item=>(
                        <div key={item} className={`sharing-item ${pCfg[item]?'on':''}`}
                          onClick={()=>toggleItem(item)}>
                          <span className="sharing-item-label">{item.toUpperCase()}</span>
                          <div className={`sharing-check ${pCfg[item]?'on':'off'}`}>{pCfg[item]?'✓':''}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <div style={{height:'32px'}}/>
        </div>
      </div>
    </div>
  );
};

/* ── ADMIN PAGE ── */
const AdminPage = ({user, onLogout, tabColor='#ff9800'}) => {
  const [users, setUsers]       = useState([]);
  const [accessList, setAccessList] = useState([]);
  const [newUser, setNewUser]   = useState({username:'',password:''});
  const [accessForm, setAccessForm] = useState({viewer:'',target:''});
  const [adminForm, setAdminForm] = useState({username:''});
  const [pwForm, setPwForm]     = useState({username:'',newPassword:''});
  const [delUser, setDelUser]   = useState('');
  const [alert, setAlert]       = useState({msg:'',type:''});

  const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),5000); };

  const fetchUsers = useCallback(async()=>{
    try { const r=await axios.get(`${API}/users`,{params:{adminUsername:user.username}}); if(r.data.success) setUsers(r.data.data); } catch {}
  },[user.username]);

  const fetchAccess = useCallback(async()=>{
    try { const r=await axios.get(`${API}/get-access`,{params:{adminUsername:user.username}}); if(r.data.success) setAccessList(r.data.accessList); } catch {}
  },[user.username]);

  useEffect(()=>{ fetchUsers(); fetchAccess(); },[fetchUsers,fetchAccess]);

  const userOpts = ['',...users.map(u=>u.username)];

  const act = async(fn)=>{ try{ const r=await fn(); msg(r.data.message||(r.data.success?'Done.':'Failed.'), r.data.success?'ok':'err'); if(r.data.success){fetchUsers();fetchAccess();} }catch(e){msg(e.response?.data?.message||'Error.','err');} };

  const btnStyle = (col='var(--green)') => ({fontFamily:"'DM Mono',monospace",fontSize:'10px',letterSpacing:'0.12em',textTransform:'uppercase',padding:'10px 16px',border:`1px solid ${col}`,color:col,background:'transparent',cursor:'pointer',borderRadius:4,width:'100%',marginTop:6});
  const inputStyle = {width:'100%',background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:4,padding:'10px 14px',fontFamily:"'DM Mono',monospace",fontSize:'13px',color:'var(--text)',outline:'none',marginBottom:8};
  const selectStyle = {...inputStyle,marginBottom:8};
  const cardStyle = {background:'var(--bg2)',borderRadius:6,padding:'16px',marginBottom:12};
  const labelStyle = {fontFamily:"'DM Mono',monospace",fontSize:'9px',letterSpacing:'0.2em',textTransform:'uppercase',color:'var(--pink)',display:'block',marginBottom:6};

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span style={{color:user?.eventColor||'#00e676'}}>§ VECTRA ARCH</span> · LEGACY · ADMIN</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">ADMIN PANEL</div>
            <div className="page-sub">USER MANAGEMENT · ACCESS CONTROL</div>
          </div>
          <Alert {...alert}/>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {/* Add User */}
            <div style={cardStyle}>
              <label style={labelStyle}>§ ADD USER</label>
              <input style={inputStyle} placeholder="Username" value={newUser.username} onChange={e=>setNewUser(p=>({...p,username:e.target.value}))}/>
              <input style={inputStyle} type="password" placeholder="Password" value={newUser.password} onChange={e=>setNewUser(p=>({...p,password:e.target.value}))}/>
              <button style={btnStyle('var(--green)')} onClick={()=>act(()=>axios.post(`${API}/add-user`,{...newUser,adminUsername:user.username}))}>Add User ↗</button>
            </div>

            {/* Grant/Revoke Access */}
            <div style={cardStyle}>
              <label style={labelStyle}>§ MANAGE ACCESS</label>
              <select style={selectStyle} value={accessForm.viewer} onChange={e=>setAccessForm(p=>({...p,viewer:e.target.value}))}>
                {userOpts.map(u=><option key={u} value={u}>{u||'— Viewer —'}</option>)}
              </select>
              <select style={selectStyle} value={accessForm.target} onChange={e=>setAccessForm(p=>({...p,target:e.target.value}))}>
                {userOpts.map(u=><option key={u} value={u}>{u||'— Target —'}</option>)}
              </select>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                <button style={{...btnStyle('var(--green)'),width:'auto'}} onClick={()=>act(()=>axios.post(`${API}/grant-access`,{...accessForm,adminUsername:user.username}))}>Grant</button>
                <button style={{...btnStyle('var(--red)'),width:'auto'}} onClick={()=>act(()=>axios.post(`${API}/revoke-access`,{...accessForm,adminUsername:user.username}))}>Revoke</button>
              </div>
            </div>

            {/* Admin status */}
            <div style={cardStyle}>
              <label style={labelStyle}>§ ADMIN STATUS</label>
              <select style={selectStyle} value={adminForm.username} onChange={e=>setAdminForm({username:e.target.value})}>
                {userOpts.map(u=><option key={u} value={u}>{u||'— Select user —'}</option>)}
              </select>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                <button style={{...btnStyle('var(--yellow)'),width:'auto'}} onClick={()=>act(()=>axios.post(`${API}/grant-admin`,{...adminForm,adminUsername:user.username}))}>Grant</button>
                <button style={{...btnStyle('var(--red)'),width:'auto'}} onClick={()=>act(()=>axios.post(`${API}/revoke-admin`,{...adminForm,adminUsername:user.username}))}>Revoke</button>
              </div>
            </div>

            {/* Update Password */}
            <div style={cardStyle}>
              <label style={labelStyle}>§ UPDATE PASSWORD</label>
              <select style={selectStyle} value={pwForm.username} onChange={e=>setPwForm(p=>({...p,username:e.target.value}))}>
                {userOpts.map(u=><option key={u} value={u}>{u||'— Select user —'}</option>)}
              </select>
              <input style={inputStyle} type="password" placeholder="New password" value={pwForm.newPassword} onChange={e=>setPwForm(p=>({...p,newPassword:e.target.value}))}/>
              <button style={btnStyle('var(--blue)')} onClick={()=>act(()=>axios.post(`${API}/admin-update-password`,{...pwForm,adminUsername:user.username}))}>Update ↗</button>
            </div>

            {/* Delete User */}
            <div style={cardStyle}>
              <label style={labelStyle}>§ DELETE USER</label>
              <select style={selectStyle} value={delUser} onChange={e=>setDelUser(e.target.value)}>
                {userOpts.map(u=><option key={u} value={u}>{u||'— Select user —'}</option>)}
              </select>
              <button style={btnStyle('var(--red)')} onClick={()=>{if(true)act(()=>axios.delete(`${API}/delete-user/${delUser}`,{params:{adminUsername:user.username}}));}}>Delete User</button>
            </div>

            {/* Access List */}
            <div style={cardStyle}>
              <label style={labelStyle}>§ ACCESS LIST ({accessList.length})</label>
              {accessList.length===0&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--text3)'}}>No access rules.</div>}
              {accessList.map((a,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid var(--border)',fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--text2)'}}>
                  <span>{a.viewer} → {a.target}</span>
                  <button onClick={()=>act(()=>axios.post(`${API}/revoke-access`,{viewer:a.viewer,target:a.target,adminUsername:user.username}))} style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'var(--red)',border:'1px solid rgba(255,61,61,0.3)',borderRadius:3,padding:'2px 8px',background:'transparent',cursor:'pointer'}}>×</button>
                </div>
              ))}
            </div>
          </div>

          {/* Users list */}
          <div style={{...cardStyle,marginTop:4}}>
            <label style={labelStyle}>§ USERS · {users.length}</label>
            {users.map(u=>(
              <div key={u.username} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                <div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:15,letterSpacing:'0.04em',color:'var(--text)'}}>{u.username} {u.isAdmin&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:'var(--yellow)',border:'1px solid rgba(255,214,0,0.3)',padding:'1px 6px',borderRadius:3,marginLeft:6}}>ADMIN</span>}</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--text3)'}}>{u.lastActive?`Last active: ${fmtDate(u.lastActive)}`:''}</div>
                </div>
              </div>
            ))}
          </div>

          <button style={{...btnStyle('var(--red)'),width:'auto',display:'inline-flex',marginTop:16}} onClick={onLogout}>SIGN OUT ×</button>
          <div style={{height:'32px'}}/>
        </div>
      </div>
    </div>
  );
};

const ALL_TABS = [
  {id:'calendar', label:'CALENDAR', color:'#448aff'},
  {id:'budget',   label:'BUDGET',   color:'#ffd600'},
  {id:'finances', label:'FINANCES', color:'#00e676'},
  {id:'gym',      label:'GYM',      color:'#ff3b3b'},
  {id:'meals',    label:'MEALS',    color:'#d67bff'},
  {id:'cycle',    label:'CYCLE',    color:'#e91e8c', cycleOnly:true},
  {id:'profile',  label:'PROFILE',  color:'#b06aff'},
  {id:'admin',    label:'ADMIN',    color:'#ff9800', adminOnly:true},
];

const App = () => {
  const [user, setUser]       = useState(null);
  const [partner, setPartner] = useState(null);
  const [partners, setPartners] = useState([]);
  const [activeTab, setActiveTab] = useState('calendar');
  const [sharingConfig, setSharingConfig] = useState(()=>{
    try {
      const s = localStorage.getItem('legacySharingConfig');
      if(!s) return {};
      const parsed = JSON.parse(s);
      // Validate it's a plain object
      if(typeof parsed !== 'object' || Array.isArray(parsed)) return {};
      return parsed;
    } catch { return {}; }
  }); // { partnerUsername: { Finances:bool, ... } } — managed in Profile only
  const [selectedUsers, setSelectedUsers] = useState({}); // { tabId: Set<username> } — which users' data to show
  const [error, setError] = useState('');

  const handleLogout = useCallback(()=>{
    localStorage.removeItem('user');
    localStorage.removeItem('legacySharingConfig');
    window.location.href = '/login.html';
  },[]);

  // Persist sharingConfig to localStorage whenever it changes
  useEffect(()=>{
    if(Object.keys(sharingConfig).length>0)
      localStorage.setItem('legacySharingConfig', JSON.stringify(sharingConfig));
  },[sharingConfig]);

  useEffect(()=>{
    const stored = localStorage.getItem('user');
    if(stored){
      try {
        const u = JSON.parse(stored);
        // Coerce isAdmin to boolean in case server stored 0/1 integer
        u.isAdmin = !!(u.isAdmin || u.is_admin);
        setUser(u);
        axios.get(`${API}/get-access`,{params:{viewer:u.username,adminUsername:u.username}})
          .then(async({data})=>{
            if(data.success&&data.accessList?.length>0){
              const targets = data.accessList.filter(a=>a.viewer===u.username).map(a=>a.target);
              if(targets.length>0){
                // Load all partners' profiles
                const partnerProfiles = await Promise.all(targets.map(async t=>{
                  try {
                    const {data:pd}=await axios.get(`${API}/profile-pictures`,{params:{username:t}});
                    return {username:t,...pd,profilePicUrl:pd.profilePicUrl||DP,eventColor:pd.eventColor||'#448aff',
                            displayName:pd.displayName||(pd.firstName&&pd.lastName?`${pd.firstName} ${pd.lastName}`:null)||t,
                            firstName:pd.firstName||'',lastName:pd.lastName||''};
                  } catch {
                    return {username:t,displayName:t,eventColor:'#448aff',profilePicUrl:DP};
                  }
                }));
                // Primary partner = first; store all in partners array too
                setPartner(partnerProfiles[0]);
                if(partnerProfiles.length>1) setPartners(partnerProfiles);
                else setPartners(partnerProfiles);
              }
            }
          }).catch(()=>{});
        axios.get(`${API}/profile-pictures`,{params:{username:u.username}}).then(({data})=>{
          const dn=data.displayName||(data.firstName&&data.lastName?`${data.firstName} ${data.lastName}`:null)||u.username;
          const adminFlag = data.isAdmin!==undefined ? !!data.isAdmin : !!u.isAdmin;
          const {success:_s, ...profileData} = data;
          setUser(prev=>({
            ...prev,
            ...profileData,
            displayName:    dn,
            firstName:      data.firstName||prev.firstName||'',
            lastName:       data.lastName||prev.lastName||'',
            profilePicUrl:  data.profilePicUrl||prev.profilePicUrl||DP,
            isAdmin:        adminFlag,
            gender:         data.gender||prev.gender||'',
          }));
        }).catch(()=>{});
        // Load existing access links to pre-populate sharingConfig
        axios.get(`${API}/get-access`,{params:{viewer:u.username,adminUsername:u.username}}).then(({data})=>{
          if(data.success&&data.accessList?.length>0){
            const targets=data.accessList.filter(a=>a.viewer===u.username).map(a=>a.target);
            if(targets.length>0){
              // Populate sharingConfig for all linked partners
              // Only set defaults for partners not already in localStorage config
              const defaultCfg={Finances:true,Calendar:true,Budget:true,Gym:true,Meals:true,Cycle:true};
              setSharingConfig(prev=>{
                const next={...prev};
                targets.forEach(t=>{
                  // Keep existing config but ensure all keys exist
                  next[t] = {...defaultCfg, ...(next[t]||{})};
                });
                return next;
              });
            }
          }
        }).catch(()=>{});
      } catch { setError('Invalid session'); }
    } else {
      window.location.href='/login.html';
    }
  },[]);

  if(error) return <div style={{padding:'40px',color:'var(--red)',fontFamily:"'DM Mono',monospace"}}>{error}</div>;
  if(!user) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--text3)',fontFamily:"'DM Mono',monospace",fontSize:'11px',letterSpacing:'0.14em'}}>LOADING...</div>;

  const TAB_COLORS = {budget:'#ffd600',finances:'#00e676',calendar:'#448aff',gym:'#ff3b3b',meals:'#d67bff',cycle:'#e91e8c',profile:'#b06aff'};
  const tabColor = TAB_COLORS[activeTab] || '#00e676';
  const TAB_KEY = {finances:'Finances',calendar:'Calendar',budget:'Budget',gym:'Gym',meals:'Meals',cycle:'Cycle'};
  const tabSharingKey = TAB_KEY[activeTab];

  // All linked partners
  const allPartners = partners.length > 0 ? partners : (partner ? [partner] : []);

  // Partners who HAVE permission for this tab (from Profile sharing config)
  const permittedPartners = allPartners.filter(p =>
    tabSharingKey && sharingConfig[p.username]?.[tabSharingKey]
  );

  // Which usernames are currently selected (visible) for this tab
  // Default: only own user. Each chip click toggles that user on/off.
  const tabSelected = selectedUsers[activeTab] || new Set([user.username]);

  // Partners currently visible = permitted AND selected
  const activePartners = permittedPartners.filter(p => tabSelected.has(p.username));
  const selfVisible    = tabSelected.has(user.username);
  const isShared       = activePartners.length > 0;

  // Toggle a specific user's visibility for this tab
  const toggleUser = (username) => {
    setSelectedUsers(prev => {
      const current = prev[activeTab] || new Set([user.username]);
      const next = new Set(current);
      if(next.has(username)) next.delete(username);
      else next.add(username);
      // Always keep at least one user selected
      if(next.size === 0) next.add(user.username);
      return {...prev, [activeTab]: next};
    });
  };

  const sharedProps = {user, partner, partners:allPartners, activePartners, permittedPartners,
    selfVisible, isShared, tabSelected, onToggleUser:toggleUser, tabColor, sharingConfig, setSharingConfig};

  // Cycle tab: show if user is female, OR if any partner is female and cycle sharing is on
  const userIsFemale = (user.gender||'').toLowerCase()==='female';
  const anyCycleFemale = allPartners.some(p=>
    (p.gender||'').toLowerCase()==='female' && sharingConfig[p.username]?.Cycle
  );
  // Male users only see Cycle tab if a female partner has explicitly shared Cycle
  const showCycle = userIsFemale || anyCycleFemale;
  const isAdmin = !!(user.isAdmin || user.is_admin); // handle int (1/0) or bool
  const visibleTabs = ALL_TABS.filter(t=>{
    if(t.adminOnly) return isAdmin;
    if(t.cycleOnly) return showCycle;
    return true;
  });

  return (
    <div className="app-shell">
      <div style={{flex:1,overflow:'hidden',minHeight:0}}>
        {activeTab==='finances'&&<FinancesPage {...sharedProps}/>}
        {activeTab==='calendar'&&<CalendarPage {...sharedProps}/>}
        {activeTab==='budget'  &&<BudgetPage   {...sharedProps}/>}
        {activeTab==='gym'     &&<GymPage      {...sharedProps}/>}
        {activeTab==='meals'   &&<MealsPage    {...sharedProps}/>}
        {activeTab==='cycle'   &&<CyclePage    {...sharedProps}/>}
        {activeTab==='profile' &&<ProfilePage  user={user} setUser={setUser} partner={partner} setPartner={setPartner} partners={partners} sharingConfig={sharingConfig} setSharingConfig={setSharingConfig} onLogout={handleLogout} tabColor={tabColor}/>}
        {activeTab==='admin'   &&isAdmin&&<AdminPage user={user} onLogout={handleLogout} tabColor={tabColor}/>}
      </div>
      <div className="bottom-tabs">
        {visibleTabs.map(t=>(
          <button key={t.id}
            className={`tab-btn ${activeTab===t.id?'active':''}`}
            style={{'--tab-color': t.color}}
            onClick={()=>setActiveTab(t.id)}>
            <span className="tab-icon">{Icons[t.id]}</span>
            <span className="tab-label">{t.label}</span>
          </button>
        ))}
        <button className="tab-btn-logout" onClick={handleLogout} title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:'7px',letterSpacing:'0.1em',textTransform:'uppercase'}}>OUT</span>
        </button>
      </div>
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
