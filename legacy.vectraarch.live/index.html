const fmtR = n => `R${parseFloat(n||0).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtDate = d => { if(!d)return'—'; const dt=new Date(d); return isNaN(dt)?'—':dt.toLocaleDateString('en-ZA',{year:'numeric',month:'2-digit',day:'2-digit'}); };
const fmtDateTime = d => { if(!d)return'—'; const dt=new Date(d); return isNaN(dt)?'—':dt.toLocaleString('en-ZA',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).replace(',',''); };
const now = () => { const n=new Date(); n.setMinutes(n.getMinutes()-n.getTimezoneOffset()); return n.toISOString().slice(0,19); };

/* ── SHARED COMPONENTS ── */
const UserRow = ({user, partner, partners=[], activePartners=[], permittedPartners=[],
    selfVisible=true, tabSelected, isShared, onToggleUser}) => {
  const selfOn = tabSelected ? tabSelected.has(user?.username) : true;
  const selfColor = user?.eventColor || '#e91e8c';
  return (
    <div className="user-row" style={{flexWrap:'wrap',gap:6}}>
      {/* Self chip — clickable to toggle own data */}
      <div
        onClick={()=>onToggleUser&&onToggleUser(user?.username)}
        style={{
          display:'flex',alignItems:'center',gap:8,
          background:selfOn?`${selfColor}18`:'var(--bg3)',
          border:`1px solid ${selfOn?selfColor:'rgba(255,255,255,0.12)'}`,
          borderRadius:4,padding:'6px 10px',cursor:'pointer',
          transition:'all 0.15s',opacity:selfOn?1:0.5,
        }}>
        <img src={user?.profilePicUrl||DP} alt={user?.username}
          style={{width:28,height:28,borderRadius:'50%',objectFit:'cover',border:`2px solid ${selfColor}`}}/>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:500,letterSpacing:'0.06em',
          textTransform:'uppercase',color:selfOn?selfColor:'var(--text3)'}}>
          {user?.displayName||(user?.firstName&&user?.lastName?`${user.firstName} ${user.lastName}`:null)||user?.username||'USER'}
        </span>
        <span style={{fontSize:9,color:selfOn?selfColor:'var(--text3)'}}>{selfOn?'●':'○'}</span>
      </div>

      {/* Partner chips — only shown if they have permission for this tab */}
      {permittedPartners.map(p=>{
        const on = tabSelected ? tabSelected.has(p.username) : false;
        const pc = p.eventColor||'#448aff';
        return (
          <div key={p.username}
            onClick={()=>onToggleUser&&onToggleUser(p.username)}
            style={{
              display:'flex',alignItems:'center',gap:8,
              background:on?`${pc}18`:'var(--bg3)',
              border:`1px solid ${on?pc:'rgba(255,255,255,0.12)'}`,
              borderRadius:4,padding:'6px 10px',cursor:'pointer',
              transition:'all 0.15s',opacity:on?1:0.5,
            }}>
            <img src={p.profilePicUrl||DP} alt={p.username}
              style={{width:28,height:28,borderRadius:'50%',objectFit:'cover',border:`2px solid ${pc}`}}/>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:500,letterSpacing:'0.06em',

const Alert = ({msg,type}) => msg ? <div className={`alert ${type||'ok'}`}>{msg}</div> : null;

// ── Shared month navigator — matches calendar header style ──
const MonthNav = ({selectedMonth, setSelectedMonth, tabColor='#00e676', label='', year: yearProp, onGoToday}) => {
  const year  = yearProp ?? new Date().getFullYear();
  const mIdx  = parseInt(selectedMonth,10) - 1;
  const mName = new Date(year, mIdx, 1).toLocaleString('default',{month:'long'}).toUpperCase();
  const prev  = () => {
    const n = parseInt(selectedMonth,10) - 1;
    setSelectedMonth(n < 1 ? '12' : String(n).padStart(2,'0'));
  };
  const next  = () => {
    const n = parseInt(selectedMonth,10) + 1;
    setSelectedMonth(n > 12 ? '01' : String(n).padStart(2,'0'));
  };
  const goNow = () => { setSelectedMonth(String(new Date().getMonth()+1).padStart(2,'0')); if(onGoToday) onGoToday(); };
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px 4px'}}>
      <button onClick={prev} style={{width:32,height:32,borderRadius:'50%',background:'var(--bg3)',border:'none',color:'var(--text)',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:22,letterSpacing:'0.04em',color:'var(--text)'}}>{mName} {year}</div>
        {label&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--text3)',marginTop:1,letterSpacing:'0.1em'}}>{label}</div>}
      </div>
      <div style={{display:'flex',gap:6}}>
        <button onClick={goNow} style={{height:32,padding:'0 12px',borderRadius:16,background:tabColor,border:'none',color:'#fff',fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:'0.1em',cursor:'pointer'}}>TODAY</button>
        <button onClick={next} style={{width:32,height:32,borderRadius:'50%',background:'var(--bg3)',border:'none',color:'var(--text)',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
      </div>
    </div>
  );
};

// ── Shared search bar ──

      style={{flex:1,background:'transparent',border:'none',outline:'none',fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--text)',letterSpacing:'0.04em'}}

// ── Styled confirm modal — replaces window.confirm everywhere ──
const ConfirmModal = ({open, message, detail, confirmLabel='DELETE', confirmColor='var(--red)', onConfirm, onCancel}) => {
  if(!open) return null;
  return (
    <div className="modal-overlay" onClick={onCancel} style={{zIndex:200}}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()} style={{borderRadius:'16px 16px 0 0',paddingBottom:32}}>
        <div className="modal-handle"/>
        <div style={{textAlign:'center',padding:'8px 0 20px'}}>
          <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:20,color:'var(--text)',marginBottom:8}}>{message}</div>
          {detail&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--text3)',letterSpacing:'0.08em',lineHeight:1.6}}>{detail}</div>}
        </div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={onCancel} style={{flex:1,padding:'14px',background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:8,fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:600,letterSpacing:'0.1em',color:'var(--text3)',cursor:'pointer',textTransform:'uppercase'}}>CANCEL</button>
          <button onClick={onConfirm} style={{flex:1,padding:'14px',background:confirmColor,border:'none',borderRadius:8,fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:600,letterSpacing:'0.1em',color:'#fff',cursor:'pointer',textTransform:'uppercase'}}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
};

// ── Item action sheet — tap a card to get edit/delete options ──
const ActionSheet = ({open, title, tabColor='#00e676', onEdit, onDelete, onClose, canEdit=true}) => {
  if(!open) return null;
  return (
    <div className="modal-overlay" onClick={onClose} style={{zIndex:150}}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()} style={{borderRadius:'16px 16px 0 0',paddingBottom:32}}>
        <div className="modal-handle"/>
        {title&&<div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:18,color:'var(--text)',marginBottom:20,paddingTop:4}}>{title.toUpperCase()}</div>}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {canEdit&&onEdit&&(
            <button onClick={()=>{onEdit();onClose();}} style={{padding:'14px',background:`${tabColor}18`,border:`1px solid ${tabColor}55`,borderRadius:8,fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:600,letterSpacing:'0.1em',color:tabColor,cursor:'pointer',textTransform:'uppercase'}}>
              ✏️ EDIT
            </button>
          )}
          {onDelete&&(
            <button onClick={()=>{onDelete();onClose();}} style={{padding:'14px',background:'rgba(255,61,61,0.12)',border:'1px solid rgba(255,61,61,0.35)',borderRadius:8,fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:600,letterSpacing:'0.1em',color:'var(--red)',cursor:'pointer',textTransform:'uppercase'}}>
              🗑️ DELETE
            </button>
          )}
          <button onClick={onClose} style={{padding:'14px',background:'transparent',border:'1px solid var(--border2)',borderRadius:8,fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:600,letterSpacing:'0.1em',color:'var(--text3)',cursor:'pointer',textTransform:'uppercase'}}>CANCEL</button>
        </div>
      </div>
    </div>
  );
};

// ── Avatar helpers — resolves pic/color for any username across user+partner ──
// Usage: <ItemAvatar username={item.user} user={user} partner={partner} partners={partners} size={36}/>
// getOwner: resolve user object from username — checks user, partner, and partners array
const getOwner = (username, user, partner, partners=[]) => {
  const uname = String(username||'');
  if(uname===user?.username) return user;
  if(uname===partner?.username) return partner;
  if(partners?.length) { const found=partners.find(p=>p.username===uname); if(found) return found; }
  return null;
};
const ItemAvatar = ({username, user, partner, partners=[], size=36}) => {
  const owner = getOwner(username, user, partner, partners);
  const pic   = owner?.profilePicUrl || DP;
  const color = owner?.eventColor    || '#888';
  return (
    <img
      src={pic} alt={String(username||'')}
      style={{width:size,height:size,borderRadius:'50%',objectFit:'cover',
              flexShrink:0,border:`2px solid ${color}`}}
    />
  );
};

/* ── FINANCES PAGE ── */
/* ── FINANCES PAGE ── */
const FinancesPage = ({user, partner, partners=[], activePartners=[], permittedPartners=[], selfVisible=true, isShared, tabSelected, onToggleUser, tabColor='#00e676'}) => {
  const [items, setItems] = useState([]);
  const [budgets, setBudgets] = useState([]);
  const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
  const [sortField, setSortField] = useState('date');
  const [search, setSearch] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({category:'',amount:'',type:'expense',date:now()});
  const [editId, setEditId] = useState(null);
  const [actionItem, setActionItem] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [alert, setAlert] = useState({msg:'',type:''});

  // ── New feature state ──
  const [activeSection, setActiveSection] = useState('overview'); // 'overview'|'trends'|'recurring'|'categories'|'savings'
  const [recurringItems, setRecurringItems] = useState(() => {
    try { return JSON.parse(localStorage.getItem(`legacy_recurring_${user.username}`) || '[]'); } catch { return []; }
  });
  const [savingsGoals, setSavingsGoals] = useState(() => {
    try { return JSON.parse(localStorage.getItem(`legacy_savings_${user.username}`) || '[]'); } catch { return []; }
  });
  const [showRecurringForm, setShowRecurringForm] = useState(false);
  const [showSavingsForm, setShowSavingsForm] = useState(false);
  const [recurringForm, setRecurringForm] = useState({name:'',amount:'',type:'expense',frequency:'monthly',category:''});
  const [savingsForm, setSavingsForm] = useState({name:'',target:'',saved:'',color:tabColor,deadline:''});
  const [editSavingsIdx, setEditSavingsIdx] = useState(null);
  const [editRecurringIdx, setEditRecurringIdx] = useState(null);

  const msg = (m,t='ok') => { setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  // Persist recurring & savings to localStorage
  useEffect(()=>{ localStorage.setItem(`legacy_recurring_${user.username}`, JSON.stringify(recurringItems)); },[recurringItems, user.username]);
  useEffect(()=>{ localStorage.setItem(`legacy_savings_${user.username}`, JSON.stringify(savingsGoals)); },[savingsGoals, user.username]);

  const fetchAll = useCallback(async () => {
    const users = [...(selfVisible?[user.username]:[]), ...(activePartners||[]).map(p=>p.username)];
    try {
      const [fins, buds] = await Promise.all([
        Promise.all(users.map(u=>axios.get(`${API}/financial`,{params:{user:u}}).then(r=>r.data).catch(()=>[]))).then(r=>r.flat()),
        Promise.all(users.map(u=>axios.get(`${API}/budget`,{params:{user:u}}).then(r=>{
          const rows=r.data.data||r.data||[];
          return rows.map(b=>({...b,expenses:Array.isArray(b.expenses)?b.expenses:(typeof b.expenses==='string'?JSON.parse(b.expenses||'[]'):(b.expenses||[])),user:b.user||u}));
        }).catch(()=>[]))).then(r=>r.flat())
      ]);
      setItems(fins); setBudgets(buds);
    } catch {}
  }, [user.username, partner, isShared, selfVisible, JSON.stringify((activePartners||[]).map(p=>p.username))]);

  useEffect(()=>{ fetchAll(); },[fetchAll]);

  // ── Current month filtered items ──
  const filtered = useMemo(()=>{
    const users = [...(selfVisible?[user.username]:[]), ...(activePartners||[]).map(p=>p.username)];
    if(users.length===0) return [];
    let list = items.filter(i=>users.includes(i.user||i.username)&&(i.date||'').slice(5,7)===selectedMonth);
    if(search) list = list.filter(i=>(i.category||'').toLowerCase().includes(search.toLowerCase()));
    return [...list].sort((a,b)=>sortField==='amount'?parseFloat(b.amount)-parseFloat(a.amount):new Date(b.date)-new Date(a.date));
  },[items,selectedMonth,search,sortField,user.username,selfVisible,JSON.stringify((activePartners||[]).map(p=>p.username))]);

  const totals = useMemo(()=>{
    const inc = filtered.filter(i=>i.type==='income').reduce((s,i)=>s+parseFloat(i.amount||0),0);
    const exp = filtered.filter(i=>i.type==='expense').reduce((s,i)=>s+parseFloat(i.amount||0),0);
    return {inc,exp,net:inc-exp};
  },[filtered]);

  // ── All items across all months (for trends) ──
  const allUserItems = useMemo(()=>{
    const users = [...(selfVisible?[user.username]:[]), ...(activePartners||[]).map(p=>p.username)];
    return items.filter(i=>users.includes(i.user||i.username));
  },[items,selfVisible,user.username,JSON.stringify((activePartners||[]).map(p=>p.username))]);

  // ── Month-over-month data (last 6 months) ──
  const trendData = useMemo(()=>{
    const anchor = new Date(new Date().getFullYear(), parseInt(selectedMonth,10)-1, 1);
    const months = [];
    for(let i=5;i>=0;i--){
      const d = new Date(anchor.getFullYear(), anchor.getMonth()-i, 1);
      const mv = String(d.getMonth()+1).padStart(2,'0');
      const year = d.getFullYear();
      const key = `${year}-${mv}`;
      const label = d.toLocaleString('default',{month:'short'}).toUpperCase();

      const inc = monthItems.filter(it=>it.type==='income').reduce((s,it)=>s+parseFloat(it.amount||0),0);
      const exp = monthItems.filter(it=>it.type==='expense').reduce((s,it)=>s+parseFloat(it.amount||0),0);
      months.push({label,key,inc,exp,net:inc-exp});
    }
    return months;

  // ── Top categories for selected month ──
  const topCategories = useMemo(()=>{

  // ── CRUD handlers ──
  const handleSave = async () => {
    if(!form.category||!form.amount){msg('Fill all fields.','err');return;}
    try {
      if(editId) {
        await axios.put(`${API}/financial/${editId}`,{user:user.username,category:form.category,amount:parseFloat(form.amount),type:form.type,date:form.date});
        msg('Updated.');
      } else {
        await axios.post(`${API}/financial`,{user:user.username,category:form.category,amount:parseFloat(form.amount),type:form.type,date:form.date});
        msg('Saved.');
      }
      setShowForm(false);setEditId(null);setForm({category:'',amount:'',type:'expense',date:now()});fetchAll();
    } catch { msg('Error.','err'); }
  };
  const handleFinDelete = async(id)=>{
    try { await axios.delete(`${API}/financial/${id}`); msg('Deleted.'); fetchAll(); } catch { msg('Error.','err'); }

  const startFinEdit = (item) => {

  // ── Savings goal handlers ──
  const handleSaveSavings = () => {
    if(!savingsForm.name||!savingsForm.target){msg('Name and target required.','err');return;}
    const goal = {...savingsForm, target:parseFloat(savingsForm.target)||0, saved:parseFloat(savingsForm.saved)||0, id:Date.now()};
    if(editSavingsIdx!==null){
      setSavingsGoals(prev=>prev.map((g,i)=>i===editSavingsIdx?{...g,...goal,id:g.id}:g));
      setEditSavingsIdx(null);
    } else {
      setSavingsGoals(prev=>[...prev, goal]);
    }
    setSavingsForm({name:'',target:'',saved:'',color:tabColor,deadline:''});
    setShowSavingsForm(false);
  };
  const deleteSavingsGoal = (idx) => setSavingsGoals(prev=>prev.filter((_,i)=>i!==idx));
  const startEditSavings = (idx) => {
    const g = savingsGoals[idx];
    setSavingsForm({name:g.name,target:String(g.target),saved:String(g.saved),color:g.color||tabColor,deadline:g.deadline||''});
    setEditSavingsIdx(idx); setShowSavingsForm(true);
  };
  const addToSavings = (idx, amount) => {
    setSavingsGoals(prev=>prev.map((g,i)=>i===idx?{...g,saved:Math.min(g.target,(g.saved||0)+amount)}:g));
  };

  // ── Recurring handlers ──
  const handleSaveRecurring = () => {
    if(!recurringForm.name||!recurringForm.amount){msg('Name and amount required.','err');return;}
    const item = {...recurringForm, amount:parseFloat(recurringForm.amount)||0, id:Date.now()};
    if(editRecurringIdx!==null){
      setRecurringItems(prev=>prev.map((r,i)=>i===editRecurringIdx?{...r,...item,id:r.id}:r));
      setEditRecurringIdx(null);
    } else {
      setRecurringItems(prev=>[...prev, item]);
    }

    setShowRecurringForm(false);

  const startEditRecurring = (idx) => {

      msg(`"${rec.name}" added to transactions.`); fetchAll();

  // ── Inline SVG bar chart for trends ──
  const TrendChart = ({data}) => {
    const maxVal = Math.max(...data.map(d=>Math.max(d.inc,d.exp)),1);
    const W=320, H=120, BAR=28, GAP=8, COLS=data.length;
    const grpW = BAR*2+GAP;
    const totalW = COLS*(grpW+16);
    return (
      <svg viewBox={`0 0 ${totalW+40} ${H+40}`} style={{width:'100%',maxWidth:'100%',display:'block'}}>
        {/* Y gridlines */}
        {[0,0.25,0.5,0.75,1].map(pct=>{
          const y = 10 + (H-20)*(1-pct);
          return <line key={pct} x1="32" x2={totalW+40} y1={y} y2={y} stroke="rgba(255,255,255,0.06)" strokeWidth="1"/>;
        })}
        {data.map((d,i)=>{
          const x = 36 + i*(grpW+16);
          const incH = maxVal>0?((d.inc/maxVal)*(H-20)):0;
          const expH = maxVal>0?((d.exp/maxVal)*(H-20)):0;
          const netPos = d.net >= 0;
          return (
            <g key={d.key}>

              <rect x={x} y={10+(H-20)-incH} width={BAR} height={Math.max(incH,1)} fill="rgba(0,230,118,0.7)" rx="2"/>
              {/* Expense bar */}
              <rect x={x+BAR+GAP} y={10+(H-20)-expH} width={BAR} height={Math.max(expH,1)} fill="rgba(255,61,61,0.7)" rx="2"/>

              <text x={x+BAR+GAP/2} y={H+16} textAnchor="middle" fontFamily="DM Mono" fontSize="8" fill="rgba(255,255,255,0.4)" letterSpacing="0.08em">{d.label}</text>
              {/* Net dot */}
              <circle cx={x+BAR+GAP/2} cy={10+(H-20)-(maxVal>0?((Math.abs(d.net)/maxVal)*(H-20)/2):0)} r="3" fill={netPos?'#00e676':'#ff3b3b'} opacity="0.9"/>
            </g>
          );

              {/* Row 2: Daily Net area chart */}
              {(()=>{
                const year = new Date().getFullYear();
                const daysInMonth = new Date(year, parseInt(selectedMonth,10), 0).getDate();
                // Accumulate daily running net for selected month
                const dailyNet = [];
                let running = 0;
                for(let d=1;d<=daysInMonth;d++){

                  const dayItems = filtered.filter(i=>(i.date||'').startsWith(dayStr));
                  dayItems.forEach(i=>{ running += i.type==='income'?parseFloat(i.amount||0):-parseFloat(i.amount||0); });
                  dailyNet.push(running);
                }
                const minV = Math.min(...dailyNet,0);
                const maxV = Math.max(...dailyNet,1);
                const range = maxV-minV||1;
                const W=400, H=68, PAD=8;
                const pts = dailyNet.map((v,i)=>{
                  const x = PAD + (i/(daysInMonth-1||1))*(W-PAD*2);
                  const y = PAD + (1-(v-minV)/range)*(H-PAD*2);
                  return `${x},${y}`;
                });
                const polyline = pts.join(' ');
                const areaClose = `${W-PAD},${H} ${PAD},${H}`;
                const lastVal = dailyNet[dailyNet.length-1]||0;
                return (
                  <div style={{position:'relative',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
                    <div style={{position:'absolute',top:10,left:14,fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.14em',color:'rgba(255,255,255,0.35)',zIndex:2}}>
                      DAILY NET · {monthLabel.toUpperCase()}
                    </div>
                    <div style={{position:'absolute',top:10,right:14,fontFamily:"'DM Mono',monospace",fontSize:9,color:lastVal>=0?'#00e676':'#ff3b3b',zIndex:2,letterSpacing:'0.06em'}}>
                      {lastVal>=0?'▲':'▼'} {fmtR(Math.abs(lastVal))}
                    </div>
                    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:80,display:'block'}} preserveAspectRatio="none">
                      <defs>
                        <linearGradient id="netGrad" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stopColor="#00e676" stopOpacity="0.45"/>
                          <stop offset="100%" stopColor="#00e676" stopOpacity="0.03"/>
                        </linearGradient>
                      </defs>
                      {/* Zero line */}
                      {minV<0&&<line x1={PAD} x2={W-PAD} y1={PAD+(1-(0-minV)/range)*(H-PAD*2)} y2={PAD+(1-(0-minV)/range)*(H-PAD*2)} stroke="rgba(255,255,255,0.1)" strokeWidth="1" strokeDasharray="3,3"/>}
                      {/* Area fill */}
                      <polygon points={`${pts[0]} ${polyline} ${areaClose}`} fill="url(#netGrad)"/>
                      {/* Line */}
                      <polyline points={polyline} fill="none" stroke="#00e676" strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
                      {/* End dot */}
                      {pts.length>0&&<circle cx={pts[pts.length-1].split(',')[0]} cy={pts[pts.length-1].split(',')[1]} r="3" fill="#00e676" filter="url(#glow)"/>}
                      <defs><filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                    </svg>
                  </div>
                );
              })()}

              {/* Row 3: Donut spend + Category bars */}
              {(()=>{
                // Top categories
                const expItems = filtered.filter(i=>i.type==='expense');
                const catMap = {};
                expItems.forEach(i=>{ const k=(i.category||'OTHER').toUpperCase(); catMap[k]=(catMap[k]||0)+parseFloat(i.amount||0); });
                const cats = Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
                const CAT_COLORS = ['#448aff','#ff3b3b','#ffd600','#00e676','#e040fb'];

                // SVG donut
                const R=38, r=24, CX=50, CY=50;
                const total = cats.reduce((s,[,v])=>s+v,0)||1;
                let cumAngle = -Math.PI/2;
                const slices = cats.map(([cat,val],i)=>{
                  const angle = (val/total)*2*Math.PI;
                  const x1=CX+R*Math.cos(cumAngle), y1=CY+R*Math.sin(cumAngle);
                  cumAngle+=angle;
                  const x2=CX+R*Math.cos(cumAngle), y2=CY+R*Math.sin(cumAngle);
                  const xi1=CX+r*Math.cos(cumAngle-angle), yi1=CY+r*Math.sin(cumAngle-angle);
                  const xi2=CX+r*Math.cos(cumAngle), yi2=CY+r*Math.sin(cumAngle);
                  const large=angle>Math.PI?1:0;
                  const d=`M${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} L${xi2.toFixed(2)},${yi2.toFixed(2)} A${r},${r} 0 ${large},0 ${xi1.toFixed(2)},${yi1.toFixed(2)} Z`;
                  return {d, color:CAT_COLORS[i%CAT_COLORS.length]};
                });

                return (
                  <div style={{display:'flex',alignItems:'center',gap:0,padding:'12px 14px'}}>
                    {/* Donut */}
                    <div style={{flexShrink:0,position:'relative',width:100,height:100}}>
                      <svg viewBox="0 0 100 100" width="100" height="100">
                        {slices.length>0
                          ? slices.map((s,i)=><path key={i} d={s.d} fill={s.color}/>)

                        }
                      </svg>
                      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,letterSpacing:'0.1em',color:'rgba(255,255,255,0.4)',marginBottom:2}}>SPEND</div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontWeight:500,fontSize:10,color:'#ff3b3b',lineHeight:1,textAlign:'center'}}>{fmtR(totals.exp)}</div>

                    <div style={{flex:1,display:'flex',flexDirection:'column',gap:7,paddingLeft:12}}>
                      {cats.length===0

                            const pct = total>0?(val/total)*100:0;

                              <div key={cat}>
                                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:'0.08em',color:'rgba(255,255,255,0.6)'}}>{cat}</span>
                                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'rgba(255,255,255,0.5)',letterSpacing:'0.04em'}}>{Math.round(val).toLocaleString('en-ZA')}</span>
                                </div>
                                <div style={{height:3,background:'rgba(255,255,255,0.08)',borderRadius:2}}>
                                  <div style={{height:'100%',width:`${pct}%`,background:CAT_COLORS[i%CAT_COLORS.length],borderRadius:2,transition:'width 0.4s'}}/>
                                </div>
                              </div>
                            );
                          })
                      }
                    </div>
                  </div>
                );
              })()}
            </div>
            {/* end dashboard widget */}

            <SearchBar value={search} onChange={setSearch} placeholder="Search transactions..." tabColor={tabColor}/>

            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'4px 16px 8px'}}>

              <div style={{display:'flex',gap:6}}>

                  <button key={f} onClick={()=>setSortField(f)} style={{...pillStyle(sortField===f?'_active':'_'),borderColor:sortField===f?tabColor:'rgba(255,255,255,0.1)',background:sortField===f?`${tabColor}18`:'transparent',color:sortField===f?tabColor:'var(--text3)'}}>

            <div className="section-label" style={{padding:'12px 16px 6px'}}>INCOME VS EXPENSES · LAST 6 MONTHS</div>

/* ── CALENDAR PAGE ── */
const CalendarPage = ({user, partner, partners=[], activePartners=[], permittedPartners=[], selfVisible=true, isShared, tabSelected, onToggleUser, tabColor='#448aff'}) => {
  const [events, setEvents]           = useState([]);
  const [viewDate, setViewDate]       = useState(new Date());
  const [selectedDay, setSelectedDay] = useState(new Date());
  const [showForm, setShowForm]       = useState(false);
  const [form, setForm]               = useState({title:'',date:now(),type:'personal',color:user?.eventColor||'#448aff',amount:'',finType:'income',financial:false});
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [alert, setAlert]             = useState({msg:'',type:''});
  const [search, setSearch]             = useState('');
  const [confirmDelCal, setConfirmDelCal] = useState(null);
  const [actionCalEvent, setActionCalEvent] = useState(null);
  const [editCalId, setEditCalId] = useState(null);
  const msg = (m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const calUserIsMale    = (user.gender||'').toLowerCase()==='male';
  const calFemalePartners = activePartners.filter(p=>(p.gender||'').toLowerCase()==='female');
  const canSeeCycle       = !calUserIsMale || calFemalePartners.length > 0;

  // ── date helpers — always compare in LOCAL date strings to avoid TZ bugs ──
  const toLocalDate  = (d) => { const dt=new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; };
  const dayKey       = (date) => toLocalDate(date);
  const todayKey     = dayKey(new Date());
  const selectedKey  = dayKey(selectedDay);

  const fetchEvents = useCallback(async()=>{
    const users=[...(selfVisible?[user.username]:[]),...(activePartners||[]).map(p=>p.username)];
    if(users.length===0){setEvents([]);return;}
    try {
      const periodUsers = calUserIsMale ? calFemalePartners.map(p=>p.username) : users;
      const [calAll, periodAll] = await Promise.all([
        Promise.all(users.map(u=>axios.get(`${API}/calendar`,{params:{user:u}}).then(r=>r.data.map(e=>({...e,user:e.user||u}))).catch(()=>[]))).then(r=>r.flat()),
        periodUsers.length>0
          ? Promise.all(periodUsers.map(u=>axios.get(`${API}/period`,{params:{user:u}}).then(r=>r.data).catch(()=>[]))).then(r=>r.flat())
          : Promise.resolve([])
      ]);
      const cycleEvents = [];
      periodAll.forEach(cyc=>{
        if(!cyc.startDate) return;
        const start = new Date(cyc.startDate);
        const end   = cyc.endDate ? new Date(cyc.endDate) : new Date(start.getTime()+4*86400000);
        const len   = parseInt(cyc.cycleLength)||28;
        for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1))
          cycleEvents.push({id:`cycle-${cyc.id}-${toLocalDate(d)}`,title:'Period',date:toLocalDate(d)+'T00:00:00',isCycle:true,user:cyc.user||cyc.username});
        const ovulation = new Date(start.getTime()+(len-14)*86400000);
        for(let i=-4;i<=1;i++){
          const fd=new Date(ovulation.getTime()+i*86400000);
          cycleEvents.push({id:`fertile-${cyc.id}-${toLocalDate(fd)}`,title:'Fertile',date:toLocalDate(fd)+'T00:00:00',isFertile:true,user:cyc.user||cyc.username});
        }
      });
      setEvents([...calAll,...cycleEvents]);
    } catch(e){ console.error(e); }
  },[user.username, partner, isShared, selfVisible, JSON.stringify((activePartners||[]).map(p=>p.username))]);

  useEffect(()=>{ fetchEvents(); },[fetchEvents]);

  // ── calendar grid ──
  const {year, month} = useMemo(()=>({year:viewDate.getFullYear(), month:viewDate.getMonth()}),[viewDate]);
  const daysInMonth = useMemo(()=>{
    const first = new Date(year,month,1);
    const last  = new Date(year,month+1,0);
    const days  = [];
    let dow = (first.getDay()+6)%7; // Mon=0
    for(let i=0;i<dow;i++) days.push({date:new Date(year,month,1-dow+i),otherMonth:true});
    for(let d=1;d<=last.getDate();d++) days.push({date:new Date(year,month,d),otherMonth:false});
    const rem=7-(days.length%7); if(rem<7) for(let i=1;i<=rem;i++) days.push({date:new Date(year,month+1,i),otherMonth:true});
    return days;
  },[year,month]);

  // ── key fix: compare using local date strings, not Date objects ──
  const eventsByDay = useMemo(()=>{
    const map={};
    events.forEach(e=>{
      if(!e.date) return;
      const k=toLocalDate(new Date(e.date));
      if(!map[k]) map[k]=[];
      map[k].push(e);
    });
    return map;
  },[events]);

  const getEventsForDay = (date) => eventsByDay[dayKey(date)] || [];
  const selectedEvents  = useMemo(()=>getEventsForDay(selectedDay),[selectedKey,eventsByDay]);

  const handleSave = async()=>{
    if(!form.title||!form.date){msg('Title and date required.','err');return;}
    try {
      if(editCalId) await axios.delete(`${API}/calendar/${editCalId}`);
      await axios.post(`${API}/calendar`,{
        user:       user.username,
        title:      form.title,
        date:       form.date,
        financial:  form.financial && !!form.amount,
        finType:    form.finType||'income',
        eventColor: form.color||user.eventColor||'#448aff',
        type:       form.financial ? form.finType : form.type,
        amount:     form.amount||null,
      });
      msg(editCalId?'Event updated.':'Event saved.');
      setShowForm(false);setEditCalId(null);
      setForm({title:'',date:now(),type:'personal',color:user?.eventColor||'#448aff',amount:'',finType:'income',financial:false});
      fetchEvents();
    } catch { msg('Error.','err'); }
  };
  const startEditCalEvent = (e) => {
    setForm({
      title:    e.title||'',
      date:     (e.date||now()).slice(0,19),
      type:     e.financial||e.is_financial ? (e.type||'income') : (e.type||'personal'),
      color:    e.eventColor||e.event_color||user.eventColor||'#448aff',
      amount:   String(e.amount||''),
      finType:  e.type==='expense'?'expense':'income',
      financial:!!(e.financial||e.is_financial),
    });
    setEditCalId(e.id);
    setShowForm(true);
  };
  const handleDeleteEvent = async(id)=>{
    try { await axios.delete(`${API}/calendar/${id}`); msg('Deleted.'); setSelectedEvent(null); fetchEvents(); } catch { msg('Error.','err'); }
  };

  const prevMonth = ()=>setViewDate(new Date(year,month-1,1));
  const nextMonth = ()=>setViewDate(new Date(year,month+1,1));
  const goToday   = ()=>{ const t=new Date(); setViewDate(new Date(t.getFullYear(),t.getMonth(),1)); setSelectedDay(t); };

  const MONTHS_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAYS_FULL   =['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  const EVENT_TYPES = ['personal','work','health','social','financial'];
  // EVENT_ICONS removed — using getEventIcon SVG function
  const getEventIcon = (e, sz=14) => {
    const s = {width:sz,height:sz};
    if(e.isCycle)   return <svg viewBox="0 0 24 24" fill="currentColor" style={s}><path d="M12 2C12 2 5 10.5 5 15a7 7 0 0 0 14 0C19 10.5 12 2 12 2z"/></svg>;
    if(e.isFertile) return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" style={s}><circle cx="12" cy="12" r="5"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>;
    if(e.financial||e.is_financial) return e.type==='expense'
      ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" style={s}><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
      : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" style={s}><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>;
    const t = e.type||'personal';
    if(t==='work')   return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" style={s}><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>;
    if(t==='health') return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" style={s}><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>;
    if(t==='social') return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" style={s}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" style={s}><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>;
  };
  const TYPE_COLORS = {personal:'var(--yellow)',work:'var(--blue)',health:'var(--green)',social:'var(--pink)',financial:'var(--green)'};

  return (
    <div className="page-outer">
      <div className="top-bar">
        <span className="top-eyebrow"><span style={{color:user?.eventColor||'#00e676'}}>§ VECTRA ARCH</span> · LEGACY · CALENDAR</span>
      </div>
      <div className="page-scroll">
        <div className="page-inner" style={{padding:0}}>
          <div className="page-head">
            <div className="page-title">CALENDAR</div>
            <div className="page-sub">EVENTS · CYCLE · SCHEDULE</div>
          </div>
          <UserRow user={user} partner={partner} partners={partners} activePartners={activePartners} permittedPartners={permittedPartners} selfVisible={selfVisible} tabSelected={tabSelected} isShared={isShared} onToggleUser={onToggleUser}/>
          <Alert {...alert}/>
          <SearchBar value={search} onChange={setSearch} placeholder="Search events..." tabColor={tabColor}/>

          {/* ── iPhone-style month header ── */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px 4px'}}>
            <button onClick={prevMonth} style={{width:32,height:32,borderRadius:'50%',background:'var(--bg3)',border:'none',color:'var(--text)',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
            <div style={{textAlign:'center'}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:22,letterSpacing:'0.04em',color:'var(--text)'}}>{MONTHS_SHORT[month].toUpperCase()} {year}</div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={goToday} style={{height:32,padding:'0 12px',borderRadius:16,background:tabColor,border:'none',color:'#fff',fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:'0.1em',cursor:'pointer'}}>TODAY</button>
              <button onClick={nextMonth} style={{width:32,height:32,borderRadius:'50%',background:'var(--bg3)',border:'none',color:'var(--text)',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
            </div>
          </div>

          {/* ── Day-of-week headers ── */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',padding:'0 8px',marginBottom:4}}>
            {['M','T','W','T','F','S','S'].map((d,i)=>(
              <div key={i} style={{textAlign:'center',fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:'0.1em',color:i>=5?'var(--red)':'var(--text3)',padding:'4px 0'}}>{d}</div>
            ))}
          </div>

          {/* ── Calendar grid — iPhone style ── */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',padding:'0 8px',gap:'2px 0'}}>
            {daysInMonth.map((item,i)=>{
              const k         = dayKey(item.date);
              const dayEvts   = eventsByDay[k]||[];
              const hasCycle  = canSeeCycle && dayEvts.some(e=>e.isCycle);
              const hasFertile= canSeeCycle && dayEvts.some(e=>e.isFertile);
              const realEvts  = dayEvts.filter(e=>!e.isCycle&&!e.isFertile);
              const isToday   = k===todayKey;
              const isSel     = k===selectedKey;
              const isWeekend = i%7>=5;
              const numColor  = item.otherMonth?'var(--border2)':hasCycle?'#fff':isToday?'#fff':isSel?tabColor:isWeekend?'var(--red)':'var(--text)';
              const numBg     = isToday&&!hasCycle?tabColor:isSel&&!isToday&&!hasCycle?`${tabColor}22`:'transparent';
              return (
                <div key={i} onClick={()=>!item.otherMonth&&setSelectedDay(item.date)}
                  style={{
                    display:'flex',flexDirection:'column',alignItems:'center',
                    padding:'4px 0 6px',cursor:item.otherMonth?'default':'pointer',
                    background:hasCycle?'rgba(233,30,140,0.22)':hasFertile?'rgba(29,233,182,0.1)':'transparent',
                    borderRadius:6,
                    opacity:item.otherMonth?0.25:1,
                  }}>
                  {/* Day number */}
                  <div style={{
                    width:28,height:28,borderRadius:'50%',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    background:numBg,
                    fontFamily:"'Barlow Condensed',sans-serif",fontWeight:isSel||isToday?800:500,
                    fontSize:15,color:numColor,
                  }}>{item.date.getDate()}</div>
                  {/* Event icons — SVG */}
                  <div style={{display:'flex',gap:1,marginTop:2,height:10,alignItems:'center',justifyContent:'center',color:'var(--text3)'}}>
                    {hasCycle&&<svg viewBox="0 0 24 24" fill="#e91e8c" width="7" height="7"><path d="M12 2C12 2 5 10.5 5 15a7 7 0 0 0 14 0C19 10.5 12 2 12 2z"/></svg>}
                    {hasFertile&&!hasCycle&&<svg viewBox="0 0 24 24" fill="none" stroke="#1de9b6" strokeWidth="2" width="7" height="7"><circle cx="12" cy="12" r="5"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>}
                    {realEvts.slice(0,2).map((e,j)=>{
                      const owner=getOwner(e.user||e.username,user,partner,partners);
                      const dc=owner?.eventColor||e.eventColor||'var(--yellow)';
                      return <div key={j} style={{color:dc}}>{getEventIcon(e,7)}</div>;
                    })}
                    {realEvts.length>2&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:6,color:'var(--text3)'}}>+{realEvts.length-2}</span>}
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── Legend inline — SVG icons matching tab icons ── */}
          <div style={{display:'flex',flexWrap:'wrap',gap:8,padding:'8px 12px 4px',borderTop:'1px solid var(--border)',marginTop:4}}>
            {canSeeCycle&&<LegendItem color="#e91e8c" label="MENSTRUATION" icon={<svg viewBox="0 0 24 24" fill="#e91e8c" width="10" height="10"><path d="M12 2C12 2 5 10.5 5 15a7 7 0 0 0 14 0C19 10.5 12 2 12 2z"/></svg>}/>}
            {canSeeCycle&&<LegendItem color="#1de9b6" label="OVULATION" icon={<svg viewBox="0 0 24 24" fill="none" stroke="#1de9b6" strokeWidth="2" width="10" height="10"><circle cx="12" cy="12" r="5"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>}/>}
            <LegendItem label="PERSONAL" icon={<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="10" height="10"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>}/>
            <LegendItem label="WORK" icon={<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="10" height="10"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>}/>
            <LegendItem label="HEALTH" icon={<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="10" height="10"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>}/>
            <LegendItem color="var(--green)" label="INCOME" icon={<svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" strokeWidth="2.5" width="10" height="10"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>}/>
            <LegendItem color="var(--red)" label="EXPENSE" icon={<svg viewBox="0 0 24 24" fill="none" stroke="var(--red)" strokeWidth="2.5" width="10" height="10"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>}/>
          </div>

          {/* ── Selected day header — iPhone style ── */}
          <div style={{padding:'14px 16px 6px',borderTop:'1px solid var(--border)',marginTop:8,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:18,color:'var(--text)',letterSpacing:'0.02em'}}>
                {DAYS_FULL[selectedDay.getDay()].toUpperCase()}{' '}
                <span style={{color:tabColor}}>{selectedDay.getDate()}</span>
                {' '}{MONTHS_SHORT[selectedDay.getMonth()]} {selectedDay.getFullYear()}
              </div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--text3)',marginTop:2}}>
                {selectedEvents.filter(e=>!e.isCycle&&!e.isFertile&&(!search||(e.title||'').toLowerCase().includes(search.toLowerCase()))).length} event{selectedEvents.filter(e=>!e.isCycle&&!e.isFertile&&(!search||(e.title||'').toLowerCase().includes(search.toLowerCase()))).length!==1?'s':''}
                {canSeeCycle&&selectedEvents.some(e=>e.isCycle)?' · 🩸 period':''}
                {canSeeCycle&&selectedEvents.some(e=>e.isFertile)?' · 🩵 ovulation':''}
              </div>
            </div>

          </div>

          {/* ── Events list ── */}
          <div style={{padding:'0 16px'}}>
            <div className="section-label" style={{padding:'4px 0 10px',borderBottom:'none'}}>
              EVENTS <span style={{color:tabColor}}>{selectedEvents.filter(e=>!e.isCycle&&!e.isFertile&&(!search||(e.title||'').toLowerCase().includes(search.toLowerCase()))).length}</span> RECORDS
            </div>
            {canSeeCycle&&selectedEvents.some(e=>e.isCycle)&&(
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'rgba(233,30,140,0.1)',border:'1px solid rgba(233,30,140,0.25)',borderRadius:8,marginBottom:8}}>
                <span style={{fontSize:16}}>🩸</span>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:'#e91e8c'}}>MENSTRUATION DAY</div>
              </div>
            )}
            {canSeeCycle&&selectedEvents.some(e=>e.isFertile)&&(
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'rgba(29,233,182,0.08)',border:'1px solid rgba(29,233,182,0.25)',borderRadius:8,marginBottom:8}}>
                <span style={{fontSize:16}}>🌿</span>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:'#1de9b6'}}>OVULATION WINDOW</div>
              </div>
            )}
            {selectedEvents.filter(e=>!e.isCycle&&!e.isFertile&&(!search||(e.title||'').toLowerCase().includes(search.toLowerCase()))).length===0&&!selectedEvents.some(e=>e.isCycle||e.isFertile)&&(
              <div style={{textAlign:'center',padding:'24px 0',color:'var(--text3)',fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:'0.1em'}}>
                NO EVENTS
              </div>
            )}
            {selectedEvents.filter(e=>!e.isCycle&&!e.isFertile&&(!search||(e.title||'').toLowerCase().includes(search.toLowerCase())||(e.type||'').toLowerCase().includes(search.toLowerCase()))).map(e=>{
              const calOwner = getOwner(e.user||e.username,user,partner,partners);
              const coc      = calOwner?.eventColor||e.eventColor||e.event_color||'var(--yellow)';
              const isOwn    = (e.user||e.username)===user.username;
              const icon     = getEventIcon(e);
              const isFin    = e.financial||e.is_financial||e.financial==='1'||e.is_financial===1;
              const badgeColor = isFin ? (e.type==='expense'?'var(--red)':'var(--green)') : coc;
              const timeStr = fmtDate(e.date);
              return (
                <div key={e.id} className="meal-card" style={{marginBottom:8,borderLeft:`3px solid ${coc}`,cursor:isOwn?'pointer':'default'}}
                  onClick={()=>isOwn&&setActionCalEvent(e)}>
                  {/* Top row: avatar + icon badge + owner name — same as gym/budget */}
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                    <ItemAvatar username={e.user||e.username} user={user} partner={partner} partners={partners} size={36}/>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:'0.12em',
                      padding:'3px 8px',borderRadius:3,textTransform:'uppercase',flexShrink:0,
                      background: isFin?(e.type==='expense'?'rgba(255,61,61,0.15)':'rgba(0,230,118,0.15)'):`${coc}20`,
                      color:      isFin?(e.type==='expense'?'var(--red)':'var(--green)'):coc,
                      border:     isFin?(e.type==='expense'?'1px solid rgba(255,61,61,0.4)':'1px solid rgba(0,230,118,0.4)'):`1px solid ${coc}55`}}>
                      <span style={{display:'inline-flex',alignItems:'center',gap:4,verticalAlign:'middle'}}>
                        {icon}
                        {isFin?(e.type==='expense'?'EXPENSE':'INCOME'):(e.type||'personal').toUpperCase()}
                      </span>
                    </span>
                    {calOwner&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:coc,letterSpacing:'0.08em'}}>
                      {(calOwner.displayName||(calOwner.firstName&&calOwner.lastName?`${calOwner.firstName} ${calOwner.lastName}`:null)||calOwner.username||'').toUpperCase()}
                    </span>}
                  </div>
                  {/* Title */}
                  <div className="meal-name" style={{marginBottom:6}}>{(e.title||'Untitled').toUpperCase()}</div>
                  {/* Time + amount row */}
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div className="meal-note">{timeStr}</div>
                    {e.amount&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:600,
                      color:e.type==='expense'?'var(--red)':'var(--green)'}}>{fmtR(e.amount)}</div>}
                  </div>
                  {isOwn&&<span style={{color:'var(--text3)',fontSize:12,marginLeft:'auto',flexShrink:0}}>›</span>}
                </div>
              );
            })}
          </div>

          <div style={{height:'80px'}}/>
        </div>
      </div>


      <button className="fab" style={{background:tabColor,boxShadow:`0 4px 20px ${tabColor}55`}}
        onClick={()=>{ setForm(p=>({...p,date:dayKey(selectedDay)+'T09:00:00'})); setShowForm(true); }}>
        + ADD EVENT
      </button>

      <ActionSheet open={!!actionCalEvent} title={actionCalEvent?.title} tabColor={tabColor}
        onEdit={()=>startEditCalEvent(actionCalEvent)}
        onDelete={()=>setConfirmDelCal(actionCalEvent?.id)}
        onClose={()=>setActionCalEvent(null)}/>
      <ConfirmModal open={!!confirmDelCal} message="Delete event?" detail={actionCalEvent?.title||selectedEvent?.title}
        onConfirm={async()=>{await handleDeleteEvent(confirmDelCal);setConfirmDelCal(null);setSelectedEvent(null);setActionCalEvent(null);}}
        onCancel={()=>setConfirmDelCal(null)}/>

      {/* ── Event detail modal ── */}
      {selectedEvent&&(
        <div className="modal-overlay" onClick={()=>setSelectedEvent(null)}>
          <div className="modal-sheet" onClick={e=>e.stopPropagation()} style={{borderRadius:'16px 16px 0 0'}}>
            <div className="modal-handle"/>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
              <ItemAvatar username={selectedEvent.user||selectedEvent.username} user={user} partner={partner} partners={partners} size={40}/>
              <div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:20,color:'var(--text)'}}>{(selectedEvent.title||'').toUpperCase()}</div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--text3)',marginTop:2}}>
                  {fmtDate(selectedEvent.date)} · {(selectedEvent.type||'personal').toUpperCase()}
                </div>
              </div>
            </div>
            {selectedEvent.amount&&<div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:18,color:'var(--green)',marginBottom:12}}>{fmtR(selectedEvent.amount)}</div>}
            {(selectedEvent.user||selectedEvent.username)===user.username&&(
              <button onClick={()=>setConfirmDelCal(selectedEvent.id)}
                style={{width:'100%',padding:'12px',background:'rgba(255,61,61,0.12)',border:'1px solid rgba(255,61,61,0.3)',borderRadius:8,color:'var(--red)',fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:'0.12em',cursor:'pointer',textTransform:'uppercase'}}>
                🗑️ DELETE EVENT
              </button>
            )}
          </div>
        </div>
      )}

      {/* ── Add event modal ── */}
      {showForm&&(
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal-sheet" style={{"--page-color":tabColor||"var(--pink)","borderRadius":'16px 16px 0 0'}} onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">New Event</div>
            <div className="form-field">
              <label className="form-label">Title</label>
              <input className="form-input" placeholder="Event name" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} autoFocus/>
            </div>
            <div className="form-field">
              <label className="form-label">Date & Time</label>
              <input className="form-input" type="datetime-local" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/>
            </div>
            {/* Financial toggle */}
            <div className="form-field">
              <label className="form-label">Has Financial Impact?</label>
              <div style={{display:'flex',gap:10,paddingTop:6}}>
                {[['no','No'],['yes','Yes — add to Finances']].map(([v,l])=>(
                  <button key={v} onClick={()=>setForm(p=>({...p,financial:v==='yes'}))}
                    style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:'0.1em',textTransform:'uppercase',
                      padding:'8px 16px',borderRadius:4,cursor:'pointer',
                      border:`1px solid ${(v==='yes')===form.financial?tabColor:'var(--border2)'}`,
                      color:(v==='yes')===form.financial?tabColor:'var(--text3)',
                      background:(v==='yes')===form.financial?`${tabColor}18`:'transparent'}}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
            {form.financial&&(
              <>
                <div className="form-field">
                  <label className="form-label">Type</label>
                  <div className="type-toggle">
                    {['income','expense'].map(t=>(
                      <button key={t} className={`type-toggle-btn ${form.finType===t?'active':''}`}
                        onClick={()=>setForm(p=>({...p,finType:t}))}
                        style={form.finType===t?{borderColor:t==='income'?'var(--green)':'var(--red)',color:t==='income'?'var(--green)':'var(--red)',background:t==='income'?'rgba(0,230,118,0.1)':'rgba(255,61,61,0.1)'}:{}}>
                        {t.toUpperCase()}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="form-field">
                  <label className="form-label">Amount (R)</label>
                  <input className="form-input" type="number" placeholder="e.g. 1500" value={form.amount}
                    onChange={e=>setForm(p=>({...p,amount:e.target.value}))}/>
                </div>
              </>
            )}
            {!form.financial&&(
              <div className="form-field">
                <label className="form-label">Category</label>
                <div className="type-toggle">
                  {EVENT_TYPES.map(t=>(
                    <button key={t} className={`type-toggle-btn ${form.type===t?'active':''}`}
                      onClick={()=>setForm(p=>({...p,type:t}))}>{t.toUpperCase()}</button>
                  ))}
                </div>
              </div>
            )}
            <button className="form-submit" style={{background:tabColor}} onClick={handleSave}>SAVE EVENT</button>
            <button className="form-cancel" onClick={()=>setShowForm(false)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── BUDGET PAGE ── */
const DEFAULT_BUDGET_ALLOCATIONS = [
  {category:'Rent / Bond',            pct:25, type:'need'},
  {category:'Food',                   pct:10, type:'need'},
  {category:'Household Essentials',   pct: 5, type:'need'},
  {category:'Transport',              pct:10, type:'need'},
  {category:'Savings',                pct:10, type:'saving'},
  {category:'Retirement',             pct: 5, type:'saving'},
  {category:'Medical Aid',            pct: 5, type:'saving'},
  {category:'Education',              pct: 5, type:'saving'},
  {category:'Financial Services',     pct: 5, type:'saving'},
  {category:'Entertainment & Dining', pct:20, type:'want'},
];

const BUDGET_SECTIONS = [
  {key:'need',   label:'ESSENTIAL EXPENSES',   targetPct:50, color:'#448aff'},
  {key:'saving', label:'FINANCIAL PRIORITIES', targetPct:30, color:'#00e676'},
  {key:'want',   label:'LIFESTYLE NEEDS',      targetPct:20, color:'#e040fb'},
];

const BudgetPage = ({user, partner, partners=[], activePartners=[], permittedPartners=[], selfVisible=true, isShared, tabSelected, onToggleUser, tabColor='#ffd600'}) => {
  const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
  const [selectedYear, setSelectedYear]   = useState(new Date().getFullYear());
  const [allBudgets, setAllBudgets]       = useState([]);
  const [finances, setFinances]           = useState([]);
  const [editing, setEditing]             = useState(false);
  const [draftIncome, setDraftIncome]     = useState('');
  const [draftAllocs, setDraftAllocs]     = useState(DEFAULT_BUDGET_ALLOCATIONS.map(a=>({...a})));
  const [saving, setSaving]               = useState(false);
  const [confirmDel, setConfirmDel]       = useState(false);
  const [alert, setAlert]                 = useState({msg:'',type:''});

  const msg = (m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const selectedPeriod = `${selectedYear}-${selectedMonth}`;
  const monthLabel = MONTHS.find(m=>m.v===selectedMonth)?.l||'';

  const fetchAll = useCallback(async()=>{
    const users=[...(selfVisible?[user.username]:[]),...(activePartners||[]).map(p=>p.username)];
    if(users.length===0){setAllBudgets([]);setFinances([]);return;}
    try {
      const [buds,fins] = await Promise.all([
        Promise.all(users.map(u=>axios.get(`${API}/budget`,{params:{user:u}})
          .then(r=>{
            const rows=r.data.data||r.data||[];
            return rows.map(b=>({
              ...b,
              expenses: Array.isArray(b.expenses)?b.expenses
                :(typeof b.expenses==='string'?JSON.parse(b.expenses||'[]'):(b.expenses||[])),
              user: b.user||u
            }));
          }).catch(()=>[])
        )).then(r=>r.flat()),
        Promise.all(users.map(u=>axios.get(`${API}/financial`,{params:{user:u}}).then(r=>r.data).catch(()=>[]))).then(r=>r.flat())
      ]);
      setAllBudgets(buds);
      setFinances(fins);
    } catch {}
  },[user.username, selfVisible, JSON.stringify((activePartners||[]).map(p=>p.username))]);

  useEffect(()=>{ fetchAll(); },[fetchAll]);

  const budgetEntry = useMemo(()=>
    allBudgets.find(b=>(b.user===user.username||!b.user)&&(b.date||'').startsWith(selectedPeriod))||null
  ,[allBudgets, user.username, selectedPeriod]);

  const monthFinances = useMemo(()=>
    finances.filter(f=>(f.date||'').startsWith(selectedPeriod))
  ,[finances, selectedPeriod]);

  const incomeVal = parseFloat(editing ? draftIncome : (budgetEntry?.income||''))||0;

  const allocations = useMemo(()=>{
    if(editing) return draftAllocs;
    if(!budgetEntry) return DEFAULT_BUDGET_ALLOCATIONS;
    const exps = budgetEntry.expenses||[];
    if(exps.length===0) return DEFAULT_BUDGET_ALLOCATIONS;
    return exps.map(e=>({
      category: e.category||'',
      pct: e.pct!=null ? parseFloat(e.pct) : (budgetEntry.income>0 ? Math.round((parseFloat(e.amount||0)/budgetEntry.income)*100) : 0),
      type: e.type||'need',
    }));
  },[editing, draftAllocs, budgetEntry]);

  const getActual = (catName) => {
    const lc = catName.toLowerCase();
    return monthFinances
      .filter(f=>f.type==='expense'&&(f.category||'').toLowerCase().includes(lc))
      .reduce((s,f)=>s+parseFloat(f.amount||0),0);
  };

  const startEdit = () => {
    const exps = budgetEntry?.expenses||[];
    const allocs = exps.length>0
      ? exps.map(e=>({
          category:e.category||'',
          pct: e.pct!=null ? parseFloat(e.pct) : (budgetEntry?.income>0 ? Math.round((parseFloat(e.amount||0)/budgetEntry.income)*100) : 0),
          type: e.type||'need',
        }))
      : DEFAULT_BUDGET_ALLOCATIONS.map(a=>({...a}));
    setDraftIncome(String(budgetEntry?.income||''));
    setDraftAllocs(allocs);
    setEditing(true);
  };

  const cancelEdit = () => setEditing(false);

  const handleSave = async () => {
    const inc = parseFloat(draftIncome)||0;
    if(inc<=0){ msg('Enter your monthly net income.','err'); return; }
    const validAllocs = draftAllocs.filter(a=>a.category&&parseFloat(a.pct||0)>0);
    if(validAllocs.length===0){ msg('Add at least one allocation.','err'); return; }
    setSaving(true);
    try {
      const expArr = validAllocs.map(a=>({
        category:a.category,
        pct:parseFloat(a.pct),
        amount:parseFloat(((inc*parseFloat(a.pct))/100).toFixed(2)),
        type:a.type,
      }));
      const dateVal = `${selectedYear}-${selectedMonth}-01`;
      if(budgetEntry){
        await axios.put(`${API}/budget/${budgetEntry.id}`,{
          user:user.username, income:inc,
          expenses:JSON.stringify(expArr),
          date:dateVal, budget_type:'need',
        });
      } else {
        await axios.post(`${API}/budget`,{
          user:user.username, income:inc,
          expenses:JSON.stringify(expArr),
          date:dateVal, budget_type:'need',
        });
      }
      msg(budgetEntry?'Budget updated.':'Budget saved.');
      setEditing(false);
      fetchAll();
    } catch(e){ msg(e.response?.data?.message||'Error: '+e.message,'err'); }
    setSaving(false);
  };

  const handleDelete = async () => {
    if(!budgetEntry) return;
    try {
      await axios.delete(`${API}/budget/${budgetEntry.id}`);
      msg('Budget deleted.');
      setConfirmDel(false);
      fetchAll();
    } catch { msg('Error deleting.','err'); }
  };

  const updateDraftAlloc = (i, field, val) =>
    setDraftAllocs(prev=>prev.map((a,j)=>j===i?{...a,[field]:val}:a));
  const removeDraftAlloc = (i) =>
    setDraftAllocs(prev=>prev.filter((_,j)=>j!==i));
  const addDraftAlloc = (type) =>
    setDraftAllocs(prev=>[...prev, {category:'', pct:0, type}]);

  const draftTotalPct = draftAllocs.reduce((s,a)=>s+parseFloat(a.pct||0),0);

  const renderSection = (sec) => {
    if(editing){
      const editRows = draftAllocs.map((a,i)=>({...a,_i:i})).filter(a=>a.type===sec.key);
      const editPlanned = editRows.reduce((s,a)=>s+(parseFloat(draftIncome||0)*parseFloat(a.pct||0)/100),0);
      return (
        React.createElement('div', {key:sec.key, style:{marginBottom:16,background:'#0d0d0b',border:`1px solid ${sec.color}44`,borderRadius:12,overflow:'hidden'}},
          React.createElement('div', {style:{padding:'12px 14px',borderBottom:`1px solid ${sec.color}22`,display:'flex',alignItems:'center',justifyContent:'space-between',background:`${sec.color}0d`}},
            React.createElement('div', {style:{display:'flex',alignItems:'center',gap:10}},
              React.createElement('div', {style:{width:10,height:10,borderRadius:2,background:sec.color}}),
              React.createElement('span', {style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:15,color:sec.color,letterSpacing:'0.1em'}}, sec.label),
              React.createElement('span', {style:{fontFamily:"'DM Mono',monospace",fontSize:9,color:sec.color,opacity:0.6}}, `TARGET ${sec.targetPct}%`)
            ),
            React.createElement('span', {style:{fontFamily:"'DM Mono',monospace",fontSize:10,color:sec.color}}, fmtR(editPlanned))
          ),
          React.createElement('div', {style:{padding:'8px 0'}},
            React.createElement('div', {style:{display:'grid',gridTemplateColumns:'1fr 80px 32px',gap:8,padding:'4px 14px 6px',borderBottom:'1px solid rgba(255,255,255,0.05)'}},
              React.createElement('span', {style:{fontFamily:"'DM Mono',monospace",fontSize:7,color:'rgba(255,255,255,0.3)',letterSpacing:'0.12em'}}, 'CATEGORY'),
              React.createElement('span', {style:{fontFamily:"'DM Mono',monospace",fontSize:7,color:'rgba(255,255,255,0.3)',letterSpacing:'0.12em'}}, '% OF INCOME'),
              React.createElement('span', null)
            ),
            editRows.map(a=>
              React.createElement('div', {key:a._i, style:{display:'grid',gridTemplateColumns:'1fr 80px 32px',gap:8,padding:'6px 14px',alignItems:'center'}},
                React.createElement('input', {className:'form-input', placeholder:'Category name', style:{margin:0,fontSize:11,padding:'5px 8px',height:32},
                  value:a.category, onChange:e=>updateDraftAlloc(a._i,'category',e.target.value)}),
                React.createElement('div', {style:{display:'flex',alignItems:'center',gap:4}},
                  React.createElement('input', {className:'form-input', type:'number', min:0, max:100, style:{margin:0,fontSize:11,padding:'5px 6px',height:32,textAlign:'center'},
                    value:a.pct, onChange:e=>updateDraftAlloc(a._i,'pct',e.target.value)}),
                  React.createElement('span', {style:{fontFamily:"'DM Mono',monospace",fontSize:9,color:'rgba(255,255,255,0.4)',flexShrink:0}}, '%')
                ),
                React.createElement('button', {onClick:()=>removeDraftAlloc(a._i),
                  style:{width:28,height:28,borderRadius:4,background:'rgba(255,61,61,0.1)',border:'1px solid rgba(255,61,61,0.25)',color:'var(--red)',cursor:'pointer',fontWeight:700,fontSize:14,flexShrink:0}}, '×')
              )
            ),
            React.createElement('div', {style:{padding:'4px 14px 8px'}},
              React.createElement('button', {onClick:()=>addDraftAlloc(sec.key),
                style:{width:'100%',padding:'7px',borderRadius:6,border:`1px dashed ${sec.color}55`,background:`${sec.color}08`,color:sec.color,fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:'0.1em',cursor:'pointer'}},
                `+ ADD CATEGORY`)
            )
          )
        )
      );
    }

    const rows = allocations.filter(a=>a.type===sec.key);
    const plannedTotal = rows.reduce((s,a)=>s+(incomeVal>0?incomeVal*parseFloat(a.pct||0)/100:0),0);
    const actualTotal  = rows.reduce((s,a)=>s+getActual(a.category),0);
    const overTotal    = actualTotal>plannedTotal&&plannedTotal>0;

    return (
      React.createElement('div', {key:sec.key, style:{marginBottom:16,background:'#0d0d0b',border:`1px solid ${sec.color}22`,borderRadius:12,overflow:'hidden'}},
        React.createElement('div', {style:{padding:'12px 14px',borderBottom:'1px solid rgba(255,255,255,0.06)',display:'flex',alignItems:'center',justifyContent:'space-between',background:`${sec.color}08`}},
          React.createElement('div', {style:{display:'flex',alignItems:'center',gap:10}},
            React.createElement('div', {style:{width:10,height:10,borderRadius:2,background:sec.color}}),
            React.createElement('span', {style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:15,color:sec.color,letterSpacing:'0.1em'}}, sec.label),
            React.createElement('span', {style:{fontFamily:"'DM Mono',monospace",fontSize:9,color:'rgba(255,255,255,0.28)'}}, `TARGET ${sec.targetPct}%`)
          ),
          React.createElement('div', {style:{textAlign:'right'}},
            React.createElement('div', {style:{fontFamily:"'DM Mono',monospace",fontSize:10,color:sec.color}}, incomeVal>0?fmtR(plannedTotal):'—'),
            actualTotal>0&&React.createElement('div', {style:{fontFamily:"'DM Mono',monospace",fontSize:8,color:overTotal?'#ff3b3b':'rgba(255,255,255,0.35)'}}, `spent ${fmtR(actualTotal)}`)
          )
        ),
        React.createElement('div', {style:{display:'grid',gridTemplateColumns:'1fr 52px 96px',gap:0,padding:'6px 14px',borderBottom:'1px solid rgba(255,255,255,0.04)'}},
          React.createElement('span', {style:{fontFamily:"'DM Mono',monospace",fontSize:7,color:'rgba(255,255,255,0.22)',letterSpacing:'0.12em'}}, 'CATEGORY'),
          React.createElement('span', {style:{fontFamily:"'DM Mono',monospace",fontSize:7,color:'rgba(255,255,255,0.22)',letterSpacing:'0.12em',textAlign:'center'}}, '%'),
          React.createElement('span', {style:{fontFamily:"'DM Mono',monospace",fontSize:7,color:'rgba(255,255,255,0.22)',letterSpacing:'0.12em',textAlign:'right'}}, 'AMOUNT')
        ),
        rows.length===0
          ? React.createElement('div', {style:{padding:'18px 14px',fontFamily:"'DM Mono',monospace",fontSize:9,color:'rgba(255,255,255,0.2)',textAlign:'center'}}, 'No categories — tap EDIT BUDGET to configure')
          : rows.map((a,i)=>{
              const amt    = incomeVal>0 ? incomeVal*parseFloat(a.pct||0)/100 : 0;
              const actual = getActual(a.category);
              const over   = actual>amt&&amt>0;
              const fill   = amt>0 ? Math.min(actual/amt,1) : 0;
              return React.createElement('div', {key:i, style:{padding:'9px 14px',borderBottom:'1px solid rgba(255,255,255,0.03)'}},
                React.createElement('div', {style:{display:'grid',gridTemplateColumns:'1fr 52px 96px',alignItems:'center',marginBottom:4}},
                  React.createElement('span', {style:{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:600,fontSize:13,color:'rgba(255,255,255,0.85)'}}, a.category),
                  React.createElement('span', {style:{fontFamily:"'DM Mono',monospace",fontSize:10,color:sec.color,textAlign:'center'}}, `${a.pct}%`),
                  React.createElement('div', {style:{textAlign:'right'}},
                    React.createElement('div', {style:{fontFamily:"'DM Mono',monospace",fontSize:11,color:'rgba(255,255,255,0.9)',fontWeight:500}}, incomeVal>0?fmtR(amt):'—'),
                    actual>0&&React.createElement('div', {style:{fontFamily:"'DM Mono',monospace",fontSize:8,color:over?'#ff3b3b':'rgba(255,255,255,0.32)'}}, `spent ${fmtR(actual)}`)
                  )
                ),
                incomeVal>0&&React.createElement('div', {style:{height:3,background:'rgba(255,255,255,0.06)',borderRadius:2,overflow:'hidden'}},
                  React.createElement('div', {style:{height:'100%',width:`${fill*100}%`,background:over?'#ff3b3b':sec.color,borderRadius:2,transition:'width 0.4s',boxShadow:`0 0 4px ${over?'#ff3b3b':sec.color}55`}})
                )
              );
            }),
        rows.length>0&&React.createElement('div', {style:{display:'grid',gridTemplateColumns:'1fr 52px 96px',padding:'8px 14px',borderTop:'1px solid rgba(255,255,255,0.06)',background:'rgba(255,255,255,0.02)'}},
          React.createElement('span', {style:{fontFamily:"'DM Mono',monospace",fontSize:8,color:'rgba(255,255,255,0.28)',letterSpacing:'0.1em'}}, 'TOTAL'),
          React.createElement('span', {style:{fontFamily:"'DM Mono',monospace",fontSize:9,color:sec.color,textAlign:'center'}}, `${rows.reduce((s,a)=>s+parseFloat(a.pct||0),0)}%`),
          React.createElement('span', {style:{fontFamily:"'DM Mono',monospace",fontSize:10,color:sec.color,textAlign:'right',fontWeight:600}}, incomeVal>0?fmtR(plannedTotal):'—')
        )
      )
    );
  };

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span style={{color:user?.eventColor||'#00e676'}}>§ VECTRA ARCH</span> · LEGACY · FINANCIAL</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">BUDGET</div>
            <div className="page-sub">MONTHLY ALLOCATION · PLANNED vs ACTUAL</div>
          </div>
          <UserRow user={user} partner={partner} partners={partners} activePartners={activePartners} permittedPartners={permittedPartners} selfVisible={selfVisible} tabSelected={tabSelected} isShared={isShared} onToggleUser={onToggleUser}/>
          <MonthNav selectedMonth={selectedMonth} setSelectedMonth={m=>{
            const curM=parseInt(selectedMonth,10),newM=parseInt(m,10);
            if(curM===12&&newM===1) setSelectedYear(y=>y+1);
            else if(curM===1&&newM===12) setSelectedYear(y=>y-1);
            setSelectedMonth(m);
          }} tabColor={tabColor} year={selectedYear} onGoToday={()=>setSelectedYear(new Date().getFullYear())}/>
          <Alert {...alert}/>

          {/* ── Income card ── */}
          <div style={{marginBottom:16,background:'#0d0d0b',border:`1px solid ${tabColor}44`,borderRadius:12,padding:'20px 16px 16px'}}>
            {editing ? (
              <>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.2em',color:'rgba(255,255,255,0.4)',marginBottom:8}}>MONTHLY NET INCOME (R)</div>
                <input className="form-input" type="number" placeholder="e.g. 47000"
                  style={{fontSize:22,fontWeight:600,padding:'10px 14px',letterSpacing:'0.02em',marginBottom:6}}
                  value={draftIncome}
                  onChange={e=>setDraftIncome(e.target.value)}
                  autoFocus/>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'rgba(255,255,255,0.3)',marginBottom:16}}>Your income after tax and deductions</div>
                {draftTotalPct!==100&&(
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,padding:'6px 10px',marginBottom:12,borderRadius:6,
                    color:draftTotalPct>100?'#ff3b3b':'#ffd600',
                    background:draftTotalPct>100?'rgba(255,61,61,0.1)':'rgba(255,214,0,0.08)',
                    border:`1px solid ${draftTotalPct>100?'rgba(255,61,61,0.3)':'rgba(255,214,0,0.2)'}`}}>
                    ⚠ Allocations total {draftTotalPct.toFixed(0)}% — must equal 100%
                  </div>
                )}
                <div style={{display:'flex',gap:8}}>
                  <button onClick={handleSave} disabled={saving}
                    style={{flex:1,padding:'11px',borderRadius:8,background:tabColor,color:'#000',border:'none',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:14,letterSpacing:'0.12em',cursor:'pointer',opacity:saving?0.6:1}}>
                    {saving?'SAVING…':'SAVE BUDGET ↗'}
                  </button>
                  <button onClick={cancelEdit}
                    style={{padding:'11px 18px',borderRadius:8,background:'rgba(255,255,255,0.05)',color:'rgba(255,255,255,0.6)',border:'1px solid rgba(255,255,255,0.1)',fontFamily:"'DM Mono',monospace",fontSize:10,cursor:'pointer'}}>
                    CANCEL
                  </button>
                </div>
              </>
            ) : incomeVal>0 ? (
              <>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.2em',color:'rgba(255,255,255,0.35)',marginBottom:6}}>MONTHLY NET INCOME</div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:38,color:'rgba(255,255,255,0.95)',letterSpacing:'0.01em',lineHeight:1,marginBottom:4}}>{fmtR(incomeVal)}</div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'rgba(255,255,255,0.35)',marginBottom:16}}>Your income after tax and deductions</div>
                <div style={{display:'flex',gap:8,marginBottom:16}}>
                  {BUDGET_SECTIONS.map(sec=>{
                    const secAllocs=allocations.filter(a=>a.type===sec.key);
                    const secAmt=secAllocs.reduce((s,a)=>s+(incomeVal*parseFloat(a.pct||0)/100),0);
                    return (
                      <div key={sec.key} style={{flex:1,padding:'8px 10px',borderRadius:8,background:`${sec.color}0f`,border:`1px solid ${sec.color}33`,textAlign:'center'}}>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:sec.color,letterSpacing:'0.08em',marginBottom:3}}>{sec.label.split(' ')[0]}</div>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,color:sec.color}}>{fmtR(secAmt)}</div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:'rgba(255,255,255,0.25)',marginTop:2}}>{sec.targetPct}%</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={startEdit}
                    style={{flex:1,padding:'10px',borderRadius:8,background:'rgba(255,255,255,0.06)',color:'rgba(255,255,255,0.8)',border:'1px solid rgba(255,255,255,0.12)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,letterSpacing:'0.1em',cursor:'pointer'}}>

                    DELETE
                  </button>
                </div>
              </>
            ) : (
              <>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.2em',color:'rgba(255,255,255,0.35)',marginBottom:6}}>MONTHLY NET INCOME</div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:28,color:'rgba(255,255,255,0.25)',letterSpacing:'0.01em',lineHeight:1,marginBottom:4}}>NOT SET</div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'rgba(255,255,255,0.3)',marginBottom:16}}>No budget configured for {monthLabel} {selectedYear}</div>
                <button onClick={startEdit}
                  style={{width:'100%',padding:'12px',borderRadius:8,background:tabColor,color:'#000',border:'none',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:15,letterSpacing:'0.12em',cursor:'pointer'}}>
                  SET UP BUDGET ↗
                </button>
              </>
            )}
          </div>

          {/* ── Three allocation sections ── */}
          {BUDGET_SECTIONS.map(sec => renderSection(sec))}

          <div style={{height:'40px'}}/>
        </div>
      </div>

      <ConfirmModal open={confirmDel} message={`Delete budget for ${monthLabel} ${selectedYear}?`} detail="This cannot be undone."
        onConfirm={handleDelete}
        onCancel={()=>setConfirmDel(false)}/>
    </div>
  );
};
