const GYM_CARDIO_VALS = new Set(['Steady-state running or jogging','Interval sprints','Incline walking or running','Steady-state cycling','HIIT cycling','Hill climb simulations','Steady-state rowing','Sprint intervals','Endurance rows','Steady-state stair climbing','Interval climbing','Run · Zone 2','Trail Run','Interval Run','Easy Jog','Spin Class']);
const GYM_MOBILITY_VALS = new Set(['Yoga Flow','Vinyasa Flow','Hatha Yoga','Foam Rolling','Stretching','Mat Pilates']);
const gymIsCardio = ex => GYM_CARDIO_VALS.has(ex)||['run','bike','cycle','swim','treadmill','elliptical','row','stair','sprint','jog','walk','hike','trail'].some(k=>(ex||'').toLowerCase().includes(k));
const gymIsMobility = ex => GYM_MOBILITY_VALS.has(ex)||['yoga','stretch','pilates','mobility','foam','roll'].some(k=>(ex||'').toLowerCase().includes(k));
const gymGetType = ex => gymIsMobility(ex)?'mobility':gymIsCardio(ex)?'cardio':'strength';

const gymFormatDetail = w => {
  const reps=String(w.reps||''), weight=String(w.weight||'');
  if(gymIsCardio(w.exercise)) return `${reps} min · ${weight} km`;
  if(gymIsMobility(w.exercise)) return `${reps} min · ${weight}`;
  const sets=parseInt(w.sets)||1;
  if(sets>1&&reps.includes(',')&&weight.includes(',')) {
    const ra=reps.split(',').map(r=>r.trim()), wa=weight.split(',').map(x=>x.trim());
    if(ra.length===sets&&wa.length===sets) return ra.map((r,i)=>`${r} reps @ ${wa[i]} kg`).join(' · ');
  }
  return `${sets} × ${reps} reps @ ${weight} kg`;
};

const GymPage = ({user, partner, partners=[], activePartners=[], permittedPartners=[], selfVisible=true, isShared, tabSelected, onToggleUser, tabColor='#ff3b3b'}) => {
  const [search, setSearch] = useState('');
  const [actionWorkout, setActionWorkout] = useState(null);
  const [confirmDelGym, setConfirmDelGym] = useState(null);
  const [editWorkoutId, setEditWorkoutId] = useState(null);
  const [workouts, setWorkouts] = useState([]);
  const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
  const [showForm, setShowForm] = useState(false);
  const [isCustomEx, setIsCustomEx] = useState(false);
  const [form, setForm] = useState({day:'Monday',exercise:'',sets:'3',reps:'10',weight:'60',date:now(),type:'strength'});
  const [alert, setAlert] = useState({msg:'',type:''});
  const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const fetchAll = useCallback(async()=>{
    const users=[...(selfVisible?[user.username]:[]),...(activePartners||[]).map(p=>p.username)];
    try {
      const all=await Promise.all(users.map(u=>axios.get(`${API}/gymworkout`,{params:{user:u}}).then(r=>r.data.map(w=>({...w,userKey:String(u)}))).catch(()=>[])));
      setWorkouts(all.flat());
    } catch {}
  },[user.username, partner, isShared, selfVisible, JSON.stringify((activePartners||[]).map(p=>p.username))]);

  useEffect(()=>{ fetchAll(); },[fetchAll]);

  const handleExerciseSelect = (val) => {
    if(val==='__custom__'){ setIsCustomEx(true); setForm(p=>({...p,exercise:'',type:'strength'})); return; }
    setIsCustomEx(false);
    const t = gymGetType(val);
    setForm(p=>({...p, exercise:val, type:t,
      sets: t==='cardio'||t==='mobility'?'1':p.sets,
      reps: t==='cardio'?'30':t==='mobility'?'45':p.reps,
      weight: t==='cardio'?'5':t==='mobility'?'vinyasa':p.weight
    }));
  };

  const handleSave = async()=>{
    if(!form.exercise){msg('Exercise required.','err');return;}
    try {
      if(editWorkoutId) await axios.delete(`${API}/gymworkout/${editWorkoutId}`);
      await axios.post(`${API}/gymworkout`,{user:user.username,day:form.day,exercise:form.exercise,sets:parseInt(form.sets)||1,reps:form.reps,weight:form.weight,date:form.date});
      msg(editWorkoutId?'Exercise updated.':'Workout saved.');
      setShowForm(false);setEditWorkoutId(null);
      setForm({day:'Monday',exercise:'',sets:'3',reps:'10',weight:'60',date:now(),type:'strength'});
      setIsCustomEx(false); fetchAll();
    } catch { msg('Error saving.','err'); }
  };

  const handleDelete = async(id)=>{
    try { await axios.delete(`${API}/gymworkout/${id}`); fetchAll(); } catch {}
  };

  const startEditWorkout = (w) => {
    setForm({
      day:      w.day||'Monday',
      exercise: w.exercise||'',
      sets:     String(w.sets||3),
      reps:     String(w.reps||10),
      weight:   String(w.weight||0),
      date:     (w.date||now()).slice(0,19),
      type:     gymGetType(w.exercise||''),
    });
    setIsCustomEx(true);
    setEditWorkoutId(w.id);
    setShowForm(true);
  };

  const users = [user, ...activePartners];
  const t = form.type;

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span style={{color:user?.eventColor||'#00e676'}}>§ VECTRA ARCH</span> · LEGACY · GYM</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">GYM WORKOUT</div>
            <div className="page-sub">EXERCISES · STRENGTH · WEEKLY PLAN</div>
          </div>
          <UserRow user={user} partner={partner} partners={partners} activePartners={activePartners} permittedPartners={permittedPartners} selfVisible={selfVisible} tabSelected={tabSelected} isShared={isShared} onToggleUser={onToggleUser}/>
          <MonthNav selectedMonth={selectedMonth} setSelectedMonth={setSelectedMonth} tabColor={tabColor}/>
          <Alert {...alert}/>
          <SearchBar value={search} onChange={setSearch} placeholder="Search exercises..." tabColor={tabColor}/>
          {/* ── Per-user summary cards ── */}
          {(()=>{
            const visUsers = [...(selfVisible?[user.username]:[]), ...(activePartners||[]).map(p=>p.username)];
            if(visUsers.length===0) return null;

            // Derive the selected month's year and reference date
            const selYear = new Date().getFullYear();
            const selMonthIdx = parseInt(selectedMonth,10)-1; // 0-indexed
            // "Anchor" date = last day of selected month (so we look back 4 weeks from there)
            const anchorDate = new Date(selYear, selMonthIdx+1, 0); // last day of month
            anchorDate.setHours(23,59,59,999);

            // Week containing anchorDate (Mon-based)
            const getWeekStartFromAnchor = (weeksAgo) => {
              const d = new Date(anchorDate);
              d.setDate(d.getDate() - ((d.getDay()+6)%7) - weeksAgo*7); // back to Mon
              d.setHours(0,0,0,0);
              return d;
            };

            // "This week" = week containing last day of selected month
            const thisWeekStart = getWeekStartFromAnchor(0);
            const thisWeekEnd = new Date(thisWeekStart); thisWeekEnd.setDate(thisWeekStart.getDate()+6); thisWeekEnd.setHours(23,59,59,999);

            return (
              <div style={{display:'flex',flexDirection:'column',gap:10,margin:'4px 0 16px'}}>
                {visUsers.map(uname=>{
                  const owner = getOwner(uname, user, partner, partners);
                  const oc = owner?.eventColor || '#00e676';
                  // Filter workouts to selected month
                  const uWorkouts = workouts.filter(w=>String(w.userKey)===String(uname)&&(w.date||'').slice(5,7)===selectedMonth);
                  const allUWorkouts = workouts.filter(w=>String(w.userKey)===String(uname));

                  // Weekly load: exercises per day of the week within selected month
                  const weekLoad = DAYS.map((dayName) => {
                    return uWorkouts.filter(w => w.day===dayName).length;
                  });

                  // 4-week trend: look at last 4 weeks relative to anchor date
                  const weekTotals = [3,2,1,0].map(weeksAgo => {
                    const ws = getWeekStartFromAnchor(weeksAgo);
                    const we = new Date(ws); we.setDate(ws.getDate()+6); we.setHours(23,59,59,999);
                    return allUWorkouts.filter(w=>{
                      if(!w.date) return false;
                      const d = new Date(w.date);
                      return d>=ws && d<=we;
                    }).length;
                  });

                  const thisWeekTotal = uWorkouts.length;
                  const maxLoad = Math.max(...weekLoad, 1);
                  const maxTrend = Math.max(...weekTotals, 1);

                  const SW=200, SH=44, SPAD=6;
                  const trendPts = weekTotals.map((v,i)=>{
                    const x = SPAD + (i/(weekTotals.length-1||1))*(SW-SPAD*2);
                    const y = SPAD + (1-(v/maxTrend))*(SH-SPAD*2);
                    return `${x.toFixed(1)},${y.toFixed(1)}`;
                  });

                  return (
                    <div key={uname} style={{background:'#0d0d0b',border:`1px solid ${oc}33`,borderRadius:12,padding:'14px 16px',borderLeft:`3px solid ${oc}`}}>
                      {/* Header: avatar + name + weekly count */}
                      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                        <ItemAvatar username={uname} user={user} partner={partner} partners={partners} size={36}/>

                          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:16,color:oc,letterSpacing:'0.06em',textTransform:'uppercase'}}>
                            {(owner?.displayName||(owner?.firstName&&owner?.lastName?`${owner.firstName} ${owner.lastName}`:null)||uname).toUpperCase()}
                          </div>
                        </div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'rgba(255,255,255,0.4)',letterSpacing:'0.1em'}}>
                          <span style={{color:oc,fontWeight:600}}>{thisWeekTotal}</span> EX/WK
                        </div>
                      </div>

                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                        {/* Weekly load bar chart */}
                        <div>
                          <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.16em',color:'rgba(255,255,255,0.3)',marginBottom:8}}>WEEKLY LOAD</div>
                          <div style={{display:'flex',alignItems:'flex-end',gap:4,height:48}}>
                            {DAYS.map((dayName,di)=>{
                              const cnt = weekLoad[di];
                              const barH = maxLoad>0?(cnt/maxLoad)*40:0;
                              const isToday = di === (anchorDate.getDay()+6)%7;
                              return (
                                <div key={dayName} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                                  <div style={{width:'100%',height:40,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
                                    <div style={{
                                      width:'100%', height:Math.max(barH,cnt>0?6:0),
                                      background:cnt>0?oc:'rgba(255,255,255,0.06)',
                                      borderRadius:'3px 3px 0 0',
                                      boxShadow:cnt>0?`0 0 8px ${oc}66`:'none',
                                      transition:'height 0.3s',
                                      minHeight:cnt>0?6:3,
                                    }}/>
                                  </div>
                                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:isToday?oc:'rgba(255,255,255,0.25)',letterSpacing:'0.04em'}}>
                                    {dayName[0]}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>

                        {/* 4-week trend sparkline */}
                        <div>
                          <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.16em',color:'rgba(255,255,255,0.3)',marginBottom:8}}>4-WEEK TREND</div>
                          <svg viewBox={`0 0 ${SW} ${SH}`} style={{width:'100%',height:48,display:'block'}} preserveAspectRatio="none">
                            <defs>
                              <linearGradient id={`gymGrad_${uname}`} x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor={oc} stopOpacity="0.3"/>
                                <stop offset="100%" stopColor={oc} stopOpacity="0.02"/>
                              </linearGradient>
                            </defs>
                            {weekTotals.some(v=>v>0)&&(
                              <polygon points={`${trendPts[0]} ${trendPts.join(' ')} ${SW-SPAD},${SH} ${SPAD},${SH}`} fill={`url(#gymGrad_${uname})`}/>
                            )}
                            <polyline points={trendPts.join(' ')} fill="none" stroke={oc} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
                            {trendPts.map((p,i)=>{
                              const [x,y]=p.split(',');
                              return <circle key={i} cx={x} cy={y} r={i===trendPts.length-1?3.5:2} fill={oc} opacity={i===trendPts.length-1?1:0.6}/>;
                            })}
                          </svg>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}

          <div className="section-label">EXERCISES <span style={{color:tabColor}}>{workouts.filter(w=>(w.date||'').slice(5,7)===selectedMonth).length}</span> THIS MONTH</div>
          {/* Days first — all users' workouts together under each day */}
          {DAYS.map(day=>{
            const visUsers=[...(selfVisible?[user.username]:[]),...(activePartners||[]).map(p=>p.username)];
            const dayWorkouts = workouts.filter(w=>(w.day===day)&&(w.date||'').slice(5,7)===selectedMonth&&(visUsers.length===0||visUsers.includes(String(w.userKey)))&&(!search||(w.exercise||'').toLowerCase().includes(search.toLowerCase())));

                  : dayWorkouts.map(w=>{
                      const wt  = gymGetType(w.exercise);
                      const own = String(w.userKey)===user.username;
                      const owner = getOwner(String(w.userKey), user, partner, partners);
                      const goc = owner?.eventColor||'#1de9b6';
                      return (

                            <ItemAvatar username={String(w.userKey)} user={user} partner={partner} partners={partners} size={22}/>

          <div style={{height:'80px'}}/>
        </div>

              </select>
            </div>
            {isCustomEx&&(
              <div className="form-field">
                <label className="form-label">Custom Exercise Name</label>
                <input className="form-input" placeholder="e.g. Deadlifts" value={form.exercise} onChange={e=>setForm(p=>({...p,exercise:e.target.value}))}/>
                <div className="type-toggle" style={{marginTop:'8px'}}>
                  {['strength','cardio','mobility'].map(tp=>(
                    <button key={tp} className={`type-toggle-btn ${form.type===tp?'active':''}`} onClick={()=>setForm(p=>({...p,type:tp}))}>{tp.toUpperCase()}</button>
                  ))}
                </div>
              </div>
            )}
            {form.exercise&&!isCustomEx&&(
              <div className="form-field">
                <span className={`workout-type-badge ${t}`} style={{display:'inline-flex'}}>{t.toUpperCase()}</span>
              </div>
            )}
            {(t==='strength')&&(
              <div className="form-field">
                <label className="form-label">Sets × Reps × Weight</label>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
                  <input className="form-input" placeholder="Sets" value={form.sets} onChange={e=>setForm(p=>({...p,sets:e.target.value}))} type="number"/>
                  <input className="form-input" placeholder="Reps (e.g. 8-10)" value={form.reps} onChange={e=>setForm(p=>({...p,reps:e.target.value}))}/>
                  <input className="form-input" placeholder="kg" value={form.weight} onChange={e=>setForm(p=>({...p,weight:e.target.value}))}/>
                </div>
              </div>
            )}
            {(t==='cardio')&&(
              <div className="form-field">
                <label className="form-label">Duration (min) & Distance (km)</label>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <input className="form-input" placeholder="e.g. 30" value={form.reps} onChange={e=>setForm(p=>({...p,reps:e.target.value}))}/> 
                  <input className="form-input" placeholder="e.g. 5" value={form.weight} onChange={e=>setForm(p=>({...p,weight:e.target.value}))}/>
                </div>
              </div>
            )}
            {(t==='mobility')&&(
              <div className="form-field">
                <label className="form-label">Duration (min) & Style</label>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <input className="form-input" placeholder="e.g. 45" value={form.reps} onChange={e=>setForm(p=>({...p,reps:e.target.value}))}/> 
                  <input className="form-input" placeholder="e.g. vinyasa" value={form.weight} onChange={e=>setForm(p=>({...p,weight:e.target.value}))}/>
                </div>
              </div>
            )}
            <div className="form-field">
              <label className="form-label">Date & Time</label>
              <input className="form-input" type="datetime-local" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} step="1"/>
            </div>
            <button className="form-submit" style={{background:tabColor}} onClick={handleSave}>{editWorkoutId?'UPDATE':'SAVE'} EXERCISE</button>
            <button className="form-cancel" onClick={()=>{setShowForm(false);setIsCustomEx(false);}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
};

const MealsPage = ({user, partner, partners=[], activePartners=[], permittedPartners=[], selfVisible=true, isShared, tabSelected, onToggleUser, tabColor='#d67bff'}) => {
  const [search, setSearch] = useState('');
  const [actionMeal, setActionMeal] = useState(null);
  const [confirmDelMeal, setConfirmDelMeal] = useState(null);
  const [editMealId, setEditMealId] = useState(null);
  const [meals, setMeals] = useState([]);
  const [mealTemplates, setMealTemplates] = useState(MEAL_OPTIONS); // start with static, replace with DB
  const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
  const [typeFilter, setTypeFilter] = useState('All');
  const [showForm, setShowForm] = useState(false);
  const [isCustomMeal, setIsCustomMeal] = useState(false);
  const [form, setForm] = useState({name:'',mealType:'breakfast',calories:'',note:'',date:now()});
  const [alert, setAlert] = useState({msg:'',type:''});
  const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  // Load meal templates from DB (fallback to static MEAL_OPTIONS)
  useEffect(()=>{
    axios.get(`${API}/meal-templates`).then(r=>{
      if(r.data.success&&r.data.data&&r.data.data.length>0)
        setMealTemplates(r.data.data);
    }).catch(()=>{});
  },[]);

  const fetchMeals = useCallback(async()=>{
    const users=[...(selfVisible?[user.username]:[]),...(activePartners||[]).map(p=>p.username)];
    try {
      const all=await Promise.all(users.map(u=>axios.get(`${API}/mealplan`,{params:{user:u}}).then(r=>r.data.map(m=>({...m,userKey:String(u)}))).catch(()=>[])));
      setMeals(all.flat());
    } catch {}
  },[user.username, partner, isShared, selfVisible, JSON.stringify((activePartners||[]).map(p=>p.username))]);

  useEffect(()=>{ fetchMeals(); },[fetchMeals]);

  const filtered = useMemo(()=>{
    const users=[...(selfVisible?[user.username]:[]),...(activePartners||[]).map(p=>p.username)];
    let list = meals.filter(m=>users.map(String).includes(String(m.userKey))&&(m.date||'').slice(5,7)===selectedMonth);
    if(typeFilter!=='All') list=list.filter(m=>(m.mealType||'').toLowerCase()===typeFilter.toLowerCase());
    return list;
  },[meals,selectedMonth,user.username,selfVisible,JSON.stringify((activePartners||[]).map(p=>p.username))]);

  // Real calorie total from DB; estimate macros
  const totals = useMemo(()=>{
    const cal=filtered.reduce((s,m)=>s+parseFloat(m.calories||0),0);
    return {cal:Math.round(cal), prot:Math.round(cal*0.08), carb:Math.round(cal*0.05), fat:Math.round(cal*0.028)};
  },[filtered]);

  // TDEE per user — calculated from their profile health data
  const getTDEE = (u) => {
    const w = parseFloat(u.weight);
    const h = parseFloat(u.height);
    if(!w||!h) return null;
    const age = u.dob ? Math.floor((new Date()-new Date(u.dob))/31557600000) : 30;
    const isFemale = (u.gender||'').toLowerCase()==='female';
    const bmr = isFemale ? 10*w+6.25*h-5*age-161 : 10*w+6.25*h-5*age+5;
    return Math.round(bmr*1.4);
  };
  const userTDEE = getTDEE(user);

  // Warning visibility (same localStorage flag as profile)
  const [showMealWarning, setShowMealWarning] = useState(()=>{
    try { const v=localStorage.getItem('legacyBmiWarning'); return v===null?true:v==='true'; } catch { return true; }
  });

  const handleMealSelect = (val) => {
    if(val==='__custom__'){ setIsCustomMeal(true); setForm(p=>({...p,name:'',calories:''})); return; }
    if(!val) return;
    setIsCustomMeal(false);
    // Search DB templates first, then fall back to static options
    const allOpts = [...mealTemplates, ...MEAL_OPTIONS].flatMap(g=>g.options||[]);
    const opt = allOpts.find(o=>o.value===val);
    const labelParts = (opt?.label||val).split(':');
    const mTypeStr = labelParts[0]?.trim()||'';
    const mt = MEAL_TYPE_MAP[mTypeStr]||form.mealType;
    setForm(p=>({...p, name:val, calories:String(opt?.cal||''), mealType:mt}));
  };

  const handleSave = async()=>{
    if(!form.name||!form.calories){msg('Name and calories required.','err');return;}
    try {
      if(editMealId) await axios.delete(`${API}/mealplan/${editMealId}`);
      await axios.post(`${API}/mealplan`,{
        user:user.username,
        day:new Date(form.date).toLocaleString('en-US',{weekday:'long'}),
        mealType:form.mealType,
        description:form.name,
        calories:parseFloat(form.calories)||0,
        date:form.date
      });
      msg(editMealId?'Meal updated.':'Meal saved.');
      setShowForm(false);setEditMealId(null);
      setForm({name:'',mealType:'breakfast',calories:'',note:'',date:now()});
      setIsCustomMeal(false); fetchMeals();
    } catch { msg('Error saving.','err'); }
  };

  const handleDelete = async(id)=>{
    try { await axios.delete(`${API}/mealplan/${id}`); fetchMeals(); } catch {}
  };

  const startEditMeal = (m) => {
    setForm({
      name:     m.description||m.name||'',
      mealType: m.mealType||'breakfast',
      calories: String(m.calories||''),
      note:     m.description||'',
      date:     (m.date||now()).slice(0,19),
    });
    setEditMealId(m.id);
    setIsCustomMeal(true);
    setShowForm(true);
  };

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span style={{color:user?.eventColor||'#00e676'}}>§ VECTRA ARCH</span> · LEGACY · NUTRITION</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">MEAL PLAN</div>
            <div className="page-sub">MACROS · DAILY FOOD LOG</div>
          </div>
          <UserRow user={user} partner={partner} partners={partners} activePartners={activePartners} permittedPartners={permittedPartners} selfVisible={selfVisible} tabSelected={tabSelected} isShared={isShared} onToggleUser={onToggleUser}/>
          <MonthNav selectedMonth={selectedMonth} setSelectedMonth={setSelectedMonth} tabColor={tabColor}/>
          <SearchBar value={search} onChange={setSearch} placeholder="Search meals..." tabColor={tabColor}/>
          <Alert {...alert}/>

          <div className="section-label">MEALS <span style={{color:tabColor}}>{filtered.length}</span> RECORDS</div>

          {/* ── Per-user nutrition cards ── */}
          {(()=>{
            const visUsers=[...(selfVisible?[user.username]:[]),...(activePartners||[]).map(p=>p.username)];
            if(visUsers.length===0) return null;

            // Anchor to selected month
            const selYear = new Date().getFullYear();
            const selMonthIdx = parseInt(selectedMonth,10)-1;
            const isCurrentMonth = selectedMonth===String(new Date().getMonth()+1).padStart(2,'0');
            // "Active day" = today if current month, else last day of selected month
            const activeDate = isCurrentMonth ? new Date() : new Date(selYear, selMonthIdx+1, 0);
            const activeDateStr = activeDate.toLocaleDateString('en-CA');
            const activeDayName = activeDate.toLocaleDateString('en-US',{weekday:'long'});
            const activeDayIdx = (activeDate.getDay()+6)%7;
            // Week containing active date
            const weekStart = new Date(activeDate);
            weekStart.setDate(activeDate.getDate()-(activeDate.getDay()+6)%7);
            weekStart.setHours(0,0,0,0);

            // Ring component — uses user's eventColor for all 4 rings, label in white
            const Ring = ({val, target, color, label, unit}) => {
              const pct = target>0?Math.min(val/target,1):0;
              const R=28, stroke=4, norm=2*Math.PI*R;
              const dash = pct*norm;
              return (
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                  <div style={{position:'relative',width:62,height:62}}>
                    <svg viewBox="0 0 62 62" width="62" height="62">
                      <circle cx="31" cy="31" r={R} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={stroke}/>
                      <circle cx="31" cy="31" r={R} fill="none" stroke={color} strokeWidth={stroke}
                        strokeDasharray={`${dash.toFixed(2)} ${norm.toFixed(2)}`}
                        strokeLinecap="round" transform="rotate(-90 31 31)"
                        style={{filter:`drop-shadow(0 0 4px ${color}99)`,transition:'stroke-dasharray 0.5s'}}/>
                    </svg>
                    <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <span style={{fontFamily:"'DM Mono',monospace",fontWeight:600,fontSize:11,color,lineHeight:1}}>{Math.round(pct*100)}%</span>
                    </div>
                  </div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,fontWeight:600,letterSpacing:'0.12em',color,textAlign:'center'}}>{label}</div>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:'rgba(255,255,255,0.28)',textAlign:'center'}}>{unit}</div>
                </div>
              );
            };

            return (
              <div style={{display:'flex',flexDirection:'column',gap:10,margin:'4px 0 16px'}}>
                {visUsers.map(uname=>{
                  const owner = getOwner(uname, user, partner, partners);
                  const oc = owner?.eventColor||'#ffd600';
                  const uMeals = meals.filter(m=>String(m.userKey)===String(uname));
                  // Meals for the "active day" within selected month
                  const activeDayMeals = uMeals.filter(m=>{
                    const d=m.date?m.date.slice(0,10):'';
                    const sd=m.day||(m.date?new Date(m.date).toLocaleDateString('en-US',{weekday:'long'}):'');
                    return d===activeDateStr||sd===activeDayName;
                  });
                  const todayCal = Math.round(activeDayMeals.reduce((s,m)=>s+parseFloat(m.calories||0),0));

                  // Also compute total for the whole selected month for rings
                  const monthMeals = uMeals.filter(m=>(m.date||'').slice(5,7)===selectedMonth);
                  const monthCal = Math.round(monthMeals.reduce((s,m)=>s+parseFloat(m.calories||0),0));
                  // Use month total for rings, day total for header
                  const ringCal = monthCal;

                  // TDEE for this user
                  const ownerFull = uname===user.username ? user : (partners.find(p=>p.username===uname)||owner);
                  const uTDEE = getTDEE(ownerFull||{})||2000;
                  const kcalTarget = uTDEE;
                  const protTarget = Math.round(kcalTarget*0.075);
                  const carbTarget = Math.round(kcalTarget*0.05);
                  const fatTarget  = Math.round(kcalTarget*0.028);
                  // Rings use month total
                  const todayProt  = Math.round(ringCal*0.075);
                  const todayCarb  = Math.round(ringCal*0.05);
                  const todayFat   = Math.round(ringCal*0.028);

                  // Weekly kcal bars: 7 days of the week containing the anchor date
                  const weekDayKcal = DAYS.map((dayName,di)=>{
                    const dayDate = new Date(weekStart);
                    dayDate.setDate(weekStart.getDate()+di);
                    const ds = dayDate.toLocaleDateString('en-CA');
                    return uMeals.filter(m=>{
                      const d=m.date?m.date.slice(0,10):'';
                      const sd=m.day||(m.date?new Date(m.date).toLocaleDateString('en-US',{weekday:'long'}):'');
                      return d===ds||sd===dayName;
                    }).reduce((s,m)=>s+parseFloat(m.calories||0),0);
                  });
                  const maxKcal = Math.max(...weekDayKcal, kcalTarget, 1);

                  const macros = [
                    {label:'KCAL', val:ringCal,    target:kcalTarget, unit:`${ringCal}/${kcalTarget}`},
                    {label:'PROT', val:todayProt,  target:protTarget,  unit:`${todayProt}/${protTarget}g`},
                    {label:'CARB', val:todayCarb,  target:carbTarget,  unit:`${todayCarb}/${carbTarget}g`},
                    {label:'FAT',  val:todayFat,   target:fatTarget,   unit:`${todayFat}/${fatTarget}g`},
                  ];

                  return (
                    <div key={uname} style={{background:'#0d0d0b',border:`1px solid ${oc}33`,borderRadius:12,overflow:'hidden',borderLeft:`3px solid ${oc}`}}>

                      {/* Header */}
                      <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px 10px',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
                        <ItemAvatar username={uname} user={user} partner={partner} partners={partners} size={36}/>
                        <div style={{flex:1}}>
                          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:16,color:oc,letterSpacing:'0.06em',textTransform:'uppercase'}}>
                            {(owner?.displayName||(owner?.firstName&&owner?.lastName?`${owner.firstName} ${owner.lastName}`:null)||uname).toUpperCase()}
                          </div>
                        </div>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'rgba(255,255,255,0.35)',letterSpacing:'0.1em'}}>
                          <span style={{color:oc,fontWeight:600}}>{ringCal.toLocaleString()}</span> kcal
                        </div>
                      </div>

                      {/* 4 rings */}
                      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',padding:'14px 8px 10px',borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
                        {macros.map(m=>(
                          <Ring key={m.label} val={m.val} target={m.target} color={oc} label={m.label} unit={m.unit}/>
                        ))}
                      </div>

                      {/* Weekly kcal bars */}
                      <div style={{padding:'10px 14px 12px'}}>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                          <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.14em',color:'rgba(255,255,255,0.28)'}}>WEEKLY KCAL TREND</div>
                          <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:oc,letterSpacing:'0.06em'}}>{ringCal.toLocaleString()} kcal {isCurrentMonth?'today':'this period'}</div>
                        </div>
                        <div style={{display:'flex',alignItems:'flex-end',gap:3,height:48}}>
                          {DAYS.map((dayName,di)=>{
                            const kcal = weekDayKcal[di];
                            const barH = maxKcal>0?(kcal/maxKcal)*40:0;
                            const isToday = di===activeDayIdx;
                            const hasData = kcal>0;
                            return (
                              <div key={dayName} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                                <div style={{width:'100%',height:40,display:'flex',alignItems:'flex-end'}}>
                                  <div style={{
                                    width:'100%',height:Math.max(hasData?barH:2,hasData?5:2),
                                    background:hasData?oc:'rgba(255,255,255,0.05)',
                                    borderRadius:'3px 3px 0 0',
                                    boxShadow:hasData&&isToday?`0 0 8px ${oc}88`:'none',
                                    opacity:isToday?1:hasData?0.7:0.25,
                                    transition:'height 0.3s',
                                  }}/>
                                </div>
                                <div style={{fontFamily:"'DM Mono',monospace",fontSize:7,color:isToday?oc:'rgba(255,255,255,0.22)',letterSpacing:'0.04em'}}>
                                  {dayName[0]}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                    </div>
                  );
                })}
              </div>
            );
          })()}

          {/* ── Calorie target bar ── */}
          {userTDEE&&(()=>{
            const pct     = Math.min(totals.cal/userTDEE, 1.5);
            const pctDisp = Math.round(pct*100);
            const remain  = userTDEE - totals.cal;
            const over    = totals.cal > userTDEE;
            const barColor = pct<0.5?'var(--blue)':pct<0.85?'var(--green)':pct<=1?'var(--green)':pct<=1.1?'var(--yellow)':'var(--red)';
            // Warning message
            const warn = totals.cal===0
              ? {icon:'📋', color:'var(--text3)', msg:'No meals logged today. Your daily target is '+userTDEE+' kcal.'}
              : pct<0.5
              ? {icon:'🍽️', color:'var(--blue)', msg:`Only ${pctDisp}% of daily target. Add ${remain} kcal more to reach your goal.`}
              : pct<0.85
              ? {icon:'⚡', color:'var(--blue)', msg:`${pctDisp}% of daily target. ${remain} kcal remaining — keep going.`}
              : pct<=1
              ? {icon:'✓', color:'var(--green)', msg:`${pctDisp}% of daily target. Almost there — ${remain} kcal left.`}
              : pct<=1.1
              ? {icon:'⚠', color:'var(--yellow)', msg:`${pctDisp}% of target — slightly over by ${-remain} kcal. Consider a lighter dinner.`}
              : {icon:'⚠️', color:'var(--red)', msg:`${pctDisp}% of target — ${-remain} kcal over. Try to balance with lighter meals tomorrow.`};
            return (
              <div style={{marginBottom:16}}>
                {/* Progress bar */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--text3)'}}>
                    DAILY TARGET
                  </span>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>

// Helper: compute cycle stats for a list of cycles
const cycleStats = (cycles) => {
  const sorted  = [...cycles].sort((a,b)=>new Date(b.startDate)-new Date(a.startDate));
  const latest  = sorted[0] || null;
  const avgLen  = cycles.length ? Math.round(cycles.reduce((s,c)=>s+(parseInt(c.cycleLength)||28),0)/cycles.length) : 28;
  const dayOfCycle = latest ? Math.max(1, Math.min(Math.floor((new Date()-new Date(latest.startDate))/86400000)+1, avgLen)) : 1;
  const nextPeriod = latest ? new Date(new Date(latest.startDate).getTime() + avgLen*86400000) : null;
  const fertileStart = nextPeriod ? new Date(nextPeriod.getTime() - ((avgLen-14)+3)*86400000) : null;
  const fertileEnd   = fertileStart ? new Date(fertileStart.getTime() + 5*86400000) : null;
  return {sorted, latest, avgLen, dayOfCycle, nextPeriod, fertileStart, fertileEnd};
};

// Phase wheel SVG — proper donut
const PhaseWheel = ({dayOfCycle=1, cycleLength=28, accentColor='#e91e8c'}) => {
  const S=260,cx=130,cy=130,outerR=100,innerR=62,numR=outerR+16;
  // Dynamic phases based on actual cycle length:
  // Menstruation: days 1-5
  // Follicular (gray): days 6 to ovulation-3
  // Fertile/Ovulation (teal): 5 days centered on ovulation (day cycleLength-14)
  const mensDays  = 5;                           // menstruation always ~5 days
  const ovDay     = Math.max(cycleLength-14, 1); // ovulation day within cycle
  const fertStart = Math.max(ovDay-4, mensDays+1); // fertile window start
  const ovDays    = Math.min(6, cycleLength - fertStart - 1); // fertile window span
  const preOvDays = Math.max(fertStart - mensDays, 0);        // gray before fertile
  const lutDays   = Math.max(cycleLength - mensDays - preOvDays - ovDays, 1); // gray after
  const phases=[
    {name:'Menstruation', days:mensDays,  color:'#e91e8c'},  // pink
    {name:'Follicular',   days:preOvDays, color:'#2a2d32'},  // dark gray
    {name:'Ovulation',    days:ovDays,    color:'#1de9b6'},  // teal
    {name:'Luteal',       days:lutDays,   color:'#2a2d32'},  // dark gray
  ];
  const total=phases.reduce((s,p)=>s+p.days,0);
  const segs=[];let angle=-Math.PI/2;
  phases.forEach(p=>{const span=(p.days/total)*2*Math.PI;segs.push({...p,sa:angle,ea:angle+span});angle+=span;});
  const arc=(sa,ea)=>{
    const g=0.02,s=sa+g,e=ea-g;
    const x1=cx+outerR*Math.cos(s),y1=cy+outerR*Math.sin(s);
    const x2=cx+outerR*Math.cos(e),y2=cy+outerR*Math.sin(e);
    const ix1=cx+innerR*Math.cos(e),iy1=cy+innerR*Math.sin(e);
    const ix2=cx+innerR*Math.cos(s),iy2=cy+innerR*Math.sin(s);
    const lg=(e-s)>Math.PI?1:0;
    return `M${x1},${y1} A${outerR},${outerR},0,${lg},1,${x2},${y2} L${ix1},${iy1} A${innerR},${innerR},0,${lg},0,${ix2},${iy2} Z`;
  };
  const dayNums=[];
  for(let d=1;d<=total;d++){
    const a=-Math.PI/2+(((d-0.5)/total)*2*Math.PI);
    dayNums.push({d,x:cx+numR*Math.cos(a),y:cy+numR*Math.sin(a)});
  }
  const curA=-Math.PI/2+((dayOfCycle-0.5)/total)*2*Math.PI;
  const phase = dayOfCycle<=mensDays ? 'MENSTRUATION'
    : dayOfCycle<fertStart           ? 'FOLLICULAR'
    : dayOfCycle<=(fertStart+ovDays) ? 'OVULATION'
    : 'LUTEAL';
  return (
    <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`}>
      {segs.map((seg,i)=><path key={i} d={arc(seg.sa,seg.ea)} fill={seg.color} opacity="0.9"/>)}
      {dayNums.map(({d,x,y})=>d!==dayOfCycle&&(
        <text key={d} x={x} y={y} textAnchor="middle" dominantBaseline="middle"
          fill="rgba(255,255,255,0.45)" fontFamily="'DM Mono',monospace" fontSize="8">{d}</text>
      ))}
      <circle cx={cx} cy={cy} r={innerR-1} fill="#0d0e10"/>
      <text x={cx} y={cy-10} textAnchor="middle" fill="#f0f0f0" fontFamily="'Barlow Condensed',sans-serif" fontWeight="800" fontSize="22">DAY {dayOfCycle}</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill="#5a5f65" fontFamily="'DM Mono',monospace" fontSize="8" letterSpacing="0.1em">{phase} PHASE</text>
      <circle cx={cx+numR*Math.cos(curA)} cy={cy+numR*Math.sin(curA)} r="12" fill="white"/>
      <text x={cx+numR*Math.cos(curA)} y={cy+numR*Math.sin(curA)} textAnchor="middle" dominantBaseline="middle"
        fill="#0d0e10" fontFamily="'DM Mono',monospace" fontWeight="700" fontSize="9">{dayOfCycle}</text>
    </svg>
  );
};

    const results = await Promise.all(allUsers.map(async u=>{
      try {
        const {data} = await axios.get(`${API}/period`,{params:{user:u.username}});
        // One cycle per month: keep only the most recent per YYYY-MM
        const raw = Array.isArray(data) ? data : [];
        const byMonth = {};
        raw.forEach(c=>{
          const month = (c.startDate||'').slice(0,7); // YYYY-MM

    setAllCycles(map);
