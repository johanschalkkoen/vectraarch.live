<!-- file: finances.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Legacy">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Finances · Legacy · Vectra Arch</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/shared/va.css"/>
  <link rel="stylesheet" href="/shared/legacy.css"/>
  <style>
    /* Finances-specific */
    .expense-row{display:grid;grid-template-columns:1fr 1fr auto auto;gap:12px;align-items:end;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
    .item-list{display:flex;flex-direction:column;gap:1px;background:var(--border);}
    .item-card{background:var(--bg2);padding:16px 20px;transition:background 0.2s;}
    .item-card:hover{background:var(--bg3);}
    .item-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .item-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;}
    .item-cat{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);}
    .item-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:0.08em;}
    .item-amount{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.04em;}
    .item-amount.income{color:var(--accent);}
    .item-amount.expense{color:var(--red);}
    .item-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:8px;}
    @media(max-width:600px){.expense-row{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="accent-lines" aria-hidden="true">
  <svg viewBox="0 0 600 900" fill="none" preserveAspectRatio="xMaxYMid slice">
    <line x1="580" y1="0" x2="20" y2="900" stroke="rgba(0,255,65,0.07)" stroke-width="1"/>
    <line x1="540" y1="0" x2="0" y2="760" stroke="rgba(0,255,65,0.05)" stroke-width="0.5"/>
    <line x1="600" y1="200" x2="100" y2="900" stroke="rgba(0,255,65,0.04)" stroke-width="1"/>
    <rect x="460" y="80" width="100" height="1" fill="rgba(0,255,65,0.15)"/>
    <rect x="480" y="120" width="60" height="1" fill="rgba(0,255,65,0.1)"/>
    <circle cx="540" cy="180" r="60" stroke="rgba(0,255,65,0.04)" stroke-width="1" fill="none"/>
    <circle cx="540" cy="180" r="90" stroke="rgba(0,255,65,0.025)" stroke-width="0.5" fill="none"/>
  </svg>
</div>
<nav>
  <a href="https://vectraarch.live" class="nav-logo">Vectra<span>&nbsp;</span>Arch</a>
  <div class="nav-status">LEGACY · FINANCES</div>
</nav>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef, useCallback, useMemo } = React;
  const API_BASE = '/legacy/api';
  const DEFAULT_PROFILE_PIC = 'https://placehold.co/50x50/808080/FFFFFF?text=U';
  const DEFAULT_EVENT_COLOR = '#00ff41';
  const MONTHS = Array.from({ length: 12 }, (_, i) => ({ value: (i + 1).toString().padStart(2, '0'), label: new Date(0, i).toLocaleString('default', { month: 'long' }) }));
  const getCurrentDateTime = () => { const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); return now.toISOString().slice(0, 19); };
  const formatDateTime = date => { if (!date) return '—'; const d = new Date(date); if (isNaN(d.getTime())) return 'Invalid'; return d.toLocaleString('en-ZA', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }).replace(/,/,''); };
  const formatAmount = amount => isNaN(amount) ? '—' : `R${parseFloat(amount).toFixed(2)}`;
  const formatDate = date => { if (!date) return ''; const d = new Date(date); return isNaN(d.getTime()) ? '' : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

  const useAccessibleUsers = (user, setUserProfiles) => {
    const [targetUsers, setTargetUsers] = useState([]);
    const [selectedTargets, setSelectedTargets] = useState([]);
    const [error, setError] = useState('');
    const fetched = useRef(false);
    useEffect(() => {
      if (fetched.current || !user?.username) return;
      fetched.current = true;
      const fetchAccessList = async () => {
        try {
          const { data } = await axios.get(`${API_BASE}/get-access`, { params: { viewer: user.username, adminUsername: user.username } });
          if (data.success && Array.isArray(data.accessList)) {
            const users = data.accessList.filter(a => a.viewer === user.username).map(a => a.target);
            setTargetUsers(users); setSelectedTargets(users); setError('');
            const profilePromises = users.concat(user.username).map(async u => {
              try {
                const { data: pd } = await axios.get(`${API_BASE}/profile-pictures?username=${u}`).catch(() => ({ data: { profilePicUrl: DEFAULT_PROFILE_PIC, eventColor: DEFAULT_EVENT_COLOR, displayName: u } }));
                return [u, { pic: pd.profilePicUrl||DEFAULT_PROFILE_PIC, color: pd.eventColor||DEFAULT_EVENT_COLOR, displayName: pd.displayName||u }];
              } catch { return [u, { pic: DEFAULT_PROFILE_PIC, color: DEFAULT_EVENT_COLOR, displayName: u }]; }
            });
            const profiles = Object.fromEntries(await Promise.all(profilePromises));
            setUserProfiles(prev => ({ ...prev, ...profiles, [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } }));
          } else {
            setTargetUsers([]); setError(data.message||'Failed.');
            setUserProfiles({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } });
          }
        } catch (err) {
          setError(err.response?.data?.message||'Error.');
          setUserProfiles({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } });
        }
      };
      fetchAccessList();
    }, [user?.username, setUserProfiles]);
    return { targetUsers, selectedTargets, setSelectedTargets, error };
  };

  const Financial = ({ user, setPage, onLogout }) => {
    const [items, setItems] = useState([]);
    const [budgets, setBudgets] = useState([]);
    const [form, setForm] = useState({ id: null, expenses: [{ category: '', amount: '', type: 'expense' }], date: getCurrentDateTime() });
    const [totalExpenses, setTotalExpenses] = useState(0);
    const [totalIncome, setTotalIncome] = useState(0);
    const [netTotal, setNetTotal] = useState(0);
    const [remainingBudget, setRemainingBudget] = useState(0);
    const [hideValues, setHideValues] = useState(false);
    const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
    const [bulkData, setBulkData] = useState('');
    const [importMessage, setImportMessage] = useState({ text:'', type:'' });
    const [showAddItemForm, setShowAddItemForm] = useState(false);
    const [showImportTool, setShowImportTool] = useState(false);
    const { targetUsers, selectedTargets, setSelectedTargets, error } = useAccessibleUsers(user, profiles => setUserProfiles(profiles));
    const [userProfiles, setUserProfiles] = useState({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } });
    const [message, setMessage] = useState({ text:'', type:'' });
    const [sortField, setSortField] = useState('date');
    const [sortOrder, setSortOrder] = useState('desc');

    const msg = (text, type='ok') => { setMessage({text,type}); setTimeout(()=>setMessage({text:'',type:''}), 5000); };
    const iMsg = (text, type='ok') => { setImportMessage({text,type}); setTimeout(()=>setImportMessage({text:'',type:''}), 5000); };

    const fetchItems = useCallback(async () => {
      try {
        const results = await Promise.all([user.username,...selectedTargets].map(u=>axios.get(`${API_BASE}/financial`,{params:{user:u}}).then(({data})=>data).catch(()=>[])));
        setItems(results.flat());
      } catch { msg('Error fetching data.','err'); }
    }, [user.username, selectedTargets]);

    const fetchBudgets = useCallback(async () => {
      try {
        const results = await Promise.all([user.username,...selectedTargets].map(u=>axios.get(`${API_BASE}/budget`,{params:{user:u}}).then(({data})=>data.map(b=>({...b,expenses:JSON.parse(b.expenses||'[]')}))).catch(()=>[])));
        setBudgets(results.flat());
      } catch { msg('Error fetching budgets.','err'); }
    }, [user.username, selectedTargets]);

    const allItems = useMemo(() => {
      const fi = items.map(i=>({...i,isBudget:false}));
      const bi = budgets.flatMap(b=>[
        {id:`b-${b.id}-income`,user:b.user,category:'Budget Income',amount:b.income,type:'income',date:b.date,isBudget:true,budgetId:b.id},
        ...b.expenses.map((e,idx)=>({id:`b-${b.id}-${idx}`,user:b.user,category:`Budget: ${e.category||'Unknown'}`,amount:e.amount,type:'expense',date:b.date,isBudget:true,budgetId:b.id}))
      ]);
      return [...fi,...bi];
    }, [items,budgets]);

    const sortedItems = useMemo(() => {
      const filtered = allItems.filter(i=>i.date?.slice(5,7)===selectedMonth&&[user.username,...selectedTargets].includes(i.user));
      return [...filtered].sort((a,b)=>{
        const fa=sortField==='amount'?parseFloat(a.amount)||0:a[sortField];
        const fb=sortField==='amount'?parseFloat(b.amount)||0:b[sortField];
        if(sortField==='amount') return sortOrder==='asc'?fa-fb:fb-fa;
        return sortOrder==='asc'?new Date(fa)-new Date(fb):new Date(fb)-new Date(fa);
      });
    }, [allItems,selectedMonth,sortField,sortOrder,user.username,selectedTargets]);

    const calculateTotals = useCallback(() => {
      const filtered = allItems.filter(i=>[user.username,...selectedTargets].includes(i.user)&&i.date?.slice(5,7)===selectedMonth);
      const inc = filtered.filter(i=>i.type==='income').reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
      const exp = filtered.filter(i=>i.type==='expense').reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
      setTotalIncome(inc); setTotalExpenses(exp); setNetTotal(inc-exp);
      const ub = budgets.filter(b=>b.user===user.username&&b.date?.slice(5,7)===selectedMonth);
      const bi = ub.reduce((s,b)=>s+(parseFloat(b.income)||0),0);
      const be = ub.reduce((s,b)=>s+b.expenses.reduce((es,e)=>es+(parseFloat(e.amount)||0),0),0);
      const fe = items.filter(i=>i.user===user.username&&i.type==='expense'&&i.date?.slice(5,7)===selectedMonth).reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
      setRemainingBudget(bi-(be+fe));
    }, [allItems,selectedTargets,selectedMonth,user.username,budgets,items]);

    const handleExpenseChange = useCallback((idx,field,val) => { setForm(p=>{const e=[...p.expenses];e[idx][field]=val;return{...p,expenses:e};}); }, []);
    const addNewExpense = useCallback(() => { setForm(p=>({...p,expenses:[...p.expenses,{category:'',amount:'',type:'expense'}]})); }, []);
    const removeExpense = useCallback(idx => { setForm(p=>({...p,expenses:p.expenses.filter((_,i)=>i!==idx)})); }, []);

    const handleSave = useCallback(async () => {
      if (form.expenses.some(e=>!e.category||!e.amount)) { msg('Fill in all fields.','err'); return; }
      try {
        const toAdd = form.expenses.map(e=>({ user:user.username, category:e.category, amount:parseFloat(e.amount), type:e.type, date:form.date }));
        if (form.id) {
          await axios.put(`${API_BASE}/financial/${form.id}`, toAdd[0]);
          msg('Item updated.');
        } else {
          await Promise.all(toAdd.map(item=>Promise.all([
            axios.post(`${API_BASE}/financial`,item),
            axios.post(`${API_BASE}/calendar`,{...item,title:`${item.category} (${item.type})`,financial:true,eventColor:user.eventColor||DEFAULT_EVENT_COLOR})
          ])));
          msg('Items added.');
        }
        await fetchItems(); calculateTotals();
        setForm({id:null,expenses:[{category:'',amount:'',type:'expense'}],date:getCurrentDateTime()});
        setShowAddItemForm(false);
      } catch { msg('Error saving.','err'); }
    }, [form,user.username,user.eventColor,fetchItems,calculateTotals]);

    const startEdit = useCallback(item => {
      if(item.isBudget) return;
      setForm({id:item.id,expenses:[{category:item.category,amount:item.amount.toString(),type:item.type}],date:item.date.slice(0,16)});
      setShowAddItemForm(true);
    }, []);

    const handleDeleteItem = useCallback(async item => {
      try {
        if(item.isBudget){await axios.delete(`${API_BASE}/budget/${item.budgetId}`);msg('Budget deleted.');await fetchBudgets();}
        else{await axios.delete(`${API_BASE}/financial/${item.id}`);msg('Item deleted.');await fetchItems();}
        calculateTotals();
      } catch { msg('Error deleting.','err'); }
    }, [fetchItems,fetchBudgets,calculateTotals]);

    const handleBulkImport = useCallback(async () => {
      if(!bulkData.trim()){iMsg('Paste data first.','err');return;}
      const toImport = bulkData.trim().split('\n').filter(l=>l.trim()).map(l=>{
        const[cat,amt,type,date]=l.split(',').map(f=>f.trim());
        if(!cat||!amt||!type||!date)return null;
        return{user:user.username,category:cat,amount:parseFloat(amt),type,date};
      }).filter(Boolean);
      if(!toImport.length){iMsg('No valid data found.','err');return;}
      iMsg(`Importing ${toImport.length} items...`,'warn');
      try {
        await Promise.all(toImport.map(item=>Promise.all([
          axios.post(`${API_BASE}/financial`,item),
          axios.post(`${API_BASE}/calendar`,{...item,title:`${item.category} (${item.type})`,financial:true,eventColor:user.eventColor||DEFAULT_EVENT_COLOR})
        ])));
        iMsg(`Imported ${toImport.length} items.`);
        setBulkData(''); setShowImportTool(false); await fetchItems(); calculateTotals();
      } catch { iMsg('Import failed.','err'); }
    }, [bulkData,user.username,user.eventColor,fetchItems,calculateTotals]);

    useEffect(()=>{fetchItems();fetchBudgets();},[fetchItems,fetchBudgets]);
    useEffect(()=>{calculateTotals();},[calculateTotals]);

    const month = MONTHS.find(m=>m.value===selectedMonth)?.label||'';

    return (
      <div className="page-wrap">
        <button className="back-btn" onClick={()=>setPage('menu')}>← Back to Menu</button>
        <div className="page-header">
          <div className="page-eyebrow">§ Vectra Arch · Legacy · Financial</div>
          <div className="page-title">Finances</div>
          <div className="page-sub">Income · Expenses · Net Total</div>
        </div>
        <div className="user-header">
          <img className="user-avatar" src={userProfiles[user.username]?.pic||DEFAULT_PROFILE_PIC} alt={user.username} style={{borderColor:userProfiles[user.username]?.color||DEFAULT_EVENT_COLOR}}/>
          <div className="user-display">{userProfiles[user.username]?.displayName||user.username}</div>
          <div style={{marginLeft:'auto'}}><button className="va-btn danger sm" onClick={onLogout}>Sign Out ×</button></div>
        </div>

        {message.text&&<div className={`va-alert ${message.type}`}>{message.type==='ok'?'✓ ':'⚠ '}{message.text}</div>}
        {error&&<div className="va-alert err">⚠ {error}</div>}

        <div className="summary-card">
          <div className="summary-title">§ Summary · {month}</div>
          <div className="summary-grid">
            <div className="si"><div className="si-label">Income</div><div className="si-value income">{hideValues?'****':formatAmount(totalIncome)}</div></div>
            <div className="si"><div className="si-label">Expenses</div><div className="si-value expense">{hideValues?'****':formatAmount(totalExpenses)}</div></div>
            <div className="si"><div className="si-label">Net</div><div className={`si-value ${netTotal>=0?'pos':'neg'}`}>{hideValues?'****':formatAmount(netTotal)}</div></div>
            <div className="si"><div className="si-label">Budget Left</div><div className={`si-value ${remainingBudget>=0?'pos':'neg'}`}>{hideValues?'****':formatAmount(remainingBudget)}</div></div>
          </div>
        </div>

        <div className="toolbar">
          <span className="tb-label">Month</span>
          <select className="mf-select" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
            {MONTHS.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
          </select>
          <span className="tb-label">Sort</span>
          <select className="mf-select" value={sortField} onChange={e=>setSortField(e.target.value)}>
            <option value="date">Date</option><option value="amount">Amount</option>
          </select>
          <select className="mf-select" value={sortOrder} onChange={e=>setSortOrder(e.target.value)}>
            <option value="desc">Desc</option><option value="asc">Asc</option>
          </select>
          <div className="tb-spacer"/>
          <button className="va-btn warn sm" onClick={()=>setHideValues(!hideValues)}>{hideValues?'Show Values':'Hide Values'}</button>
          <button className="va-btn sm" onClick={()=>setShowImportTool(!showImportTool)}>{showImportTool?'Hide Import':'Bulk Import'}</button>
          <button className="va-btn primary sm" onClick={()=>setShowAddItemForm(!showAddItemForm)}>{showAddItemForm?'Hide Form':'Add Item ↗'}</button>
        </div>

        {targetUsers.length>0&&(
          <div className="user-toggles">
            {targetUsers.map(t=>(
              <button key={t} className={`user-toggle ${selectedTargets.includes(t)?'on':'off'}`} onClick={()=>setSelectedTargets(prev=>prev.includes(t)?prev.filter(u=>u!==t):[...prev,t])}>
                <img className="mini-avatar" src={userProfiles[t]?.pic||DEFAULT_PROFILE_PIC} alt={t} style={{border:`1px solid ${userProfiles[t]?.color||DEFAULT_EVENT_COLOR}`}}/>
                {userProfiles[t]?.displayName||t}
              </button>
            ))}
          </div>
        )}

        {showImportTool&&(
          <div className="import-box">
            <div className="section-label">§ Bulk Import</div>
            <div className="import-hint">Format: Category,Amount,Type,Date<br/>Example: Salary,50000,income,2026-08-01 09:00:00<br/>Example: Rent,15000,expense,2026-08-01 09:00:00</div>
            <textarea className="mf-textarea" rows="5" value={bulkData} onChange={e=>setBulkData(e.target.value)} placeholder="Paste CSV data..."/>
            {importMessage.text&&<div className={`va-alert ${importMessage.type}`} style={{marginTop:'12px'}}>{importMessage.text}</div>}
            <div className="btn-row" style={{marginTop:'12px'}}>
              <button className="va-btn primary" onClick={handleBulkImport}>Import ↗</button>
              <button className="va-btn" onClick={()=>setShowImportTool(false)}>Cancel</button>
            </div>
          </div>
        )}

        {showAddItemForm&&(
          <div className="va-form">
            <div className="section-label">§ {form.id?'Edit Item':'Add Item'}</div>
            <div className="form-grid">
              <div className="mf-field full">
                <label className="mf-label">Date & Time</label>
                <input className="mf-input" type="datetime-local" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} step="1"/>
              </div>
            </div>
            <div className="section-label" style={{marginTop:'8px'}}>§ Items</div>
            {form.expenses.map((exp,idx)=>(
              <div key={idx} className="expense-row">
                <div className="mf-field" style={{margin:0}}>
                  <label className="mf-label">Category</label>
                  <input className="mf-input" placeholder="Category" value={exp.category} onChange={e=>handleExpenseChange(idx,'category',e.target.value)}/>
                </div>
                <div className="mf-field" style={{margin:0}}>
                  <label className="mf-label">Amount</label>
                  <input className="mf-input" type="number" placeholder="0.00" value={exp.amount} onChange={e=>handleExpenseChange(idx,'amount',e.target.value)}/>
                </div>
                <div className="mf-field" style={{margin:0}}>
                  <label className="mf-label">Type</label>
                  <select className="mf-select" value={exp.type} onChange={e=>handleExpenseChange(idx,'type',e.target.value)}>
                    <option value="income">Income</option><option value="expense">Expense</option>
                  </select>
                </div>
                <button className="va-btn danger sm" onClick={()=>removeExpense(idx)}>✕</button>
              </div>
            ))}
            <div className="btn-row" style={{marginBottom:'16px'}}>
              <button className="va-btn sm" onClick={addNewExpense}>+ Add Row</button>
            </div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:'10px',color:'var(--text-dim)',marginBottom:'16px'}}>
              Total: {formatAmount(form.expenses.reduce((s,e)=>s+(parseFloat(e.amount)||0),0))}
            </div>
            <div className="btn-row">
              <button className="va-btn primary" onClick={handleSave}>{form.id?'Update ↗':'Save ↗'}</button>
              <button className="va-btn" onClick={()=>{setShowAddItemForm(false);setForm({id:null,expenses:[{category:'',amount:'',type:'expense'}],date:getCurrentDateTime()});}}>Cancel</button>
            </div>
          </div>
        )}

        <div className="section-label">§ Items · {month} · {sortedItems.length} records</div>
        {sortedItems.length===0
          ? <div style={{fontFamily:"'DM Mono',monospace",fontSize:'10px',color:'var(--text-dim)',padding:'24px',background:'var(--bg2)',textAlign:'center',letterSpacing:'0.1em',border:'1px solid var(--border2)'}}>No items for {month}</div>
          : <div className="item-list">
              {sortedItems.map(item=>(
                <div key={item.id} className="item-card">
                  <div className="item-top">
                    <img className="item-avatar" src={userProfiles[item.user]?.pic||DEFAULT_PROFILE_PIC} alt={item.user} style={{border:`1px solid ${userProfiles[item.user]?.color||DEFAULT_EVENT_COLOR}`}}/>
                    <div style={{flex:1}}>
                      <div className="item-cat">{item.category}{item.isBudget?' · Budget':''}</div>
                      <div className="item-meta">{formatDateTime(item.date)} · {userProfiles[item.user]?.displayName||item.user}</div>
                    </div>
                    <div className={`item-amount ${item.type}`}>{hideValues?'****':formatAmount(item.amount)}</div>
                  </div>
                  {item.user===user.username&&(
                    <div className="item-actions">
                      {!item.isBudget&&<button className="va-btn sm" onClick={()=>startEdit(item)}>Edit</button>}
                      <button className="va-btn danger sm" onClick={()=>handleDeleteItem(item)}>Delete</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
        }
      </div>
    );
  };

  const App = () => {
    const [user, setUser] = useState(null);
    useEffect(() => {
      const s = localStorage.getItem('user');
      if(s){try{setUser(JSON.parse(s));}catch{localStorage.removeItem('user');window.location.href='index.html';}}
      else window.location.href='index.html';
    }, []);
    const handleLogout = useCallback(()=>{localStorage.removeItem('user');window.location.href='index.html';},[]);
    if(!user)return null;
    return <Financial user={user} setPage={()=>window.location.href='index.html'} onLogout={handleLogout} setUser={setUser}/>;
  };
  ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
