  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0a0a08;--bg2:#111110;--bg3:#191917;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--text:#e8e4d8;--text-muted:rgba(232,228,216,0.55);--text-dim:rgba(232,228,216,0.25);--accent:#00ff41;--accent2:#00b32c;--red:#b84040;--warn:#d4a800;--blue:#6a8aff;--purple:#b06aff;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-weight:300;font-size:16px;line-height:1.6;overflow-x:hidden;cursor:crosshair;min-height:100vh;}

    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:80px 80px;pointer-events:none;z-index:0;}
    .accent-lines{position:fixed;top:0;right:0;width:50%;height:100%;pointer-events:none;overflow:hidden;z-index:0;}
    .accent-lines svg{width:100%;height:100%;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:60px;border-bottom:1px solid var(--border);background:rgba(10,10,8,0.88);backdrop-filter:blur(12px);}
    .nav-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text);text-decoration:none;}
    .nav-logo span{color:var(--accent);}
    .nav-status{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.1em;}
    .nav-status::before{content:'';display:block;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);}
    #root{position:relative;z-index:1;}
    .page-wrap{max-width:960px;margin:0 auto;padding:88px 40px 80px;position:relative;z-index:1;}
    .page-header{margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--border);}
    .page-eyebrow{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
    .page-title{font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:0.9;color:var(--text);letter-spacing:0.02em;margin-bottom:4px;}
    .page-sub{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);}
    .user-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;}
    .user-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:1px solid var(--accent);flex-shrink:0;}
    .user-display{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:18px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);}
    .va-alert{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;padding:12px 16px;border:1px solid;margin-bottom:20px;}
    .va-alert.ok{color:var(--accent);border-color:rgba(0,255,65,0.25);background:rgba(0,255,65,0.05);}
    .va-alert.err{color:var(--red);border-color:rgba(184,64,64,0.25);background:rgba(184,64,64,0.05);}
    .va-alert.warn{color:var(--warn);border-color:rgba(212,168,0,0.25);background:rgba(212,168,0,0.05);}
    .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:20px;padding:14px 18px;background:var(--bg2);border:1px solid var(--border2);}
    .tb-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);white-space:nowrap;}
    .mf-select{background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.06em;padding:7px 12px;outline:none;transition:border-color 0.2s;cursor:crosshair;-webkit-appearance:none;}
    .mf-select:focus{border-color:var(--accent);}
    .mf-select option,.mf-select optgroup{background:var(--bg2);color:var(--text);}
    .tb-spacer{flex:1;}
    .section-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
    .va-form{background:var(--bg2);border:1px solid var(--border2);padding:28px;margin-bottom:24px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 28px;}
    .mf-field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
    .mf-field.full{grid-column:1/-1;}
    .mf-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-dim);}
    .mf-input,.mf-field-select{background:transparent;border:none;border-bottom:1px solid var(--border2);padding:10px 0;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);outline:none;transition:border-color 0.2s;width:100%;}
    .mf-input:focus,.mf-field-select:focus{border-bottom-color:var(--accent);}
    .mf-input::placeholder{color:var(--text-dim);}
    .mf-field-select{cursor:pointer;-webkit-appearance:none;}
    .mf-field-select option,.mf-field-select optgroup{background:var(--bg2);color:var(--text);}
    .type-badge{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;padding:4px 12px;border:1px solid;margin-bottom:16px;}
    .type-badge.strength{color:var(--accent);border-color:rgba(0,255,65,0.3);background:rgba(0,255,65,0.05);}
    .type-badge.cardio{color:var(--blue);border-color:rgba(106,138,255,0.3);background:rgba(106,138,255,0.05);}
    .btn-row{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;}
    .va-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;padding:10px 20px;border:1px solid var(--border2);background:transparent;color:var(--text-muted);cursor:crosshair;transition:all 0.2s;}
    .va-btn:hover{border-color:var(--text-muted);color:var(--text);}
    .va-btn.primary{border-color:var(--accent);color:var(--accent);}
    .va-btn.primary:hover{background:rgba(0,255,65,0.08);}
    .va-btn.danger{border-color:var(--red);color:var(--red);}
    .va-btn.danger:hover{background:rgba(184,64,64,0.08);}
    .va-btn.purple{border-color:var(--purple);color:var(--purple);}
    .va-btn.purple:hover{background:rgba(176,106,255,0.08);}
    .va-btn.sm{padding:6px 14px;font-size:9px;}
    .va-btn.full{width:100%;}
    .va-btn:disabled{opacity:0.35;cursor:not-allowed;}
    .toggle-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
    .toggle-chip{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;padding:6px 14px;border:1px solid var(--border2);background:transparent;color:var(--text-dim);cursor:crosshair;transition:all 0.2s;}
    .toggle-chip.on{border-color:var(--accent);color:var(--accent);background:rgba(0,255,65,0.06);}
    .user-toggles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
    .user-toggle{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;padding:6px 14px;border:1px solid;cursor:crosshair;transition:all 0.2s;}
    .user-toggle.on{border-color:var(--accent);color:var(--accent);background:rgba(0,255,65,0.05);}
    .user-toggle.off{border-color:var(--border2);color:var(--text-dim);background:transparent;}
    .mini-avatar{width:18px;height:18px;border-radius:50%;object-fit:cover;}
    .import-box{background:var(--bg2);border:1px solid var(--border2);padding:24px;margin-bottom:24px;}
    .import-hint{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;color:var(--text-dim);margin-bottom:12px;line-height:1.8;}
    .mf-textarea{background:transparent;border:1px solid var(--border2);padding:10px 14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);outline:none;transition:border-color 0.2s;width:100%;resize:vertical;min-height:100px;}
    .mf-textarea:focus{border-color:var(--accent);}
    .day-section{background:var(--bg2);border:1px solid var(--border2);margin-bottom:1px;}
    .day-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .day-name{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.04em;color:var(--text);}
    .day-count{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.14em;color:var(--text-dim);}
    .day-empty{padding:14px 20px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.1em;}
    .workout-card{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px;transition:background 0.2s;}

    .workout-avatar{width:20px;height:20px;border-radius:50%;object-fit:cover;flex-shrink:0;}
    .workout-ex{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:14px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);}

    .workout-type.cardio{color:var(--blue);border-color:rgba(106,138,255,0.3);}
    .workout-program-badge{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;padding:2px 8px;border:1px solid var(--purple);color:var(--purple);background:rgba(176,106,255,0.06);}
    .workout-detail{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:0.06em;}
    .workout-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:0.1em;}
    .workout-actions{display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;}
    .notes-box{background:var(--bg2);border:1px solid var(--border2);padding:24px;margin-top:24px;}
    .note-item{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.08em;padding:6px 0;border-bottom:1px solid var(--border);}
    .note-item:last-child{border-bottom:none;}
    .back-btn{display:inline-flex;align-items:center;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);background:transparent;border:none;cursor:crosshair;padding:0;margin-bottom:28px;transition:color 0.2s;}
    .back-btn:hover{color:var(--accent);}

    /* ── PROGRAMS ── */
    .programs-section{margin-bottom:32px;}
    .program-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:20px;}
    .program-card{background:var(--bg2);border:1px solid var(--border2);padding:20px;display:flex;flex-direction:column;gap:10px;transition:border-color 0.2s;cursor:default;}
    .program-card:hover{border-color:rgba(176,106,255,0.4);}
    .program-card.active-program{border-color:var(--purple);background:rgba(176,106,255,0.04);}
    .program-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);}
    .program-meta-row{display:flex;flex-wrap:wrap;gap:6px;}
    .program-tag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.14em;text-transform:uppercase;padding:2px 8px;border:1px solid var(--border2);color:var(--text-dim);}
    .program-tag.goal{border-color:rgba(0,255,65,0.3);color:var(--accent);}
    .program-tag.diff{border-color:rgba(212,168,0,0.3);color:var(--warn);}
    .program-desc{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:0.06em;line-height:1.7;}
    .program-schedule{margin-top:4px;}
    .program-day-row{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:0.08em;padding:3px 0;border-bottom:1px solid var(--border);}
    .program-day-row:last-child{border-bottom:none;}
    .program-day-label{color:var(--text-muted);margin-right:8px;}
    .program-actions{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
    .prog-ex-row{display:grid;grid-template-columns:auto 1fr auto auto auto;gap:0 12px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
    .prog-ex-row:last-child{border-bottom:none;}
    .prog-ex-day{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:0.1em;width:80px;}
    .prog-ex-name{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);}
    .prog-ex-detail{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);}
    .prog-ex-remove{background:none;border:none;color:var(--red);font-family:'DM Mono',monospace;font-size:10px;cursor:crosshair;padding:2px 6px;opacity:0.6;transition:opacity 0.2s;}
    .prog-ex-remove:hover{opacity:1;}
    .empty-programs{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.1em;padding:24px;background:var(--bg2);border:1px solid var(--border2);text-align:center;}

    @media(max-width:600px){
      nav{padding:0 20px;}
      .page-wrap{padding:80px 20px 60px;}
      .page-title{font-size:40px;}
      .form-grid{grid-template-columns:1fr;}
      .mf-field.full{grid-column:1;}
      .program-cards{grid-template-columns:1fr;}
      .prog-ex-row{grid-template-columns:1fr 1fr;}
    }
  </style>
</head>

  const isCardio = exercise => WORKOUT_OPTIONS.some(g => g.label.startsWith('Cardio Workouts') && g.options.some(o => o.value === exercise));

  const formatWorkoutDetails = workout => {
    const reps = String(workout.reps);
    const weight = String(workout.weight);
    if (isCardio(workout.exercise)) return `${reps} min · ${weight} km`;
    if (workout.sets > 1 && reps.includes(',') && weight.includes(',')) {
      const ra = reps.split(',').map(r=>r.trim());
      const wa = weight.split(',').map(w=>w.trim());
      if (ra.length === workout.sets && wa.length === workout.sets) return ra.map((r,i)=>`${r} reps @ ${wa[i]} kg`).join(' · ');
    }
    return `${workout.sets} × ${reps} reps @ ${weight} kg`;
  };

  class ErrorBoundary extends React.Component {

  // ── ACCESSIBLE USERS HOOK ────────────────────────────────────────────────────
  const useAccessibleUsers = (user, setUserProfiles) => {
    const [targetUsers, setTargetUsers] = useState([]);
    const [selectedTargets, setSelectedTargets] = useState([]);
    const [error, setError] = useState('');
    const fetched = useRef(false);
    useEffect(() => {
      if (fetched.current || !user?.username) return;
      fetched.current = true;
      const fetchAccessList = async () => {
        try {
          const { data } = await axios.get(`${API_BASE}/get-access`, { params: { viewer: user.username, adminUsername: user.username } });
          if (data.success && Array.isArray(data.accessList)) {
            const users = data.accessList.filter(a => a.viewer === user.username).map(a => a.target);
            setTargetUsers(users); setSelectedTargets(users); setError('');
            const profilePromises = users.concat(user.username).map(async u => {
              try {
                const { data: pd } = await axios.get(`${API_BASE}/profile-pictures?username=${u}`).catch(() => ({ data: { profilePicUrl: DEFAULT_PROFILE_PIC, eventColor: DEFAULT_EVENT_COLOR, displayName: u } }));
                return [u, { pic: pd.profilePicUrl||DEFAULT_PROFILE_PIC, color: pd.eventColor||DEFAULT_EVENT_COLOR, displayName: pd.displayName||u }];
              } catch { return [u, { pic: DEFAULT_PROFILE_PIC, color: DEFAULT_EVENT_COLOR, displayName: u }]; }
            });
            const profiles = Object.fromEntries(await Promise.all(profilePromises));
            setUserProfiles(prev => ({ ...prev, ...profiles, [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } }));
          } else {
            setTargetUsers([]); setError(data.message||'Failed.');
            setUserProfiles({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } });
          }
        } catch (err) {
          setError(err.response?.data?.message||'Error.');
          setUserProfiles({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } });
        }
      };
      fetchAccessList();
    }, [user?.username, setUserProfiles]);
    return { targetUsers, selectedTargets, setSelectedTargets, error };
  };

    const handleExSelect = e => {

      setExercises(prev => [...prev, { day:exForm.day, exercise:ex, sets:parseInt(exForm.sets)||null, reps:exForm.reps, weight:exForm.weight }]);
      setExForm(p=>({...p,exercise:'',isCustom:false,customExercise:'',sets:'3',reps:'10',weight:''}));
      setExType('strength');
      setErr('');
    };

      if (!form.name.trim()) { setErr('Program name is required.'); return; }
      setSaving(true); setErr('');
      try {
        const payload = { user: user.username, ...form, durationWeeks: form.durationWeeks||null, daysPerWeek: form.daysPerWeek||null, exercises };
        if (editingProgram) {
          await axios.put(`${API_BASE}/gymprogram/${editingProgram.id}`, payload);

          await axios.post(`${API_BASE}/gymprogram`, payload);

          <div className="mf-field full">

            <input className="mf-input" placeholder="Brief description of the program" value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/>
          </div>
          <div className="mf-field">
            <label className="mf-label">Goal</label>
            <select className="mf-field-select" value={form.goal} onChange={e=>setForm(p=>({...p,goal:e.target.value}))}>
              <option value="">— Select goal —</option>
              {GOALS.map(g=><option key={g} value={g}>{g}</option>)}
            </select>
          </div>
          <div className="mf-field">
            <label className="mf-label">Difficulty</label>
            <select className="mf-field-select" value={form.difficulty} onChange={e=>setForm(p=>({...p,difficulty:e.target.value}))}>
              <option value="">— Select difficulty —</option>
              {DIFFICULTIES.map(d=><option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div className="mf-field">
            <label className="mf-label">Duration (weeks)</label>
            <input className="mf-input" type="number" min="1" max="52" placeholder="8" value={form.durationWeeks} onChange={e=>setForm(p=>({...p,durationWeeks:e.target.value}))}/>
          </div>
          <div className="mf-field">
            <label className="mf-label">Days per week</label>
            <input className="mf-input" type="number" min="1" max="7" placeholder="5" value={form.daysPerWeek} onChange={e=>setForm(p=>({...p,daysPerWeek:e.target.value}))}/>
          </div>
        </div>

        <div className="section-label" style={{marginTop:'8px'}}>§ Program Schedule</div>
        {exercises.length > 0 && (
          <div style={{marginBottom:'16px'}}>
            {exercises.map((ex,i)=>(
              <div key={i} className="prog-ex-row">
                <div className="prog-ex-day">{ex.day}</div>
                <div className="prog-ex-name">{ex.exercise}</div>
                <div className="prog-ex-detail">{ex.sets&&`${ex.sets}×`}{ex.reps&&`${ex.reps}`}{ex.weight&&` @ ${ex.weight}kg`}</div>
                <button className="prog-ex-remove" onClick={()=>removeExercise(i)}>✕</button>
              </div>
            ))}
          </div>
        )}
        <div style={{background:'var(--bg3)',border:'1px solid var(--border)',padding:'16px',marginBottom:'16px'}}>
          <div className="mf-label" style={{marginBottom:'8px'}}>Add Exercise to Schedule</div>
          <div className="toggle-group" style={{marginBottom:'12px'}}>
            {DAYS.map(d=><button key={d} className={`toggle-chip ${exForm.day===d?'on':'off'}`} onClick={()=>setExForm(p=>({...p,day:d}))}>{d.slice(0,3)}</button>)}
          </div>
          <div className="form-grid">
            <div className="mf-field full">
              <label className="mf-label">Exercise</label>
              <select className="mf-field-select" value={exForm.isCustom?'custom':exForm.exercise} onChange={handleExSelect}>
                <option value="">— Select exercise —</option>
                {WORKOUT_OPTIONS.map(group=>(
                  <optgroup key={group.label} label={group.label}>
                    {group.options.map(opt=><option key={opt.value} value={opt.value}>{opt.label}</option>)}
                  </optgroup>

              </select>
            </div>
            {exForm.isCustom && (
              <div className="mf-field full">
                <label className="mf-label">Custom Exercise Name</label>
                <input className="mf-input" placeholder="Enter exercise name" value={exForm.customExercise} onChange={e=>setExForm(p=>({...p,customExercise:e.target.value}))}/>

            )}
            {exType==='strength' && (
              <div className="mf-field">
                <label className="mf-label">Sets</label>
                <input className="mf-input" type="number" min="1" placeholder="3" value={exForm.sets} onChange={e=>setExForm(p=>({...p,sets:e.target.value}))}/>

              <label className="mf-label">{exType==='cardio'?'Duration (min)':'Reps'}</label>
              <input className="mf-input" type="text" placeholder={exType==='cardio'?'30':'10'} value={exForm.reps} onChange={e=>setExForm(p=>({...p,reps:e.target.value}))}/>

  // ── MAIN COMPONENT ───────────────────────────────────────────────────────────
  const GymWorkout = ({ user, setPage, onLogout, setUser }) => {
    const [workouts, setWorkouts] = useState([]);
    const [programs, setPrograms] = useState([]);
    const [activeProgram, setActiveProgram] = useState(null); // program id filter
    const [form, setForm] = useState({ id:null, day:new Date().toLocaleString('en-US',{weekday:'long'}), exercise:'', sets:'', reps:'', weight:'', date:getCurrentDateTime(), programId:'' });
    const [message, setMessage] = useState({ text:'', type:'' });
    const [showAddForm, setShowAddForm] = useState(false);
    const [showProgramForm, setShowProgramForm] = useState(false);
    const [editingProgram, setEditingProgram] = useState(null);
    const [bulkData, setBulkData] = useState('');
    const [importMessage, setImportMessage] = useState({ text:'', type:'' });
    const [showImportTool, setShowImportTool] = useState(false);
    const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
    const [sortField, setSortField] = useState('date');
    const [sortOrder, setSortOrder] = useState('desc');
    const [exerciseType, setExerciseType] = useState('strength');
    const [isCustom, setIsCustom] = useState(false);
    const [customExercise, setCustomExercise] = useState('');
    const { targetUsers, selectedTargets, setSelectedTargets, error } = useAccessibleUsers(user, profiles => setUserProfiles(profiles));
    const [userProfiles, setUserProfiles] = useState({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } });

    const msg = (text, type='ok') => { setMessage({text,type}); setTimeout(()=>setMessage({text:'',type:''}),5000); };
    const iMsg = (text, type='ok') => { setImportMessage({text,type}); setTimeout(()=>setImportMessage({text:'',type:''}),5000); };

    const fetchWorkouts = useCallback(async () => {
      try {
        const results = await Promise.all([user.username,...selectedTargets].map(u=>
          axios.get(`${API_BASE}/gymworkout`,{params:{user:u}})
            .then(({data})=>data.map(w=>({...w,reps:String(w.reps),weight:String(w.weight)})))
            .catch(()=>[])
        ));
        setWorkouts(results.flat());
      } catch { msg('Error fetching workouts.','err'); }
    }, [user.username, selectedTargets]);

    const fetchPrograms = useCallback(async () => {
      try {
        const { data } = await axios.get(`${API_BASE}/gymprogram`, { params: { user: user.username } });
        setPrograms(Array.isArray(data) ? data : []);
      } catch { msg('Error fetching programs.','err'); }
    }, [user.username]);

    const handleInputChange = useCallback(e => {
      const { name, value } = e.target;
      if (name==='exerciseSelect') {
        if(value==='custom'){setIsCustom(true);setExerciseType('strength');setForm(p=>({...p,exercise:customExercise||''}));}
        else{setIsCustom(false);setExerciseType(isCardio(value)?'cardio':'strength');setForm(p=>({...p,exercise:value}));setCustomExercise('');}
      } else if (name==='customExercise') {
        setCustomExercise(value);setForm(p=>({...p,exercise:value}));
      } else { setForm(p=>({...p,[name]:value})); }
    }, [customExercise]);

    const handleSaveWorkout = useCallback(async () => {
      if (!form.day||!form.exercise) { msg('Day and exercise required.','err'); return; }
      const sets = exerciseType==='cardio'?1:parseInt(form.sets);
      if (isNaN(sets)||sets<=0) { msg('Sets must be a positive number.','err'); return; }
      const repsArray = form.reps.split(',').map(r=>r.trim());
      const weightArray = form.weight.split(',').map(w=>w.trim());
      if (exerciseType!=='cardio') {
        if(sets>1&&(repsArray.length!==sets||weightArray.length!==sets)){msg('For multiple sets, provide comma-separated reps and weights matching the number of sets.','err');return;}
        if(repsArray.some(r=>isNaN(parseInt(r))||parseInt(r)<=0)||weightArray.some(w=>isNaN(parseFloat(w))||parseFloat(w)<=0)){msg('Reps and weights must be positive numbers.','err');return;}
      } else {
        if(isNaN(parseFloat(form.reps))||parseFloat(form.reps)<=0||isNaN(parseFloat(form.weight))||parseFloat(form.weight)<=0){msg('Duration and distance must be positive numbers.','err');return;}
      }
      const wd = { user:user.username, day:form.day, exercise:form.exercise, sets, reps:form.reps, weight:form.weight, date:form.date, programId:form.programId||null };
      try {
        if(form.id){await axios.put(`${API_BASE}/gymworkout/${form.id}`,wd);msg('Workout updated.');}
        else{await axios.post(`${API_BASE}/gymworkout`,wd);msg('Workout saved.');}
        fetchWorkouts();
        setForm({id:null,day:new Date().toLocaleString('en-US',{weekday:'long'}),exercise:'',sets:'',reps:'',weight:'',date:getCurrentDateTime(),programId:''});
        setShowAddForm(false);setIsCustom(false);setExerciseType('strength');setCustomExercise('');
      } catch { msg('Error saving workout.','err'); }
    }, [form,user.username,fetchWorkouts,exerciseType]);

    const handleDeleteWorkout = useCallback(async id => {
      try { await axios.delete(`${API_BASE}/gymworkout/${id}`);msg('Workout deleted.');fetchWorkouts(); } catch { msg('Error deleting.','err'); }
    }, [fetchWorkouts]);

    const handleDeleteProgram = useCallback(async id => {
      if (!window.confirm('Delete this program? Logged workouts will keep their history.')) return;
      try { await axios.delete(`${API_BASE}/gymprogram/${id}`);msg('Program deleted.');fetchPrograms();if(activeProgram===id)setActiveProgram(null); } catch { msg('Error deleting program.','err'); }
    }, [fetchPrograms, activeProgram]);

    const startEdit = useCallback(workout => {
      setForm({id:workout.id,day:workout.day,exercise:workout.exercise,sets:workout.sets.toString(),reps:String(workout.reps),weight:String(workout.weight),date:workout.date.slice(0,16),programId:workout.program_id||''});
      const type = isCardio(workout.exercise)?'cardio':'strength';
      setExerciseType(type);
      const custom = !WORKOUT_OPTIONS.some(g=>g.options.some(o=>o.value===workout.exercise));
      setIsCustom(custom);setCustomExercise(custom?workout.exercise:'');setShowAddForm(true);
    }, []);

    const handleBulkImport = useCallback(async () => {
      if(!bulkData.trim()){iMsg('Paste data first.','err');return;}
      const toImport = bulkData.trim().split('\n').filter(l=>l.trim()).map(l=>{
        const[day,exercise,sets,reps,weight,date]=l.split(',').map(f=>f.trim());
        if(!day||!exercise||!sets||!reps||!weight||!date)return null;
        return{user:user.username,day,exercise,sets:parseInt(sets),reps,weight,date};
      }).filter(Boolean);
      if(!toImport.length){iMsg('No valid data.','err');return;}
      iMsg(`Importing ${toImport.length} workouts...`,'warn');
      try {
        await Promise.all(toImport.map(w=>axios.post(`${API_BASE}/gymworkout`,w)));
        iMsg(`Imported ${toImport.length} workouts.`);setBulkData('');setShowImportTool(false);fetchWorkouts();
      } catch { iMsg('Import failed.','err'); }
    }, [bulkData,user.username,fetchWorkouts]);

    const sortedWorkouts = useMemo(() => {
      let filtered = workouts.filter(w=>w.date?.startsWith(`${new Date().getFullYear().toString().slice(0,2)}${selectedMonth.length===2?new Date().getFullYear().toString().slice(2):''}`) || w.date?.slice(5,7)===selectedMonth);
      // simple month filter
      filtered = workouts.filter(w => w.date && w.date.slice(5,7) === selectedMonth);
      if (activeProgram) filtered = filtered.filter(w => String(w.program_id)===String(activeProgram));
      filtered = filtered.filter(w=>[user.username,...selectedTargets].includes(w.user));
      return [...filtered].sort((a,b)=>{
        const fa=sortField==='sets'?parseFloat(a.sets)||0:a[sortField];
        const fb=sortField==='sets'?parseFloat(b.sets)||0:b[sortField];
        if(sortField==='sets') return sortOrder==='asc'?fa-fb:fb-fa;
        return sortOrder==='asc'?new Date(fa)-new Date(fb):new Date(fb)-new Date(fa);
      });
    }, [workouts,selectedMonth,sortField,sortOrder,activeProgram,user.username,selectedTargets]);

    useEffect(()=>{if(user?.username){fetchWorkouts();fetchPrograms();}},[fetchWorkouts,fetchPrograms,user]);

    const month = MONTHS.find(m=>m.value===selectedMonth)?.label||'';
    const activeProgramObj = programs.find(p=>p.id===activeProgram);

    return (
      <div className="page-wrap">
        <button className="back-btn" onClick={()=>setPage('menu')}>← Back to Menu</button>
        <div className="page-header">
          <div className="page-eyebrow">§ Vectra Arch · Legacy · Fitness</div>
          <div className="page-title">Gym Workout</div>
          <div className="page-sub">Strength · Cardio · Weekly Training Log</div>
        </div>
        <div className="user-header">
          <img className="user-avatar" src={userProfiles[user.username]?.pic||DEFAULT_PROFILE_PIC} alt={user.username} style={{borderColor:userProfiles[user.username]?.color||DEFAULT_EVENT_COLOR}}/>
          <div className="user-display">{userProfiles[user.username]?.displayName||user.username}</div>
          <div style={{marginLeft:'auto'}}><button className="va-btn danger sm" onClick={onLogout}>Sign Out ×</button></div>
        </div>

        {message.text&&<div className={`va-alert ${message.type}`}>{message.type==='ok'?'✓ ':'⚠ '}{message.text}</div>}
        {error&&<div className="va-alert err">⚠ {error}</div>}

        {/* ── PROGRAMS SECTION ── */}
        <div className="programs-section">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}}>
            <div className="section-label" style={{marginBottom:0,paddingBottom:0,borderBottom:'none'}}>§ Programs</div>
            <button className="va-btn purple sm" onClick={()=>{setEditingProgram(null);setShowProgramForm(!showProgramForm);}}>
              {showProgramForm?'Hide':'New Program ↗'}
            </button>
          </div>

          {showProgramForm && (
            <ProgramForm
              user={user}
              editingProgram={editingProgram}
              onSaved={()=>{fetchPrograms();setShowProgramForm(false);setEditingProgram(null);msg('Program saved.');}}
              onCancel={()=>{setShowProgramForm(false);setEditingProgram(null);}}
            />
          )}

          {programs.length === 0 && !showProgramForm ? (
            <div className="empty-programs">§ No programs yet · Create one to organise your training</div>
          ) : (
            <div className="program-cards">
              {programs.map(p=>(
                <div key={p.id} className={`program-card ${activeProgram===p.id?'active-program':''}`}>
                  <div className="program-name">{p.name}</div>
                  <div className="program-meta-row">
                    {p.goal&&<span className="program-tag goal">{p.goal}</span>}
                    {p.difficulty&&<span className="program-tag diff">{p.difficulty}</span>}
                    {p.durationWeeks&&<span className="program-tag">{p.durationWeeks}w</span>}
                    {p.daysPerWeek&&<span className="program-tag">{p.daysPerWeek}d/wk</span>}
                  </div>
                  {p.description&&<div className="program-desc">{p.description}</div>}
                  {p.exercises&&p.exercises.length>0&&(
                    <div className="program-schedule">
                      {DAYS.filter(d=>p.exercises.some(e=>e.day===d)).map(d=>(
                        <div key={d} className="program-day-row">
                          <span className="program-day-label">{d.slice(0,3)}</span>
                          {p.exercises.filter(e=>e.day===d).map((e,i)=>(
                            <span key={i}>{i>0?' · ':''}{e.exercise}{e.sets?` ${e.sets}×`:''}{e.reps?`${e.reps}`:''}</span>
                          ))}
                        </div>
                      ))}
                    </div>
                  )}
                  <div className="program-actions">
                    <button className="va-btn sm purple" onClick={()=>setActiveProgram(activeProgram===p.id?null:p.id)}>
                      {activeProgram===p.id?'Clear Filter':'Filter Workouts'}
                    </button>
                    <button className="va-btn sm" onClick={()=>{setEditingProgram(p);setShowProgramForm(true);window.scrollTo({top:0,behavior:'smooth'});}}>Edit</button>
                    <button className="va-btn sm danger" onClick={()=>handleDeleteProgram(p.id)}>Delete</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ── WORKOUT LOG TOOLBAR ── */}
        <div className="toolbar">
          <span className="tb-label">Month</span>
          <select className="mf-select" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
            {MONTHS.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
          </select>
          <span className="tb-label">Sort</span>
          <select className="mf-select" value={sortField} onChange={e=>setSortField(e.target.value)}>
            <option value="date">Date</option><option value="sets">Sets</option>
          </select>
          <select className="mf-select" value={sortOrder} onChange={e=>setSortOrder(e.target.value)}>
            <option value="desc">Desc</option><option value="asc">Asc</option>
          </select>
          <div className="tb-spacer"/>
          <button className="va-btn sm" onClick={()=>setShowImportTool(!showImportTool)}>{showImportTool?'Hide Import':'Bulk Import'}</button>
          <button className="va-btn primary sm" onClick={()=>setShowAddForm(!showAddForm)}>{showAddForm?'Hide Form':'Log Workout ↗'}</button>
        </div>

        {targetUsers.length>0&&(
          <div className="user-toggles">
            {targetUsers.map(t=>(
              <button key={t} className={`user-toggle ${selectedTargets.includes(t)?'on':'off'}`} onClick={()=>setSelectedTargets(prev=>prev.includes(t)?prev.filter(u=>u!==t):[...prev,t])}>
                <img className="mini-avatar" src={userProfiles[t]?.pic||DEFAULT_PROFILE_PIC} alt={t} style={{border:`1px solid ${userProfiles[t]?.color||DEFAULT_EVENT_COLOR}`}}/>
                {userProfiles[t]?.displayName||t}
              </button>
            ))}
          </div>
        )}

        {showImportTool&&(
          <div className="import-box">
            <div className="section-label">§ Bulk Import</div>
            <div className="import-hint">Format: Day,Exercise,Sets,Reps,Weight,Date<br/>Strength: Monday,Bench Press,3,10,50,2025-08-01 09:00:00<br/>Cardio: Monday,Steady-state running,1,30,5,2025-08-01 09:00:00</div>
            <textarea className="mf-textarea" rows="5" value={bulkData} onChange={e=>setBulkData(e.target.value)} placeholder="Paste CSV data..."/>
            {importMessage.text&&<div className={`va-alert ${importMessage.type}`} style={{marginTop:'12px'}}>{importMessage.text}</div>}
            <div className="btn-row" style={{marginTop:'12px'}}>
              <button className="va-btn primary" onClick={handleBulkImport}>Import ↗</button>
              <button className="va-btn" onClick={()=>setShowImportTool(false)}>Cancel</button>
            </div>
          </div>
        )}

        {showAddForm&&(
          <div className="va-form">
            <div className="section-label">§ {form.id?'Edit Workout':'Log Workout'}</div>
            <div className="mf-label" style={{marginBottom:'8px'}}>Day</div>
            <div className="toggle-group" style={{marginBottom:'20px'}}>
              {DAYS.map(d=><button key={d} className={`toggle-chip ${form.day===d?'on':'off'}`} onClick={()=>setForm(p=>({...p,day:d}))}>{d}</button>)}
            </div>
            <div className="mf-field full">
              <label className="mf-label">Exercise Template</label>
              <select className="mf-field-select" name="exerciseSelect" value={isCustom?'custom':form.exercise} onChange={handleInputChange}>
                <option value="">— Select exercise —</option>
                {WORKOUT_OPTIONS.map(group=>(
                  <optgroup key={group.label} label={group.label}>
                    {group.options.map(opt=><option key={opt.value} value={opt.value}>{opt.label}</option>)}
                  </optgroup>
                ))}
              </select>
            </div>
            {isCustom&&(
              <div className="mf-field full">
                <label className="mf-label">Custom Exercise Name</label>
                <input className="mf-input" name="customExercise" placeholder="Enter exercise name" value={customExercise} onChange={handleInputChange}/>
              </div>
            )}
            {form.exercise&&(
              <div className={`type-badge ${exerciseType}`} style={{marginBottom:'20px'}}>
                {exerciseType==='cardio'?'◎ Cardio':'⬡ Strength'}
              </div>
            )}
            {programs.length>0&&(
              <div className="mf-field full">
                <label className="mf-label">Assign to Program (optional)</label>
                <select className="mf-field-select" name="programId" value={form.programId} onChange={handleInputChange}>
                  <option value="">— No program —</option>
                  {programs.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
              </div>
            )}
            <div className="form-grid">
              {exerciseType==='strength'&&(
                <div className="mf-field">
                  <label className="mf-label">Sets</label>
                  <input className="mf-input" name="sets" type="number" placeholder="3" value={form.sets} onChange={handleInputChange}/>
                </div>
              )}
              <div className="mf-field">
                <label className="mf-label">{exerciseType==='cardio'?'Duration (min)':'Reps'}{exerciseType!=='cardio'&&parseInt(form.sets)>1?' (comma-sep, e.g. 10,8,6)':''}</label>
                <input className="mf-input" name="reps" type="text" placeholder={exerciseType==='cardio'?'30':parseInt(form.sets)>1?'10,8,6':'10'} value={form.reps} onChange={handleInputChange}/>
              </div>
              <div className="mf-field">
                <label className="mf-label">{exerciseType==='cardio'?'Distance (km)':'Weight (kg)'}{exerciseType!=='cardio'&&parseInt(form.sets)>1?' (comma-sep, e.g. 50,60,70)':''}</label>
                <input className="mf-input" name="weight" type="text" placeholder={exerciseType==='cardio'?'5':parseInt(form.sets)>1?'50,60,70':'80'} value={form.weight} onChange={handleInputChange}/>
              </div>
              <div className="mf-field">
                <label className="mf-label">Date & Time</label>
                <input className="mf-input" type="datetime-local" name="date" value={form.date} onChange={handleInputChange} step="1"/>
              </div>
            </div>
            <div className="btn-row">
              <button className="va-btn primary" onClick={handleSaveWorkout}>{form.id?'Update ↗':'Save ↗'}</button>
              <button className="va-btn" onClick={()=>{setShowAddForm(false);setIsCustom(false);setExerciseType('strength');setCustomExercise('');setForm({id:null,day:new Date().toLocaleString('en-US',{weekday:'long'}),exercise:'',sets:'',reps:'',weight:'',date:getCurrentDateTime(),programId:''});}}>Cancel</button>
            </div>
          </div>
        )}

        <div className="section-label">
          § Weekly Plan · {month}{activeProgramObj?` · ${activeProgramObj.name}`:''}
        </div>

        {DAYS.map(day=>{
          const dayWorkouts = sortedWorkouts.filter(w=>w.day===day);
          const totalSets = dayWorkouts.reduce((s,w)=>s+(parseInt(w.sets)||0),0);
          return (
            <div key={day} className="day-section">
              <div className="day-header">
                <div className="day-name">{day}</div>
                <div className="day-count">{dayWorkouts.length} exercises · {totalSets} sets</div>
              </div>
              {dayWorkouts.length===0
                ? <div className="day-empty">§ Rest day</div>
                : dayWorkouts.map(workout=>{
                    const progName = workout.program_id ? programs.find(p=>p.id===workout.program_id)?.name : null;
                    return (
                      <div key={workout.id} className="workout-card">
                        <div className="workout-top">
                          <img className="workout-avatar" src={userProfiles[workout.user]?.pic||DEFAULT_PROFILE_PIC} alt={workout.user} style={{border:`1px solid ${userProfiles[workout.user]?.color||DEFAULT_EVENT_COLOR}`}}/>
                          <span className={`workout-type ${isCardio(workout.exercise)?'cardio':'strength'}`}>{isCardio(workout.exercise)?'Cardio':'Strength'}</span>
                          {progName&&<span className="workout-program-badge">⬡ {progName}</span>}
                          <span className="workout-ex">{workout.exercise}</span>
                        </div>
                        <div className="workout-detail">{formatWorkoutDetails(workout)}</div>
                        <div className="workout-meta">{formatDateTime(workout.date)} · {userProfiles[workout.user]?.displayName||workout.user}</div>
                        {workout.user===user.username&&(
                          <div className="workout-actions">
                            <button className="va-btn sm" onClick={()=>startEdit(workout)}>Edit</button>
                            <button className="va-btn danger sm" onClick={()=>handleDeleteWorkout(workout.id)}>Delete</button>
                          </div>
                        )}
                      </div>
                    );
                  })}
            </div>
          );
        })}

        <div className="notes-box">
          <div className="section-label">§ Notes</div>
          <div className="note-item">Equipment availability varies by gym. Most offer free weights, machines, and cardio equipment.</div>
          <div className="note-item">Workouts can be tailored for beginners (lighter weights, simpler movements) or advanced athletes.</div>
          <div className="note-item">Proper form is critical to avoid injury, especially with free weights or compound movements like deadlifts.</div>
          <div className="note-item">Combine exercises based on your goal — muscle gain, fat loss, or endurance — using progressive overload.</div>
        </div>
      </div>
    );
  };

  const App = () => {
    const [user, setUser] = useState(null);
    useEffect(() => {
      const s = localStorage.getItem('user');
      if(s){try{setUser(JSON.parse(s));}catch{localStorage.removeItem('user');window.location.href='index.html';}}
      else window.location.href='index.html';
    }, []);
    const handleLogout = useCallback(()=>{localStorage.removeItem('user');window.location.href='index.html';},[]);
    if(!user)return null;
    return <ErrorBoundary><GymWorkout user={user} setPage={()=>window.location.href='index.html'} onLogout={handleLogout} setUser={setUser}/></ErrorBoundary>;
  };
  ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
