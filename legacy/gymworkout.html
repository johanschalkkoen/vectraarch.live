<!-- file: gymworkout.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Legacy">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Gym Workout · Legacy · Vectra Arch</title>
  
  <script src="/legacy/auth-guard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
  
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0a0a08;--bg2:#111110;--bg3:#191917;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--text:#e8e4d8;--text-muted:rgba(232,228,216,0.55);--text-dim:rgba(232,228,216,0.25);--accent:#00ff41;--accent2:#00b32c;--red:#b84040;--warn:#d4a800;--blue:#6a8aff;}
    body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-weight:300;font-size:16px;line-height:1.6;overflow-x:hidden;cursor:crosshair;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");opacity:0.4;pointer-events:none;z-index:0;}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:80px 80px;pointer-events:none;z-index:0;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:60px;border-bottom:1px solid var(--border);background:rgba(10,10,8,0.88);backdrop-filter:blur(12px);}
    .nav-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text);text-decoration:none;}
    .nav-logo span{color:var(--accent);}
    .nav-status{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.1em;}
    .nav-status::before{content:'';display:block;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);}
    #root{position:relative;z-index:1;}
    .page-wrap{max-width:960px;margin:0 auto;padding:88px 40px 80px;}
    .page-header{margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--border);}
    .page-eyebrow{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
    .page-title{font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:0.9;color:var(--text);letter-spacing:0.02em;margin-bottom:4px;}
    .va-alert{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;padding:12px 16px;border:1px solid;margin-bottom:20px;}
    .va-alert.ok{color:var(--accent);border-color:rgba(0,255,65,0.25);background:rgba(0,255,65,0.05);}
    .va-alert.err{color:var(--red);border-color:rgba(184,64,64,0.25);background:rgba(184,64,64,0.05);}
    .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:20px;padding:14px 18px;background:var(--bg2);border:1px solid var(--border2);}
    .mf-select{background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:7px 12px;outline:none;}
    .mf-select:focus{border-color:var(--accent);}
    .va-form{background:var(--bg2);border:1px solid var(--border2);padding:28px;margin-bottom:24px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 28px;}
    .mf-field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
    .mf-field.full{grid-column:1/-1;}
    .mf-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-dim);}
    .mf-input{background:transparent;border:none;border-bottom:1px solid var(--border2);padding:10px 0;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);width:100%;}
    .mf-input:focus{border-bottom-color:var(--accent);}
    .va-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text);background:none;border:1px solid var(--border2);padding:9px 16px;cursor:crosshair;}
    .va-btn:hover{border-color:var(--accent);color:var(--accent);}
    .va-btn.primary{background:var(--accent);color:#0a0a08;border-color:var(--accent);}
    .day-section{background:var(--bg2);border:1px solid var(--border2);margin-bottom:1px;}
    .workout-card{padding:14px 20px;border-bottom:1px solid var(--border);}
    .workout-card:hover{background:var(--bg3);}
  </style>
</head>
<body>
<div class="grid-bg"></div>
<nav>
  <a href="https://vectraarch.live" class="nav-logo">Vectra<span>&nbsp;</span>Arch</a>
  <div class="nav-status">LEGACY · GYM WORKOUT</div>
</nav>

<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useCallback } = React;

  class ErrorBoundary extends React.Component {
    state = { error: null };
    componentDidCatch(error) { this.setState({ error }); }
    render() {
      if (this.state.error) return <div className="page-wrap"><div className="va-alert err">⚠ {this.state.error.toString()}</div></div>;
      return this.props.children;
    }
  }

  const API_BASE = '/legacy/api';
  const MONTHS = Array.from({ length: 12 }, (_, i) => ({ value: (i + 1).toString().padStart(2, '0'), label: new Date(0, i).toLocaleString('default', { month: 'long' }) }));
  const YEARS = Array.from({length:5},(_,i)=>new Date().getFullYear()-2+i);
  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

  const getCurrentDateTime = () => {
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    return now.toISOString().slice(0, 19);
  };

  const GymWorkout = ({ user }) => {
    const [workouts, setWorkouts] = useState([]);
    const [message, setMessage] = useState({text: '', type: 'ok'});
    const [form, setForm] = useState({ exercise: '', sets: '3', reps: '10', weight: '80', notes: '', date: getCurrentDateTime() });

    const loadWorkouts = useCallback(async () => {
      try {
        const res = await axios.get(`${API_BASE}/gymworkout`, { params: { user: user.username } });
        if (res.data.success) setWorkouts(res.data.data || []);
      } catch (e) {
        console.error(e);
      }
    }, [user]);

    useEffect(() => { loadWorkouts(); }, [loadWorkouts]);

    const handleSave = async () => {
      try {
        await axios.post(`${API_BASE}/gymworkout`, { ...form, user: user.username });
        setMessage({text: 'Workout saved', type: 'ok'});
        loadWorkouts();
        setForm({ exercise: '', sets: '3', reps: '10', weight: '80', notes: '', date: getCurrentDateTime() });
      } catch (e) {
        setMessage({text: 'Failed to save', type: 'err'});
      }
    };

    return (
      <div className="page-wrap">
        <div className="page-header">
          <div className="page-eyebrow">LEGACY SYSTEM</div>
          <h1 className="page-title">GYM WORKOUT</h1>
        </div>

        {message.text && <div className={`va-alert ${message.type}`}>{message.text}</div>}

        {/* Add Form - Aligned to Financial */}
        <div className="va-form">
          <div className="form-grid">
            <div className="mf-field">
              <div className="mf-label">Exercise</div>
              <input className="mf-input" value={form.exercise} onChange={e => setForm({...form, exercise: e.target.value})} placeholder="Bench Press / Run" />
            </div>
            <div className="mf-field">
              <div className="mf-label">Sets</div>
              <input className="mf-input" type="number" value={form.sets} onChange={e => setForm({...form, sets: e.target.value})} />
            </div>
            <div className="mf-field">
              <div className="mf-label">Reps</div>
              <input className="mf-input" type="number" value={form.reps} onChange={e => setForm({...form, reps: e.target.value})} />
            </div>
            <div className="mf-field">
              <div className="mf-label">Weight (kg)</div>
              <input className="mf-input" type="number" value={form.weight} onChange={e => setForm({...form, weight: e.target.value})} />
            </div>
          </div>
          <button className="va-btn primary" onClick={handleSave} style={{marginTop:'20px'}}>LOG WORKOUT</button>
        </div>

        {/* List */}
        <div className="section-label">RECENT WORKOUTS</div>
        {workouts.length === 0 ? <div>No workouts yet</div> : workouts.map(w => (
          <div key={w.id} className="workout-card">
            <strong>{w.exercise}</strong><br/>
            {w.sets} × {w.reps} @ {w.weight}kg
          </div>
        ))}
      </div>
    );
  };

  const App = () => {
    const [user, setUser] = useState(null);
    useEffect(() => {
      const s = localStorage.getItem('user');
      if (s) setUser(JSON.parse(s));
      else window.location.href = 'index.html';
    }, []);
    if (!user) return null;
    return <ErrorBoundary><GymWorkout user={user} /></ErrorBoundary>;
  };

  ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
