    /* Gymworkout-specific — type badges with correct colours inline for type-badge class variants */
    .type-badge.cardio  { color: var(--blue);   border-color: rgba(106,138,255,0.3); background: rgba(106,138,255,0.05); }
    .type-badge.strength{ color: var(--accent); border-color: rgba(0,255,65,0.3);    background: rgba(0,255,65,0.05); }

    /* Programs section */
    .program-card { background: var(--bg2); border: 1px solid var(--border2); padding: 20px; margin-bottom: 1px; transition: background 0.2s; }

    .program-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 12px; flex-wrap: wrap; }
    .program-day-section { background: var(--bg3); border: 1px solid var(--border); padding: 12px 16px; margin-bottom: 4px; }
    .program-day-label { font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--purple); margin-bottom: 8px; }

<script type="text/babel">
  const { useState, useEffect, useRef, useCallback, useMemo } = React;

  class ErrorBoundary extends React.Component {
    state = { error: null };
    componentDidCatch(error) { this.setState({ error }); }
    render() {
      if (this.state.error) return (
        <div className="page-wrap">
          <div className="va-alert err">⚠ {this.state.error.toString()}</div>
          <button className="va-btn" onClick={()=>window.location.reload()}>Reload</button>
        </div>
      );
      return this.props.children;
    }
  }

  const API_BASE = '/legacy/api';
  const DEFAULT_PROFILE_PIC = 'https://placehold.co/50x50/808080/FFFFFF?text=U';
  const DEFAULT_EVENT_COLOR = '#00ff41';
  const MONTHS = Array.from({ length: 12 }, (_, i) => ({ value: (i + 1).toString().padStart(2, '0'), label: new Date(0, i).toLocaleString('default', { month: 'long' }) }));
  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const capitalize = str => str ? str.charAt(0).toUpperCase() + str.slice(1) : '';
  const getCurrentDateTime = () => { const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); return now.toISOString().slice(0, 19); };
  const formatDateTime = date => { if (!date) return '—'; const d = new Date(date); if (isNaN(d.getTime())) return 'Invalid'; return d.toLocaleString('en-ZA', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }).replace(/,/,''); };

  const WORKOUT_OPTIONS = [
    { label:'Strength — Free Weights', options:[
      {value:'Barbell Back Squat',label:'Barbell Back Squat'},{value:'Barbell Front Squat',label:'Barbell Front Squat'},
      {value:'Barbell Deadlift',label:'Barbell Deadlift'},{value:'Romanian Deadlift',label:'Romanian Deadlift'},
      {value:'Barbell Bench Press',label:'Barbell Bench Press'},{value:'Incline Barbell Bench Press',label:'Incline Barbell Bench Press'},
      {value:'Barbell Overhead Press',label:'Barbell Overhead Press'},{value:'Barbell Bent-Over Row',label:'Barbell Bent-Over Row'},
      {value:'Barbell Hip Thrust',label:'Barbell Hip Thrust'},{value:'Barbell Curl',label:'Barbell Curl'},
      {value:'Dumbbell Shoulder Press',label:'Dumbbell Shoulder Press'},{value:'Dumbbell Lateral Raises',label:'Dumbbell Lateral Raises'},
      {value:'Dumbbell Bicep Curl',label:'Dumbbell Bicep Curl'},{value:'Hammer Curl',label:'Hammer Curl'},
      {value:'Dumbbell Tricep Kickback',label:'Dumbbell Tricep Kickback'},{value:'Dumbbell Romanian Deadlift',label:'Dumbbell Romanian Deadlift'},
      {value:'Dumbbell Lunges',label:'Dumbbell Lunges'},{value:'Goblet Squat',label:'Goblet Squat'},
      {value:'Dumbbell Row',label:'Dumbbell Row'},{value:'Dumbbell Fly',label:'Dumbbell Fly'},
      {value:'EZ-Bar Curl',label:'EZ-Bar Curl'},{value:'Skull Crushers',label:'Skull Crushers'}
    ]},
    { label:'Strength — Cable Machine', options:[
      {value:'Cable Crossover (Fly)',label:'Cable Crossover (Fly)'},{value:'Cable Tricep Pushdown',label:'Cable Tricep Pushdown'},
      {value:'Cable Bicep Curl',label:'Cable Bicep Curl'},{value:'Cable Row',label:'Cable Row'},
      {value:'Face Pull',label:'Face Pull'},{value:'Cable Lateral Raise',label:'Cable Lateral Raise'},
      {value:'Cable Woodchop',label:'Cable Woodchop'},{value:'Cable Hip Abduction',label:'Cable Hip Abduction'}
    ]},
    { label:'Strength — Machine', options:[
      {value:'Leg Press',label:'Leg Press'},{value:'Leg Extension',label:'Leg Extension'},
      {value:'Leg Curl (Hamstring Curl)',label:'Leg Curl (Hamstring Curl)'},{value:'Chest Press Machine',label:'Chest Press Machine'},
      {value:'Lat Pulldown',label:'Lat Pulldown'},{value:'Seated Row Machine',label:'Seated Row Machine'},
      {value:'Hip Abduction/Adduction Machine',label:'Hip Abduction/Adduction Machine'},
      {value:'Pec Deck (Chest Fly)',label:'Pec Deck (Chest Fly)'},{value:'Tricep Pushdowns',label:'Tricep Pushdowns'},
      {value:'Machine Shoulder Press',label:'Machine Shoulder Press'},{value:'Abdominal Crunch Machine',label:'Abdominal Crunch Machine'}
    ]},
    { label:'Strength — Bodyweight', options:[
      {value:'Push-Ups (standard, wide, diamond)',label:'Push-Ups (standard, wide, diamond)'},
      {value:'Pull-Ups/Chin-Ups (assisted or unassisted)',label:'Pull-Ups/Chin-Ups (assisted or unassisted)'},
      {value:'Dips (parallel bars or bench)',label:'Dips (parallel bars or bench)'},
      {value:'Planks (front, side)',label:'Planks (front, side)'},{value:'Bodyweight Squats',label:'Bodyweight Squats'},
      {value:'Lunges',label:'Lunges'},{value:'Step-Ups (using a bench)',label:'Step-Ups (using a bench)'},
      {value:'Wall Sits',label:'Wall Sits'},{value:'Hanging Leg Raises',label:'Hanging Leg Raises'}
    ]},
    { label:'Cardio Workouts — Treadmill', options:[
      {value:'Steady-state running or jogging',label:'Steady-state running or jogging'},
      {value:'Interval sprints (e.g., 30 seconds sprint, 1 minute walk)',label:'Interval sprints'},
      {value:'Incline walking or running',label:'Incline walking or running'}
    ]},
    { label:'Cardio Workouts — Stationary Bike', options:[
      {value:'Steady-state cycling',label:'Steady-state cycling'},
      {value:'High-Intensity Interval Training (HIIT) cycling',label:'HIIT cycling'},
      {value:'Hill climb simulations',label:'Hill climb simulations'}
    ]},
    { label:'Cardio Workouts — Elliptical', options:[
      {value:'Full-body cardio (with arm movement)',label:'Full-body cardio (with arm movement)'},
      {value:'Reverse pedaling',label:'Reverse pedaling'},{value:'Interval training',label:'Interval training'}
    ]},
    { label:'Cardio Workouts — Rowing Machine', options:[
      {value:'Steady-state rowing',label:'Steady-state rowing'},
      {value:'Sprint intervals',label:'Sprint intervals'},{value:'Endurance rows',label:'Endurance rows'}
    ]},
    { label:'Cardio Workouts — Stair Climber', options:[
      {value:'Steady-state stair climbing',label:'Steady-state stair climbing'},
      {value:'Interval climbing',label:'Interval climbing'}
    ]},
    { label:'Group Classes — HIIT', options:[
      {value:'High-intensity interval training circuits',label:'High-intensity interval training circuits'},
      {value:'Plyometric exercises (burpees, jump squats)',label:'Plyometric exercises (burpees, jump squats)'},
      {value:'Battle Ropes',label:'Battle Ropes'}
    ]},
    { label:'Group Classes — Yoga', options:[
      {value:'Power Yoga',label:'Power Yoga'},{value:'Hatha Yoga',label:'Hatha Yoga'},{value:'Vinyasa Flow',label:'Vinyasa Flow'}
    ]},
    { label:'Group Classes — Pilates', options:[
      {value:'Mat-based core strengthening',label:'Mat-based core strengthening'},
      {value:'Reformer Pilates (if equipment is available)',label:'Reformer Pilates'}
    ]},
    { label:'Group Classes — TRX', options:[
      {value:'TRX rows',label:'TRX rows'},{value:'TRX squats',label:'TRX squats'},{value:'TRX planks',label:'TRX planks'}
    ]},
    { label:'Misc — Medicine Ball', options:[
      {value:'Wall Balls',label:'Wall Balls'},{value:'Rotational Throws',label:'Rotational Throws'},{value:'Overhead Slams',label:'Overhead Slams'}
    ]},
    { label:'Misc — Swimming', options:[
      {value:'Freestyle, breaststroke, backstroke',label:'Freestyle, breaststroke, backstroke'},
      {value:'Interval swimming',label:'Interval swimming'},{value:'Water aerobics',label:'Water aerobics'}
    ]},
    { label:'Custom', options:[{value:'custom',label:'Custom Workout'}]}
  ];

  const isCardio = exercise => WORKOUT_OPTIONS.some(g => g.label.startsWith('Cardio Workouts') && g.options.some(o => o.value === exercise));

  const formatWorkoutDetails = workout => {
    const reps = String(workout.reps);
    const weight = String(workout.weight);
    if (isCardio(workout.exercise)) return `${reps} min · ${weight} km`;
    if (workout.sets > 1 && reps.includes(',') && weight.includes(',')) {
      const ra = reps.split(',').map(r=>r.trim());
      const wa = weight.split(',').map(w=>w.trim());
      if (ra.length === workout.sets && wa.length === workout.sets) return ra.map((r,i)=>`${r} reps @ ${wa[i]} kg`).join(' · ');
    }
    return `${workout.sets} × ${reps} reps @ ${weight} kg`;
  };

  const useAccessibleUsers = (user, setUserProfiles) => {
    const [targetUsers, setTargetUsers] = useState([]);
    const [selectedTargets, setSelectedTargets] = useState([]);
    const [error, setError] = useState('');
    const fetched = useRef(false);
    useEffect(() => {
      if (fetched.current || !user?.username) return;
      fetched.current = true;
      const fetchAccessList = async () => {
        try {
          const { data } = await axios.get(`${API_BASE}/get-access`, { params: { viewer: user.username, adminUsername: user.username } });
          if (data.success && Array.isArray(data.accessList)) {
            const users = data.accessList.filter(a => a.viewer === user.username).map(a => a.target);
            setTargetUsers(users); setSelectedTargets(users); setError('');
            const profilePromises = users.concat(user.username).map(async u => {
              try {
                const { data: pd } = await axios.get(`${API_BASE}/profile-pictures?username=${u}`).catch(() => ({ data: { profilePicUrl: DEFAULT_PROFILE_PIC, eventColor: DEFAULT_EVENT_COLOR, displayName: u } }));
                return [u, { pic: pd.profilePicUrl||DEFAULT_PROFILE_PIC, color: pd.eventColor||DEFAULT_EVENT_COLOR, displayName: pd.displayName||u }];
              } catch { return [u, { pic: DEFAULT_PROFILE_PIC, color: DEFAULT_EVENT_COLOR, displayName: u }]; }
            });
            const profiles = Object.fromEntries(await Promise.all(profilePromises));
            setUserProfiles(prev => ({ ...prev, ...profiles, [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } }));
          } else {
            setTargetUsers([]); setError(data.message||'Failed.');
            setUserProfiles({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } });
          }
        } catch (err) {
          setError(err.response?.data?.message||'Error.');
          setUserProfiles({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } });
        }
      };
      fetchAccessList();
    }, [user?.username, setUserProfiles]);
    return { targetUsers, selectedTargets, setSelectedTargets, error };
  };

  const GymWorkout = ({ user, setPage, onLogout }) => {
    const [workouts, setWorkouts] = useState([]);
    const [programs, setPrograms] = useState([]);
    const [activeProgram, setActiveProgram] = useState(null);
    const [filterProgram, setFilterProgram] = useState('');
    const [form, setForm] = useState({ id:null, day:new Date().toLocaleString('en-US',{weekday:'long'}), exercise:'', sets:'', reps:'', weight:'', date:getCurrentDateTime() });
    const [message, setMessage] = useState({ text:'', type:'' });
    const [showAddForm, setShowAddForm] = useState(false);
    const [showProgramForm, setShowProgramForm] = useState(false);
    const [showProgramsPanel, setShowProgramsPanel] = useState(false);
    const [bulkData, setBulkData] = useState('');
    const [importMessage, setImportMessage] = useState({ text:'', type:'' });
    const [showImportTool, setShowImportTool] = useState(false);
    const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
    const [sortField, setSortField] = useState('date');
    const [sortOrder, setSortOrder] = useState('desc');
    const [exerciseType, setExerciseType] = useState('strength');
    const [isCustom, setIsCustom] = useState(false);
    const [customExercise, setCustomExercise] = useState('');
    const { targetUsers, selectedTargets, setSelectedTargets, error } = useAccessibleUsers(user, profiles => setUserProfiles(profiles));
    const [userProfiles, setUserProfiles] = useState({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } });

    // Program form state
    const [programForm, setProgramForm] = useState({ id:null, name:'', description:'', goal:'', difficulty:'Intermediate', duration_weeks:'', days_per_week:'', exercises:{} });

    const msg = (text, type='ok') => { setMessage({text,type}); setTimeout(()=>setMessage({text:'',type:''}),5000); };
    const iMsg = (text, type='ok') => { setImportMessage({text,type}); setTimeout(()=>setImportMessage({text:'',type:''}),5000); };

    const fetchWorkouts = useCallback(async () => {
      try {
        const results = await Promise.all([user.username,...selectedTargets].map(u=>
          axios.get(`${API_BASE}/gymworkout`,{params:{user:u}})
            .then(({data})=>data.map(w=>({...w,reps:String(w.reps),weight:String(w.weight)})))
            .catch(()=>[])
        ));
        setWorkouts(results.flat());
      } catch { msg('Error fetching workouts.','err'); }
    }, [user.username, selectedTargets]);

    const fetchPrograms = useCallback(async () => {
      try {
        const { data } = await axios.get(`${API_BASE}/gymprogram`, { params: { username: user.username } });
        if (Array.isArray(data)) setPrograms(data);
      } catch {}
    }, [user.username]);

    const handleInputChange = useCallback(e => {
      const { name, value } = e.target;
      if (name==='exerciseSelect') {
        if(value==='custom'){setIsCustom(true);setExerciseType('strength');setForm(p=>({...p,exercise:customExercise||''}));}
        else{setIsCustom(false);setExerciseType(isCardio(value)?'cardio':'strength');setForm(p=>({...p,exercise:value}));setCustomExercise('');}
      } else if (name==='customExercise') {
        setCustomExercise(value);setForm(p=>({...p,exercise:value}));
      } else { setForm(p=>({...p,[name]:value})); }
    }, [customExercise]);

    const handleSaveWorkout = useCallback(async () => {
      if (!form.day||!form.exercise) { msg('Day and exercise required.','err'); return; }
      const sets = exerciseType==='cardio'?1:parseInt(form.sets);
      if (isNaN(sets)||sets<=0) { msg('Sets must be a positive number.','err'); return; }
      const repsArray = form.reps.split(',').map(r=>r.trim());
      const weightArray = form.weight.split(',').map(w=>w.trim());
      if (exerciseType!=='cardio') {
        if(sets>1&&(repsArray.length!==sets||weightArray.length!==sets)){msg('For multiple sets, provide comma-separated reps and weights matching the number of sets.','err');return;}
        if(repsArray.some(r=>isNaN(parseInt(r))||parseInt(r)<=0)||weightArray.some(w=>isNaN(parseFloat(w))||parseFloat(w)<=0)){msg('Reps and weights must be positive numbers.','err');return;}
      } else {
        if(isNaN(parseFloat(form.reps))||parseFloat(form.reps)<=0||isNaN(parseFloat(form.weight))||parseFloat(form.weight)<=0){msg('Duration and distance must be positive numbers.','err');return;}
      }
      const wd = { user:user.username, day:form.day, exercise:form.exercise, sets, reps:form.reps, weight:form.weight, date:form.date };
      try {
        if(form.id){await axios.put(`${API_BASE}/gymworkout/${form.id}`,wd);msg('Workout updated.');}
        else{await axios.post(`${API_BASE}/gymworkout`,wd);msg('Workout saved.');}
        fetchWorkouts();
        setForm({id:null,day:new Date().toLocaleString('en-US',{weekday:'long'}),exercise:'',sets:'',reps:'',weight:'',date:getCurrentDateTime()});
        setShowAddForm(false);setIsCustom(false);setExerciseType('strength');setCustomExercise('');
      } catch { msg('Error saving workout.','err'); }
    }, [form,user.username,fetchWorkouts,exerciseType]);

    const handleDeleteWorkout = useCallback(async id => {
      try { await axios.delete(`${API_BASE}/gymworkout/${id}`);msg('Workout deleted.');fetchWorkouts(); } catch { msg('Error deleting.','err'); }
    }, [fetchWorkouts]);

    const startEdit = useCallback(workout => {
      setForm({id:workout.id,day:workout.day,exercise:workout.exercise,sets:workout.sets.toString(),reps:String(workout.reps),weight:String(workout.weight),date:workout.date.slice(0,16)});
      const type = isCardio(workout.exercise)?'cardio':'strength';
      setExerciseType(type);
      const custom = !WORKOUT_OPTIONS.some(g=>g.options.some(o=>o.value===workout.exercise));
      setIsCustom(custom);setCustomExercise(custom?workout.exercise:'');setShowAddForm(true);
    }, []);

    const handleBulkImport = useCallback(async () => {
      if(!bulkData.trim()){iMsg('Paste data first.','err');return;}
      const toImport = bulkData.trim().split('\n').filter(l=>l.trim()).map(l=>{
        const[day,exercise,sets,reps,weight,date]=l.split(',').map(f=>f.trim());
        if(!day||!exercise||!sets||!reps||!weight||!date)return null;
        return{user:user.username,day,exercise,sets:parseInt(sets),reps,weight,date};
      }).filter(Boolean);
      if(!toImport.length){iMsg('No valid data.','err');return;}
      iMsg(`Importing ${toImport.length} workouts...`,'warn');
      try { await Promise.all(toImport.map(w=>axios.post(`${API_BASE}/gymworkout`,w)));iMsg(`Imported ${toImport.length} workouts.`);setBulkData('');setShowImportTool(false);fetchWorkouts(); } catch { iMsg('Import failed.','err'); }
    }, [bulkData,user.username,fetchWorkouts]);

    // ── PROGRAMS ──
    const handleSaveProgram = useCallback(async () => {
      if (!programForm.name) { msg('Program name required.','err'); return; }
      try {
        const pd = { username: user.username, name: programForm.name, description: programForm.description, goal: programForm.goal, difficulty: programForm.difficulty, duration_weeks: parseInt(programForm.duration_weeks)||null, days_per_week: parseInt(programForm.days_per_week)||null, exercises: programForm.exercises };
        if (programForm.id) { await axios.put(`${API_BASE}/gymprogram/${programForm.id}`, pd); msg('Program updated.'); }
        else { await axios.post(`${API_BASE}/gymprogram`, pd); msg('Program created.'); }
        fetchPrograms();
        setProgramForm({id:null,name:'',description:'',goal:'',difficulty:'Intermediate',duration_weeks:'',days_per_week:'',exercises:{}});
        setShowProgramForm(false);
      } catch { msg('Error saving program.','err'); }
    }, [programForm, user.username, fetchPrograms]);

    const handleDeleteProgram = useCallback(async id => {
      try { await axios.delete(`${API_BASE}/gymprogram/${id}`); msg('Program deleted.'); fetchPrograms(); if(activeProgram?.id===id) setActiveProgram(null); } catch { msg('Error deleting program.','err'); }
    }, [fetchPrograms, activeProgram]);

    const handleAssignProgram = useCallback(async (workoutId, programId) => {
      try { await axios.patch(`${API_BASE}/gymworkout/${workoutId}/program`, { program_id: programId||null }); fetchWorkouts(); } catch {}
    }, [fetchWorkouts]);

    const addProgramExercise = useCallback((day) => {
      setProgramForm(p => ({ ...p, exercises: { ...p.exercises, [day]: [...(p.exercises[day]||[]), {exercise:'',sets:'',reps:'',weight:''}] } }));
    }, []);

    const updateProgramExercise = useCallback((day, idx, field, val) => {
      setProgramForm(p => { const exs = [...(p.exercises[day]||[])]; exs[idx] = {...exs[idx],[field]:val}; return {...p, exercises:{...p.exercises,[day]:exs}}; });
    }, []);

    const removeProgramExercise = useCallback((day, idx) => {
      setProgramForm(p => { const exs = (p.exercises[day]||[]).filter((_,i)=>i!==idx); return {...p, exercises:{...p.exercises,[day]:exs}}; });
    }, []);

    const sortedWorkouts = useMemo(() => {
      let filtered = workouts.filter(w=>w.date?.slice(5,7)===selectedMonth);
      if (filterProgram) filtered = filtered.filter(w=>String(w.program_id)===filterProgram);
      return [...filtered].sort((a,b)=>{
        const fa=sortField==='sets'?parseFloat(a.sets)||0:a[sortField];
        const fb=sortField==='sets'?parseFloat(b.sets)||0:b[sortField];
        if(sortField==='sets') return sortOrder==='asc'?fa-fb:fb-fa;
        return sortOrder==='asc'?new Date(fa)-new Date(fb):new Date(fb)-new Date(fa);
      });
    }, [workouts,selectedMonth,sortField,sortOrder,filterProgram]);

    useEffect(()=>{if(user?.username){fetchWorkouts();fetchPrograms();}},[fetchWorkouts,fetchPrograms,user]);

    const month = MONTHS.find(m=>m.value===selectedMonth)?.label||'';

    return (
      <div className="page-wrap">
        <button className="back-btn" onClick={()=>setPage('menu')}>← Back to Menu</button>
        <div className="page-header">
          <div className="page-eyebrow">§ Vectra Arch · Legacy · Fitness</div>
          <div className="page-title">Gym Workout</div>
          <div className="page-sub">Strength · Cardio · Weekly Training Log</div>
        </div>
        <div className="user-header">
          <img className="user-avatar" src={userProfiles[user.username]?.pic||DEFAULT_PROFILE_PIC} alt={user.username} style={{borderColor:userProfiles[user.username]?.color||DEFAULT_EVENT_COLOR}}/>
          <div className="user-display">{userProfiles[user.username]?.displayName||user.username}</div>
          <div style={{marginLeft:'auto'}}><button className="va-btn danger sm" onClick={onLogout}>Sign Out ×</button></div>
        </div>

        {message.text&&<div className={`va-alert ${message.type}`}>{message.type==='ok'?'✓ ':'⚠ '}{message.text}</div>}
        {error&&<div className="va-alert err">⚠ {error}</div>}

        {/* ── TOOLBAR ── */}
        <div className="toolbar">
          <span className="tb-label">Month</span>
          <select className="mf-select" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
            {MONTHS.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
          </select>
          <span className="tb-label">Sort</span>
          <select className="mf-select" value={sortField} onChange={e=>setSortField(e.target.value)}>
            <option value="date">Date</option><option value="sets">Sets</option>
          </select>
          <select className="mf-select" value={sortOrder} onChange={e=>setSortOrder(e.target.value)}>
            <option value="desc">Desc</option><option value="asc">Asc</option>
          </select>
          {programs.length>0&&(
            <>
              <span className="tb-label">Program</span>
              <select className="mf-select" value={filterProgram} onChange={e=>setFilterProgram(e.target.value)}>
                <option value="">All</option>
                {programs.map(p=><option key={p.id} value={String(p.id)}>{p.name}</option>)}
              </select>
            </>
          )}
          <div className="tb-spacer"/>
          <button className="va-btn purple sm" style={{borderColor:'var(--purple)',color:'var(--purple)'}} onClick={()=>setShowProgramsPanel(!showProgramsPanel)}>{showProgramsPanel?'Hide Programs':'Programs ↗'}</button>
          <button className="va-btn sm" onClick={()=>setShowImportTool(!showImportTool)}>{showImportTool?'Hide Import':'Bulk Import'}</button>
          <button className="va-btn primary sm" onClick={()=>setShowAddForm(!showAddForm)}>{showAddForm?'Hide Form':'Log Workout ↗'}</button>
        </div>

        {targetUsers.length>0&&(
          <div className="user-toggles">
            {targetUsers.map(t=>(
              <button key={t} className={`user-toggle ${selectedTargets.includes(t)?'on':'off'}`} onClick={()=>setSelectedTargets(prev=>prev.includes(t)?prev.filter(u=>u!==t):[...prev,t])}>
                <img className="mini-avatar" src={userProfiles[t]?.pic||DEFAULT_PROFILE_PIC} alt={t} style={{border:`1px solid ${userProfiles[t]?.color||DEFAULT_EVENT_COLOR}`}}/>
                {userProfiles[t]?.displayName||t}
              </button>
            ))}
          </div>
        )}

        {/* ── PROGRAMS PANEL ── */}
        {showProgramsPanel&&(
          <div style={{marginBottom:'24px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}}>
              <div className="section-label" style={{margin:0,padding:0,border:'none'}}>§ Programs</div>
              <button className="va-btn purple sm" style={{borderColor:'var(--purple)',color:'var(--purple)'}} onClick={()=>{setShowProgramForm(!showProgramForm);setProgramForm({id:null,name:'',description:'',goal:'',difficulty:'Intermediate',duration_weeks:'',days_per_week:'',exercises:{}});}}>
                {showProgramForm?'Cancel':'New Program ↗'}
              </button>
            </div>

            {showProgramForm&&(
              <div className="va-form" style={{borderColor:'var(--purple)'}}>
                <div className="section-label">§ {programForm.id?'Edit Program':'Create Program'}</div>
                <div className="form-grid">
                  <div className="mf-field"><label className="mf-label">Program Name *</label><input className="mf-input" value={programForm.name} onChange={e=>setProgramForm(p=>({...p,name:e.target.value}))} placeholder="e.g. Push Pull Legs"/></div>
                  <div className="mf-field"><label className="mf-label">Goal</label><input className="mf-input" value={programForm.goal} onChange={e=>setProgramForm(p=>({...p,goal:e.target.value}))} placeholder="e.g. Muscle gain"/></div>
                  <div className="mf-field full"><label className="mf-label">Description</label><textarea className="mf-textarea" rows="2" value={programForm.description} onChange={e=>setProgramForm(p=>({...p,description:e.target.value}))} placeholder="Brief description..."/></div>
                  <div className="mf-field"><label className="mf-label">Difficulty</label><select className="mf-field-select" value={programForm.difficulty} onChange={e=>setProgramForm(p=>({...p,difficulty:e.target.value}))}><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></div>
                  <div className="mf-field"><label className="mf-label">Duration (weeks)</label><input className="mf-input" type="number" value={programForm.duration_weeks} onChange={e=>setProgramForm(p=>({...p,duration_weeks:e.target.value}))} placeholder="12"/></div>
                  <div className="mf-field"><label className="mf-label">Days / Week</label><input className="mf-input" type="number" min="1" max="7" value={programForm.days_per_week} onChange={e=>setProgramForm(p=>({...p,days_per_week:e.target.value}))} placeholder="4"/></div>
                </div>

                <div className="section-label" style={{marginTop:'8px'}}>§ Exercise Schedule</div>
                {DAYS.map(day=>(
                  <div key={day} className="program-day-section">
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}}>
                      <div className="program-day-label">{day}</div>
                      <button className="va-btn sm" style={{fontSize:'8px',padding:'4px 10px'}} onClick={()=>addProgramExercise(day)}>+ Add</button>
                    </div>
                    {(programForm.exercises[day]||[]).map((ex,idx)=>(
                      <div key={idx} className="program-ex-row">
                        <input className="mf-input" placeholder="Exercise" value={ex.exercise} onChange={e=>updateProgramExercise(day,idx,'exercise',e.target.value)} style={{fontSize:'11px'}}/>
                        <input className="mf-input" placeholder="Sets" type="number" value={ex.sets} onChange={e=>updateProgramExercise(day,idx,'sets',e.target.value)} style={{fontSize:'11px',width:'60px'}}/>
                        <input className="mf-input" placeholder="Reps" value={ex.reps} onChange={e=>updateProgramExercise(day,idx,'reps',e.target.value)} style={{fontSize:'11px',width:'80px'}}/>
                        <button className="va-btn danger sm" onClick={()=>removeProgramExercise(day,idx)}>✕</button>
                      </div>
                    ))}
                    {!(programForm.exercises[day]||[]).length&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'var(--text-dim)'}}>§ Rest day</div>}
                  </div>
                ))}

                <div className="btn-row" style={{marginTop:'16px'}}>
                  <button className="va-btn purple" style={{borderColor:'var(--purple)',color:'var(--purple)'}} onClick={handleSaveProgram}>{programForm.id?'Update ↗':'Create ↗'}</button>
                  <button className="va-btn" onClick={()=>setShowProgramForm(false)}>Cancel</button>
                </div>
              </div>
            )}

            {programs.length===0&&!showProgramForm&&(
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:'10px',color:'var(--text-dim)',padding:'20px',textAlign:'center',background:'var(--bg2)',border:'1px solid var(--border2)'}}>§ No programs yet. Create one to organise your training.</div>
            )}
            {programs.map(prog=>(
              <div key={prog.id} className={`program-card ${activeProgram?.id===prog.id?'active':''}`}>
                <div className="program-title">{prog.name}</div>
                {prog.goal&&<div className="program-meta">Goal: {prog.goal}</div>}
                <div className="program-meta">{prog.difficulty}{prog.duration_weeks?` · ${prog.duration_weeks}w`:''}{prog.days_per_week?` · ${prog.days_per_week}d/wk`:''}</div>
                {prog.description&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:'10px',color:'var(--text-muted)',marginTop:'8px'}}>{prog.description}</div>}
                <div className="program-actions">
                  <button className="va-btn sm" onClick={()=>setActiveProgram(activeProgram?.id===prog.id?null:prog)}>{activeProgram?.id===prog.id?'Deactivate':'Set Active'}</button>
                  <button className="va-btn sm" onClick={()=>{setProgramForm({id:prog.id,name:prog.name,description:prog.description||'',goal:prog.goal||'',difficulty:prog.difficulty||'Intermediate',duration_weeks:prog.duration_weeks||'',days_per_week:prog.days_per_week||'',exercises:prog.exercises||{}});setShowProgramForm(true);}}>Edit</button>
                  <button className="va-btn danger sm" onClick={()=>handleDeleteProgram(prog.id)}>Delete</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ── BULK IMPORT ── */}
        {showImportTool&&(
          <div className="import-box">
            <div className="section-label">§ Bulk Import</div>
            <div className="import-hint">Format: Day,Exercise,Sets,Reps,Weight,Date<br/>Example: Monday,Barbell Back Squat,3,10,80,2026-08-01 09:00:00<br/>For cardio: Monday,Steady-state running or jogging,1,30,5,2026-08-01 07:00:00</div>
            <textarea className="mf-textarea" rows="5" value={bulkData} onChange={e=>setBulkData(e.target.value)} placeholder="Paste CSV data..."/>
            {importMessage.text&&<div className={`va-alert ${importMessage.type}`} style={{marginTop:'12px'}}>{importMessage.text}</div>}
            <div className="btn-row" style={{marginTop:'12px'}}>
              <button className="va-btn primary" onClick={handleBulkImport}>Import ↗</button>
              <button className="va-btn" onClick={()=>setShowImportTool(false)}>Cancel</button>
            </div>
          </div>
        )}

        {/* ── LOG WORKOUT FORM ── */}
        {showAddForm&&(
          <div className="va-form">
            <div className="section-label">§ {form.id?'Edit Workout':'Log Workout'}</div>
            <div className="mf-label" style={{marginBottom:'8px'}}>Day</div>
            <div className="toggle-group" style={{marginBottom:'20px'}}>
              {DAYS.map(d=><button key={d} className={`toggle-chip ${form.day===d?'on':'off'}`} onClick={()=>setForm(p=>({...p,day:d}))}>{d}</button>)}
            </div>
            <div className="mf-field full">
              <label className="mf-label">Exercise Template</label>
              <select className="mf-field-select" name="exerciseSelect" value={isCustom?'custom':form.exercise} onChange={handleInputChange}>
                <option value="">— Select exercise —</option>
                {WORKOUT_OPTIONS.map(group=>(
                  <optgroup key={group.label} label={group.label}>
                    {group.options.map(opt=><option key={opt.value} value={opt.value}>{opt.label}</option>)}
                  </optgroup>
                ))}
              </select>
            </div>
            {isCustom&&(
              <div className="mf-field full">
                <label className="mf-label">Custom Exercise Name</label>
                <input className="mf-input" name="customExercise" placeholder="Enter exercise name" value={customExercise} onChange={handleInputChange}/>
              </div>
            )}
            {form.exercise&&(
              <div style={{marginBottom:'16px'}}>
                <span className={`type-badge ${exerciseType}`}>{exerciseType==='cardio'?'◎ Cardio':'⬡ Strength'}</span>
              </div>
            )}
            <div className="form-grid">
              {exerciseType==='strength'&&(
                <div className="mf-field">
                  <label className="mf-label">Sets</label>
                  <input className="mf-input" name="sets" type="number" placeholder="3" value={form.sets} onChange={handleInputChange}/>
                </div>
              )}
              <div className="mf-field">
                <label className="mf-label">{exerciseType==='cardio'?'Duration (min)':'Reps'}{exerciseType!=='cardio'&&parseInt(form.sets)>1?' (comma-sep e.g. 10,8,6)':''}</label>
                <input className="mf-input" name="reps" type="text" placeholder={exerciseType==='cardio'?'30':parseInt(form.sets)>1?'10,8,6':'10'} value={form.reps} onChange={handleInputChange}/>
              </div>
              <div className="mf-field">
                <label className="mf-label">{exerciseType==='cardio'?'Distance (km)':'Weight (kg)'}{exerciseType!=='cardio'&&parseInt(form.sets)>1?' (comma-sep e.g. 50,60,70)':''}</label>
                <input className="mf-input" name="weight" type="text" placeholder={exerciseType==='cardio'?'5':parseInt(form.sets)>1?'50,60,70':'80'} value={form.weight} onChange={handleInputChange}/>
              </div>
              <div className="mf-field">
                <label className="mf-label">Date & Time</label>
                <input className="mf-input" type="datetime-local" name="date" value={form.date} onChange={handleInputChange} step="1"/>
              </div>
              {programs.length>0&&(
                <div className="mf-field">
                  <label className="mf-label">Program (optional)</label>
                  <select className="mf-field-select" value={form.program_id||''} onChange={e=>setForm(p=>({...p,program_id:e.target.value||null}))}>
                    <option value="">None</option>
                    {programs.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                </div>
              )}
            </div>
            <div className="btn-row">
              <button className="va-btn primary" onClick={handleSaveWorkout}>{form.id?'Update ↗':'Save ↗'}</button>
              <button className="va-btn" onClick={()=>{setShowAddForm(false);setIsCustom(false);setExerciseType('strength');setCustomExercise('');setForm({id:null,day:new Date().toLocaleString('en-US',{weekday:'long'}),exercise:'',sets:'',reps:'',weight:'',date:getCurrentDateTime()});}}>Cancel</button>
            </div>
          </div>
        )}

        {/* ── WEEKLY PLAN ── */}
        <div className="section-label">§ Weekly Plan · {month}{filterProgram?' · '+programs.find(p=>String(p.id)===filterProgram)?.name:''}</div>
        {DAYS.map(day=>{
          const dayWorkouts = sortedWorkouts.filter(w=>w.day===day&&[user.username,...selectedTargets].includes(w.user));
          const totalSets = dayWorkouts.reduce((s,w)=>s+(parseInt(w.sets)||0),0);
          return (
            <div key={day} className="day-section">
              <div className="day-header">
                <div className="day-name">{day}</div>
                <div className="day-count">{dayWorkouts.length} exercises · {totalSets} sets</div>
              </div>
              {dayWorkouts.length===0
                ? <div className="day-empty">§ Rest day</div>
                : dayWorkouts.map(workout=>(
                    <div key={workout.id} className="workout-card">
                      <div className="workout-top">
                        <img className="workout-avatar" src={userProfiles[workout.user]?.pic||DEFAULT_PROFILE_PIC} alt={workout.user} style={{border:`1px solid ${userProfiles[workout.user]?.color||DEFAULT_EVENT_COLOR}`}}/>
                        <span className={`workout-type ${isCardio(workout.exercise)?'cardio':'strength'}`}>{isCardio(workout.exercise)?'Cardio':'Strength'}</span>
                        <span className="workout-ex">{workout.exercise}</span>
                        {workout.program_id&&<span className="workout-program-badge">{programs.find(p=>p.id===workout.program_id)?.name||'Program'}</span>}
                      </div>
                      <div className="workout-detail">{formatWorkoutDetails(workout)}</div>
                      <div className="workout-meta">{formatDateTime(workout.date)} · {userProfiles[workout.user]?.displayName||workout.user}</div>
                      {workout.user===user.username&&(
                        <div className="workout-actions">
                          {programs.length>0&&(
                            <select className="mf-select" style={{fontSize:'9px',padding:'4px 8px'}} value={workout.program_id||''} onChange={e=>handleAssignProgram(workout.id,e.target.value||null)}>
                              <option value="">No program</option>
                              {programs.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                            </select>
                          )}
                          <button className="va-btn sm" onClick={()=>startEdit(workout)}>Edit</button>
                          <button className="va-btn danger sm" onClick={()=>handleDeleteWorkout(workout.id)}>Delete</button>
                        </div>
                      )}
                    </div>
                  ))}
            </div>
          );
        })}

        <div className="notes-box">
          <div className="section-label">§ Notes</div>
          <div className="note-item">Equipment availability varies by gym. Most offer free weights, machines, and cardio equipment.</div>
          <div className="note-item">Workouts can be tailored for beginners (lighter weights, simpler movements) or advanced athletes.</div>
          <div className="note-item">Proper form is critical to avoid injury, especially with free weights or compound movements like deadlifts.</div>
          <div className="note-item">Combine exercises based on your goal — muscle gain, fat loss, or endurance — using progressive overload.</div>
        </div>
      </div>
    );
  };

  const App = () => {
    const [user, setUser] = useState(null);
    useEffect(() => {
      const s = localStorage.getItem('user');
      if(s){try{setUser(JSON.parse(s));}catch{localStorage.removeItem('user');window.location.href='index.html';}}
      else window.location.href='index.html';
    }, []);
    const handleLogout = useCallback(()=>{localStorage.removeItem('user');window.location.href='index.html';},[]);
    if(!user)return null;
    return <ErrorBoundary><GymWorkout user={user} setPage={()=>window.location.href='index.html'} onLogout={handleLogout} setUser={setUser}/></ErrorBoundary>;
  };
  ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
