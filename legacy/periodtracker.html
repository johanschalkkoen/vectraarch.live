<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Legacy">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Period Tracker · Legacy · Vectra Arch</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0a0a08;--bg2:#111110;--bg3:#191917;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--text:#e8e4d8;--text-muted:rgba(232,228,216,0.55);--text-dim:rgba(232,228,216,0.25);--accent:#00ff41;--accent2:#00b32c;--red:#b84040;--warn:#d4a800;--pink:#e05c8a;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-weight:300;font-size:16px;line-height:1.6;overflow-x:hidden;cursor:crosshair;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");opacity:0.4;pointer-events:none;z-index:0;}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:80px 80px;pointer-events:none;z-index:0;}
    .accent-lines{position:fixed;top:0;right:0;width:50%;height:100%;pointer-events:none;overflow:hidden;z-index:0;}
    .accent-lines svg{width:100%;height:100%;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:60px;border-bottom:1px solid var(--border);background:rgba(10,10,8,0.88);backdrop-filter:blur(12px);}
    .nav-logo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text);text-decoration:none;}
    .nav-logo span{color:var(--accent);}
    .nav-status{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:0.1em;}
    .nav-status::before{content:'';display:block;width:6px;height:6px;border-radius:50%;background:var(--pink);box-shadow:0 0 6px var(--pink);}
    #root{position:relative;z-index:1;}
    .page-wrap{max-width:960px;margin:0 auto;padding:88px 40px 80px;position:relative;z-index:1;}
    .page-header{margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--border);}
    .page-eyebrow{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--pink);margin-bottom:12px;}
    .page-title{font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:0.9;color:var(--text);letter-spacing:0.02em;margin-bottom:4px;}
    .page-sub{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);}
    .user-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;}
    .user-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:1px solid var(--pink);flex-shrink:0;}
    .user-display{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:18px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);}
    .va-alert{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;padding:12px 16px;border:1px solid;margin-bottom:20px;}
    .va-alert.ok{color:var(--accent);border-color:rgba(0,255,65,0.25);background:rgba(0,255,65,0.05);}
    .va-alert.err{color:var(--red);border-color:rgba(184,64,64,0.25);background:rgba(184,64,64,0.05);}
    .va-alert.warn{color:var(--warn);border-color:rgba(212,168,0,0.25);background:rgba(212,168,0,0.05);}
    .toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:20px;padding:14px 18px;background:var(--bg2);border:1px solid var(--border2);}
    .tb-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);white-space:nowrap;}
    .mf-select{background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.06em;padding:7px 12px;outline:none;transition:border-color 0.2s;cursor:crosshair;-webkit-appearance:none;}
    .mf-select:focus{border-color:var(--pink);}
    .mf-select option{background:var(--bg2);color:var(--text);}
    .tb-spacer{flex:1;}
    /* PREDICTION SUMMARY */
    .pred-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-bottom:24px;}
    .pred-cell{background:var(--bg2);padding:20px;position:relative;}
    .pred-cell::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--pink);}
    .pred-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;}
    .pred-value{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:16px;letter-spacing:0.04em;color:var(--pink);}
    .pred-value.empty{color:var(--text-dim);font-style:italic;font-size:12px;}
    .section-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--pink);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
    .va-form{background:var(--bg2);border:1px solid var(--border2);padding:28px;margin-bottom:24px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 28px;}
    .mf-field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
    .mf-field.full{grid-column:1/-1;}
    .mf-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-dim);}
    .mf-input,.mf-textarea{background:transparent;border:none;border-bottom:1px solid var(--border2);padding:10px 0;font-family:'DM Mono',monospace;font-size:13px;color:var(--text);outline:none;transition:border-color 0.2s;width:100%;}
    .mf-input:focus{border-bottom-color:var(--pink);}
    .mf-input::placeholder{color:var(--text-dim);}
    .mf-textarea{resize:vertical;min-height:70px;}
    .mf-textarea:focus{border-bottom-color:var(--pink);}
    .va-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text);background:none;border:1px solid var(--border2);padding:9px 16px;cursor:crosshair;transition:border-color 0.2s,color 0.2s;display:inline-flex;align-items:center;gap:6px;}
    .va-btn:hover{border-color:var(--pink);color:var(--pink);}
    .va-btn.primary{background:var(--pink);color:#fff;border-color:var(--pink);}
    .va-btn.primary:hover{background:#c04070;border-color:#c04070;}
    .va-btn.danger{border-color:rgba(184,64,64,0.4);color:var(--red);}
    .va-btn.danger:hover{border-color:var(--red);background:rgba(184,64,64,0.06);}
    .va-btn.sm{padding:5px 12px;font-size:9px;}
    .back-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-muted);background:none;border:1px solid var(--border2);padding:10px 20px;cursor:crosshair;transition:border-color 0.2s,color 0.2s;display:inline-flex;align-items:center;gap:8px;margin-bottom:32px;}
    .back-btn:hover{border-color:var(--text-dim);color:var(--text);}
    .cycle-list{display:flex;flex-direction:column;gap:1px;background:var(--border);}
    .cycle-card{background:var(--bg2);padding:18px 20px;transition:background 0.2s;}
    .cycle-card:hover{background:var(--bg3);}
    .cycle-top{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
    .cycle-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;}
    .cycle-start{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--pink);}
    .cycle-meta{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;color:var(--text-dim);}
    .cycle-details{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
    .cd-item{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}
    .cd-label{color:var(--text-dim);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;display:block;margin-bottom:2px;}
    .cycle-symptoms{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);padding:8px 12px;background:var(--bg3);border-left:2px solid var(--pink);margin-bottom:8px;}
    .cycle-actions{display:flex;gap:6px;justify-content:flex-end;}
    .user-toggles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
    .user-toggle{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;padding:6px 14px;border:1px solid;cursor:crosshair;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
    .user-toggle.on{color:var(--pink);border-color:rgba(224,92,138,0.3);background:rgba(224,92,138,0.06);}
    .user-toggle.off{color:var(--text-dim);border-color:var(--border2);background:transparent;}
    .mini-avatar{width:18px;height:18px;border-radius:50%;object-fit:cover;}
    .import-box{background:var(--bg2);border:1px solid var(--border2);padding:24px;margin-bottom:24px;}
    .import-hint{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;color:var(--text-dim);margin-bottom:12px;line-height:1.8;}
    .import-textarea{background:transparent;border:1px solid var(--border2);padding:10px 14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);outline:none;transition:border-color 0.2s;width:100%;resize:vertical;min-height:100px;}
    .import-textarea:focus{border-color:var(--pink);}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap;}
    @media(max-width:768px){nav{padding:0 20px;}.page-wrap{padding:80px 20px 60px;}.form-grid{grid-template-columns:1fr;}.pred-grid{grid-template-columns:1fr;}}
    @media(pointer:fine){body,a,button{cursor:crosshair;}}
  </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="accent-lines" aria-hidden="true">
  <svg viewBox="0 0 600 900" fill="none" preserveAspectRatio="xMaxYMid slice">
    <line x1="580" y1="0" x2="20" y2="900" stroke="rgba(224,92,138,0.07)" stroke-width="1"/>
    <line x1="540" y1="0" x2="0" y2="760" stroke="rgba(224,92,138,0.05)" stroke-width="0.5"/>
    <line x1="600" y1="200" x2="100" y2="900" stroke="rgba(224,92,138,0.04)" stroke-width="1"/>
    <rect x="460" y="80" width="100" height="1" fill="rgba(224,92,138,0.15)"/>
    <circle cx="540" cy="180" r="60" stroke="rgba(224,92,138,0.04)" stroke-width="1" fill="none"/>
    <circle cx="540" cy="180" r="90" stroke="rgba(224,92,138,0.025)" stroke-width="0.5" fill="none"/>
  </svg>
</div>
<nav>
  <a href="https://vectraarch.live" class="nav-logo">Vectra<span>&nbsp;</span>Arch</a>
  <div class="nav-status">LEGACY · CYCLE TRACKER</div>
</nav>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef, useCallback, useMemo } = React;
  const API_BASE = '/legacy/api';
  const DEFAULT_PROFILE_PIC = 'https://placehold.co/50x50/808080/FFFFFF?text=U';
  const DEFAULT_EVENT_COLOR = '#00ff41';
  const MONTHS = Array.from({ length: 12 }, (_, i) => ({ value: (i + 1).toString().padStart(2, '0'), label: new Date(0, i).toLocaleString('default', { month: 'long' }) }));
  const YEARS = Array.from({length:5},(_,i)=>new Date().getFullYear()-2+i);
  const getCurrentDateTime = () => { const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); return now.toISOString().slice(0, 19); };
  const formatDateTime = date => { if (!date) return '—'; const d = new Date(date); if (isNaN(d.getTime())) return 'Invalid'; return d.toLocaleString('en-ZA', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }).replace(/,/,''); };
  const formatDate = date => { if (!date) return ''; const d = new Date(date); return isNaN(d.getTime()) ? '' : d.toISOString().slice(0, 10); };

  const useAccessibleUsers = (user, setUserProfiles) => {
    const [targetUsers, setTargetUsers] = useState([]);
    const [selectedTargets, setSelectedTargets] = useState([]);
    const [error, setError] = useState('');
    const fetched = useRef(false);
    useEffect(() => {
      if (fetched.current || !user?.username) return;
      fetched.current = true;
      const fetchAccessList = async () => {
        try {
          const { data } = await axios.get(`${API_BASE}/get-access`, { params: { viewer: user.username, adminUsername: user.username } });
          if (data.success && Array.isArray(data.accessList)) {
            const users = data.accessList.filter(a => a.viewer === user.username).map(a => a.target);
            setTargetUsers(users); setSelectedTargets(users); setError('');
            const profilePromises = users.concat(user.username).map(async u => {
              try {
                const { data: pd } = await axios.get(`${API_BASE}/profile-pictures?username=${u}`).catch(() => ({ data: { profilePicUrl: DEFAULT_PROFILE_PIC, eventColor: DEFAULT_EVENT_COLOR, displayName: u, gender: '' } }));
                return [u, { pic: pd.profilePicUrl||DEFAULT_PROFILE_PIC, color: pd.eventColor||DEFAULT_EVENT_COLOR, displayName: pd.displayName||u, gender: pd.gender||'' }];
              } catch { return [u, { pic: DEFAULT_PROFILE_PIC, color: DEFAULT_EVENT_COLOR, displayName: u, gender: '' }]; }
            });
            const profiles = Object.fromEntries(await Promise.all(profilePromises));
            setUserProfiles(prev => ({ ...prev, ...profiles, [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username, gender: user.gender||'' } }));
          } else {
            setTargetUsers([]); setError(data.message||'Failed.');
            setUserProfiles({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username, gender: user.gender||'' } });
          }
        } catch (err) {
          setError(err.response?.data?.message||'Error.');
          setUserProfiles({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username, gender: user.gender||'' } });
        }
      };
      fetchAccessList();
    }, [user?.username, setUserProfiles]);
    return { targetUsers, selectedTargets, setSelectedTargets, error };
  };

  const PeriodTracker = ({ user, setPage, onLogout, setUser }) => {
    const [cycles, setCycles] = useState([]);
    const [form, setForm] = useState({ id:null, startDate:formatDate(new Date()), endDate:'', cycleLength:'28', symptoms:'', date:getCurrentDateTime() });
    const [message, setMessage] = useState({ text:'', type:'' });
    const [predictions, setPredictions] = useState({ nextPeriod:'', fertileDays:'' });
    const [selectedMonth, setSelectedMonth] = useState(()=>(new Date().getMonth()+1).toString().padStart(2,'0'));
    const [selectedYear, setSelectedYear] = useState(()=>new Date().getFullYear());
    const [showAddCycleForm, setShowAddCycleForm] = useState(false);
    const [bulkData, setBulkData] = useState('');
    const [importMessage, setImportMessage] = useState({ text:'', type:'' });
    const [showImportTool, setShowImportTool] = useState(false);
    const [sortField, setSortField] = useState('date');
    const [sortOrder, setSortOrder] = useState('desc');
    const { targetUsers, selectedTargets, setSelectedTargets, error } = useAccessibleUsers(user, profiles => setUserProfiles(profiles));
    const [userProfiles, setUserProfiles] = useState({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username, gender: user.gender||'' } });

    const msg = (text, type='ok') => { setMessage({text,type}); setTimeout(()=>setMessage({text:'',type:''}),5000); };
    const iMsg = (text, type='ok') => { setImportMessage({text,type}); setTimeout(()=>setImportMessage({text:'',type:''}),5000); };

    const fetchCycles = useCallback(async () => {
      try { const results = await Promise.all([user.username,...selectedTargets].map(u=>axios.get(`${API_BASE}/period`,{params:{user:u}}).then(({data})=>data).catch(()=>[])));setCycles(results.flat()); } catch { msg('Error fetching cycles.','err'); }
    }, [user.username, selectedTargets]);

    const calculatePredictions = useCallback(() => {
      const uc = cycles.filter(c=>c.user===user.username);
      if(!uc.length) return;
      const last = uc[uc.length-1];
      if(!last.startDate) return;
      const start = new Date(last.startDate);
      const avgLen = parseInt(last.cycleLength)||28;
      const nextPeriod = new Date(start); nextPeriod.setDate(start.getDate()+avgLen);
      const fertileStart = new Date(start); fertileStart.setDate(start.getDate()+avgLen-14-5);
      const fertileEnd = new Date(fertileStart); fertileEnd.setDate(fertileStart.getDate()+6);
      setPredictions({ nextPeriod:formatDate(nextPeriod), fertileDays:`${formatDate(fertileStart)} to ${formatDate(fertileEnd)}` });
    }, [cycles, user.username]);

    const sortedCycles = useMemo(() => {
      const filtered = cycles.filter(c=>c.date?.startsWith(`${selectedYear}-${selectedMonth}`));
      return [...filtered].sort((a,b)=>{
        const fa=sortField==='cycleLength'?parseFloat(a.cycleLength)||0:a[sortField];
        const fb=sortField==='cycleLength'?parseFloat(b.cycleLength)||0:b[sortField];
        if(sortField==='cycleLength') return sortOrder==='asc'?fa-fb:fb-fa;
        return sortOrder==='asc'?new Date(fa)-new Date(fb):new Date(fb)-new Date(fa);
      });
    }, [cycles,selectedMonth,sortField,sortOrder]);

    const handleSaveCycle = useCallback(async () => {
      if(!form.startDate||!form.cycleLength||!form.date){msg('Start date, cycle length, and date required.','err');return;}
      if(isNaN(parseInt(form.cycleLength))||parseInt(form.cycleLength)<=0){msg('Cycle length must be a positive number.','err');return;}
      const cd = { user:user.username, startDate:form.startDate, endDate:form.endDate||'', cycleLength:parseInt(form.cycleLength), symptoms:form.symptoms||'', date:form.date };
      try {
        if(form.id){await axios.put(`${API_BASE}/period/${form.id}`,cd);msg('Cycle updated.');}
        else{await axios.post(`${API_BASE}/period`,cd);msg('Cycle added.');}
        setForm({id:null,startDate:formatDate(new Date()),endDate:'',cycleLength:'28',symptoms:'',date:getCurrentDateTime()});
        setShowAddCycleForm(false);fetchCycles();
      } catch { msg('Error saving cycle.','err'); }
    }, [form,user.username,fetchCycles]);

    const startEdit = useCallback(c => { setForm({id:c.id,startDate:formatDate(c.startDate),endDate:c.endDate?formatDate(c.endDate):'',cycleLength:c.cycleLength.toString(),symptoms:c.symptoms||'',date:c.date.slice(0,16)});setShowAddCycleForm(true); }, []);

    const handleDeleteCycle = useCallback(async id => {
      try { await axios.delete(`${API_BASE}/period/${id}`);msg('Cycle deleted.');fetchCycles(); } catch { msg('Error deleting.','err'); }
    }, [fetchCycles]);

    const handleBulkImport = useCallback(async () => {
      if(!bulkData.trim()){iMsg('Paste data first.','err');return;}
      const toImport = bulkData.trim().split('\n').filter(l=>l.trim()).map(l=>{const[sd,ed,cl,sym,date]=l.split(',').map(f=>f.trim());if(!sd||!cl||!date)return null;if(isNaN(parseInt(cl))||parseInt(cl)<=0)return null;return{user:user.username,startDate:sd,endDate:ed||'',cycleLength:parseInt(cl),symptoms:sym||'',date};}).filter(Boolean);
      if(!toImport.length){iMsg('No valid data.','err');return;}
      iMsg(`Importing ${toImport.length} cycles...`,'warn');
      try { await Promise.all(toImport.map(c=>axios.post(`${API_BASE}/period`,c)));iMsg(`Imported ${toImport.length} cycles.`);setBulkData('');setShowImportTool(false);fetchCycles(); } catch { iMsg('Import failed.','err'); }
    }, [bulkData,user.username,fetchCycles]);

    useEffect(()=>{fetchCycles();},[fetchCycles]);
    useEffect(()=>{calculatePredictions();},[calculatePredictions]);

    const month = MONTHS.find(m=>m.value===selectedMonth)?.label||'';
    const visibleCycles = sortedCycles.filter(c=>[user.username,...selectedTargets].includes(c.user));
    const currentGender = userProfiles[user.username]?.gender||'';
    const hasFemaleAccess = targetUsers.some(u=>userProfiles[u]?.gender?.toLowerCase()==='female');
    const showViewDataOption = targetUsers.length>0&&(currentGender.toLowerCase()!=='male'||hasFemaleAccess);

    return (
      <div className="page-wrap">
        <button className="back-btn" onClick={()=>setPage('menu')}>← Back to Menu</button>
        <div className="page-header">
          <div className="page-eyebrow">§ Vectra Arch · Legacy · Health</div>
          <div className="page-title">Cycle Tracker</div>
          <div className="page-sub">Period · Predictions · Fertility Window</div>
        </div>
        <div className="user-header">
          <img className="user-avatar" src={userProfiles[user.username]?.pic||DEFAULT_PROFILE_PIC} alt={user.username}/>
          <div className="user-display">{userProfiles[user.username]?.displayName||user.username}</div>
          <div style={{marginLeft:'auto'}}><button className="va-btn danger sm" onClick={onLogout}>Sign Out ×</button></div>
        </div>

        {message.text&&<div className={`va-alert ${message.type}`}>{message.type==='ok'?'✓ ':'⚠ '}{message.text}</div>}
        {error&&<div className="va-alert err">⚠ {error}</div>}

        {/* PREDICTIONS */}
        <div className="pred-grid">
          <div className="pred-cell">
            <div className="pred-label">Last Cycle Start</div>
            <div className={`pred-value${!cycles.filter(c=>c.user===user.username).length?' empty':''}`}>
              {cycles.filter(c=>c.user===user.username).length ? formatDate(cycles.filter(c=>c.user===user.username).slice(-1)[0]?.startDate) : 'No cycles yet'}
            </div>
          </div>
          <div className="pred-cell">
            <div className="pred-label">Next Period</div>
            <div className={`pred-value${!predictions.nextPeriod?' empty':''}`}>{predictions.nextPeriod||'Log a cycle first'}</div>
          </div>
          <div className="pred-cell">
            <div className="pred-label">Fertile Window</div>
            <div className={`pred-value${!predictions.fertileDays?' empty':''}`} style={{fontSize:'13px'}}>{predictions.fertileDays||'Log a cycle first'}</div>
          </div>
        </div>

        {/* TOOLBAR */}
        <div className="toolbar">
          <span className="tb-label">Month</span>
          <select className="mf-select" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
            {MONTHS.map(m=><option key={m.value} value={m.value}>{m.label} {selectedYear}</option>)}
          </select>
          <span className="tb-label">Year</span>
          <select className="mf-select" value={selectedYear} onChange={e=>setSelectedYear(parseInt(e.target.value))}>
            {YEARS.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          <span className="tb-label">Sort</span>
          <select className="mf-select" value={sortField} onChange={e=>setSortField(e.target.value)}>
            <option value="date">Date</option><option value="cycleLength">Cycle Length</option>
          </select>
          <select className="mf-select" value={sortOrder} onChange={e=>setSortOrder(e.target.value)}>
            <option value="desc">Desc</option><option value="asc">Asc</option>
          </select>
          <div className="tb-spacer"/>
          <button className="va-btn sm" onClick={()=>setShowImportTool(!showImportTool)}>{showImportTool?'Hide Import':'Bulk Import'}</button>
          <button className="va-btn primary sm" onClick={()=>setShowAddCycleForm(!showAddCycleForm)}>{showAddCycleForm?'Hide Form':'Log Cycle ↗'}</button>
        </div>

        {showViewDataOption&&(
          <div className="user-toggles">
            {targetUsers.map(t=>(
              <button key={t} className={`user-toggle ${selectedTargets.includes(t)?'on':'off'}`} onClick={()=>setSelectedTargets(prev=>prev.includes(t)?prev.filter(u=>u!==t):[...prev,t])}>
                <img className="mini-avatar" src={userProfiles[t]?.pic||DEFAULT_PROFILE_PIC} alt={t}/>
                {userProfiles[t]?.displayName||t}
              </button>
            ))}
          </div>
        )}

        {showImportTool&&(
          <div className="import-box">
            <div className="section-label">§ Bulk Import</div>
            <div className="import-hint">Format: StartDate,EndDate,CycleLength,Symptoms,Date<br/>Example: 2026-08-01,,28,Cramps,2026-08-25 09:00:00</div>
            <textarea className="import-textarea" rows="5" value={bulkData} onChange={e=>setBulkData(e.target.value)} placeholder="Paste CSV data..."/>
            {importMessage.text&&<div className={`va-alert ${importMessage.type}`} style={{marginTop:'12px'}}>{importMessage.text}</div>}
            <div className="btn-row" style={{marginTop:'12px'}}>
              <button className="va-btn primary" onClick={handleBulkImport}>Import ↗</button>
              <button className="va-btn" onClick={()=>setShowImportTool(false)}>Cancel</button>
            </div>
          </div>
        )}

        {showAddCycleForm&&(
          <div className="va-form">
            <div className="section-label">§ {form.id?'Edit Cycle':'Log New Cycle'}</div>
            <div className="form-grid">
              <div className="mf-field">
                <label className="mf-label">Start Date</label>
                <input className="mf-input" type="date" value={form.startDate} onChange={e=>setForm(p=>({...p,startDate:e.target.value}))}/>
              </div>
              <div className="mf-field">
                <label className="mf-label">End Date (optional)</label>
                <input className="mf-input" type="date" value={form.endDate} onChange={e=>setForm(p=>({...p,endDate:e.target.value}))}/>
              </div>
              <div className="mf-field">
                <label className="mf-label">Cycle Length (days)</label>
                <input className="mf-input" type="number" placeholder="28" value={form.cycleLength} onChange={e=>setForm(p=>({...p,cycleLength:e.target.value}))}/>
              </div>
              <div className="mf-field">
                <label className="mf-label">Date & Time</label>
                <input className="mf-input" type="datetime-local" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} step="1"/>
              </div>
              <div className="mf-field full">
                <label className="mf-label">Symptoms (optional)</label>
                <textarea className="mf-textarea" rows="2" placeholder="e.g. Cramps, Mood swings" value={form.symptoms} onChange={e=>setForm(p=>({...p,symptoms:e.target.value}))}/>
              </div>
            </div>
            <div className="btn-row">
              <button className="va-btn primary" onClick={handleSaveCycle}>{form.id?'Update ↗':'Save ↗'}</button>
              <button className="va-btn" onClick={()=>{setShowAddCycleForm(false);setForm({id:null,startDate:formatDate(new Date()),endDate:'',cycleLength:'28',symptoms:'',date:getCurrentDateTime()});}}>Cancel</button>
            </div>
          </div>
        )}

        <div className="section-label">§ Cycles · {month} {selectedYear} · {visibleCycles.length} records</div>
        {visibleCycles.length===0
          ? <div style={{fontFamily:"'DM Mono',monospace",fontSize:'10px',color:'var(--text-dim)',padding:'24px',background:'var(--bg2)',textAlign:'center',letterSpacing:'0.1em'}}>No cycles logged for {month} {selectedYear}</div>
          : <div className="cycle-list">
              {visibleCycles.map(c=>(
                <div key={c.id} className="cycle-card">
                  <div className="cycle-top">
                    <img className="cycle-avatar" src={userProfiles[c.user]?.pic||DEFAULT_PROFILE_PIC} alt={c.user} style={{border:`1px solid ${userProfiles[c.user]?.color||DEFAULT_EVENT_COLOR}`}}/>
                    <div>
                      <div className="cycle-start">Start: {formatDate(c.startDate)}</div>
                      <div className="cycle-meta">{formatDateTime(c.date)} · {userProfiles[c.user]?.displayName||c.user}</div>
                    </div>
                  </div>
                  <div className="cycle-details">
                    <div className="cd-item"><span className="cd-label">End</span>{c.endDate?formatDate(c.endDate):'—'}</div>
                    <div className="cd-item"><span className="cd-label">Cycle Length</span>{c.cycleLength} days</div>
                    <div className="cd-item"><span className="cd-label">Duration</span>{c.endDate?`${Math.round((new Date(c.endDate)-new Date(c.startDate))/(1000*60*60*24))} days`:'—'}</div>
                  </div>
                  {c.symptoms&&<div className="cycle-symptoms">§ {c.symptoms}</div>}
                  {c.user===user.username&&(
                    <div className="cycle-actions">
                      <button className="va-btn sm" onClick={()=>startEdit(c)}>Edit</button>
                      <button className="va-btn danger sm" onClick={()=>handleDeleteCycle(c.id)}>Delete</button>
                    </div>
                  )}
                </div>
              ))}
            </div>}
      </div>
    );
  };

  const App = () => {
    const [user, setUser] = useState(null);
    useEffect(() => {
      const s = localStorage.getItem('user');
      if(s){try{setUser(JSON.parse(s));}catch{localStorage.removeItem('user');window.location.href='index.html';}}
      else window.location.href='index.html';
    }, []);
    const handleLogout = useCallback(()=>{localStorage.removeItem('user');window.location.href='index.html';},[]);
    if(!user)return null;
    return <PeriodTracker user={user} setPage={()=>window.location.href='index.html'} onLogout={handleLogout} setUser={setUser}/>;
  };
  ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
