<!-- file: periodtracker.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Legacy">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>Period Tracker · Legacy · Vectra Arch</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;500;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/shared/va.css"/>
  <link rel="stylesheet" href="/shared/legacy.css"/>
</head>
<body>
<div class="grid-bg"></div>
<div class="accent-lines" aria-hidden="true">
  <svg viewBox="0 0 600 900" fill="none" preserveAspectRatio="xMaxYMid slice">
    <line x1="580" y1="0" x2="20" y2="900" stroke="rgba(176,106,255,0.07)" stroke-width="1"/>
    <line x1="540" y1="0" x2="0" y2="760" stroke="rgba(176,106,255,0.05)" stroke-width="0.5"/>
    <line x1="600" y1="200" x2="100" y2="900" stroke="rgba(176,106,255,0.04)" stroke-width="1"/>
    <rect x="460" y="80" width="100" height="1" fill="rgba(176,106,255,0.15)"/>
    <rect x="480" y="120" width="60" height="1" fill="rgba(176,106,255,0.1)"/>
    <circle cx="540" cy="180" r="60" stroke="rgba(176,106,255,0.06)" stroke-width="1" fill="none"/>
    <circle cx="540" cy="180" r="90" stroke="rgba(176,106,255,0.04)" stroke-width="0.5" fill="none"/>
  </svg>
</div>
<nav>
  <a href="https://vectraarch.live" class="nav-logo">Vectra<span>&nbsp;</span>Arch</a>
  <div class="nav-status">LEGACY · PERIOD TRACKER</div>
</nav>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef, useCallback, useMemo } = React;

  class ErrorBoundary extends React.Component {
    state = { error: null };
    componentDidCatch(error) { this.setState({ error }); }
    render() {
      if (this.state.error) return (
        <div className="page-wrap">
          <div className="va-alert err">⚠ {this.state.error.toString()}</div>
          <button className="va-btn" onClick={()=>window.location.reload()}>Reload</button>
        </div>
      );
      return this.props.children;
    }
  }

  const API_BASE = '/legacy/api';
  const DEFAULT_PROFILE_PIC = 'https://placehold.co/50x50/808080/FFFFFF?text=U';
  const DEFAULT_EVENT_COLOR = '#00ff41';
  const MONTHS = Array.from({ length: 12 }, (_, i) => ({ value: (i + 1).toString().padStart(2, '0'), label: new Date(0, i).toLocaleString('default', { month: 'long' }) }));
  const SYMPTOM_OPTIONS = ['Cramps','Headache','Bloating','Mood swings','Fatigue','Back pain','Nausea','Spotting','Heavy flow','Light flow','Normal flow','Breast tenderness','Acne'];

  const getCurrentDate = () => { const now = new Date(); return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`; };
  const getCurrentDateTime = () => { const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); return now.toISOString().slice(0, 19); };
  const formatDate = date => { if (!date) return '—'; const d = new Date(date); return isNaN(d.getTime()) ? '—' : d.toLocaleDateString('en-ZA', { year:'numeric', month:'short', day:'2-digit' }); };
  const formatDateTime = date => { if (!date) return '—'; const d = new Date(date); return isNaN(d.getTime()) ? '—' : d.toLocaleString('en-ZA', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }).replace(/,/,''); };
  const daysBetween = (a, b) => { if (!a || !b) return null; const ms = new Date(b) - new Date(a); return Math.round(ms / 86400000); };

  const PeriodTracker = ({ user, setPage, onLogout }) => {
    const [cycles, setCycles] = useState([]);
    const [form, setForm] = useState({ startDate: getCurrentDate(), endDate: '', cycleLength: '28', symptoms: [], date: getCurrentDateTime() });
    const [message, setMessage] = useState({ text:'', type:'' });
    const [showAddForm, setShowAddForm] = useState(false);
    const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
    const [userProfiles, setUserProfiles] = useState({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } });

    const msg = (text, type='ok') => { setMessage({text,type}); setTimeout(()=>setMessage({text:'',type:''}),5000); };

    const fetchCycles = useCallback(async () => {
      try {
        const { data } = await axios.get(`${API_BASE}/period`, { params: { user: user.username } });
        setCycles(Array.isArray(data) ? data : []);
      } catch { msg('Error fetching cycles.','err'); }
    }, [user.username]);

    const handleSave = useCallback(async () => {
      if (!form.startDate || !form.cycleLength) { msg('Start date and cycle length required.','err'); return; }
      const cl = parseInt(form.cycleLength);
      if (isNaN(cl) || cl < 1 || cl > 90) { msg('Cycle length must be between 1 and 90 days.','err'); return; }
      try {
        await axios.post(`${API_BASE}/period`, {
          user: user.username,
          startDate: form.startDate,
          endDate: form.endDate || null,
          cycleLength: cl,
          symptoms: form.symptoms.join(','),
          date: form.date
        });
        msg('Cycle logged.');
        fetchCycles();
        setForm({ startDate: getCurrentDate(), endDate: '', cycleLength: '28', symptoms: [], date: getCurrentDateTime() });
        setShowAddForm(false);
      } catch { msg('Error saving cycle.','err'); }
    }, [form, user.username, fetchCycles]);

    const handleDelete = useCallback(async id => {
      try { await axios.delete(`${API_BASE}/period/${id}`); msg('Cycle deleted.'); fetchCycles(); } catch { msg('Error deleting.','err'); }
    }, [fetchCycles]);

    const toggleSymptom = useCallback(s => {
      setForm(p => ({ ...p, symptoms: p.symptoms.includes(s) ? p.symptoms.filter(x=>x!==s) : [...p.symptoms, s] }));
    }, []);

    const sortedCycles = useMemo(() => {
      return [...cycles].sort((a,b) => new Date(b.startDate) - new Date(a.startDate));
    }, [cycles]);

    const stats = useMemo(() => {
      if (cycles.length === 0) return null;
      const sorted = [...cycles].sort((a,b) => new Date(a.startDate) - new Date(b.startDate));
      const avgCycle = Math.round(sorted.reduce((s,c) => s + (parseInt(c.cycleLength)||28), 0) / sorted.length);
      const last = sorted[sorted.length - 1];
      const nextDate = last ? new Date(new Date(last.startDate).getTime() + avgCycle * 86400000) : null;
      const daysUntilNext = nextDate ? daysBetween(new Date(), nextDate) : null;
      const avgDuration = sorted.filter(c=>c.endDate).length > 0
        ? Math.round(sorted.filter(c=>c.endDate).reduce((s,c) => s + (daysBetween(c.startDate, c.endDate)||0), 0) / sorted.filter(c=>c.endDate).length)
        : null;
      return { avgCycle, nextDate, daysUntilNext, avgDuration, total: cycles.length };
    }, [cycles]);

    useEffect(() => { fetchCycles(); }, [fetchCycles]);

    const month = MONTHS.find(m=>m.value===selectedMonth)?.label||'';

    return (
      <div className="page-wrap">
        <button className="back-btn" onClick={()=>setPage('menu')}>← Back to Menu</button>
        <div className="page-header">
          <div className="page-eyebrow">§ Vectra Arch · Legacy · Health</div>
          <div className="page-title">Period Tracker</div>
          <div className="page-sub">Cycle Tracking · Symptoms · Predictions</div>
        </div>
        <div className="user-header">
          <img className="user-avatar" src={userProfiles[user.username]?.pic||DEFAULT_PROFILE_PIC} alt={user.username} style={{borderColor:userProfiles[user.username]?.color||DEFAULT_EVENT_COLOR}}/>
          <div className="user-display">{userProfiles[user.username]?.displayName||user.username}</div>
          <div style={{marginLeft:'auto'}}><button className="va-btn danger sm" onClick={onLogout}>Sign Out ×</button></div>
        </div>

        {message.text&&<div className={`va-alert ${message.type}`}>{message.type==='ok'?'✓ ':'⚠ '}{message.text}</div>}

        {stats&&(
          <div className="period-stats">
            <div className="period-stat">
              <div className="period-stat-label">Avg Cycle</div>
              <div className="period-stat-value">{stats.avgCycle}<span style={{fontSize:'1rem',color:'var(--text-dim)',marginLeft:'4px'}}>days</span></div>
            </div>
            <div className="period-stat">
              <div className="period-stat-label">Next Period</div>
              <div className="period-stat-value blue">{stats.nextDate ? new Date(stats.nextDate).toLocaleDateString('en-ZA',{day:'2-digit',month:'short'}) : '—'}</div>
            </div>
            <div className="period-stat">
              <div className="period-stat-label">Days Until</div>
              <div className={`period-stat-value ${stats.daysUntilNext !== null && stats.daysUntilNext <= 3 ? 'warn' : 'green'}`}>
                {stats.daysUntilNext !== null ? (stats.daysUntilNext < 0 ? 'Now' : stats.daysUntilNext) : '—'}
              </div>
            </div>
            <div className="period-stat">
              <div className="period-stat-label">Avg Duration</div>
              <div className="period-stat-value">{stats.avgDuration ? `${stats.avgDuration}d` : '—'}</div>
            </div>
          </div>
        )}

        <div className="toolbar">
          <span className="tb-label">Month</span>
          <select className="mf-select" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
            {MONTHS.map(m=><option key={m.value} value={m.value}>{m.label}</option>)}
          </select>
          <div className="tb-spacer"/>
          <button className="va-btn purple sm" onClick={()=>setShowAddForm(!showAddForm)}>{showAddForm?'Hide Form':'Log Cycle ↗'}</button>
        </div>

        {showAddForm&&(
          <div className="va-form">
            <div className="section-label">§ Log Cycle</div>
            <div className="form-grid">
              <div className="mf-field">
                <label className="mf-label">Start Date *</label>
                <input className="mf-input" type="date" value={form.startDate} onChange={e=>setForm(p=>({...p,startDate:e.target.value}))}/>
              </div>
              <div className="mf-field">
                <label className="mf-label">End Date (optional)</label>
                <input className="mf-input" type="date" value={form.endDate} onChange={e=>setForm(p=>({...p,endDate:e.target.value}))}/>
              </div>
              <div className="mf-field">
                <label className="mf-label">Cycle Length (days)</label>
                <input className="mf-input" type="number" min="1" max="90" value={form.cycleLength} onChange={e=>setForm(p=>({...p,cycleLength:e.target.value}))}/>
              </div>
              <div className="mf-field">
                <label className="mf-label">Logged At</label>
                <input className="mf-input" type="datetime-local" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} step="1"/>
              </div>
            </div>
            <div className="mf-label" style={{marginBottom:'10px'}}>Symptoms</div>
            <div className="toggle-group" style={{marginBottom:'20px'}}>
              {SYMPTOM_OPTIONS.map(s=>(
                <button key={s} className={`toggle-chip ${form.symptoms.includes(s)?'on':''}`} onClick={()=>toggleSymptom(s)}
                  style={form.symptoms.includes(s)?{borderColor:'var(--purple)',color:'var(--purple)',background:'rgba(176,106,255,0.06)'}:{}}>{s}</button>
              ))}
            </div>
            <div className="btn-row">
              <button className="va-btn purple" style={{borderColor:'var(--purple)',color:'var(--purple)'}} onClick={handleSave}>Save ↗</button>
              <button className="va-btn" onClick={()=>setShowAddForm(false)}>Cancel</button>
            </div>
          </div>
        )}

        <div className="section-label">§ Cycle History · {month}</div>
        {sortedCycles.filter(c=>c.startDate?.slice(5,7)===selectedMonth).length===0
          ? <div style={{fontFamily:"'DM Mono',monospace",fontSize:'10px',color:'var(--text-dim)',padding:'24px',background:'var(--bg2)',textAlign:'center',letterSpacing:'0.1em',border:'1px solid var(--border2)'}}>§ No cycles logged for {month}</div>
          : sortedCycles.filter(c=>c.startDate?.slice(5,7)===selectedMonth).map(cycle=>(
              <div key={cycle.id} className="period-card">
                <div className="period-card-top">
                  <span className="period-badge">⬡ Cycle</span>
                  <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'1.1rem',color:'var(--text)',letterSpacing:'0.04em'}}>
                    {formatDate(cycle.startDate)}{cycle.endDate ? ` → ${formatDate(cycle.endDate)}` : ' → ongoing'}
                  </span>
                </div>
                <div className="period-detail">
                  {cycle.cycleLength} day cycle
                  {cycle.endDate && cycle.startDate ? ` · ${daysBetween(cycle.startDate, cycle.endDate)} days duration` : ''}
                </div>
                {cycle.symptoms&&cycle.symptoms.length>0&&(
                  <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginTop:'4px'}}>
                    {cycle.symptoms.split(',').map(s=>s.trim()).filter(Boolean).map(s=>(
                      <span key={s} style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',letterSpacing:'0.12em',textTransform:'uppercase',padding:'2px 8px',border:'1px solid rgba(176,106,255,0.3)',color:'var(--purple)'}}>
                        {s}
                      </span>
                    ))}
                  </div>
                )}
                <div className="period-detail" style={{color:'var(--text-dim)',fontSize:'9px'}}>Logged: {formatDateTime(cycle.date)}</div>
                <div className="period-actions">
                  <button className="va-btn danger sm" onClick={()=>handleDelete(cycle.id)}>Delete</button>
                </div>
              </div>
            ))
        }

        {sortedCycles.length > 0 && (
          <>
            <div className="section-label" style={{marginTop:'32px'}}>§ All Cycles</div>
            {sortedCycles.map(cycle=>(
              <div key={`all-${cycle.id}`} className="period-card">
                <div className="period-card-top">
                  <span className="period-badge">⬡ Cycle</span>
                  <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'1.1rem',color:'var(--text)',letterSpacing:'0.04em'}}>
                    {formatDate(cycle.startDate)}{cycle.endDate ? ` → ${formatDate(cycle.endDate)}` : ' → ongoing'}
                  </span>
                </div>
                <div className="period-detail">{cycle.cycleLength} day cycle</div>
                {cycle.symptoms&&cycle.symptoms.length>0&&(
                  <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginTop:'4px'}}>
                    {cycle.symptoms.split(',').map(s=>s.trim()).filter(Boolean).map(s=>(
                      <span key={s} style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',letterSpacing:'0.12em',textTransform:'uppercase',padding:'2px 8px',border:'1px solid rgba(176,106,255,0.3)',color:'var(--purple)'}}>
                        {s}
                      </span>
                    ))}
                  </div>
                )}
                <div className="period-actions">
                  <button className="va-btn danger sm" onClick={()=>handleDelete(cycle.id)}>Delete</button>
                </div>
              </div>
            ))}
          </>
        )}

        <div className="notes-box">
          <div className="section-label">§ Notes</div>
          <div className="note-item">Average menstrual cycle is 28 days but ranges from 21–35 days. Track consistently for accurate predictions.</div>
          <div className="note-item">Symptoms vary widely. Log them regularly to identify patterns and discuss with your healthcare provider.</div>
          <div className="note-item">This tracker is for personal reference only and does not replace professional medical advice.</div>
        </div>
      </div>
    );
  };

  const App = () => {
    const [user, setUser] = useState(null);
    useEffect(() => {
      const s = localStorage.getItem('user');
      if(s){try{setUser(JSON.parse(s));}catch{localStorage.removeItem('user');window.location.href='index.html';}}
      else window.location.href='index.html';
    }, []);
    const handleLogout = useCallback(()=>{localStorage.removeItem('user');window.location.href='index.html';},[]);
    if(!user)return null;
    return <ErrorBoundary><PeriodTracker user={user} setPage={()=>window.location.href='index.html'} onLogout={handleLogout} setUser={setUser}/></ErrorBoundary>;
  };
  ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
