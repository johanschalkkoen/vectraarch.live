<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Legacy"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>Legacy · Vectra Arch</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="/legacy/auth-guard.js"></script>
  <link rel="stylesheet" href="/shared/legacy.css"/>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── CONSTANTS ── */
const API = '/legacy/api';
const DP = 'https://placehold.co/50x50/2a2d31/888?text=U';
const MONTHS = Array.from({length:12},(_,i)=>({v:(i+1).toString().padStart(2,'0'),l:new Date(2026,i,1).toLocaleString('default',{month:'long'})}));
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const fmtR = n => `R${parseFloat(n||0).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtDate = d => { if(!d)return'—'; const dt=new Date(d); return isNaN(dt)?'—':dt.toLocaleDateString('en-ZA',{year:'numeric',month:'2-digit',day:'2-digit'}); };
const fmtDateTime = d => { if(!d)return'—'; const dt=new Date(d); return isNaN(dt)?'—':dt.toLocaleString('en-ZA',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).replace(',',''); };
const now = () => { const n=new Date(); n.setMinutes(n.getMinutes()-n.getTimezoneOffset()); return n.toISOString().slice(0,19); };
const todayISO = () => new Date().toISOString().slice(0,10);

/* ── TAB ICONS (SVG inline) ── */
const Icons = {
  finances: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>,
  calendar: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  budget:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><rect x="2" y="3" width="8" height="8" rx="1"/><rect x="14" y="3" width="8" height="8" rx="1"/><rect x="2" y="13" width="8" height="8" rx="1"/><rect x="14" y="13" width="8" height="8" rx="1"/></svg>,
  gym:      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M6 4v16M18 4v16M2 9h4M18 9h4M2 15h4M18 15h4M6 12h12"/></svg>,
  meals:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>,
  cycle:    <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 2C12 2 5 10.5 5 15a7 7 0 0 0 14 0C19 10.5 12 2 12 2z" opacity="0.9"/></svg>,
  profile:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  search:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="14" height="14"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
  admin:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
};

/* ── SHARED COMPONENTS ── */
const UserRow = ({user, partner, partners=[], activePartners=[], permittedPartners=[], isShared, onToggleShared}) => {
  // permittedPartners = who has permission for this tab (set in Profile)
  // activePartners    = currently visible (permission + view toggle on)
  const hasPermitted = permittedPartners.length > 0;
  return (
    <div className="user-row" style={{flexWrap:'wrap',gap:6}}>
      <div className="user-chip">
        <img className="user-chip-avatar" src={user?.profilePicUrl||DP} alt={user?.username} style={{border:`2px solid ${user?.eventColor||'#e91e8c'}`}}/>
        <span className="user-chip-name">{user?.displayName||(user?.firstName&&user?.lastName?`${user.firstName} ${user.lastName}`:null)||user?.username||'USER'}</span>
        <span className="user-chip-arrow">⌄</span>
      </div>
      {hasPermitted
        ? <button
            className="badge-shared"
            onClick={onToggleShared}
            title={isShared ? 'Click to view solo' : 'Click to show shared data'}
            style={!isShared ? {background:'transparent',border:'1px solid rgba(255,255,255,0.12)',color:'var(--text3)'} : {}}>
            {isShared ? '● SHARED' : '○ SOLO'}
          </button>
        : <span className="badge-solo">SOLO</span>
      }
      {/* Always show permitted partner chips so user knows who is linked */}
      {permittedPartners.map(p=>(
        <div key={p.username} className="partner-chip" style={!isShared?{opacity:0.45}:{}}>
          <img className="partner-chip-avatar" src={p.profilePicUrl||DP} alt={p.username}
            style={{border:`2px solid ${p.eventColor||'#448aff'}`}}/>
          <span className="partner-chip-name">
            {isShared ? '+ ' : ''}
            {p.displayName||(p.firstName&&p.lastName?`${p.firstName} ${p.lastName}`:null)||p.username}
          </span>
        </div>
      ))}
    </div>
  );
};

const Alert = ({msg,type}) => msg ? <div className={`alert ${type||'ok'}`}>{msg}</div> : null;

// ── Avatar helpers — resolves pic/color for any username across user+partner ──
// Usage: <ItemAvatar username={item.user} user={user} partner={partner} size={36}/>
// getOwner: resolve user object from username — checks user, partner, and partners array
const getOwner = (username, user, partner, partners=[]) => {
  const uname = String(username||'');
  if(uname===user?.username) return user;
  if(uname===partner?.username) return partner;
  if(partners?.length) { const found=partners.find(p=>p.username===uname); if(found) return found; }
  return null;
};
const ItemAvatar = ({username, user, partner, partners=[], size=36}) => {
  const owner = getOwner(username, user, partner, partners);
  const pic   = owner?.profilePicUrl || DP;
  const color = owner?.eventColor    || '#888';
  return (
    <img
      src={pic} alt={String(username||'')}
      style={{width:size,height:size,borderRadius:'50%',objectFit:'cover',
              flexShrink:0,border:`2px solid ${color}`}}
    />
  );
};

/* ── FINANCES PAGE ── */
const FinancesPage = ({user, partner, partners=[], activePartners=[], permittedPartners=[], isShared, onToggleShared, tabColor='#00e676'}) => {
  const [items, setItems] = useState([]);
  const [budgets, setBudgets] = useState([]);
  const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
  const [sortField, setSortField] = useState('date');
  const [search, setSearch] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({category:'',amount:'',type:'expense',date:now()});
  const [editId, setEditId] = useState(null);
  const [alert, setAlert] = useState({msg:'',type:''});

  const msg = (m,t='ok') => { setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const fetchAll = useCallback(async () => {
    const users = [user.username, ...activePartners.map(p=>p.username)];
    try {
      const [fins, buds] = await Promise.all([
        Promise.all(users.map(u=>axios.get(`${API}/financial`,{params:{user:u}}).then(r=>r.data).catch(()=>[]))).then(r=>r.flat()),
        Promise.all(users.map(u=>axios.get(`${API}/budget`,{params:{user:u}}).then(r=>r.data.map(b=>({...b,expenses:JSON.parse(b.expenses||'[]')}))).catch(()=>[]))).then(r=>r.flat())
      ]);
      setItems(fins); setBudgets(buds);
    } catch {}
  }, [user.username, partner, isShared]);

  useEffect(()=>{ fetchAll(); },[fetchAll]);

  const filtered = useMemo(()=>{
    const users = [user.username, ...activePartners.map(p=>p.username)];
    let list = items.filter(i=>users.includes(i.user||i.username)&&(i.date||'').slice(5,7)===selectedMonth);
    if(search) list = list.filter(i=>(i.category||'').toLowerCase().includes(search.toLowerCase()));
    return [...list].sort((a,b)=>sortField==='amount'?parseFloat(b.amount)-parseFloat(a.amount):new Date(b.date)-new Date(a.date));
  },[items,selectedMonth,search,sortField,user.username,partner,isShared]);

  const totals = useMemo(()=>{
    const inc = filtered.filter(i=>i.type==='income').reduce((s,i)=>s+parseFloat(i.amount||0),0);
    const exp = filtered.filter(i=>i.type==='expense').reduce((s,i)=>s+parseFloat(i.amount||0),0);
    return {inc,exp,net:inc-exp};
  },[filtered]);

  const handleSave = async () => {
    if(!form.category||!form.amount){msg('Fill all fields.','err');return;}
    try {
      if(editId) {
        await axios.put(`${API}/financial/${editId}`,{user:user.username,category:form.category,amount:parseFloat(form.amount),type:form.type,date:form.date});
        msg('Updated.');
      } else {
        await axios.post(`${API}/financial`,{user:user.username,category:form.category,amount:parseFloat(form.amount),type:form.type,date:form.date});
        msg('Saved.');
      }
      setShowForm(false);setEditId(null);setForm({category:'',amount:'',type:'expense',date:now()});fetchAll();
    } catch { msg('Error.','err'); }
  };
  const handleFinDelete = async(id)=>{
    if(!window.confirm('Delete this transaction?')) return;
    try { await axios.delete(`${API}/financial/${id}`); msg('Deleted.'); fetchAll(); } catch { msg('Error.','err'); }
  };
  const startFinEdit = (item) => {
    setForm({category:item.category||'',amount:String(item.amount||''),type:item.type||'expense',date:(item.date||now()).slice(0,19)});
    setEditId(item.id); setShowForm(true);
  };

  const monthLabel = MONTHS.find(m=>m.v===selectedMonth)?.l||'';
  const isShared2 = isShared && partner;

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · FINANCIAL</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">FINANCES</div>
            <div className="page-sub">{isShared2?'COMBINED HOUSEHOLD TOTALS':'INCOME · EXPENSES · NET TOTAL'}</div>
          </div>
          <UserRow user={user} partner={partner} partners={partners} activePartners={activePartners} permittedPartners={permittedPartners} isShared={isShared} onToggleShared={onToggleShared}/>
          <div className="toolbar-row">
            <div className="tb-chip">
              <span style={{fontSize:'9px',fontFamily:"'DM Mono',monospace",letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text3)'}}>MONTH</span>
              <select value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
                {MONTHS.map(m=><option key={m.v} value={m.v}>{m.l} 2026</option>)}
              </select>
            </div>
            <div className={`tb-chip ${sortField==='date'?'sort-active':''}`} onClick={()=>setSortField('date')} style={{cursor:'pointer'}}>
              <span style={{fontSize:'9px',fontFamily:"'DM Mono',monospace",letterSpacing:'0.1em',textTransform:'uppercase'}}>SORT</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:'10px'}}>Date</span>
            </div>
          </div>
          <div className="search-bar">
            {Icons.search}
            <input placeholder="SEARCH TRANSACTIONS..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <Alert {...alert}/>

          {/* Summary */}
          <div className="section-label">§ SUMMARY · {monthLabel.toUpperCase()} 2026</div>
          <div className="summary-card">
            <div className="summary-grid">
              <div>
                <div className="summary-item-label">Income</div>
                <div className={`summary-item-value income`}>{fmtR(totals.inc)}</div>
              </div>
              <div>
                <div className="summary-item-label">Expenses</div>
                <div className="summary-item-value expense">{fmtR(totals.exp)}</div>
              </div>
              <div>
                <div className="summary-item-label">Net</div>
                <div className={`summary-item-value ${totals.net>=0?'net-pos':'net-neg'}`}>{fmtR(totals.net)}</div>
              </div>
            </div>
          </div>

          {/* Items */}
          <div className="section-label">§ ITEMS · {filtered.length} RECORDS</div>
          <div className="item-list">
            {filtered.map(item=>{
              const finOwner=getOwner(item.user||item.username,user,partner);
              const isIncome=item.type==='income';
              return (
                <div key={item.id} className="meal-card" style={{marginBottom:8}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                    <ItemAvatar username={item.user||item.username} user={user} partner={partner} size={36}/>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:'0.12em',padding:'3px 8px',borderRadius:3,textTransform:'uppercase',flexShrink:0,background:isIncome?'rgba(0,230,118,0.15)':'rgba(255,61,61,0.15)',color:isIncome?'var(--green)':'var(--red)',border:`1px solid ${isIncome?'rgba(0,230,118,0.3)':'rgba(255,61,61,0.3)'}`}}>{(item.type||'expense').toUpperCase()}</span>
                    {finOwner&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:finOwner.eventColor||'var(--text3)',letterSpacing:'0.08em'}}>{(finOwner.displayName||finOwner.username||'').toUpperCase()}</span>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div>
                      <div className="meal-name">{(item.category||'').toUpperCase()}</div>
                      <div className="meal-note" style={{marginTop:2}}>{fmtDate(item.date)}</div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div className={`item-amount ${item.type}`}>{fmtR(item.amount)}</div>
                      {(item.user||item.username)===user.username&&(
                        <div style={{display:'flex',flexDirection:'column',gap:3}}>
                          <button onClick={()=>startFinEdit(item)} style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'var(--blue)',border:'1px solid rgba(68,138,255,0.35)',borderRadius:3,padding:'3px 7px',background:'transparent',cursor:'pointer',letterSpacing:'0.1em'}}>EDIT</button>
                          <button onClick={()=>handleFinDelete(item.id)} style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'var(--red)',border:'1px solid rgba(255,61,61,0.35)',borderRadius:3,padding:'3px 7px',background:'transparent',cursor:'pointer',letterSpacing:'0.1em'}}>DEL</button>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {filtered.length===0&&<div className="no-events"><div className="no-events-text">No transactions for {monthLabel}</div></div>}
        </div>
      </div>
      <button className="fab" style={{background:'var(--green)',color:'#000',boxShadow:'0 4px 20px rgba(0,230,118,0.4)'}} onClick={()=>setShowForm(true)}>+ ADD ITEM</button>

      {showForm&&(
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal-sheet" style={{"--page-color":tabColor||"var(--pink)"}} onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">{editId?"Edit":"Add"} Transaction</div>
            <div className="form-field">
              <label className="form-label">Category</label>
              <input className="form-input" placeholder="e.g. Groceries" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Amount (ZAR)</label>
              <input className="form-input" type="number" placeholder="0.00" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Type</label>
              <div className="type-toggle">
                {['income','expense'].map(t=><button key={t} className={`type-toggle-btn ${form.type===t?'active':''}`} onClick={()=>setForm(p=>({...p,type:t}))}>{t.toUpperCase()}</button>)}
              </div>
            </div>
            <div className="form-field">
              <label className="form-label">Date</label>
              <input className="form-input" type="datetime-local" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} step="1"/>
            </div>
            <button className="form-submit" style={{background:tabColor,color:tabColor==='#ffd600'||tabColor==='#00e676'?'#000':'#fff'}} onClick={handleSave}>{editId?"UPDATE":"SAVE"}</button>
            <button className="form-cancel" onClick={()=>{setShowForm(false);setEditId(null);setForm({category:'',amount:'',type:'expense',date:now()});}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── CALENDAR PAGE ── */
const CalendarPage = ({user, partner, partners=[], activePartners=[], permittedPartners=[], isShared, onToggleShared, tabColor='#448aff'}) => {
  const [events, setEvents] = useState([]);
  const [viewDate, setViewDate] = useState(new Date());
  const [selectedDay, setSelectedDay] = useState(new Date());
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({title:'',date:now(),type:'personal',color:'#448aff'});
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [alert, setAlert] = useState({msg:'',type:''});

  const msg = (m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const fetchEvents = useCallback(async()=>{
    const users=[user.username,...activePartners.map(p=>p.username)];
    try {
      const [calAll, periodAll] = await Promise.all([
        Promise.all(users.map(u=>axios.get(`${API}/calendar`,{params:{user:u}}).then(r=>r.data.map(e=>({...e,user:e.user||u}))).catch(()=>[]))).then(r=>r.flat()),
        Promise.all(users.map(u=>axios.get(`${API}/period`,{params:{user:u}}).then(r=>r.data).catch(()=>[]))).then(r=>r.flat())
      ]);
      // Convert period cycles into calendar dot events
      const cycleEvents = [];
      periodAll.forEach(c=>{
        if(!c.startDate) return;
        const start = new Date(c.startDate);
        const end = c.endDate ? new Date(c.endDate) : new Date(start.getTime()+4*86400000);
        const len = parseInt(c.cycleLength)||28;
        // Mark each day of bleeding as a cycle dot
        for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
          cycleEvents.push({id:`cycle-${c.id}-${d.toISOString().slice(0,10)}`,title:'Period',date:d.toISOString().slice(0,10)+'T00:00:00',isCycle:true,user:c.user});
        }
        // Mark fertile window: ovulation ~14 days before next period, fertile 5 days around it
        const nextStart = new Date(start.getTime()+len*86400000);
        const ovulation = new Date(nextStart.getTime()-14*86400000);
        for(let i=-2; i<=3; i++){
          const fd = new Date(ovulation.getTime()+i*86400000);
          cycleEvents.push({id:`fertile-${c.id}-${fd.toISOString().slice(0,10)}`,title:'Fertile',date:fd.toISOString().slice(0,10)+'T00:00:00',isFertile:true,user:c.user});
        }
      });
      setEvents([...calAll, ...cycleEvents]);
    } catch {}
  },[user.username,partner,isShared]);

  useEffect(()=>{ fetchEvents(); },[fetchEvents]);

  const daysInMonth = useMemo(()=>{
    const year=viewDate.getFullYear(), month=viewDate.getMonth();
    const first=new Date(year,month,1);
    const last=new Date(year,month+1,0);
    const days=[];
    // pad start (Monday=0)
    let dow=(first.getDay()+6)%7;
    for(let i=0;i<dow;i++) days.push({date:new Date(year,month,1-dow+i),otherMonth:true});
    for(let d=1;d<=last.getDate();d++) days.push({date:new Date(year,month,d),otherMonth:false});
    // pad end
    const rem=7-(days.length%7); if(rem<7) for(let i=1;i<=rem;i++) days.push({date:new Date(year,month+1,i),otherMonth:true});
    return days;
  },[viewDate]);

  const getEventsForDay = (date) => events.filter(e=>{
    if(!e.date) return false;
    const d=new Date(e.date);
    return d.getFullYear()===date.getFullYear()&&d.getMonth()===date.getMonth()&&d.getDate()===date.getDate();
  });

  const selectedEvents = useMemo(()=>getEventsForDay(selectedDay),[selectedDay,events]);

  const eventType = e => {
    if(e.financial) return 'fin';
    if((e.title||'').toLowerCase().includes('work')||e.eventCategory==='work') return 'work';
    if(e.isCycle||e.eventCategory==='cycle'||(e.title||'').toLowerCase().includes('cycle')||(e.title||'').toLowerCase().includes('period')) return 'cycle';
    if(e.isFertile||e.eventCategory==='fertile') return 'fertile';
    return 'personal';
  };

  const handleSave = async()=>{
    if(!form.title||!form.date){msg('Title and date required.','err');return;}
    try {
      await axios.post(`${API}/calendar`,{user:user.username,title:form.title,date:form.date,financial:false,eventColor:form.color,type:form.type});
      msg('Event added.');setShowForm(false);setForm({title:'',date:now(),type:'personal',color:'#448aff'});fetchEvents();
    } catch { msg('Error.','err'); }
  };
  const handleDeleteEvent = async(id)=>{
    if(!window.confirm('Delete this event?')) return;
    try { await axios.delete(`${API}/calendar/${id}`); msg('Deleted.'); setSelectedEvent(null); fetchEvents(); } catch { msg('Error.','err'); }
  };

  const prevMonth=()=>setViewDate(d=>new Date(d.getFullYear(),d.getMonth()-1,1));
  const nextMonth=()=>setViewDate(d=>new Date(d.getFullYear(),d.getMonth()+1,1));
  const goToday=()=>{const t=new Date();setViewDate(t);setSelectedDay(t);};
  const monthLabel=viewDate.toLocaleString('default',{month:'long'}).toUpperCase();
  const selLabel=selectedDay.toISOString().slice(0,10);

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · CALENDAR</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">CALENDAR</div>
            <div className="page-sub">EVENTS · CYCLE · SCHEDULE</div>
          </div>
          <UserRow user={user} partner={partner} partners={partners} activePartners={activePartners} permittedPartners={permittedPartners} isShared={isShared} onToggleShared={onToggleShared}/>
          <Alert {...alert}/>

          {/* Nav */}
          <div className="cal-nav">
            <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
            <div className="cal-nav-month">{monthLabel} {viewDate.getFullYear()}</div>
            <button className="cal-nav-btn" onClick={nextMonth}>›</button>
            <button className="cal-today-btn" onClick={goToday}>TODAY</button>
          </div>

          {/* Grid */}
          <div className="cal-grid">
            {['MON','TUE','WED','THU','FRI','SAT','SUN'].map(d=><div key={d} className="cal-dow">{d}</div>)}
            {daysInMonth.map((item,i)=>{
              const isToday=item.date.toDateString()===new Date().toDateString();
              const isSelected=item.date.toDateString()===selectedDay.toDateString();
              const dayEvts=getEventsForDay(item.date);
              const hasCycle   = dayEvts.some(e=>e.isCycle);
              const hasFertile = dayEvts.some(e=>e.isFertile);
              const realEvts   = dayEvts.filter(e=>!e.isCycle&&!e.isFertile);
              return (
                <div key={i}
                  className={`cal-day${item.otherMonth?' other-month':''}${isToday&&!hasCycle?' today':''}${isSelected?' selected':''}`}
                  style={hasCycle?{background:'rgba(233,30,140,0.38)',cursor:'pointer'}:hasFertile?{background:'rgba(29,233,182,0.12)',cursor:'pointer'}:{cursor:'pointer'}}
                  onClick={()=>setSelectedDay(item.date)}>
                  <div className="cal-day-num" style={hasCycle?{color:'#fff',fontWeight:700}:{}}>{item.date.getDate()}</div>
                  {(realEvts.length>0||hasFertile)&&(
                    <div className="cal-day-dots">
                      {realEvts.slice(0,3).map((e,j)=>(
                        <div key={j} className="cal-dot" style={{background:e.eventColor||e.event_color||'var(--yellow)'}}/>
                      ))}
                      {hasFertile&&<div className="cal-dot fertile"/>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Legend */}
          <div className="cal-legend">
            <div className="cal-legend-item"><div style={{width:7,height:7,borderRadius:'50%',background:'rgba(233,30,140,0.85)',display:'inline-block'}}/>CYCLE</div>
            <div className="cal-legend-item"><div style={{width:7,height:7,borderRadius:'50%',background:'var(--teal)',display:'inline-block'}}/>FERTILE</div>
            <div className="cal-legend-item"><div style={{width:7,height:7,borderRadius:'50%',background:'var(--green)',display:'inline-block'}}/>FIN</div>
            <div className="cal-legend-item"><div style={{width:7,height:7,borderRadius:'50%',background:'var(--blue)',display:'inline-block'}}/>WORK</div>
            <div className="cal-legend-item"><div style={{width:7,height:7,borderRadius:'50%',background:'var(--yellow)',display:'inline-block'}}/>PERSONAL</div>
          </div>

          {/* Events for selected day */}
          <div className="section-label">§ EVENTS · {selLabel}</div>
          {selectedEvents.some(e=>e.isCycle)&&(
            <div style={{background:'rgba(233,30,140,0.12)',border:'1px solid rgba(233,30,140,0.3)',borderRadius:6,padding:'10px 14px',marginBottom:6,display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:'16px'}}>🩸</span>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:'var(--pink)'}}>PERIOD DAY</div>
            </div>
          )}
          {selectedEvents.some(e=>e.isFertile)&&(
            <div style={{background:'rgba(29,233,182,0.1)',border:'1px solid rgba(29,233,182,0.3)',borderRadius:6,padding:'10px 14px',marginBottom:6,display:'flex',alignItems:'center',gap:10}}>
              <span style={{fontSize:'16px'}}>🌿</span>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:'var(--teal)'}}>FERTILE WINDOW</div>
            </div>
          )}
          {selectedEvents.filter(e=>!e.isCycle&&!e.isFertile).length===0&&!selectedEvents.some(e=>e.isCycle||e.isFertile)&&(
            <div className="no-events"><div className="no-events-icon">📅</div><div className="no-events-text">NO EVENTS</div></div>
          )}
          {selectedEvents.filter(e=>!e.isCycle&&!e.isFertile).map(e=>{
            const dotColor=e.eventColor||e.event_color||(e.financial?'var(--green)':'var(--yellow)');
            const calOwner=getOwner(e.user||e.username,user,partner);
            return (
              <div key={e.id} className="meal-card" style={{marginBottom:8,borderLeft:`3px solid ${dotColor}`,cursor:'pointer'}} onClick={()=>setSelectedEvent(e)}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <ItemAvatar username={e.user||e.username} user={user} partner={partner} size={36}/>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:'0.12em',padding:'3px 8px',borderRadius:3,textTransform:'uppercase',flexShrink:0,background:`${dotColor}22`,color:dotColor,border:`1px solid ${dotColor}55`}}>{(e.type||'personal').toUpperCase()}</span>
                  {calOwner&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:calOwner.eventColor||'var(--text3)',letterSpacing:'0.08em'}}>{(calOwner.displayName||calOwner.username||'').toUpperCase()}</span>}
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div>
                    <div className="meal-name">{(e.title||'').toUpperCase()}</div>
                    <div className="meal-note" style={{marginTop:2}}>{fmtDateTime(e.date)}</div>
                  </div>
                  {e.amount&&<div className="item-amount income">{fmtR(e.amount)}</div>}
                </div>
              </div>
            );
          })}
          <div style={{height:'80px'}}/>
        </div>
      </div>
      <button className="fab" style={{background:'var(--blue)',boxShadow:'0 4px 20px rgba(68,138,255,0.4)'}} onClick={()=>setShowForm(true)}>+ ADD EVENT</button>

      {showForm&&(
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal-sheet" style={{"--page-color":tabColor||"var(--pink)"}} onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">Add Event</div>
            <div className="form-field">
              <label className="form-label">Title</label>
              <input className="form-input" placeholder="Event title" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Category</label>
              <div className="type-toggle">
                {[['personal','Personal','#ffd600'],['work','Work','#448aff'],['health','Health','#00e676'],['social','Social','#e040fb']].map(([v,l,col])=>(
                  <button key={v} className={`type-toggle-btn ${form.type===v?'active':''}`}
                    style={form.type===v?{borderColor:col,color:col,background:col+'22'}:{borderColor:'var(--border2)',color:'var(--text3)'}}
                    onClick={()=>setForm(p=>({...p,type:v,color:col}))}>{l}</button>
                ))}
              </div>
            </div>
            <div className="form-field">
              <label className="form-label">Custom Colour</label>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <input type="color" value={form.color} onChange={e=>setForm(p=>({...p,color:e.target.value}))} style={{width:44,height:36,border:'1px solid var(--border2)',borderRadius:4,background:'var(--bg3)',cursor:'pointer',padding:2}}/>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--text3)'}}>{form.color}</span>
                <div style={{width:20,height:20,borderRadius:'50%',background:form.color,border:'2px solid rgba(255,255,255,0.2)'}}/>
              </div>
            </div>
            <div className="form-field">
              <label className="form-label">Date & Time</label>
              <input className="form-input" type="datetime-local" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} step="1"/>
            </div>
            <button className="form-submit" style={{background:tabColor}} onClick={handleSave}>SAVE EVENT</button>
            <button className="form-cancel" onClick={()=>setShowForm(false)}>Cancel</button>
          </div>
        </div>
      )}
      {selectedEvent&&(
        <div className="modal-overlay" onClick={()=>setSelectedEvent(null)}>
          <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
              <ItemAvatar username={selectedEvent.user||selectedEvent.username} user={user} partner={partner} size={36}/>
              <div style={{width:12,height:12,borderRadius:'50%',background:selectedEvent.eventColor||selectedEvent.event_color||'var(--blue)',flexShrink:0,border:'2px solid rgba(255,255,255,0.2)'}}/>
              <div className="modal-title" style={{margin:0}}>{(selectedEvent.title||'').toUpperCase()}</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
              <div><div className="form-label">Date & Time</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:'var(--text)'}}>{fmtDateTime(selectedEvent.date)}</div></div>
              <div><div className="form-label">Category</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:'var(--text)'}}>{selectedEvent.type||'personal'}</div></div>
              {selectedEvent.amount&&<div><div className="form-label">Amount</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,color:'var(--green)'}}>{fmtR(selectedEvent.amount)}</div></div>}
              {selectedEvent.user&&<div><div className="form-label">Added by</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:'var(--text)'}}>{selectedEvent.user}</div></div>}
            </div>
            {selectedEvent.user===user.username&&!selectedEvent.financial&&(
              <button className="form-submit" style={{background:'var(--red)',marginBottom:0}} onClick={()=>handleDeleteEvent(selectedEvent.id)}>DELETE EVENT</button>
            )}
            <button className="form-cancel" onClick={()=>setSelectedEvent(null)}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── BUDGET PAGE ── */
const BudgetPage = ({user, partner, partners=[], activePartners=[], permittedPartners=[], isShared, onToggleShared, tabColor='#ffd600'}) => {
  const [budgets, setBudgets] = useState([]);
  const [items, setItems] = useState([]);
  const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({name:'',category:'',income:'',expenses:[{category:'',amount:''}],date:now()});
  const [alert, setAlert] = useState({msg:'',type:''});

  const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const fetchAll = useCallback(async()=>{
    const users=[user.username,...activePartners.map(p=>p.username)];
    try {
      const [buds,fins]=await Promise.all([
        Promise.all(users.map(u=>axios.get(`${API}/budget`,{params:{user:u}}).then(r=>{const rows=r.data.data||r.data||[];return rows.map(b=>({...b,expenses:Array.isArray(b.expenses)?b.expenses:(typeof b.expenses==='string'?JSON.parse(b.expenses||'[]'):(b.expenses||[])),user:b.user||u}));}).catch(()=>[]))).then(r=>r.flat()),
        Promise.all(users.map(u=>axios.get(`${API}/financial`,{params:{user:u}}).then(r=>r.data).catch(()=>[]))).then(r=>r.flat())
      ]);
      setBudgets(buds); setItems(fins);
    } catch {}
  },[user.username,partner,isShared]);

  useEffect(()=>{ fetchAll(); },[fetchAll]);

  const filteredBudgets = useMemo(()=>budgets.filter(b=>{
    const d = b.date||'';
    // Handle both ISO (2026-05-01T00:00:00) and date-only (2026-05-01) formats
    const month = d.slice(5,7);
    return month===selectedMonth;
  }),[budgets,selectedMonth]);

  const totalPlanned = filteredBudgets.reduce((s,b)=>s+b.expenses.reduce((ss,e)=>ss+parseFloat(e.amount||0),0),0);
  const totalActual = useMemo(()=>{
    const users=[user.username,...activePartners.map(p=>p.username)];
    return items.filter(i=>users.includes(i.user||i.username)&&(i.date||'').slice(5,7)===selectedMonth&&i.type==='expense').reduce((s,i)=>s+parseFloat(i.amount||0),0);
  },[items,selectedMonth,user.username,partner,isShared]);

  const getBudgetActual = (b) => {
    const users=[user.username,...activePartners.map(p=>p.username)];
    return items.filter(i=>users.includes(i.user||i.username)&&(i.date||'').slice(5,7)===selectedMonth&&i.type==='expense').reduce((s,i)=>s+parseFloat(i.amount||0),0);
  };

  const getBudgetStatus = (planned, actual) => {
    const pct = planned>0 ? actual/planned : 0;
    if(pct>=1) return 'over';
    if(pct>=0.65) return 'warn';
    return 'ok';
  };

  const handleSave = async()=>{
    if(!form.expenses[0]?.category){msg('Category name required.','err');return;}
    if(!form.income||parseFloat(form.income)<=0){msg('Amount must be greater than 0.','err');return;}
    const expensesJson = JSON.stringify([{category:form.expenses[0].category||'Budget',amount:parseFloat(form.income)}]);
    const dateStr = form.date||now();
    try {
      await axios.post(`${API}/budget`,{user:user.username,income:parseFloat(form.income),expenses:expensesJson,date:dateStr});
      msg('Budget saved.');setShowForm(false);
      setForm({name:'',category:'',income:'',expenses:[{category:'',amount:''}],date:now()});
      fetchAll();
    } catch(e) { msg(e.response?.data?.message||'Error saving budget.','err'); }
  };
  const handleBudgetDelete = async(id)=>{
    if(!window.confirm('Delete this budget?')) return;
    try { await axios.delete(`${API}/budget/${id}`); msg('Deleted.'); fetchAll(); } catch { msg('Error.','err'); }
  };

  const monthLabel = MONTHS.find(m=>m.v===selectedMonth)?.l||'';
  const left = totalPlanned - totalActual;

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · FINANCIAL</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">BUDGET</div>
            <div className="page-sub">PLANNED · ACTUAL · REMAINING</div>
          </div>
          <UserRow user={user} partner={partner} partners={partners} activePartners={activePartners} permittedPartners={permittedPartners} isShared={isShared} onToggleShared={onToggleShared}/>
          <div className="toolbar-row">
            <div className="tb-chip">
              <span style={{fontSize:'9px',fontFamily:"'DM Mono',monospace",letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text3)'}}>MONTH</span>
              <select value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
                {MONTHS.map(m=><option key={m.v} value={m.v}>{m.l} 2026</option>)}
              </select>
            </div>
            <div className="sort-active tb-chip" style={{cursor:'default'}}>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:'10px'}}>Desc</span>
            </div>
          </div>
          <Alert {...alert}/>

          {/* Summary */}
          <div className="section-label">§ SUMMARY · {monthLabel.toUpperCase()} 2026</div>
          <div className="summary-card">
            <div className="summary-grid">
              <div>
                <div className="summary-item-label">Planned</div>
                <div className="summary-item-value" style={{color:'var(--green)'}}>{fmtR(totalPlanned)}</div>
              </div>
              <div>
                <div className="summary-item-label">Actual</div>
                <div className="summary-item-value" style={{color:'var(--red)'}}>{fmtR(totalActual)}</div>
              </div>
              <div>
                <div className="summary-item-label">Left</div>
                <div className="summary-item-value" style={{color:left>=0?'var(--green)':'var(--red)'}}>{fmtR(Math.abs(left))}</div>
              </div>
            </div>
          </div>

          <div className="section-label">§ BUDGETS · {filteredBudgets.length} RECORDS</div>
          {filteredBudgets.map(b=>{
            const planned  = b.expenses.reduce((s,e)=>s+parseFloat(e.amount||0),0);
            const actual   = getBudgetActual(b);
            const pct      = planned>0?Math.min(actual/planned,1):0;
            const status   = getBudgetStatus(planned, actual);
            const leftVal  = planned - actual;
            const budOwner = getOwner(b.user||user.username, user, partner);
            return (
              <div key={b.id} className="meal-card" style={{marginBottom:8,position:'relative'}}>
                <span className={`budget-status-badge ${status}`}>{status.toUpperCase()}</span>
                {/* Top row: avatar + BUDGET badge + owner name */}
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                  <ItemAvatar username={b.user||user.username} user={user} partner={partner} size={36}/>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:'0.12em',padding:'3px 8px',borderRadius:3,textTransform:'uppercase',flexShrink:0,background:'rgba(255,214,0,0.15)',color:'var(--yellow)',border:'1px solid rgba(255,214,0,0.3)'}}>BUDGET</span>
                  {budOwner&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:budOwner.eventColor||'var(--text3)',letterSpacing:'0.08em'}}>{(budOwner.displayName||budOwner.username||'').toUpperCase()}</span>}
                </div>
                <div className="meal-name" style={{marginBottom:4}}>{(b.expenses[0]?.category||'Budget').toUpperCase()}</div>
                <div className="meal-note" style={{marginBottom:10}}>{fmtDate(b.date)}</div>
                <div className="budget-cols">
                  <div><div className="budget-col-label">Plan</div><div className="budget-col-value plan">{fmtR(planned)}</div></div>
                  <div><div className="budget-col-label">Act</div><div className="budget-col-value act">{fmtR(actual)}</div></div>
                  <div><div className="budget-col-label">Left</div><div className={`budget-col-value left ${leftVal>=0?'pos':'neg'}`}>{fmtR(Math.abs(leftVal))}</div></div>
                </div>
                <div className="progress-bar"><div className={`progress-fill ${status}`} style={{width:`${pct*100}%`}}/></div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div className="progress-label">{Math.round(pct*100)}% USED</div>
                  {(b.user===user.username||!b.user)&&<button onClick={()=>handleBudgetDelete(b.id)} style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'var(--red)',border:'1px solid rgba(255,61,61,0.3)',borderRadius:3,padding:'2px 8px',background:'transparent',cursor:'pointer',letterSpacing:'0.1em'}}>DELETE</button>}
                </div>
              </div>
            );
          })}
          {filteredBudgets.length===0&&<div className="no-events"><div className="no-events-text">No budgets for {monthLabel}</div></div>}
          <div style={{height:'80px'}}/>
        </div>
      </div>
      <button className="fab" style={{background:'var(--yellow)',color:'#000',boxShadow:'0 4px 20px rgba(255,214,0,0.4)'}} onClick={()=>setShowForm(true)}>+ ADD BUDGET</button>

      {showForm&&(
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">Add Budget</div>
            <div className="form-field">
              <label className="form-label">Category Name</label>
              <input className="form-input" placeholder="e.g. Groceries, Fuel, Savings" value={form.expenses[0]?.category||''} onChange={e=>setForm(p=>({...p,expenses:[{...p.expenses[0],category:e.target.value}]}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Planned Amount (ZAR)</label>
              <input className="form-input" type="number" min="0" step="0.01" placeholder="0.00" value={form.income}
                onChange={e=>setForm(p=>({...p,income:e.target.value,expenses:[{...(p.expenses[0]||{}),amount:e.target.value,category:p.expenses[0]?.category||''}]}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Month</label>
              <input className="form-input" type="month" value={form.date.slice(0,7)} onChange={e=>setForm(p=>({...p,date:e.target.value+'-01T00:00:00'}))}/>
            </div>
            <button className="form-submit" style={{background:tabColor,color:'#000'}} onClick={handleSave}>SAVE BUDGET</button>
            <button className="form-cancel" onClick={()=>setShowForm(false)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
};

const GYM_CARDIO_VALS = new Set(['Steady-state running or jogging','Interval sprints','Incline walking or running','Steady-state cycling','HIIT cycling','Hill climb simulations','Steady-state rowing','Sprint intervals','Endurance rows','Steady-state stair climbing','Interval climbing','Run · Zone 2','Trail Run','Interval Run','Easy Jog','Spin Class']);
const GYM_MOBILITY_VALS = new Set(['Yoga Flow','Vinyasa Flow','Hatha Yoga','Foam Rolling','Stretching','Mat Pilates']);
const gymIsCardio = ex => GYM_CARDIO_VALS.has(ex)||['run','bike','cycle','swim','treadmill','elliptical','row','stair','sprint','jog','walk','hike','trail'].some(k=>(ex||'').toLowerCase().includes(k));
const gymIsMobility = ex => GYM_MOBILITY_VALS.has(ex)||['yoga','stretch','pilates','mobility','foam','roll'].some(k=>(ex||'').toLowerCase().includes(k));
const gymGetType = ex => gymIsMobility(ex)?'mobility':gymIsCardio(ex)?'cardio':'strength';

const gymFormatDetail = w => {
  const reps=String(w.reps||''), weight=String(w.weight||'');
  if(gymIsCardio(w.exercise)) return `${reps} min · ${weight} km`;
  if(gymIsMobility(w.exercise)) return `${reps} min · ${weight}`;
  const sets=parseInt(w.sets)||1;
  if(sets>1&&reps.includes(',')&&weight.includes(',')) {
    const ra=reps.split(',').map(r=>r.trim()), wa=weight.split(',').map(x=>x.trim());
    if(ra.length===sets&&wa.length===sets) return ra.map((r,i)=>`${r} reps @ ${wa[i]} kg`).join(' · ');
  }
  return `${sets} × ${reps} reps @ ${weight} kg`;
};

// Helper: compute cycle stats for a list of cycles
const cycleStats = (cycles) => {
  const sorted  = [...cycles].sort((a,b)=>new Date(b.startDate)-new Date(a.startDate));
  const latest  = sorted[0] || null;
  const avgLen  = cycles.length ? Math.round(cycles.reduce((s,c)=>s+(parseInt(c.cycleLength)||28),0)/cycles.length) : 28;
  const dayOfCycle = latest ? Math.max(1, Math.min(Math.floor((new Date()-new Date(latest.startDate))/86400000)+1, avgLen)) : 1;
  const nextPeriod = latest ? new Date(new Date(latest.startDate).getTime() + avgLen*86400000) : null;
  const fertileStart = nextPeriod ? new Date(nextPeriod.getTime() - ((avgLen-14)+3)*86400000) : null;
  const fertileEnd   = fertileStart ? new Date(fertileStart.getTime() + 5*86400000) : null;
  return {sorted, latest, avgLen, dayOfCycle, nextPeriod, fertileStart, fertileEnd};
};

// Phase wheel SVG — proper donut
const PhaseWheel = ({dayOfCycle=1, cycleLength=28, accentColor='#e91e8c'}) => {
  const S=260,cx=130,cy=130,outerR=100,innerR=62,numR=outerR+16;
  const phases=[
    {name:'Menstrual', days:5,  color:'#e91e8c'},
    {name:'Follicular',days:7,  color:'#1de9b6'},
    {name:'Ovulation', days:3,  color:'#ffd600'},
    {name:'Luteal',    days:Math.max(cycleLength-15,1), color:'#ff6d00'}
  ];
  const total=phases.reduce((s,p)=>s+p.days,0);
  const segs=[];let angle=-Math.PI/2;
  phases.forEach(p=>{const span=(p.days/total)*2*Math.PI;segs.push({...p,sa:angle,ea:angle+span});angle+=span;});
  const arc=(sa,ea)=>{
    const g=0.02,s=sa+g,e=ea-g;
    const x1=cx+outerR*Math.cos(s),y1=cy+outerR*Math.sin(s);
    const x2=cx+outerR*Math.cos(e),y2=cy+outerR*Math.sin(e);
    const ix1=cx+innerR*Math.cos(e),iy1=cy+innerR*Math.sin(e);
    const ix2=cx+innerR*Math.cos(s),iy2=cy+innerR*Math.sin(s);
    const lg=(e-s)>Math.PI?1:0;
    return `M${x1},${y1} A${outerR},${outerR},0,${lg},1,${x2},${y2} L${ix1},${iy1} A${innerR},${innerR},0,${lg},0,${ix2},${iy2} Z`;
  };
  const dayNums=[];
  for(let d=1;d<=total;d++){
    const a=-Math.PI/2+(((d-0.5)/total)*2*Math.PI);
    dayNums.push({d,x:cx+numR*Math.cos(a),y:cy+numR*Math.sin(a)});
  }
  const curA=-Math.PI/2+((dayOfCycle-0.5)/total)*2*Math.PI;
  const phase=dayOfCycle<=5?'MENSTRUAL':dayOfCycle<=12?'FOLLICULAR':dayOfCycle<=15?'OVULATION':'LUTEAL';
  return (
    <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`}>
      {segs.map((seg,i)=><path key={i} d={arc(seg.sa,seg.ea)} fill={seg.color} opacity="0.9"/>)}
      {dayNums.map(({d,x,y})=>d!==dayOfCycle&&(
        <text key={d} x={x} y={y} textAnchor="middle" dominantBaseline="middle"
          fill="rgba(255,255,255,0.45)" fontFamily="'DM Mono',monospace" fontSize="8">{d}</text>
      ))}
      <circle cx={cx} cy={cy} r={innerR-1} fill="#0d0e10"/>
      <text x={cx} y={cy-10} textAnchor="middle" fill="#f0f0f0" fontFamily="'Barlow Condensed',sans-serif" fontWeight="800" fontSize="22">DAY {dayOfCycle}</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill="#5a5f65" fontFamily="'DM Mono',monospace" fontSize="8" letterSpacing="0.1em">{phase} PHASE</text>
      <circle cx={cx+numR*Math.cos(curA)} cy={cy+numR*Math.sin(curA)} r="12" fill="white"/>
      <text x={cx+numR*Math.cos(curA)} y={cy+numR*Math.sin(curA)} textAnchor="middle" dominantBaseline="middle"
        fill="#0d0e10" fontFamily="'DM Mono',monospace" fontWeight="700" fontSize="9">{dayOfCycle}</text>
    </svg>
  );
};

  const [picFile, setPicFile]               = useState(null);
  const [partnerLinked, setPartnerLinked]   = useState(false);
  const [alert, setAlert]                   = useState({msg:'',type:''});
  const fileInputRef = useRef();

  const COLORS = ['#00e676','#ff3b3b','#448aff','#ffd600','#e91e8c','#e040fb'];
  const msg = (m,t='ok') => { setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };
  const sharingItems = ['Finances','Calendar','Budget','Gym','Meals','Cycle'];

  // Re-sync form when user prop updates (after App reloads profile)
  useEffect(()=>{
    setForm({
      firstName: user.firstName||'',
      lastName:  user.lastName||'',
      email:     user.email||'',
      phone:     user.phone||'',
      gender:    user.gender||'',
    });
    setSelectedColor(user.eventColor||'#00e676');

  },[user.username]);

  useEffect(()=>{
    if(!partner) return;
    axios.get(`${API}/get-access`,{params:{viewer:user.username,adminUsername:user.username}})
      .then(r=>{
        if(r.data.success){

            const linked=(r.data.accessList||[]).some(a=>a.viewer===user.username&&a.target===p.username);

              setSharingConfig(prev=>{
                if(prev[p.username]) return prev; // already set — don't overwrite

    try {
      const displayName = form.firstName&&form.lastName ? `${form.firstName} ${form.lastName}` : (user.displayName||user.username);
      // If a new picture was selected, convert to base64 and send
      let profilePicUrl = user.profilePicUrl||DP;
      if(picFile){
        profilePicUrl = picPreview; // base64 data URL
      }
      await axios.post(`${API}/profile-pictures`,{
        username:    user.username,
        firstName:   form.firstName,
        lastName:    form.lastName,
        displayName: displayName,
        email:       form.email,
        phone:       form.phone,
        gender:      form.gender,
        eventColor:  selectedColor,
        profilePicUrl: profilePicUrl !== DP ? profilePicUrl : undefined,
      });
      const updated = {...user,...form,displayName,eventColor:selectedColor,profilePicUrl:profilePicUrl!==DP?profilePicUrl:user.profilePicUrl,gender:form.gender};
      setUser(updated);
      localStorage.setItem('user',JSON.stringify(updated));
      setPicFile(null);
      msg('Changes saved.');
    } catch(e) { msg('Error saving.','err'); }
  };



  const fullName = form.firstName&&form.lastName ? `${form.firstName} ${form.lastName}` : (user.displayName||user.username);

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · PROFILE</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">PROFILE</div>
            <div className="page-sub">ACCOUNT · SHARING · PREFERENCES</div>
          </div>
          <Alert {...alert}/>

          {/* ── Profile picture + name card ── */}
          <div className="profile-user-card" style={{flexDirection:'column',alignItems:'center',gap:12,padding:'20px 16px'}}>
            {/* Avatar with tap-to-change */}
            <div style={{position:'relative',cursor:'pointer'}} onClick={()=>fileInputRef.current.click()}>
              <img src={picPreview} alt="avatar"
                style={{width:80,height:80,borderRadius:'50%',objectFit:'cover',border:`3px solid ${selectedColor}`,display:'block'}}/>
              <div style={{position:'absolute',bottom:0,right:0,width:26,height:26,borderRadius:'50%',background:'var(--bg3)',border:'2px solid var(--border2)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              </div>
              <input ref={fileInputRef} type="file" accept="image/*" style={{display:'none'}} onChange={handlePicChange}/>
            </div>
            <div style={{textAlign:'center'}}>
              <div className="profile-user-name" style={{fontSize:20,marginBottom:4}}>{fullName}</div>
              <div className="profile-user-email">{form.email||user.username}</div>
              {form.gender&&<span className={`profile-user-badge ${form.gender.toLowerCase()}`} style={{marginTop:6,display:'inline-block'}}>{form.gender.toUpperCase()}</span>}
            </div>
            {picFile&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--green)',letterSpacing:'0.1em'}}>NEW PHOTO — SAVE TO APPLY</div>}
          </div>

          {/* ── Partner sharing ── */}
          {!partner&&(
            <div style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:6,padding:'14px 16px',marginBottom:16}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--pink)',marginBottom:6}}>§ PARTNER SHARING</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:'var(--text3)',lineHeight:1.6}}>No partner linked. Contact admin at <strong style={{color:'var(--text2)'}}>vectraarch.live/conduit/users</strong></div>
            </div>
          )}
          {(partners.length>0?partners:partner?[partner]:[]).length>0&&(
            <div className="partner-sharing-card">
              <div className="profile-section-title">§ PARTNER SHARING</div>
              <div className="partner-hint" style={{marginBottom:12}}>Enable shared view per section. Each partner is controlled independently.</div>

              {(partners.length>0?partners:[partner]).map((p,pi)=>{
                const pun    = p.username;
                const pCfg   = sharingConfig[pun] || {};
                const pAll   = sharingItems.every(i=>pCfg[i]);

                const toggleItem = (item) => setSharingConfig(prev=>({
                  ...prev,
                  [pun]: { ...(prev[pun]||{}), [item]: !(prev[pun]?.[item]) }
                }));

                const shareAll = async() => {
                  const next = !pAll;
                  setSharingConfig(prev=>({
                    ...prev,
                    [pun]: Object.fromEntries(sharingItems.map(i=>[i,next]))
                  }));
                  try {
                    if(next) await axios.post(`${API}/grant-access`,{viewer:user.username,target:pun,adminUsername:user.username});
                    else     await axios.post(`${API}/revoke-access`,{viewer:user.username,target:pun,adminUsername:user.username});
                    msg(next?`Sharing enabled with ${pun}.`:`Sharing disabled with ${pun}.`);
                  } catch {}
                };

                return (
                  <div key={pun} style={pi>0?{marginTop:16,paddingTop:16,borderTop:'1px solid var(--border)'}:{}}>
                    <div className="partner-row" style={{marginBottom:10}}>
                      <img className="partner-avatar" src={p.profilePicUrl||DP} alt=""
                        style={{border:`2px solid ${p.eventColor||'#448aff'}`}}/>
                      <div style={{flex:1}}>

                    </div>
                    <div className="sharing-grid">
                      {sharingItems.map(item=>(
                        <div key={item} className={`sharing-item ${pCfg[item]?'on':''}`}

                          <span className="sharing-item-label">{item.toUpperCase()}</span>
                          <div className={`sharing-check ${pCfg[item]?'on':'off'}`}>{pCfg[item]?'✓':''}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* ── Account Details ── */}
          <div className="profile-section">
            <div className="profile-section-title">§ ACCOUNT DETAILS</div>
            <div className="profile-field">
              <div className="profile-field-label">First Name</div>
              <input className="profile-field-input" placeholder="First name" value={form.firstName}
                onChange={e=>setForm(p=>({...p,firstName:e.target.value}))}/>
            </div>
            <div className="profile-field">
              <div className="profile-field-label">Last Name</div>
              <input className="profile-field-input" placeholder="Last name" value={form.lastName}
                onChange={e=>setForm(p=>({...p,lastName:e.target.value}))}/>
            </div>
            <div className="profile-field">
              <div className="profile-field-label">Email</div>
              <input className="profile-field-input" type="email" value={form.email}
                onChange={e=>setForm(p=>({...p,email:e.target.value}))}/>
            </div>
            <div className="profile-field">
              <div className="profile-field-label">Phone</div>
              <input className="profile-field-input" type="tel" value={form.phone}
                onChange={e=>setForm(p=>({...p,phone:e.target.value}))}/>
            </div>
            <div className="profile-field">
              <div className="profile-field-label">Gender</div>
              <div style={{display:'flex',gap:10,paddingTop:6}}>
                {['male','female'].map(g=>(
                  <button key={g}
                    onClick={()=>setForm(p=>({...p,gender:g}))}
                    style={{
                      fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:'0.12em',
                      textTransform:'uppercase',padding:'8px 20px',borderRadius:4,cursor:'pointer',
                      border: form.gender===g
                        ? `1px solid ${g==='female'?'var(--pink)':'var(--blue)'}`
                        : '1px solid var(--border2)',
                      color: form.gender===g ? (g==='female'?'var(--pink)':'var(--blue)') : 'var(--text3)',
                      background: form.gender===g
                        ? (g==='female'?'rgba(233,30,140,0.12)':'rgba(68,138,255,0.12)')
                        : 'transparent',
                    }}>
                    {g==='male'?'♂ Male':'♀ Female'}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* ── Event Color ── */}
          <div className="profile-section">
            <div className="profile-section-title">§ EVENT COLOR</div>
            <div style={{padding:'12px 14px',fontFamily:"'DM Mono',monospace",fontSize:'10px',color:'var(--text3)'}}>Your personal event color for the calendar</div>
            <div className="color-palette">
              {COLORS.map(col=>(
                <div key={col} className={`color-swatch ${selectedColor===col?'selected':''}`}
                  style={{background:col}} onClick={()=>setSelectedColor(col)}/>
              ))}
            </div>
          </div>

          <button className="save-btn" onClick={handleSave}>SAVE CHANGES</button>

          <button onClick={onLogout} style={{width:'100%',padding:'14px',background:'transparent',border:'1px solid rgba(233,30,140,0.4)',color:'var(--pink)',borderRadius:'6px',fontFamily:"'DM Mono',monospace",fontWeight:500,fontSize:'12px',letterSpacing:'0.14em',textTransform:'uppercase',marginBottom:'16px',cursor:'pointer'}}>SIGN OUT ×</button>

          <div className="profile-section-title" style={{color:'var(--red)',marginBottom:'8px'}}>§ DANGER ZONE</div>

    </div>
  );
};

  const [adminForm, setAdminForm] = useState({username:''});
  const [pwForm, setPwForm]     = useState({username:'',newPassword:''});
  const [delUser, setDelUser]   = useState('');
  const [alert, setAlert]       = useState({msg:'',type:''});

  const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),5000); };

  const fetchUsers = useCallback(async()=>{
    try { const r=await axios.get(`${API}/users`,{params:{adminUsername:user.username}}); if(r.data.success) setUsers(r.data.data); } catch {}

  },[user.username]);

  useEffect(()=>{ fetchUsers(); fetchAccess(); },[fetchUsers,fetchAccess]);

  const userOpts = ['',...users.map(u=>u.username)];

  const act = async(fn)=>{ try{ const r=await fn(); msg(r.data.message||(r.data.success?'Done.':'Failed.'), r.data.success?'ok':'err'); if(r.data.success){fetchUsers();fetchAccess();} }catch(e){msg(e.response?.data?.message||'Error.','err');} };

            {/* Grant/Revoke Access */}

              <label style={labelStyle}>§ MANAGE ACCESS</label>
              <select style={selectStyle} value={accessForm.viewer} onChange={e=>setAccessForm(p=>({...p,viewer:e.target.value}))}>
                {userOpts.map(u=><option key={u} value={u}>{u||'— Viewer —'}</option>)}
              </select>
              <select style={selectStyle} value={accessForm.target} onChange={e=>setAccessForm(p=>({...p,target:e.target.value}))}>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                <button style={{...btnStyle('var(--green)'),width:'auto'}} onClick={()=>act(()=>axios.post(`${API}/grant-access`,{...accessForm,adminUsername:user.username}))}>Grant</button>
                <button style={{...btnStyle('var(--red)'),width:'auto'}} onClick={()=>act(()=>axios.post(`${API}/revoke-access`,{...accessForm,adminUsername:user.username}))}>Revoke</button>

              <label style={labelStyle}>§ ADMIN STATUS</label>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                <button style={{...btnStyle('var(--yellow)'),width:'auto'}} onClick={()=>act(()=>axios.post(`${API}/grant-admin`,{...adminForm,adminUsername:user.username}))}>Grant</button>
                <button style={{...btnStyle('var(--red)'),width:'auto'}} onClick={()=>act(()=>axios.post(`${API}/revoke-admin`,{...adminForm,adminUsername:user.username}))}>Revoke</button>

            {/* Update Password */}
            <div style={cardStyle}>
              <label style={labelStyle}>§ UPDATE PASSWORD</label>
              <select style={selectStyle} value={pwForm.username} onChange={e=>setPwForm(p=>({...p,username:e.target.value}))}>

            {/* Access List */}
            <div style={cardStyle}>

                  <span>{a.viewer} → {a.target}</span>
                  <button onClick={()=>act(()=>axios.post(`${API}/revoke-access`,{viewer:a.viewer,target:a.target,adminUsername:user.username}))} style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'var(--red)',border:'1px solid rgba(255,61,61,0.3)',borderRadius:3,padding:'2px 8px',background:'transparent',cursor:'pointer'}}>×</button>
                </div>
              ))}
            </div>
          </div>

          {/* Users list */}
          <div style={{...cardStyle,marginTop:4}}>
            <label style={labelStyle}>§ USERS · {users.length}</label>
            {users.map(u=>(
              <div key={u.username} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)'}}>

                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--text3)'}}>{u.lastActive?`Last active: ${fmtDate(u.lastActive)}`:''}</div>

        </div>

  );

const ALL_TABS = [
  {id:'budget',   label:'BUDGET',   color:'#ffd600'},
  {id:'finances', label:'FINANCES', color:'#00e676'},
  {id:'calendar', label:'CALENDAR', color:'#448aff'},
  {id:'gym',      label:'GYM',      color:'#ff3b3b'},
  {id:'meals',    label:'MEALS',    color:'#d67bff'},
  {id:'cycle',    label:'CYCLE',    color:'#e91e8c', cycleOnly:true},
  {id:'profile',  label:'PROFILE',  color:'#b06aff'},
  {id:'admin',    label:'ADMIN',    color:'#ff9800', adminOnly:true},
];

const App = () => {
  const [user, setUser]       = useState(null);
  const [partner, setPartner] = useState(null);
  const [partners, setPartners] = useState([]);
  const [activeTab, setActiveTab] = useState('budget');
  const [sharingConfig, setSharingConfig] = useState({}); // { partnerUsername: { Finances:bool, ... } } — managed in Profile only
  const [viewConfig, setViewConfig] = useState({finances:true,calendar:true,budget:true,gym:true,meals:true,cycle:true}); // display toggle per tab
  const [error, setError] = useState('');

  const handleLogout = useCallback(()=>{
    localStorage.removeItem('user');
    window.location.href = '/legacy/login.html';
  },[]);

  useEffect(()=>{
    const stored = localStorage.getItem('user');
    if(stored){
      try {
        const u = JSON.parse(stored);
        // Coerce isAdmin to boolean in case server stored 0/1 integer
        u.isAdmin = !!(u.isAdmin || u.is_admin);
        setUser(u);
        axios.get(`${API}/get-access`,{params:{viewer:u.username,adminUsername:u.username}})
          .then(async({data})=>{
            if(data.success&&data.accessList?.length>0){
              const targets = data.accessList.filter(a=>a.viewer===u.username).map(a=>a.target);
              if(targets.length>0){
                // Load all partners' profiles
                const partnerProfiles = await Promise.all(targets.map(async t=>{
                  try {
                    const {data:pd}=await axios.get(`${API}/profile-pictures`,{params:{username:t}});
                    return {username:t,...pd,profilePicUrl:pd.profilePicUrl||DP,eventColor:pd.eventColor||'#448aff',
                            displayName:pd.displayName||(pd.firstName&&pd.lastName?`${pd.firstName} ${pd.lastName}`:null)||t,
                            firstName:pd.firstName||'',lastName:pd.lastName||''};
                  } catch {
                    return {username:t,displayName:t,eventColor:'#448aff',profilePicUrl:DP};
                  }
                }));
                // Primary partner = first; store all in partners array too
                setPartner(partnerProfiles[0]);
                if(partnerProfiles.length>1) setPartners(partnerProfiles);
                else setPartners(partnerProfiles);
              }
            }
          }).catch(()=>{});
        axios.get(`${API}/profile-pictures`,{params:{username:u.username}}).then(({data})=>{
          const dn=data.displayName||(data.firstName&&data.lastName?`${data.firstName} ${data.lastName}`:null)||u.username;
          const adminFlag = data.isAdmin!==undefined ? !!data.isAdmin : !!u.isAdmin;
          const {success:_s, ...profileData} = data;
          setUser(prev=>({
            ...prev,
            ...profileData,
            displayName:    dn,
            firstName:      data.firstName||prev.firstName||'',
            lastName:       data.lastName||prev.lastName||'',
            profilePicUrl:  data.profilePicUrl||prev.profilePicUrl||DP,
            isAdmin:        adminFlag,
            gender:         data.gender||prev.gender||'',
          }));
        }).catch(()=>{});
        // Load existing access links to pre-populate sharingConfig
        axios.get(`${API}/get-access`,{params:{viewer:u.username,adminUsername:u.username}}).then(({data})=>{
          if(data.success&&data.accessList?.length>0){
            const targets=data.accessList.filter(a=>a.viewer===u.username).map(a=>a.target);
            if(targets.length>0){
              // Default: all tabs enabled for all linked partners
              const defaultCfg={Finances:true,Calendar:true,Budget:true,Gym:true,Meals:true,Cycle:true};
              setSharingConfig(prev=>{
                const next={...prev};
                targets.forEach(t=>{ if(!next[t]) next[t]={...defaultCfg}; });
                return next;
              });
            }
          }
        }).catch(()=>{});
      } catch { setError('Invalid session'); }
    } else {
      window.location.href='/legacy/login.html';
    }
  },[]);

  if(error) return <div style={{padding:'40px',color:'var(--red)',fontFamily:"'DM Mono',monospace"}}>{error}</div>;
  if(!user) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--text3)',fontFamily:"'DM Mono',monospace",fontSize:'11px',letterSpacing:'0.14em'}}>LOADING...</div>;

  const TAB_COLORS = {budget:'#ffd600',finances:'#00e676',calendar:'#448aff',gym:'#ff3b3b',meals:'#d67bff',cycle:'#e91e8c',profile:'#b06aff'};
  const tabColor = TAB_COLORS[activeTab] || '#00e676';
  const TAB_KEY = {finances:'Finances',calendar:'Calendar',budget:'Budget',gym:'Gym',meals:'Meals',cycle:'Cycle'};
  const tabSharingKey = TAB_KEY[activeTab];

  // All linked partners
  const allPartners = partners.length > 0 ? partners : (partner ? [partner] : []);

  // Partners who HAVE permission for this tab (set in Profile sharing)
  const permittedPartners = allPartners.filter(p =>
    tabSharingKey && sharingConfig[p.username]?.[tabSharingKey]
  );

  // Partners whose data is CURRENTLY VISIBLE (permission ON and view toggle ON)
  const viewOn = viewConfig[activeTab] !== false; // default true
  const activePartners = viewOn ? permittedPartners : [];
  const isShared = activePartners.length > 0;

  // Toggle = view-only switch: shows/hides already-permitted partners
  // Does NOT change sharingConfig (permissions are managed in Profile only)
  const toggleShared = () => {
    if(permittedPartners.length === 0) return; // nothing permitted — button does nothing
    setViewConfig(prev => ({...prev, [activeTab]: !viewOn}));
  };

  const sharedProps = {user, partner, partners:allPartners, activePartners, permittedPartners, isShared, onToggleShared:toggleShared, tabColor, sharingConfig, setSharingConfig};

  // Cycle tab: show if user is female, OR if any partner is female and cycle sharing is on
  const userIsFemale = (user.gender||'').toLowerCase()==='female';
  const anyCycleFemale = allPartners.some(p=>
    (p.gender||'').toLowerCase()==='female' && sharingConfig[p.username]?.Cycle
  );
  const showCycle = userIsFemale || anyCycleFemale;
  const isAdmin = !!(user.isAdmin || user.is_admin); // handle int (1/0) or bool
  const visibleTabs = ALL_TABS.filter(t=>{
    if(t.adminOnly) return isAdmin;
    if(t.cycleOnly) return showCycle;
    return true;
  });

  return (
    <div className="app-shell">
      <div style={{flex:1,overflow:'hidden',minHeight:0}}>
        {activeTab==='finances'&&<FinancesPage {...sharedProps}/>}
        {activeTab==='calendar'&&<CalendarPage {...sharedProps}/>}
        {activeTab==='budget'  &&<BudgetPage   {...sharedProps}/>}
        {activeTab==='gym'     &&<GymPage      {...sharedProps}/>}
        {activeTab==='meals'   &&<MealsPage    {...sharedProps}/>}
        {activeTab==='cycle'   &&<CyclePage    {...sharedProps}/>}
        {activeTab==='profile' &&<ProfilePage  user={user} setUser={setUser} partner={partner} setPartner={setPartner} partners={partners} sharingConfig={sharingConfig} setSharingConfig={setSharingConfig} onLogout={handleLogout}/>}
        {activeTab==='admin'   &&isAdmin&&<AdminPage user={user} onLogout={handleLogout}/>}
      </div>
      <div className="bottom-tabs">
        {visibleTabs.map(t=>(
          <button key={t.id}
            className={`tab-btn ${activeTab===t.id?'active':''}`}
            style={{'--tab-color': t.color}}
            onClick={()=>setActiveTab(t.id)}>
            <span className="tab-icon">{Icons[t.id]}</span>
            <span className="tab-label">{t.label}</span>
          </button>
        ))}
        <button className="tab-btn-logout" onClick={handleLogout} title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:'7px',letterSpacing:'0.1em',textTransform:'uppercase'}}>OUT</span>
        </button>
      </div>
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
