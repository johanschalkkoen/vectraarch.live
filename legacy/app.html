<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Legacy"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>Legacy · Vectra Arch</title>
  <script src="/legacy/auth-guard.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/shared/legacy.css"/>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── CONSTANTS ── */
const API = '/legacy/api';
const DP = 'https://placehold.co/50x50/2a2d31/888?text=U';
const MONTHS = Array.from({length:12},(_,i)=>({v:(i+1).toString().padStart(2,'0'),l:new Date(2026,i,1).toLocaleString('default',{month:'long'})}));
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const fmtR = n => `R${parseFloat(n||0).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtDate = d => { if(!d)return'—'; const dt=new Date(d); return isNaN(dt)?'—':dt.toLocaleDateString('en-ZA',{year:'numeric',month:'2-digit',day:'2-digit'}); };
const fmtDateTime = d => { if(!d)return'—'; const dt=new Date(d); return isNaN(dt)?'—':dt.toLocaleString('en-ZA',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).replace(',',''); };
const now = () => { const n=new Date(); n.setMinutes(n.getMinutes()-n.getTimezoneOffset()); return n.toISOString().slice(0,19); };
const todayISO = () => new Date().toISOString().slice(0,10);

/* ── TAB ICONS (SVG inline) ── */
const Icons = {
  finances: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>,
  calendar: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  budget:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><rect x="2" y="3" width="8" height="8" rx="1"/><rect x="14" y="3" width="8" height="8" rx="1"/><rect x="2" y="13" width="8" height="8" rx="1"/><rect x="14" y="13" width="8" height="8" rx="1"/></svg>,
  gym:      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M6 4v16M18 4v16M2 9h4M18 9h4M2 15h4M18 15h4M6 12h12"/></svg>,
  meals:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>,
  cycle:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>,
  profile:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  search:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="14" height="14"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
  admin:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
};

/* ── SHARED COMPONENTS ── */
const UserRow = ({user, partner, isShared, onToggleShared}) => (
  <div className="user-row">
    <div className="user-chip">
      <img className="user-chip-avatar" src={user?.profilePicUrl||DP} alt={user?.username} style={{border:`2px solid ${user?.eventColor||'#e91e8c'}`}}/>
      <span className="user-chip-name">{user?.displayName||user?.username||'USER'}</span>
      <span className="user-chip-arrow">⌄</span>
    </div>
    {partner
      ? <button className={`badge-shared`} onClick={onToggleShared} style={!isShared?{background:'transparent',border:'1px solid rgba(255,255,255,0.12)',color:'var(--text3)'}:{}}>
          {isShared ? 'SHARED' : 'SOLO'}
        </button>
      : <span className="badge-solo">SOLO</span>
    }
    {partner && isShared && (
      <div className="partner-chip">
        <img className="partner-chip-avatar" src={partner?.profilePicUrl||DP} alt={partner?.username} style={{border:`2px solid ${partner?.eventColor||'#448aff'}`}}/>
        <span className="partner-chip-name">+ {partner?.displayName||partner?.username}</span>
      </div>
    )}
  </div>
);

const Alert = ({msg,type}) => msg ? <div className={`alert ${type||'ok'}`}>{msg}</div> : null;

/* ── FINANCES PAGE ── */
const FinancesPage = ({user, partner, isShared}) => {
  const [items, setItems] = useState([]);
  const [budgets, setBudgets] = useState([]);
  const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
  const [sortField, setSortField] = useState('date');
  const [search, setSearch] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({category:'',amount:'',type:'expense',date:now()});
  const [editId, setEditId] = useState(null);
  const [alert, setAlert] = useState({msg:'',type:''});

  const msg = (m,t='ok') => { setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const fetchAll = useCallback(async () => {
    const users = [user.username, ...(isShared&&partner?[partner.username]:[])];
    try {
      const [fins, buds] = await Promise.all([
        Promise.all(users.map(u=>axios.get(`${API}/financial`,{params:{user:u}}).then(r=>r.data).catch(()=>[]))).then(r=>r.flat()),
        Promise.all(users.map(u=>axios.get(`${API}/budget`,{params:{user:u}}).then(r=>r.data.map(b=>({...b,expenses:JSON.parse(b.expenses||'[]')}))).catch(()=>[]))).then(r=>r.flat())
      ]);
      setItems(fins); setBudgets(buds);
    } catch {}
  }, [user.username, partner, isShared]);

  useEffect(()=>{ fetchAll(); },[fetchAll]);

  const filtered = useMemo(()=>{
    const users = [user.username, ...(isShared&&partner?[partner.username]:[])];
    let list = items.filter(i=>users.includes(i.user||i.username)&&(i.date||'').slice(5,7)===selectedMonth);
    if(search) list = list.filter(i=>(i.category||'').toLowerCase().includes(search.toLowerCase()));
    return [...list].sort((a,b)=>sortField==='amount'?parseFloat(b.amount)-parseFloat(a.amount):new Date(b.date)-new Date(a.date));
  },[items,selectedMonth,search,sortField,user.username,partner,isShared]);

  const totals = useMemo(()=>{
    const inc = filtered.filter(i=>i.type==='income').reduce((s,i)=>s+parseFloat(i.amount||0),0);
    const exp = filtered.filter(i=>i.type==='expense').reduce((s,i)=>s+parseFloat(i.amount||0),0);
    return {inc,exp,net:inc-exp};
  },[filtered]);

  const handleSave = async () => {
    if(!form.category||!form.amount){msg('Fill all fields.','err');return;}
    try {
      if(editId){
        await axios.put(`${API}/financial/${editId}`,{user:user.username,category:form.category,amount:parseFloat(form.amount),type:form.type,date:form.date});
        msg('Updated.');
      } else {
        await axios.post(`${API}/financial`,{user:user.username,category:form.category,amount:parseFloat(form.amount),type:form.type,date:form.date});
        msg('Saved.');
      }
      setShowForm(false);setEditId(null);setForm({category:'',amount:'',type:'expense',date:now()});fetchAll();
    } catch { msg('Error.','err'); }
  };
  const handleDelete = async(id)=>{
    if(!confirm('Delete this transaction?')) return;
    try { await axios.delete(`${API}/financial/${id}`); msg('Deleted.'); fetchAll(); } catch { msg('Error.','err'); }
  };
  const startEdit = (item) => {
    setForm({category:item.category||'',amount:String(item.amount||''),type:item.type||'expense',date:(item.date||now()).slice(0,19)});
    setEditId(item.id); setShowForm(true);
  };

  const monthLabel = MONTHS.find(m=>m.v===selectedMonth)?.l||'';
  const isShared2 = isShared && partner;

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · FINANCIAL</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">FINANCES</div>
            <div className="page-sub">{isShared2?'COMBINED HOUSEHOLD TOTALS':'INCOME · EXPENSES · NET TOTAL'}</div>
          </div>
          <UserRow user={user} partner={partner} isShared={isShared}/>
          <div className="toolbar-row">
            <div className="tb-chip">
              <span style={{fontSize:'9px',fontFamily:"'DM Mono',monospace",letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text3)'}}>MONTH</span>
              <select value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
                {MONTHS.map(m=><option key={m.v} value={m.v}>{m.l} 2026</option>)}
              </select>
            </div>
            <div className={`tb-chip ${sortField==='date'?'sort-active':''}`} onClick={()=>setSortField('date')} style={{cursor:'pointer'}}>
              <span style={{fontSize:'9px',fontFamily:"'DM Mono',monospace",letterSpacing:'0.1em',textTransform:'uppercase'}}>SORT</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:'10px'}}>Date</span>
            </div>
          </div>
          <div className="search-bar">
            {Icons.search}
            <input placeholder="SEARCH TRANSACTIONS..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <Alert {...alert}/>

          {/* Summary */}
          <div className="section-label">§ SUMMARY · {monthLabel.toUpperCase()} 2026</div>
          <div className="summary-card">
            <div className="summary-grid">
              <div>
                <div className="summary-item-label">Income</div>
                <div className={`summary-item-value income`}>{fmtR(totals.inc)}</div>
              </div>
              <div>
                <div className="summary-item-label">Expenses</div>
                <div className="summary-item-value expense">{fmtR(totals.exp)}</div>
              </div>
              <div>
                <div className="summary-item-label">Net</div>
                <div className={`summary-item-value ${totals.net>=0?'net-pos':'net-neg'}`}>{fmtR(totals.net)}</div>
              </div>
            </div>
          </div>

          {/* Items */}
          <div className="section-label">§ ITEMS · {filtered.length} RECORDS</div>
          <div className="item-list">
            {filtered.map(item=>(
              <div key={item.id} className="item-card">
                <img className="item-avatar" src={item.user===user.username?(user.profilePicUrl||DP):(partner?.profilePicUrl||DP)} alt="" style={{border:`2px solid ${item.user===user.username?(user.eventColor||'#e91e8c'):(partner?.eventColor||'#448aff')}`}}/>
                <div className="item-body">
                  <div className="item-title">
                    <span className={`item-tag ${item.user===user.username?(user.username==='jane'?'jane':'joe'):'joe'}`}>{(item.user||'').toUpperCase().slice(0,4)}</span>
                    {(item.category||'').toUpperCase()}
                  </div>
                  <div className="item-sub">{fmtDate(item.date)} · {item.type}</div>
                </div>
                <div className={`item-amount ${item.type}`}>{fmtR(item.amount)}</div>
                {item.user===user.username&&(
                  <div style={{display:'flex',flexDirection:'column',gap:4,marginLeft:8}}>
                    <button onClick={()=>startEdit(item)} style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'var(--blue)',border:'1px solid rgba(68,138,255,0.3)',borderRadius:3,padding:'3px 7px',background:'transparent',cursor:'pointer',letterSpacing:'0.1em'}}>EDIT</button>
                    <button onClick={()=>handleDelete(item.id)} style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'var(--red)',border:'1px solid rgba(255,61,61,0.3)',borderRadius:3,padding:'3px 7px',background:'transparent',cursor:'pointer',letterSpacing:'0.1em'}}>DEL</button>
                  </div>
                )}
              </div>
            ))}
          </div>
          {filtered.length===0&&<div className="no-events"><div className="no-events-text">No transactions for {monthLabel}</div></div>}
        </div>
      </div>
      <button className="fab" onClick={()=>setShowForm(true)}>+ ADD ITEM</button>

      {showForm&&(
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">{editId?"Edit Transaction":"Add Transaction"}</div>
            <div className="form-field">
              <label className="form-label">Category</label>
              <input className="form-input" placeholder="e.g. Groceries" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Amount (ZAR)</label>
              <input className="form-input" type="number" placeholder="0.00" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Type</label>
              <div className="type-toggle">
                {['income','expense'].map(t=><button key={t} className={`type-toggle-btn ${form.type===t?'active':''}`} onClick={()=>setForm(p=>({...p,type:t}))}>{t.toUpperCase()}</button>)}
              </div>
            </div>
            <div className="form-field">
              <label className="form-label">Date</label>
              <input className="form-input" type="datetime-local" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} step="1"/>
            </div>
            <button className="form-submit" onClick={handleSave}>{editId?'UPDATE':'SAVE'}</button>
            <button className="form-cancel" onClick={()=>{setShowForm(false);setEditId(null);setForm({category:'',amount:'',type:'expense',date:now()});}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── CALENDAR PAGE ── */
const CalendarPage = ({user, partner, isShared}) => {
  const [events, setEvents] = useState([]);
  const [viewDate, setViewDate] = useState(new Date());
  const [selectedDay, setSelectedDay] = useState(new Date());
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({title:'',date:now(),type:'personal',color:'#448aff'});
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [alert, setAlert] = useState({msg:'',type:''});

  const msg = (m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const fetchEvents = useCallback(async()=>{
    const users=[user.username,...(isShared&&partner?[partner.username]:[])];
    try {
      const [calAll, periodAll] = await Promise.all([
        Promise.all(users.map(u=>axios.get(`${API}/calendar`,{params:{user:u}}).then(r=>r.data).catch(()=>[]))).then(r=>r.flat()),
        Promise.all(users.map(u=>axios.get(`${API}/period`,{params:{user:u}}).then(r=>r.data).catch(()=>[]))).then(r=>r.flat())
      ]);
      // Convert period cycles into calendar dot events
      const cycleEvents = [];
      periodAll.forEach(c=>{
        if(!c.startDate) return;
        const start = new Date(c.startDate);
        const end = c.endDate ? new Date(c.endDate) : new Date(start.getTime()+4*86400000);
        const len = parseInt(c.cycleLength)||28;
        // Mark each day of bleeding as a cycle dot
        for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
          cycleEvents.push({id:`cycle-${c.id}-${d.toISOString().slice(0,10)}`,title:'Period',date:d.toISOString().slice(0,10)+'T00:00:00',isCycle:true,user:c.user});
        }
        // Mark fertile window: ovulation ~14 days before next period, fertile 5 days around it
        const nextStart = new Date(start.getTime()+len*86400000);
        const ovulation = new Date(nextStart.getTime()-14*86400000);
        for(let i=-2; i<=3; i++){
          const fd = new Date(ovulation.getTime()+i*86400000);
          cycleEvents.push({id:`fertile-${c.id}-${fd.toISOString().slice(0,10)}`,title:'Fertile',date:fd.toISOString().slice(0,10)+'T00:00:00',isFertile:true,user:c.user});
        }
      });
      setEvents([...calAll, ...cycleEvents]);
    } catch {}
  },[user.username,partner,isShared]);

  useEffect(()=>{ fetchEvents(); },[fetchEvents]);

  const daysInMonth = useMemo(()=>{
    const year=viewDate.getFullYear(), month=viewDate.getMonth();
    const first=new Date(year,month,1);
    const last=new Date(year,month+1,0);
    const days=[];
    // pad start (Monday=0)
    let dow=(first.getDay()+6)%7;
    for(let i=0;i<dow;i++) days.push({date:new Date(year,month,1-dow+i),otherMonth:true});
    for(let d=1;d<=last.getDate();d++) days.push({date:new Date(year,month,d),otherMonth:false});
    // pad end
    const rem=7-(days.length%7); if(rem<7) for(let i=1;i<=rem;i++) days.push({date:new Date(year,month+1,i),otherMonth:true});
    return days;
  },[viewDate]);

  const getEventsForDay = (date) => events.filter(e=>{
    if(!e.date) return false;
    const d=new Date(e.date);
    return d.getFullYear()===date.getFullYear()&&d.getMonth()===date.getMonth()&&d.getDate()===date.getDate();
  });

  const selectedEvents = useMemo(()=>getEventsForDay(selectedDay),[selectedDay,events]);

  const eventType = e => {
    if(e.financial) return 'fin';
    if((e.title||'').toLowerCase().includes('work')||e.eventCategory==='work') return 'work';
    if(e.isCycle||e.eventCategory==='cycle'||(e.title||'').toLowerCase().includes('cycle')||(e.title||'').toLowerCase().includes('period')) return 'cycle';
    if(e.isFertile||e.eventCategory==='fertile') return 'fertile';
    return 'personal';
  };

  const handleSave = async()=>{
    if(!form.title||!form.date){msg('Title and date required.','err');return;}
    try {
      await axios.post(`${API}/calendar`,{user:user.username,title:form.title,date:form.date,financial:false,eventColor:form.color,type:form.type});
      msg('Event added.');setShowForm(false);setForm({title:'',date:now(),type:'personal',color:'#448aff'});fetchEvents();
    } catch { msg('Error.','err'); }
  };
  const handleDeleteEvent = async(id)=>{
    if(!confirm('Delete this event?')) return;
    try { await axios.delete(`${API}/calendar/${id}`); msg('Deleted.'); setSelectedEvent(null); fetchEvents(); } catch { msg('Error.','err'); }
  };

  const prevMonth=()=>setViewDate(d=>new Date(d.getFullYear(),d.getMonth()-1,1));
  const nextMonth=()=>setViewDate(d=>new Date(d.getFullYear(),d.getMonth()+1,1));
  const goToday=()=>{const t=new Date();setViewDate(t);setSelectedDay(t);};
  const monthLabel=viewDate.toLocaleString('default',{month:'long'}).toUpperCase();
  const selLabel=selectedDay.toISOString().slice(0,10);

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · CALENDAR</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">CALENDAR</div>
            <div className="page-sub">EVENTS · CYCLE · SCHEDULE</div>
          </div>
          <UserRow user={user} partner={partner} isShared={isShared}/>
          <Alert {...alert}/>

          {/* Nav */}
          <div className="cal-nav">
            <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
            <div className="cal-nav-month">{monthLabel} {viewDate.getFullYear()}</div>
            <button className="cal-nav-btn" onClick={nextMonth}>›</button>
            <button className="cal-today-btn" onClick={goToday}>TODAY</button>
          </div>

          {/* Grid */}
          <div className="cal-grid">
            {['MON','TUE','WED','THU','FRI','SAT','SUN'].map(d=><div key={d} className="cal-dow">{d}</div>)}
            {daysInMonth.map((item,i)=>{
              const isToday=item.date.toDateString()===new Date().toDateString();
              const isSelected=item.date.toDateString()===selectedDay.toDateString();
              const dayEvts=getEventsForDay(item.date);
              return (
                {(() => {
                  const hasCycle   = dayEvts.some(e => e.isCycle);
                  const hasFertile = dayEvts.some(e => e.isFertile);
                  const realEvts   = dayEvts.filter(e => !e.isCycle && !e.isFertile);
                  const bgStyle    = hasCycle   ? {background:'rgba(233,30,140,0.35)'}
                                   : hasFertile ? {background:'rgba(29,233,182,0.12)'} : {};
                  const numStyle   = hasCycle   ? {color:'#fff',fontWeight:700} : {};
                  return (
                    <div key={i}
                      className={`cal-day${item.otherMonth?' other-month':''}${isToday&&!hasCycle?' today':''}${isSelected?' selected':''}`}
                      style={{...bgStyle,cursor:'pointer'}}
                      onClick={() => setSelectedDay(item.date)}>
                      <div className="cal-day-num" style={numStyle}>{item.date.getDate()}</div>
                      {(realEvts.length > 0 || hasFertile) && (
                        <div className="cal-day-dots">
                          {realEvts.slice(0,3).map((e,j) => (
                            <div key={j} className="cal-dot" style={{background: e.eventColor || 'var(--yellow)'}}/>

  const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const fetchAll = useCallback(async()=>{
    const users=[user.username,...(isShared&&partner?[partner.username]:[])];
    try {
      const [buds,fins]=await Promise.all([
        Promise.all(users.map(u=>axios.get(`${API}/budget`,{params:{user:u}}).then(r=>r.data.map(b=>({...b,expenses:JSON.parse(b.expenses||'[]'),user:b.username||u}))).catch(()=>[]))).then(r=>r.flat()),

    } catch {}

  useEffect(()=>{ fetchAll(); },[fetchAll]);

  const filteredBudgets = useMemo(()=>budgets.filter(b=>(b.date||'').slice(5,7)===selectedMonth),[budgets,selectedMonth]);

  const totalPlanned = filteredBudgets.reduce((s,b)=>s+b.expenses.reduce((ss,e)=>ss+parseFloat(e.amount||0),0),0);

            <div className="sort-active tb-chip" style={{cursor:'default'}}>

          {/* Summary */}
          <div className="section-label">§ SUMMARY · {monthLabel.toUpperCase()} 2026</div>
          <div className="summary-card">
            <div className="summary-grid">
              <div>
                <div className="summary-item-label">Planned</div>
                <div className="summary-item-value" style={{color:'var(--green)'}}>{fmtR(totalPlanned)}</div>
              </div>
              <div>
                <div className="summary-item-label">Actual</div>

          {filteredBudgets.map(b=>{
            const planned = b.expenses.reduce((s,e)=>s+parseFloat(e.amount||0),0);

// Gym type detection (works on any exercise name)
const gymIsCardio = ex => ['run','bike','cycle','swim','treadmill','elliptical','row','stair','sprint','jog','walk','hike','trail','cardio','hiit','spin'].some(k=>(ex||'').toLowerCase().includes(k));
const gymIsMobility = ex => ['yoga','stretch','pilates','mobility','foam','roll','flexibility'].some(k=>(ex||'').toLowerCase().includes(k));
const gymGetType = ex => gymIsMobility(ex)?'mobility':gymIsCardio(ex)?'cardio':'strength';

const gymFormatDetail = w => {
  const reps=String(w.reps||''), weight=String(w.weight||'');
  if(gymIsCardio(w.exercise)) return `${reps} min · ${weight} km`;
  if(gymIsMobility(w.exercise)) return `${reps} min · ${weight}`;
  const sets=parseInt(w.sets)||1;
  if(sets>1&&reps.includes(',')&&weight.includes(',')) {
    const ra=reps.split(',').map(r=>r.trim()), wa=weight.split(',').map(x=>x.trim());
    if(ra.length===sets&&wa.length===sets) return ra.map((r,i)=>`${r} reps @ ${wa[i]} kg`).join(' · ');
  }
  return `${sets} × ${reps} reps @ ${weight} kg`;
};

const MEAL_TYPE_MAP = {'Breakfast':'breakfast','Lunch':'lunch','Dinner':'dinner','Snack':'snack','Meal 1':'breakfast','Meal 2':'lunch','Meal 3':'dinner','Pre-Workout':'snack','Post-Workout':'snack'};


const MealsPage = ({user, partner, isShared}) => {
  const [meals, setMeals] = useState([]);
  const [mealTemplates, setMealTemplates] = useState([]);
  const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
  const [typeFilter, setTypeFilter] = useState('All');
  const [showForm, setShowForm] = useState(false);
  const [isCustomMeal, setIsCustomMeal] = useState(false);
  const [form, setForm] = useState({name:'',mealType:'breakfast',calories:'',note:'',date:now()});
  const [alert, setAlert] = useState({msg:'',type:''});
  const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  // Load meal templates from DB
  useEffect(()=>{
    axios.get(`${API}/meal-templates`).then(r=>{
      if(r.data.success) setMealTemplates(r.data.data);
    }).catch(()=>{});
  },[]);

  const fetchMeals = useCallback(async()=>{
    const users=[user.username,...(isShared&&partner?[partner.username]:[])];
    try {
      const all=await Promise.all(users.map(u=>axios.get(`${API}/mealplan`,{params:{user:u}}).then(r=>r.data.map(m=>({...m,userKey:u}))).catch(()=>[])));
      setMeals(all.flat());
    } catch {}
  },[user.username,partner,isShared]);

  useEffect(()=>{ fetchMeals(); },[fetchMeals]);

  const filtered = useMemo(()=>{
    const users=[user.username,...(isShared&&partner?[partner.username]:[])];
    let list = meals.filter(m=>users.includes(m.userKey)&&(m.date||'').slice(5,7)===selectedMonth);
    if(typeFilter!=='All') list=list.filter(m=>(m.mealType||'').toLowerCase()===typeFilter.toLowerCase());
    return list;
  },[meals,selectedMonth,typeFilter,user.username,partner,isShared]);

  // Real calorie total from DB; estimate macros
  const totals = useMemo(()=>{
    const cal=filtered.reduce((s,m)=>s+parseFloat(m.calories||0),0);
    return {cal:Math.round(cal), prot:Math.round(cal*0.08), carb:Math.round(cal*0.05), fat:Math.round(cal*0.028)};
  },[filtered]);

  const handleMealSelect = (val) => {
    if(val==='__custom__'){ setIsCustomMeal(true); setForm(p=>({...p,name:'',calories:''})); return; }
    setIsCustomMeal(false);
    const allOpts = mealTemplates.flatMap(g=>g.options);
    const opt = allOpts.find(o=>o.value===val);
    if(!opt) return;
    const labelParts = (opt.label||'').split(':');
    const mTypeStr = labelParts[0]?.trim()||'';
    const mt = MEAL_TYPE_MAP[mTypeStr]||form.mealType;
    setForm(p=>({...p, name:val, calories:String(opt.cal||''), mealType:mt}));
  };

  const handleSave = async()=>{
    if(!form.name||!form.calories){msg('Name and calories required.','err');return;}
    try {
      await axios.post(`${API}/mealplan`,{
        user:user.username,
        day:new Date(form.date).toLocaleString('en-US',{weekday:'long'}),
        mealType:form.mealType,
        description:form.name,
        calories:parseFloat(form.calories)||0,
        date:form.date
      });
      msg('Meal saved.');setShowForm(false);
      setForm({name:'',mealType:'breakfast',calories:'',note:'',date:now()});
      setIsCustomMeal(false); fetchMeals();
    } catch { msg('Error saving.','err'); }
  };

  const handleDelete = async(id)=>{
    try { await axios.delete(`${API}/mealplan/${id}`); fetchMeals(); } catch {}
  };

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · NUTRITION</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">MEAL PLAN</div>
            <div className="page-sub">MACROS · DAILY FOOD LOG</div>
          </div>
          <UserRow user={user} partner={partner} isShared={isShared}/>
          <div className="toolbar-row">
            <div className="tb-chip">
              <span style={{fontSize:'9px',fontFamily:"'DM Mono',monospace",letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text3)'}}>MONTH</span>
              <select value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)} style={{color:'var(--pink)'}}>
                {MONTHS.map(m=><option key={m.v} value={m.v}>{m.l}</option>)}
              </select>
            </div>
            <div className="tb-chip">
              <span style={{fontSize:'9px',fontFamily:"'DM Mono',monospace",letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text3)'}}>TYPE</span>
              <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)} style={{color:'var(--green)'}}>
                {['All','Breakfast','Lunch','Dinner','Snack'].map(tp=><option key={tp}>{tp}</option>)}
              </select>
            </div>
          </div>
          <Alert {...alert}/>

          <div className="section-label">§ TODAY'S MACROS</div>
          <div className="macro-grid">
            <div className="macro-card kcal"><div className="macro-value">{totals.cal}</div><div className="macro-unit">kcal · CAL</div></div>
            <div className="macro-card prot"><div className="macro-value">{totals.prot}</div><div className="macro-unit">g · PROT</div></div>
            <div className="macro-card carb"><div className="macro-value">{totals.carb}</div><div className="macro-unit">g · CARB</div></div>
            <div className="macro-card fat" ><div className="macro-value">{totals.fat}</div><div className="macro-unit">g · FAT</div></div>
          </div>

          <div className="section-label">§ MEALS · {filtered.length} RECORDS</div>
          {filtered.map(m=>{
            const cal=parseFloat(m.calories)||0;
            const desc=m.description||m.name||'Unknown';
            return (
              <div key={m.id} className="meal-card">
                <div className="meal-top">
                  <img className="meal-avatar" src={m.userKey===user.username?(user.profilePicUrl||DP):(partner?.profilePicUrl||DP)} alt="" style={{border:`2px solid ${m.userKey===user.username?(user.eventColor||'#e91e8c'):(partner?.eventColor||'#448aff')}`}}/>
                  <span className={`meal-type-badge ${m.mealType||'breakfast'}`}>{(m.mealType||'breakfast').toUpperCase()}</span>
                  <div className="meal-name">{desc.toUpperCase()}</div>
                </div>
                <div className="meal-macros">
                  <span className="macro-badge kcal">{Math.round(cal)} kcal</span>
                  <span className="macro-badge prot">P {Math.round(cal*0.08)}g</span>
                  <span className="macro-badge carb">C {Math.round(cal*0.05)}g</span>
                  <span className="macro-badge fat">F {Math.round(cal*0.028)}g</span>
                </div>
                {m.description&&<div className="meal-note">· {m.description}</div>}
                {m.userKey===user.username&&(
                  <button style={{marginTop:'8px',fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'var(--red)',background:'transparent',border:'none',cursor:'pointer',textTransform:'uppercase',letterSpacing:'0.1em'}} onClick={()=>handleDelete(m.id)}>✕ Remove</button>
                )}
              </div>
            );
          })}
          {filtered.length===0&&<div className="no-events"><div className="no-events-icon">🍽️</div><div className="no-events-text">NO MEALS LOGGED</div></div>}
          <div style={{height:'80px'}}/>
        </div>
      </div>
      <button className="fab green" onClick={()=>setShowForm(true)}>+ ADD MEAL</button>

      {showForm&&(
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">Log Meal</div>
            <div className="form-field">
              <label className="form-label">Select Meal Template</label>
              <select className="form-select" value={isCustomMeal?'__custom__':form.name} onChange={e=>handleMealSelect(e.target.value)}>
                <option value="">— Choose a meal —</option>
                {mealTemplates.map(group=>(
                  <optgroup key={group.label} label={group.label}>
                    {group.options.map(opt=><option key={opt.value} value={opt.value}>{opt.label}</option>)}
                  </optgroup>
                ))}
                <option value="__custom__">Custom meal...</option>
              </select>
            </div>
            {isCustomMeal&&(
              <div className="form-field">
                <label className="form-label">Meal Name</label>
                <input className="form-input" placeholder="e.g. Overnight Oats" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
              </div>
            )}
            <div className="form-field">
              <label className="form-label">Meal Type</label>
              <div className="type-toggle">
                {['breakfast','lunch','dinner','snack'].map(tp=>(
                  <button key={tp} className={`type-toggle-btn ${form.mealType===tp?'active':''}`} onClick={()=>setForm(p=>({...p,mealType:tp}))}>{tp.toUpperCase()}</button>
                ))}
              </div>
            </div>
            <div className="form-field">
              <label className="form-label">Calories (kcal)</label>
              <input className="form-input" type="number" placeholder="e.g. 380" value={form.calories} onChange={e=>setForm(p=>({...p,calories:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Date & Time</label>
              <input className="form-input" type="datetime-local" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} step="1"/>
            </div>
            <button className="form-submit" style={{background:'var(--green)',color:'#000'}} onClick={handleSave}>SAVE MEAL</button>
            <button className="form-cancel" onClick={()=>{setShowForm(false);setIsCustomMeal(false);}}>Cancel</button>
          </div>
        </div>

  );

/* ── CYCLE PAGE ── */
const CyclePage = ({user, partner, isShared}) => {
  const [cycles, setCycles] = useState([]);
  const [viewDate, setViewDate] = useState(new Date());
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({startDate:todayISO(),endDate:'',cycleLength:'28',symptoms:[],date:now()});
  const [alert, setAlert] = useState({msg:'',type:''});

  const SYMPTOMS=['Nausea','Pain','Cramps','Headache','Bloating','Mood swings','Fatigue'];
  const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const fetchCycles = useCallback(async()=>{
    try {
      const {data}=await axios.get(`${API}/period`,{params:{user:user.username}});
      setCycles(Array.isArray(data)?data:[]);
    } catch {}
  },[user.username]);

  useEffect(()=>{ fetchCycles(); },[fetchCycles]);

  // Stats from most recent cycle
  const latestCycle = useMemo(()=>[...cycles].sort((a,b)=>new Date(b.startDate)-new Date(a.startDate))[0],[cycles]);
  const avgLen = useMemo(()=>cycles.length?Math.round(cycles.reduce((s,c)=>s+(parseInt(c.cycleLength)||28),0)/cycles.length):28,[cycles]);

  const nextPeriod = useMemo(()=>{
    if(!latestCycle) return null;
    const d=new Date(latestCycle.startDate);
    d.setDate(d.getDate()+avgLen);
    return d;
  },[latestCycle,avgLen]);

  const fertileStart = useMemo(()=>{
    if(!nextPeriod) return null;
    const d=new Date(nextPeriod);
    d.setDate(d.getDate()-(avgLen-14)-3);
    return d;
  },[nextPeriod,avgLen]);

  const fertileEnd = useMemo(()=>{
    if(!fertileStart) return null;
    const d=new Date(fertileStart);
    d.setDate(d.getDate()+5);
    return d;
  },[fertileStart]);

  // Phase wheel SVG — matches screenshot exactly
  const PhaseWheel = ({dayOfCycle=4, cycleLength=28}) => {
    const SIZE=280, cx=140, cy=140, outerR=110, innerR=68, numR=outerR+16;
    const phases=[
      {name:'Menstrual', days:5,  color:'#e91e8c'},
      {name:'Follicular',days:7,  color:'#1de9b6'},
      {name:'Ovulation', days:3,  color:'#ffd600'},
      {name:'Luteal',    days:Math.max(cycleLength-15,1), color:'#ff9800'}
    ];
    const total=phases.reduce((s,p)=>s+p.days,0);
    const segments=[]; let angle=-Math.PI/2;
    phases.forEach(p=>{
      const span=(p.days/total)*2*Math.PI;
      segments.push({...p,startAngle:angle,endAngle:angle+span});
      angle+=span;
    });
    const donutArc=(sa,ea)=>{
      const gap=0.018;
      const s=sa+gap, e=ea-gap;
      const x1=cx+outerR*Math.cos(s), y1=cy+outerR*Math.sin(s);
      const x2=cx+outerR*Math.cos(e), y2=cy+outerR*Math.sin(e);
      const ix1=cx+innerR*Math.cos(e), iy1=cy+innerR*Math.sin(e);
      const ix2=cx+innerR*Math.cos(s), iy2=cy+innerR*Math.sin(s);
      const lg=(e-s)>Math.PI?1:0;
      return `M${x1},${y1} A${outerR},${outerR},0,${lg},1,${x2},${y2} L${ix1},${iy1} A${innerR},${innerR},0,${lg},0,${ix2},${iy2} Z`;
    };
    // Day numbers around the outside ring
    const dayNums=[];
    for(let d=1;d<=total;d++){
      const a=-Math.PI/2+(((d-0.5)/total)*2*Math.PI);
      dayNums.push({d, x:cx+numR*Math.cos(a), y:cy+numR*Math.sin(a)});
    }
    // Current day bubble
    const curA=-Math.PI/2+((dayOfCycle-0.5)/total)*2*Math.PI;
    const curX=cx+numR*Math.cos(curA), curY=cy+numR*Math.sin(curA);
    // Phase label
    const phase=dayOfCycle<=5?'MENSTRUAL PHASE':dayOfCycle<=12?'FOLLICULAR PHASE':dayOfCycle<=15?'OVULATION PHASE':'LUTEAL PHASE';
    return (
      <svg width={SIZE} height={SIZE} viewBox={`0 0 ${SIZE} ${SIZE}`} style={{overflow:'visible'}}>
        {segments.map((seg,i)=>(
          <path key={i} d={donutArc(seg.startAngle,seg.endAngle)} fill={seg.color} opacity="0.9"/>
        ))}
        {/* Day numbers ring */}
        {dayNums.map(({d,x,y})=>(
          d!==dayOfCycle&&<text key={d} x={x} y={y} textAnchor="middle" dominantBaseline="middle"
            fill="rgba(255,255,255,0.45)" fontFamily="'DM Mono',monospace" fontSize="7">{d}</text>
        ))}
        {/* Center */}
        <circle cx={cx} cy={cy} r={innerR-2} fill="#0d0e10"/>
        <text x={cx} y={cy-12} textAnchor="middle" fill="#f0f0f0" fontFamily="'Barlow Condensed',sans-serif" fontWeight="800" fontSize="22" letterSpacing="0.04em">DAY {dayOfCycle}</text>
        <text x={cx} y={cy+8} textAnchor="middle" fill="#5a5f65" fontFamily="'DM Mono',monospace" fontSize="7" letterSpacing="0.1em">{phase}</text>
        {/* Current day indicator bubble */}
        <circle cx={curX} cy={curY} r="12" fill="white"/>
        <text x={curX} y={curY+1} textAnchor="middle" dominantBaseline="middle"
          fill="#0d0e10" fontFamily="'DM Mono',monospace" fontWeight="700" fontSize="8">{dayOfCycle}</text>
      </svg>
    );
  };

  const dayOfCycle = useMemo(()=>{
    if(!latestCycle) return 1;
    const diff=Math.floor((new Date()-new Date(latestCycle.startDate))/86400000)+1;
    return Math.max(1,Math.min(diff,avgLen));
  },[latestCycle,avgLen]);

  const [editCycleId, setEditCycleId] = useState(null);
  const handleSave = async()=>{
    try {
      if(editCycleId){
        await axios.delete(`${API}/period/${editCycleId}`);
      }
      await axios.post(`${API}/period`,{user:user.username,startDate:form.startDate,endDate:form.endDate||null,cycleLength:parseInt(form.cycleLength)||28,symptoms:form.symptoms.join(','),date:form.date});
      msg(editCycleId?'Cycle updated.':'Cycle logged.');setShowForm(false);setEditCycleId(null);fetchCycles();
    } catch { msg('Error.','err'); }
  };
  const handleDeleteCycle = async(id)=>{
    if(!confirm('Delete this cycle record?')) return;
    try { await axios.delete(`${API}/period/${id}`); msg('Deleted.'); fetchCycles(); } catch { msg('Error.','err'); }
  };
  const startEditCycle = (c) => {
    setForm({startDate:(c.startDate||'').slice(0,10),endDate:(c.endDate||'').slice(0,10),cycleLength:String(c.cycleLength||28),symptoms:c.symptoms?c.symptoms.split(',').filter(Boolean):[],date:now()});
    setEditCycleId(c.id); setShowForm(true);
  };

  const prevDay=()=>setViewDate(d=>{const n=new Date(d);n.setDate(n.getDate()-1);return n;});
  const nextDay=()=>setViewDate(d=>{const n=new Date(d);n.setDate(n.getDate()+1);return n;});
  const goToday=()=>setViewDate(new Date());
  const viewLabel=viewDate.toLocaleDateString('en-ZA',{weekday:'short',day:'2-digit',month:'long',year:'numeric'}).toUpperCase();

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · HEALTH</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">CYCLE TRACKER</div>
            <div className="page-sub">PERIOD · OVULATION · FERTILITY</div>
          </div>
          <UserRow user={user} partner={partner} isShared={isShared}/>
          <Alert {...alert}/>

          {/* Stats */}
          {latestCycle&&(
            <div className="cycle-stats-card">
              <div className="cycle-stats-grid">
                <div>
                  <div className="cycle-stat-label">Last Start</div>
                  <div className="cycle-stat-value start">{fmtDate(latestCycle.startDate)}</div>
                </div>
                <div>
                  <div className="cycle-stat-label">Next Period</div>
                  <div className="cycle-stat-value next">{nextPeriod?fmtDate(nextPeriod.toISOString()):'—'}</div>
                </div>
                <div>
                  <div className="cycle-stat-label">Fertile</div>
                  <div className="cycle-stat-value fertile">{fertileStart&&fertileEnd?`${fertileStart.toLocaleDateString('en-ZA',{month:'short',day:'numeric'})} - ${fertileEnd.toLocaleDateString('en-ZA',{month:'short',day:'numeric'})}`:'—'}</div>
                </div>
              </div>
            </div>
          )}

          {/* Date nav */}
          <div className="cycle-date-nav">
            <button className="cal-nav-btn" onClick={prevDay}>‹</button>
            <div className="cycle-date-label">
              <span>📅</span>
              <span>{viewLabel}</span>
            </div>
            <button className="cal-nav-btn" onClick={nextDay}>›</button>
            <button className="cycle-today-btn" onClick={goToday}>TODAY</button>
          </div>

          {/* Phase wheel */}
          <div className="section-label">§ PHASE WHEEL · DAY {dayOfCycle} OF {avgLen}</div>
          <div className="phase-wheel-wrap">
            <PhaseWheel dayOfCycle={dayOfCycle} cycleLength={avgLen}/>
            <div className="phase-legend">
              {[['#e91e8c','MENSTRUAL · 1-5'],['#1de9b6','FOLLICULAR · 6-12'],['#ffd600','OVULATION · 13-15'],['#ff6d00',`LUTEAL · 16-${avgLen}`]].map(([c,l])=>(
                <div key={l} className="phase-legend-item"><div className="phase-legend-dot" style={{background:c}}/>{l}</div>
              ))}
            </div>
          </div>

          {/* Cycles */}
          <div className="section-label">§ CYCLES · {cycles.length} RECORD{cycles.length!==1?'S':''}</div>
          {cycles.map(c=>(
            <div key={c.id} className="cycle-record-card">
              <div className="cycle-record-start">
                <span className="cycle-record-icon">🔴</span>
                START: {fmtDate(c.startDate).toUpperCase()}
              </div>
              <div className="cycle-record-grid">
                <div>
                  <div className="cycle-record-label">End</div>
                  <div className="cycle-record-value">{fmtDate(c.endDate)||'—'}</div>
                </div>
                <div>
                  <div className="cycle-record-label">Length</div>
                  <div className="cycle-record-value">{c.cycleLength}d</div>
                </div>
                <div>
                  <div className="cycle-record-label">Duration</div>
                  <div className="cycle-record-value">{c.endDate?Math.floor((new Date(c.endDate)-new Date(c.startDate))/86400000)+'d':'—'}</div>
                </div>
              </div>
              {c.symptoms&&c.symptoms.length>0&&(
                <div className="symptom-tags">
                  {c.symptoms.split(',').filter(Boolean).map(s=>(
                    <span key={s} className="symptom-tag">§ {s.trim()}</span>
                  ))}
                </div>
              )}
            </div>
          ))}
          {cycles.length===0&&<div className="no-events"><div className="no-events-text">No cycles logged</div></div>}
          <div style={{height:'80px'}}/>
        </div>
      </div>
      <button className="fab" style={{background:'var(--pink)'}} onClick={()=>setShowForm(true)}>+ ADD CYCLE</button>

      {showForm&&(
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">{editCycleId?'Edit Cycle':'Log Cycle'}</div>
            <div className="form-field">
              <label className="form-label">Start Date</label>
              <input className="form-input" type="date" value={form.startDate} onChange={e=>setForm(p=>({...p,startDate:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">End Date (optional)</label>
              <input className="form-input" type="date" value={form.endDate} onChange={e=>setForm(p=>({...p,endDate:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Cycle Length (days)</label>
              <input className="form-input" type="number" value={form.cycleLength} onChange={e=>setForm(p=>({...p,cycleLength:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Symptoms</label>
              <div className="type-toggle" style={{flexWrap:'wrap'}}>
                {SYMPTOMS.map(s=><button key={s} className={`type-toggle-btn ${form.symptoms.includes(s)?'active':''}`} onClick={()=>setForm(p=>({...p,symptoms:p.symptoms.includes(s)?p.symptoms.filter(x=>x!==s):[...p.symptoms,s]}))}>{s}</button>)}
              </div>
            </div>
            <button className="form-submit" style={{background:'var(--pink)'}} onClick={handleSave}>{editCycleId?'UPDATE CYCLE':'SAVE CYCLE'}</button>
            <button className="form-cancel" onClick={()=>{setShowForm(false);setEditCycleId(null);}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── PROFILE PAGE ── */
const ProfilePage = ({user, setUser, partner, setPartner, sharingConfig, setSharingConfig, onLogout}) => {
  const [activeUser, setActiveUser] = useState(user);
  const [form, setForm] = useState({displayName:user.displayName||user.username,email:user.email||'',phone:user.phone||''});
  const [pushNotifs, setPushNotifs] = useState(true);
  const [darkMode, setDarkMode] = useState(true);
  const [selectedColor, setSelectedColor] = useState(user.eventColor||'#00e676');
  const [alert, setAlert] = useState({msg:'',type:''});

  const COLORS=['#00e676','#ff3b3b','#448aff','#ffd600','#e91e8c','#e040fb'];
  const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const isSharing = Object.values(sharingConfig).some(v=>v);
  const currentUser = activeUser.username===user.username?user:partner;

  const handleSave = async()=>{
    try {
      await axios.post(`${API}/profile-pictures`,{username:activeUser.username,displayName:form.displayName,email:form.email,phone:form.phone,eventColor:selectedColor});
      const updated={...activeUser,...form,eventColor:selectedColor};
      if(activeUser.username===user.username){setUser(updated);localStorage.setItem('user',JSON.stringify(updated));}
      msg('Changes saved.');
    } catch { msg('Error saving.','err'); }
  };

  const toggleSharingItem = (item) => {
    setSharingConfig(p=>({...p,[item]:!p[item]}));
  };
  const sharingItems=['Finances','Calendar','Budget','Gym','Meals','Cycle'];

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · ADMIN</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">PROFILE</div>
            <div className="page-sub">ACCOUNT · SHARING · PREFERENCES</div>
          </div>
          <Alert {...alert}/>

          {/* Active user card */}
          <div className="profile-user-card">
            <img className="profile-user-avatar" src={currentUser?.profilePicUrl||DP} alt="" style={{border:`2px solid ${currentUser?.eventColor||'#e91e8c'}`}}/>
            <div>
              <div className="profile-user-name">{currentUser?.displayName||currentUser?.username||'USER'}</div>
              <div className="profile-user-email">{currentUser?.email||`${(currentUser?.username||'user')}@vectraarch.live`}</div>
              {currentUser?.gender&&<span className={`profile-user-badge ${currentUser.gender?.toLowerCase()}`}>{(currentUser.gender||'').toUpperCase()}</span>}
            </div>
            {partner&&<button className="switch-btn" onClick={()=>setActiveUser(activeUser.username===user.username?partner:user)}>SWITCH</button>}
          </div>

          {/* Partner sharing */}
          {partner&&(
            <div className="partner-sharing-card">
              <div className="profile-section-title">§ PARTNER SHARING</div>
              <div className="partner-row">
                <img className="partner-avatar" src={partner.profilePicUrl||DP} alt="" style={{border:`2px solid ${partner.eventColor||'#448aff'}`}}/>
                <div>
                  <div className="partner-info-name">{partner.displayName||partner.username}</div>
                  <div className="partner-info-status">Partner · linked</div>
                </div>
                <button className={`share-all-btn ${isSharing?'sharing':'not-sharing'}`} onClick={()=>{const all=!isSharing;setSharingConfig(Object.fromEntries(sharingItems.map(i=>[i,all])));}}>{isSharing?'SHARING ALL':'SHARE ALL'}</button>
              </div>
              <div className="partner-hint">Tap a tab below to enable shared view. When enabled, totals combine both partners' data on that page.</div>
              <div className="sharing-grid">
                {sharingItems.map(item=>(
                  <div key={item} className={`sharing-item ${sharingConfig[item]?'on':''}`} onClick={()=>toggleSharingItem(item)}>
                    <span className="sharing-item-label">{item.toUpperCase()}</span>
                    <div className={`sharing-check ${sharingConfig[item]?'on':'off'}`}>{sharingConfig[item]?'✓':''}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Account Details */}
          <div className="profile-section">
            <div className="profile-section-title">§ ACCOUNT DETAILS</div>
            <div className="profile-field">
              <div className="profile-field-label">Display Name</div>
              <input className="profile-field-input" value={form.displayName} onChange={e=>setForm(p=>({...p,displayName:e.target.value}))}/>
            </div>
            <div className="profile-field">
              <div className="profile-field-label">Email</div>
              <input className="profile-field-input" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} type="email"/>
            </div>
            <div className="profile-field">
              <div className="profile-field-label">Phone</div>
              <input className="profile-field-input" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))} type="tel"/>
            </div>
          </div>

          {/* Preferences */}
          <div className="profile-section">
            <div className="profile-section-title">§ PREFERENCES</div>
            <div className="toggle-row">
              <div>
                <div className="toggle-info-title">Push Notifications</div>
                <div className="toggle-info-sub">Alerts for events and reminders</div>
              </div>
              <div className={`toggle-switch ${pushNotifs?'on':'off'}`} onClick={()=>setPushNotifs(p=>!p)}/>
            </div>

          </div>

          {/* Event Color */}
          <div className="profile-section">
            <div className="profile-section-title">§ EVENT COLOR</div>
            <div style={{padding:'12px 14px',fontFamily:"'DM Mono',monospace",fontSize:'10px',color:'var(--text3)',marginBottom:'4px'}}>Your personal event color</div>
            <div className="color-palette">
              {COLORS.map(c=>(
                <div key={c} className={`color-swatch ${selectedColor===c?'selected':''}`} style={{background:c}} onClick={()=>setSelectedColor(c)}/>
              ))}
            </div>
          </div>

          <button className="save-btn" onClick={handleSave}>SAVE CHANGES</button>

          {/* Logout */}
          <button onClick={onLogout} style={{
            width:'100%',padding:'14px',background:'transparent',
            border:'1px solid rgba(233,30,140,0.4)',color:'var(--pink)',
            borderRadius:'6px',fontFamily:"'DM Mono',monospace",fontWeight:500,
            fontSize:'12px',letterSpacing:'0.14em',textTransform:'uppercase',
            marginBottom:'16px',cursor:'pointer'
          }}>SIGN OUT ×</button>

          {/* Danger Zone */}
          <div className="profile-section-title" style={{color:'var(--red)',marginBottom:'8px'}}>§ DANGER ZONE</div>
          <div className="danger-zone">
            <button className="danger-btn">CHANGE PASSWORD</button>
            <button className="danger-btn">DELETE ACCOUNT</button>
          </div>
          <div style={{height:'32px'}}/>
        </div>
      </div>
    </div>
  );
};

/* ── ROOT APP ── */
const ALL_TABS = [
  {id:'finances', label:'FINANCES', color:'#00e676'},  // green
  {id:'calendar', label:'CALENDAR', color:'#448aff'},  // blue
  {id:'budget',   label:'BUDGET',   color:'#ffd600'},  // yellow
  {id:'gym',      label:'GYM',      color:'#1de9b6'},  // teal
  {id:'meals',    label:'MEALS',    color:'#ff9800'},  // orange
  {id:'cycle',    label:'CYCLE',    color:'#e91e8c'},  // pink (only one)
  {id:'profile',  label:'PROFILE',  color:'#b06aff'},  // purple
  {id:'admin',    label:'ADMIN',    color:'#ff5252', adminOnly:true}, // red
];

const App = () => {
  const [user, setUser] = useState(null);
  const [partner, setPartner] = useState(null);
  const [activeTab, setActiveTab] = useState('finances');
  const [sharingConfig, setSharingConfig] = useState({Finances:false,Calendar:false,Budget:false,Gym:false,Meals:false,Cycle:false});
  const [error, setError] = useState('');

  const handleLogout = useCallback(()=>{
    localStorage.removeItem('user');
    window.location.href = '/legacy/login.html';
  },[]);

  useEffect(()=>{
    const stored = localStorage.getItem('user');
    if(stored){
      try {
        const u = JSON.parse(stored);
        setUser(u);
        axios.get(`${API}/get-access`,{params:{viewer:u.username,adminUsername:u.username}})
          .then(async({data})=>{
            if(data.success&&data.accessList?.length>0){
              const targets = data.accessList.filter(a=>a.viewer===u.username).map(a=>a.target);
              if(targets.length>0){
                try {
                  const {data:pd}=await axios.get(`${API}/profile-pictures`,{params:{username:targets[0]}});
                  setPartner({username:targets[0],...pd,profilePicUrl:pd.profilePicUrl||DP,eventColor:pd.eventColor||'#448aff',displayName:pd.displayName||targets[0]});
                } catch {
                  setPartner({username:targets[0],displayName:targets[0],eventColor:'#448aff',profilePicUrl:DP});
                }
              }
            }
          }).catch(()=>{});
        axios.get(`${API}/profile-pictures`,{params:{username:u.username}}).then(({data})=>{
          setUser(prev=>({...prev,...data,profilePicUrl:data.profilePicUrl||prev.profilePicUrl||DP}));
        }).catch(()=>{});
      } catch { setError('Invalid session'); }
    } else {
      window.location.href='/legacy/login.html';
    }
  },[]);

  if(error) return <div style={{padding:'40px',color:'var(--red)',fontFamily:"'DM Mono',monospace"}}>{error}</div>;
  if(!user) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--text3)',fontFamily:"'DM Mono',monospace",fontSize:'11px',letterSpacing:'0.14em'}}>LOADING...</div>;

  const tabSharingKey = {finances:'Finances',calendar:'Calendar',budget:'Budget',gym:'Gym',meals:'Meals',cycle:'Cycle'}[activeTab];
  const isShared = tabSharingKey ? sharingConfig[tabSharingKey] : false;
  const toggleShared = () => { if(tabSharingKey) setSharingConfig(p=>({...p,[tabSharingKey]:!p[tabSharingKey]})); };
  const sharedProps = {user, partner, isShared, onToggleShared:toggleShared};

  // Only show admin tab for admin users
  const visibleTabs = ALL_TABS.filter(t=>!t.adminOnly||user.isAdmin);

  return (
    <div className="app-shell">
      <div style={{flex:1,overflow:'hidden',minHeight:0}}>
        {activeTab==='finances'&&<FinancesPage {...sharedProps}/>}
        {activeTab==='calendar'&&<CalendarPage {...sharedProps}/>}
        {activeTab==='budget'  &&<BudgetPage   {...sharedProps}/>}
        {activeTab==='gym'     &&<GymPage      {...sharedProps}/>}
        {activeTab==='meals'   &&<MealsPage    {...sharedProps}/>}
        {activeTab==='cycle'   &&<CyclePage    {...sharedProps}/>}
        {activeTab==='profile' &&<ProfilePage  user={user} setUser={setUser} partner={partner} setPartner={setPartner} sharingConfig={sharingConfig} setSharingConfig={setSharingConfig} onLogout={handleLogout}/>}
        {activeTab==='admin'   &&user.isAdmin&&<AdminPage user={user} onLogout={handleLogout}/>}
      </div>
      <div className="bottom-tabs">
        {visibleTabs.map(t=>(
          <button key={t.id}
            className={`tab-btn ${activeTab===t.id?'active':''}`}
            style={{'--tab-color':t.color}}
            onClick={()=>setActiveTab(t.id)}>
            <span className="tab-icon">{Icons[t.id]}</span>
            <span className="tab-label">{t.label}</span>
          </button>
        ))}
        <button className="tab-btn-logout" onClick={handleLogout} title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:'7px',letterSpacing:'0.1em',textTransform:'uppercase'}}>OUT</span>
        </button>
      </div>
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
