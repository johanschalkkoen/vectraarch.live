<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Legacy"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>Legacy · Vectra Arch</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    /* ── RESET & BASE ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:       #0d0e10;
      --bg2:      #161719;
      --bg3:      #1e2023;
      --bg4:      #252729;
      --border:   rgba(255,255,255,0.06);
      --border2:  rgba(255,255,255,0.12);
      --text:     #f0f0f0;
      --text2:    #a0a4a8;
      --text3:    #5a5f65;
      --pink:     #e91e8c;
      --pink2:    #c4186f;
      --green:    #00e676;
      --green2:   #00b85c;
      --red:      #ff3b3b;
      --red2:     #cc2e2e;
      --teal:     #1de9b6;
      --yellow:   #ffd600;
      --orange:   #ff6d00;
      --blue:     #448aff;
      --purple:   #e040fb;
      --cyan:     #00e5ff;
      --tab-h:    64px;
      --top-h:    52px;
    }
    html{height:-webkit-fill-available;}
    body{
      min-height:100vh;
      min-height:100dvh;
      max-height:100vh;
      max-height:100dvh;
      overflow:hidden;
      background:var(--bg);
      font-family:'Space Grotesk',sans-serif;
      font-weight:400;font-size:14px;color:var(--text);line-height:1.5;
    }
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
    input,select,textarea{font-family:inherit;color:inherit;}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}

    /* ── PINK TOP ACCENT ── */
    body::before{content:'';position:fixed;top:0;left:0;right:0;height:calc(3px + env(safe-area-inset-top,0px));background:var(--pink);z-index:1000;}

    /* ── APP SHELL ── */
    #root{
      position:fixed;
      top:0;left:0;right:0;bottom:0;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .app-shell{
      display:flex;
      flex-direction:column;
      flex:1;
      min-height:0;
      padding-top:calc(3px + env(safe-area-inset-top, 0px));
      overflow:hidden;
    }
    .app-shell > div:first-child{flex:1;overflow:hidden;min-height:0;}
    .page-outer{display:flex;flex-direction:column;height:100%;overflow:hidden;}

    /* ── TOP BAR ── */
    .top-bar{flex-shrink:0;height:var(--top-h);display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);background:var(--bg);}
    .top-eyebrow{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);}
    .top-eyebrow span{color:var(--pink);}

    /* ── PAGE CONTENT ── */
    .page-outer{display:flex;flex-direction:column;height:100%;overflow:hidden;}
    .page-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
    /* Each page fragment (React fragment) gets outer styling via parent */
    [data-page]{display:contents;}
    .page-inner{padding:16px;}

    /* ── PAGE HEADER ── */
    .page-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:36px;letter-spacing:0.02em;text-transform:uppercase;color:var(--text);line-height:1;}
    .page-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);margin-top:4px;}
    .page-head{margin-bottom:16px;}

    /* ── USER CHIP ── */
    .user-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
    .user-chip{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:6px 10px;min-width:0;}
    .user-chip-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0;}
    .user-chip-name{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;}
    .user-chip-arrow{font-size:10px;color:var(--text3);margin-left:2px;}
    .badge-solo{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;border:1px solid var(--border2);color:var(--text2);}
    .badge-shared{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;background:rgba(0,230,118,0.12);border:1px solid rgba(0,230,118,0.3);color:var(--green);}
    .badge-shared::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
    .partner-chip{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:5px 10px;}
    .partner-chip-avatar{width:22px;height:22px;border-radius:50%;object-fit:cover;}
    .partner-chip-name{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);}

    /* ── TOOLBAR ROW ── */
    .toolbar-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
    .tb-chip{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:5px 10px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);}
    .tb-chip select{background:transparent;border:none;outline:none;font-family:'DM Mono',monospace;font-size:10px;color:var(--text);-webkit-appearance:none;cursor:pointer;padding-right:4px;}
    .tb-chip select option{background:var(--bg3);}
    .sort-active{background:rgba(233,30,140,0.12);border-color:rgba(233,30,140,0.3);color:var(--pink);}

    /* ── SEARCH BAR ── */
    .search-bar{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:10px 14px;margin-bottom:14px;}
    .search-bar input{flex:1;background:transparent;border:none;outline:none;font-family:'DM Mono',monospace;font-size:11px;color:var(--text);letter-spacing:0.04em;}
    .search-bar input::placeholder{color:var(--text3);}
    .search-icon{color:var(--text3);font-size:13px;}

    /* ── SECTION LABEL ── */
    .section-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--pink);margin-bottom:10px;}

    /* ── SUMMARY CARD ── */
    .summary-card{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;padding:16px;margin-bottom:16px;}
    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
    .summary-item-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
    .summary-item-value{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;letter-spacing:0.04em;line-height:1;}
    .summary-item-value.income{color:var(--green);}
    .summary-item-value.expense{color:var(--red);}
    .summary-item-value.net-pos{color:var(--green);}
    .summary-item-value.net-neg{color:var(--red);}

    /* ── TRANSACTION / ITEM CARDS ── */
    .item-list{display:flex;flex-direction:column;gap:1px;}
    .item-card{background:var(--bg2);padding:14px 14px;display:flex;align-items:center;gap:12px;position:relative;border-radius:4px;margin-bottom:1px;}
    .item-card:active{background:var(--bg3);}
    .item-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid transparent;}
    .item-body{flex:1;min-width:0;}
    .item-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .item-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:0.06em;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .item-tag{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:8px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;padding:2px 6px;border-radius:3px;margin-right:4px;}
    .item-tag.jane{background:rgba(233,30,140,0.15);color:var(--pink);}
    .item-tag.joe{background:rgba(68,138,255,0.15);color:var(--blue);}
    .item-amount{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:0.04em;white-space:nowrap;flex-shrink:0;}
    .item-amount.income{color:var(--green);}
    .item-amount.expense{color:var(--red);}

    /* ── FAB ── */
    .fab{position:fixed;bottom:calc(var(--tab-h) + env(safe-area-inset-bottom,0px) + 16px);right:16px;display:flex;align-items:center;gap:8px;background:var(--pink);color:#fff;border-radius:6px;padding:12px 18px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;box-shadow:0 4px 20px rgba(233,30,140,0.4);z-index:50;transition:background 0.2s;}
    .fab:active{background:var(--pink2);}
    .fab.teal{background:var(--teal);box-shadow:0 4px 20px rgba(29,233,182,0.3);color:#000;}
    .fab.green{background:var(--green);box-shadow:0 4px 20px rgba(0,230,118,0.3);color:#000;}
    .fab.blue{background:var(--blue);box-shadow:0 4px 20px rgba(68,138,255,0.3);}

    /* ── BOTTOM TABS ── */
    .bottom-tabs{
      flex-shrink:0;
      height:calc(var(--tab-h) + env(safe-area-inset-bottom, 0px));
      padding-bottom:env(safe-area-inset-bottom, 0px);
      background:var(--bg2);
      border-top:1px solid var(--border);
      display:flex;
      align-items:stretch;
      position:relative;
      z-index:100;
    }
    .tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:4px 0;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:color 0.2s;-webkit-tap-highlight-color:transparent;position:relative;}
    .tab-btn.active{color:var(--pink);}
    .tab-btn.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--pink);border-radius:0 0 2px 2px;}
    .tab-icon{font-size:18px;line-height:1;}
    .tab-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;}

    /* ── MACRO GRID ── */
    .macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
    .macro-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px 8px;text-align:center;}
    .macro-value{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:28px;line-height:1;color:var(--text);}
    .macro-unit{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}
    .macro-card.kcal .macro-value{color:var(--yellow);}
    .macro-card.prot .macro-value{color:var(--green);}
    .macro-card.carb .macro-value{color:var(--blue);}
    .macro-card.fat  .macro-value{color:var(--red);}

    /* ── MEAL CARDS ── */
    .meal-card{background:var(--bg2);border-radius:6px;padding:14px;margin-bottom:8px;}
    .meal-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .meal-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;flex-shrink:0;}
    .meal-type-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;}
    .meal-type-badge.breakfast{background:rgba(255,214,0,0.15);color:var(--yellow);}
    .meal-type-badge.lunch    {background:rgba(0,230,118,0.15);color:var(--green);}
    .meal-type-badge.dinner   {background:rgba(68,138,255,0.15);color:var(--blue);}
    .meal-type-badge.snack    {background:rgba(224,64,251,0.15);color:var(--purple);}
    .meal-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);}
    .meal-macros{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
    .macro-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;border-radius:3px;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;}
    .macro-badge.kcal{background:rgba(255,214,0,0.12);color:var(--yellow);}
    .macro-badge.prot{background:rgba(0,230,118,0.12);color:var(--green);}
    .macro-badge.carb{background:rgba(68,138,255,0.12);color:var(--blue);}
    .macro-badge.fat {background:rgba(255,61,61,0.12);color:var(--red);}
    .meal-note{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:4px;}

    /* ── GYM CARDS ── */
    .day-block{margin-bottom:2px;}
    .day-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
    .day-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text);}
    .day-count{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:0.06em;}
    .day-add-btn{font-family:'DM Mono',monospace;font-size:9px;color:var(--pink);letter-spacing:0.1em;text-transform:uppercase;padding:4px 8px;border:1px solid rgba(233,30,140,0.3);border-radius:3px;}
    .workout-card{background:var(--bg2);border-radius:6px;padding:12px 14px;margin-top:6px;border-left:2px solid transparent;}
    .workout-card.strength{border-left-color:var(--green);}
    .workout-card.cardio  {border-left-color:var(--blue);}
    .workout-card.mobility{border-left-color:var(--purple);}
    .workout-type-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
    .workout-type-badge.strength{background:rgba(0,230,118,0.15);color:var(--green);}
    .workout-type-badge.cardio  {background:rgba(68,138,255,0.15);color:var(--blue);}
    .workout-type-badge.mobility{background:rgba(224,64,251,0.15);color:var(--purple);}
    .workout-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);}
    .workout-detail{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);margin-top:4px;}
    .workout-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:4px;}
    .rest-day{padding:12px 0;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:0.1em;}
    .user-section-header{display:flex;align-items:center;gap:10px;padding:14px 0 10px;border-bottom:1px solid var(--border);margin-bottom:4px;}
    .user-section-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;}
    .user-section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text2);}
    .user-section-label span{color:var(--pink);}

    /* ── BUDGET CARDS ── */
    .budget-card{background:var(--bg2);border-radius:6px;padding:14px;margin-bottom:8px;position:relative;}
    .budget-status-badge{position:absolute;top:12px;right:12px;padding:2px 8px;border-radius:3px;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;}
    .budget-status-badge.ok  {background:rgba(0,230,118,0.15);color:var(--green);}
    .budget-status-badge.warn{background:rgba(255,214,0,0.15);color:var(--yellow);}
    .budget-status-badge.over{background:rgba(255,61,61,0.15);color:var(--red);}
    .budget-card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text);margin-bottom:2px;}
    .budget-card-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:0.06em;margin-bottom:10px;}
    .budget-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
    .budget-col-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:3px;}
    .budget-col-value{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:17px;letter-spacing:0.04em;}
    .budget-col-value.plan{color:var(--green);}
    .budget-col-value.act{color:var(--red);}
    .budget-col-value.left.pos{color:var(--green);}
    .budget-col-value.left.neg{color:var(--red);}
    .progress-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:6px;}
    .progress-fill{height:100%;border-radius:2px;transition:width 0.3s;}
    .progress-fill.ok  {background:var(--green);}
    .progress-fill.warn{background:var(--yellow);}
    .progress-fill.over{background:var(--red);}
    .progress-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:0.08em;}

    /* ── CALENDAR ── */
    .cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
    .cal-nav-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;font-size:14px;color:var(--text2);}
    .cal-nav-month{flex:1;text-align:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text);}
    .cal-today-btn{padding:6px 12px;background:var(--green);color:#000;border-radius:4px;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:14px;}
    .cal-dow{background:var(--bg2);padding:6px 0;text-align:center;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);}
    .cal-day{background:var(--bg2);padding:6px 4px;min-height:44px;display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;transition:background 0.15s;}
    .cal-day:active{background:var(--bg3);}
    .cal-day.today{background:rgba(0,230,118,0.08);}
    .cal-day.today .cal-day-num{background:var(--green);color:#000;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
    .cal-day.selected{background:rgba(233,30,140,0.1);}
    .cal-day.selected .cal-day-num{color:var(--pink);}
    .cal-day.other-month .cal-day-num{color:var(--text3);}
    .cal-day-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--text);width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
    .cal-day-dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center;}
    .cal-dot{width:5px;height:5px;border-radius:50%;}
    .cal-dot.fin{background:var(--green);}
    .cal-dot.work{background:var(--blue);}
    .cal-dot.health{background:var(--purple);}
    .cal-dot.personal{background:var(--pink);}
    .cal-legend{display:flex;flex-wrap:wrap;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:16px;}
    .cal-legend-item{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);}
    .evt-card{background:var(--bg2);border-radius:6px;padding:12px 14px;margin-bottom:6px;border-left:2px solid transparent;}
    .evt-card.fin{border-left-color:var(--green);}
    .evt-card.work{border-left-color:var(--blue);}
    .evt-card.health{border-left-color:var(--purple);}
    .evt-card.personal{border-left-color:var(--pink);}
    .evt-top{display:flex;align-items:center;justify-content:between;margin-bottom:4px;}
    .evt-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);}
    .evt-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);}
    .evt-desc{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);margin-top:2px;}
    .no-events{background:var(--bg2);border:1px dashed var(--border2);border-radius:6px;padding:40px 16px;text-align:center;}
    .no-events-icon{font-size:24px;margin-bottom:8px;opacity:0.6;}
    .no-events-text{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.08em;color:var(--text3);text-transform:uppercase;}

    /* ── PROFILE PAGE ── */
    .profile-banner{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:20px;text-align:center;margin-bottom:16px;}
    .profile-avatar-wrapper{position:relative;width:80px;height:80px;margin:0 auto 12px;cursor:pointer;}
    .profile-avatar-big{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--pink);}
    .profile-avatar-edit{position:absolute;bottom:0;right:0;width:24px;height:24px;background:var(--pink);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;}
    .profile-name-big{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px;letter-spacing:0.02em;text-transform:uppercase;color:var(--text);line-height:1.2;}
    .profile-username-big{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.06em;color:var(--text3);text-transform:uppercase;margin-top:2px;}
    .profile-section{background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:12px;}
    .profile-section-title{background:var(--bg3);padding:8px 14px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--pink);border-bottom:1px solid var(--border);}
    .profile-row-toggle{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--border);}
    .profile-row-toggle:last-child{border-bottom:none;}
    .toggle-info-label{font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:13px;color:var(--text);}
    .toggle-info-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);margin-top:1px;}
    .toggle-switch{width:42px;height:24px;border-radius:12px;background:var(--bg4);position:relative;cursor:pointer;transition:background 0.2s;}
    .toggle-switch::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform 0.2s;}
    .toggle-switch.on{background:var(--green);}
    .toggle-switch.on::after{transform:translateX(18px);}
    .color-palette{display:flex;gap:8px;padding:4px 14px 14px;flex-wrap:wrap;}
    .color-swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;transition:transform 0.15s;position:relative;}
    .color-swatch:active{transform:scale(0.9);}
    .color-swatch.selected::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#000;}
    .save-btn{width:100%;padding:16px;background:var(--green);color:#000;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px;transition:background 0.2s;}
    .save-btn:active{background:var(--green2);}
    .danger-zone{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
    .danger-btn{padding:14px;border-radius:4px;border:1px solid var(--red);color:var(--red);font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;background:transparent;text-align:center;}

    /* ── MODALS & FORMS ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
    .modal-sheet{
      background:var(--bg2);
      border-radius:16px 16px 0 0;
      width:100%;
      max-width:520px;
      max-height:85vh;
      overflow-y:auto;
      padding:20px;
      box-shadow:0 -8px 32px rgba(0,0,0,0.5);
      border:1px solid var(--border2);
      border-bottom:none;
    }
    .modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text);margin-bottom:16px;}
    .form-field{margin-bottom:14px;}
    .form-label{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
    .form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:12px 14px;font-family:inherit;font-size:13px;color:var(--text);outline:none;}
    .form-input:focus{border-color:var(--pink);}
    .form-submit{width:100%;padding:14px;background:var(--green);color:#000;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;margin-top:8px;}
    .form-cancel{width:100%;padding:12px;background:transparent;color:var(--text3);border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;margin-top:6px;text-align:center;}
    .type-toggle{display:flex;gap:4px;background:var(--bg3);padding:3px;border-radius:4px;border:1px solid var(--border2);}
    .type-toggle-btn{flex:1;padding:8px 0;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);text-transform:uppercase;border-radius:3px;text-align:center;}
    .type-toggle-btn.active{background:var(--bg4);color:var(--text);}
    .type-toggle-btn.active.fin{color:var(--green);}
    .type-toggle-btn.active.work{color:var(--blue);}
    .type-toggle-btn.active.health{color:var(--purple);}
    .type-toggle-btn.active.personal{color:var(--pink);}

    /* ── CYCLE GRAPH ── */
    .cycle-container{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:20px 16px;margin-bottom:16px;display:flex;flex-direction:column;align-items:center;}
    .cycle-wheel{position:relative;width:260px;height:260px;margin-bottom:16px;}
  </style>
  <script src="/legacy/auth-guard.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useCallback, useMemo } = React;

  const API = '/legacy/api';
  const DP = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235a5f65' stroke-width='1.5'%3E%3Ccircle cx='12' cy='9' r='4'/%3E%3Cpath d='M5 20c0-3 3-5 7-5s7 2 7 5'/%3E%3C/svg%3E";

  const TABS = [
    { id: 'finances', label: 'Finances' },
    { id: 'calendar', label: 'Calendar' },
    { id: 'budget',   label: 'Budget' },
    { id: 'gym',      label: 'Gym' },
    { id: 'meals',    label: 'Meals' },
    { id: 'cycle',    label: 'Cycle' },
    { id: 'profile',  label: 'Profile' }
  ];

  const ICONS = {
    finances: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
    calendar: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>,
    budget:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M21.21 15.89A10 10 0 1 1 8 2.83M22 12A10 10 0 0 0 12 2v10z"/></svg>,
    gym:      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M6.5 6.5h11M6.5 17.5h11M3 10h18M3 14h18M3 6.5A3.5 3.5 0 0 1 6.5 3h11A3.5 3.5 0 0 1 21 6.5v11a3.5 3.5 0 0 1-3.5 3.5h-11A3.5 3.5 0 0 1 3 17.5z"/></svg>,
    meals:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M12 2v20M17 5H9.5A3.5 3.5 0 0 0 9.5 12h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
    cycle:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 6v6l4 2"/></svg>,
    profile:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    logout:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>,
    search:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="14" height="14"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
  };

  /* ── SHARED COMPONENTS ── */
  const UserRow = ({user, partner, isShared, onToggleShared}) => (
    <div className="user-row">
      <div className="user-chip">
        <img className="user-chip-avatar" src={user?.profilePicUrl||DP} alt={user?.username} style={{border:`2px solid ${user?.eventColor||'#e91e8c'}`}}/>
        <span className="user-chip-name">{user?.displayName||user?.username||'USER'}</span>
        <span className="user-chip-arrow">⌄</span>
      </div>
      {partner ? (
        <button className={`badge-shared`} onClick={onToggleShared} style={!isShared?{background:'transparent',border:'1px solid rgba(255,255,255,0.12)',color:'var(--text3)'}:{}}>
          {isShared ? 'SHARED' : 'SOLO'}
        </button>
      ) : <span className="badge-solo">SOLO</span>}
      {partner && isShared && (
        <div className="partner-chip">
          <img className="partner-chip-avatar" src={partner?.profilePicUrl||DP} alt=""/>
          <span className="partner-chip-name">{partner?.displayName||partner?.username}</span>
        </div>
      )}
    </div>
  );

  const Alert = ({msg, type}) => {
    if(!msg) return null;
    const bg = type==='ok' ? 'rgba(0,230,118,0.1)' : 'rgba(255,61,61,0.1)';
    const col = type==='ok' ? 'var(--green)' : 'var(--red)';
    const border = type==='ok' ? '1px solid rgba(0,230,118,0.2)' : '1px solid rgba(255,61,61,0.2)';
    return (
      <div style={{padding:'12px',borderRadius:'4px',background:bg,color:col,border:border,fontFamily:"'DM Mono',monospace",fontSize:'11px',marginBottom:'14px',textTransform:'uppercase',letterSpacing:'0.04em'}}>
        {type==='ok'?'✓':'⚠'} {msg}
      </div>
    );
  };

  const fmtDate = (dStr) => {
    if(!dStr) return '';
    const d = new Date(dStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toUpperCase();
  };
  const fmtR = (v) => 'R ' + (parseFloat(v)||0).toFixed(2);
  const now = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  };

  /* ── FINANCES PAGE ── */
  const FinancesPage = ({user, partner, isShared}) => {
    const [txs, setTxs] = useState([]);
    const [search, setSearch] = useState('');
    const [showForm, setShowForm] = useState(false);
    const [form, setForm] = useState({type:'expense',category:'Groceries',amount:'',date:now(),description:''});
    const [alert, setAlert] = useState({msg:'',type:''});
    const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

    const fetchAll = useCallback(async () => {
      const users = [user.username, ...(isShared && partner ? [partner.username] : [])];
      try {
        const res = await Promise.all(users.map(u => axios.get(`${API}/financetransaction`, { params: { user: u } }).then(r => r.data)));
        setTxs(res.flat().sort((a,b)=>new Date(b.date)-new Date(a.date)));
      } catch {}
    }, [user.username, partner, isShared]);

    useEffect(() => { fetchAll(); }, [fetchAll]);

    const handleSave = async () => {
      if(!form.amount || !form.category) return msg('Missing fields','err');
      try {
        await axios.post(`${API}/financetransaction`, { ...form, amount: parseFloat(form.amount), user: user.username });
        msg('Transaction recorded');
        setShowForm(false);
        setForm({type:'expense',category:'Groceries',amount:'',date:now(),description:''});
        fetchAll();
      } catch { msg('Error saving','err'); }
    };

    const filtered = txs.filter(t => (t.category||'').toLowerCase().includes(search.toLowerCase()) || (t.description||'').toLowerCase().includes(search.toLowerCase()));

    const totals = useMemo(() => {
      let inc=0, exp=0;
      filtered.forEach(t => {
        const a = parseFloat(t.amount)||0;
        if(t.type==='income') inc+=a; else exp+=a;
      });
      return { inc, exp, net: inc - exp };
    }, [filtered]);

    const monthLabel = new Date().toLocaleDateString('en-US',{month:'long'});

    return (
      <div className="page-outer">
        <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · FINANCIAL</span></div>
        <div className="page-scroll">
          <div className="page-inner">
            <div className="page-head">
              <div className="page-title">TRANSACTIONS</div>
              <div className="page-sub">FLOWS · RECORDS · LEDGER</div>
            </div>
            <UserRow user={user} partner={partner} isShared={isShared}/>
            <div className="search-bar">
              <span className="search-icon">⌕</span>
              <input placeholder="SEARCH TRANSACTIONS..." value={search} onChange={e=>setSearch(e.target.value)}/>
            </div>
            <Alert {...alert}/>
            <div className="section-label">§ SUMMARY · {monthLabel.toUpperCase()} 2026</div>
            <div className="summary-card">
              <div className="summary-grid">
                <div>
                  <div className="summary-item-label">Income</div>
                  <div className={`summary-item-value income`}>{fmtR(totals.inc)}</div>
                </div>
                <div>
                  <div className="summary-item-label">Expenses</div>
                  <div className="summary-item-value expense">{fmtR(totals.exp)}</div>
                </div>
                <div>
                  <div className="summary-item-label">Net</div>
                  <div className={`summary-item-value ${totals.net>=0?'net-pos':'net-neg'}`}>{fmtR(totals.net)}</div>
                </div>
              </div>
            </div>
            <div className="section-label">§ ITEMS · {filtered.length} RECORDS</div>
            <div className="item-list">
              {filtered.map(item=>(
                <div key={item.id} className="item-card">
                  <img className="item-avatar" src={item.user===user.username?(user.profilePicUrl||DP):(partner?.profilePicUrl||DP)} alt="" style={{border:`2px solid ${item.user===user.username?(user.eventColor||'#e91e8c'):(partner?.eventColor||'#448aff')}`}}/>
                  <div className="item-body">
                    <div className="item-title">
                      <span className={`item-tag ${item.user===user.username?(user.username==='jane'?'jane':'joe'):'joe'}`}>{(item.user||'').toUpperCase().slice(0,4)}</span>
                      {(item.category||'').toUpperCase()}
                    </div>
                    <div className="item-sub">{fmtDate(item.date)} · {item.description||item.category}</div>
                  </div>
                  <div className={`item-amount ${item.type}`}>{fmtR(item.amount)}</div>
                </div>
              ))}
            </div>
            {filtered.length===0&&<div className="no-events"><div className="no-events-icon">💸</div><div className="no-events-text">NO TRANSACTIONS FOUND</div></div>}
            <div style={{height:'80px'}}/>
          </div>
        </div>
        <button className="fab" onClick={()=>setShowForm(true)}>+ ADD RECORD</button>

        {showForm && (
          <div className="modal-overlay" onClick={()=>setShowForm(false)}>
            <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
              <div className="modal-title">NEW TRANSACTION</div>
              <div className="form-field">
                <label className="form-label">Type</label>
                <div className="type-toggle">
                  <button className={`type-toggle-btn ${form.type==='expense'?'active':''}`} onClick={()=>setForm(p=>({...p,type:'expense'}))}>Expense</button>
                  <button className={`type-toggle-btn ${form.type==='income'?'active':''}`} onClick={()=>setForm(p=>({...p,type:'income'}))}>Income</button>
                </div>
              </div>
              <div className="form-field">
                <label className="form-label">Category</label>
                <input className="form-input" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}/>
              </div>
              <div className="form-field">
                <label className="form-label">Amount (ZAR)</label>
                <input className="form-input" type="number" placeholder="0.00" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))}/>
              </div>
              <div className="form-field">
                <label className="form-label">Date</label>
                <input className="form-input" type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/>
              </div>
              <div className="form-field">
                <label className="form-label">Description (optional)</label>
                <input className="form-input" value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/>
              </div>
              <button className="form-submit" onClick={handleSave}>SAVE TRANSACTION</button>
              <button className="form-cancel" onClick={()=>setShowForm(false)}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  /* ── CALENDAR PAGE ── */
  const CalendarPage = ({user, partner, isShared}) => {
    const [events, setEvents] = useState([]);
    const [viewDate, setViewDate] = useState(new Date());
    const [selectedDay, setSelectedDay] = useState(new Date());
    const [showForm, setShowForm] = useState(false);
    const [form, setForm] = useState({title:'',type:'personal',time:'12:00',date:now(),description:''});
    const [alert, setAlert] = useState({msg:'',type:''});
    const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

    const fetchAll = useCallback(async () => {
      const users = [user.username, ...(isShared && partner ? [partner.username] : [])];
      try {
        const res = await Promise.all(users.map(u => axios.get(`${API}/calendarevent`, { params: { user: u } }).then(r => r.data)));
        setEvents(res.flat());
      } catch {}
    }, [user.username, partner, isShared]);

    useEffect(() => { fetchAll(); }, [fetchAll]);

    const handleSave = async () => {
      if(!form.title) return msg('Title required','err');
      try {
        await axios.post(`${API}/calendarevent`, { ...form, user: user.username });
        msg('Event scheduled');
        setShowForm(false);
        setForm({title:'',type:'personal',time:'12:00',date:now(),description:''});
        fetchAll();
      } catch { msg('Error saving event','err'); }
    };

    const daysInMonth = useMemo(() => {
      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const first = new Date(year, month, 1);
      const last = new Date(year, month + 1, 0);
      let startDow = first.getDay() - 1; if(startDow < 0) startDow = 6;
      const arr = [];
      for (let i = startDow - 1; i >= 0; i--) { arr.push({ date: new Date(year, month, -i), otherMonth: true }); }
      for (let d = 1; d <= last.getDate(); d++) { arr.push({ date: new Date(year, month, d), otherMonth: false }); }
      const totalGrid = 42;
      const remain = totalGrid - arr.length;
      for (let x = 1; x <= remain; x++) { arr.push({ date: new Date(year, month + 1, x), otherMonth: true }); }
      return arr;
    }, [viewDate]);

    const getEventsForDay = (d) => events.filter(e => new Date(e.date).toDateString() === d.toDateString());
    const activeDayEvents = getEventsForDay(selectedDay).sort((a,b)=>(a.time||'').localeCompare(b.time||''));

    const prevMonth = () => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1));
    const nextMonth = () => setViewDate(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1));
    const goToday = () => { const t=new Date(); setViewDate(t); setSelectedDay(t); };

    const eventType = (e) => e.type || 'personal';
    const monthLabel = viewDate.toLocaleDateString('en-US', { month: 'long' });

    return (
      <div className="page-outer">
        <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · CALENDAR</span></div>
        <div className="page-scroll">
          <div className="page-inner">
            <div className="page-head">
              <div className="page-title">CALENDAR</div>
              <div className="page-sub">EVENTS · CYCLE · SCHEDULE</div>
            </div>
            <UserRow user={user} partner={partner} isShared={isShared}/>
            <Alert {...alert}/>
            <div className="cal-nav">
              <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
              <div className="cal-nav-month">{monthLabel} {viewDate.getFullYear()}</div>
              <button className="cal-nav-btn" onClick={nextMonth}>›</button>
              <button className="cal-today-btn" onClick={goToday}>TODAY</button>
            </div>
            <div className="cal-grid">
              {['MON','TUE','WED','THU','FRI','SAT','SUN'].map(d=><div key={d} className="cal-dow">{d}</div>)}
              {daysInMonth.map((item,i)=>{
                const isToday=item.date.toDateString()===new Date().toDateString();
                const isSelected=item.date.toDateString()===selectedDay.toDateString();
                const dayEvts=getEventsForDay(item.date);
                return (
                  <div key={i} className={`cal-day${item.otherMonth?' other-month':''}${isToday?' today':''}${isSelected?' selected':''}`} onClick={()=>setSelectedDay(item.date)}>
                    <div className="cal-day-num">{item.date.getDate()}</div>
                    {dayEvts.length>0&&(
                      <div className="cal-day-dots">

  /* ── BUDGET PAGE ── */
  const BudgetPage = ({user, partner, isShared}) => {
    const [budgets, setBudgets] = useState([]);
    const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
    const [showForm, setShowForm] = useState(false);
    const [form, setForm] = useState({category:'Food',allocated:'',month:String(new Date().getMonth()+1).padStart(2,'0')});
    const [alert, setAlert] = useState({msg:'',type:''});
    const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

    const MONTHS=[
      {v:'01',l:'January'},{v:'02',l:'February'},{v:'03',l:'March'},{v:'04',l:'April'},
      {v:'05',l:'May'},{v:'06',l:'June'},{v:'07',l:'July'},{v:'08',l:'August'},
      {v:'09',l:'September'},{v:'10',l:'October'},{v:'11',l:'November'},{v:'12',l:'December'}
    ];

    const fetchAll = useCallback(async () => {
      const users = [user.username, ...(isShared && partner ? [partner.username] : [])];
      try {
        const res = await Promise.all(users.map(u => axios.get(`${API}/financebudget`, { params: { user: u } }).then(r => r.data)));
        setBudgets(res.flat());
      } catch {}
    }, [user.username, partner, isShared]);

    useEffect(() => { fetchAll(); }, [fetchAll]);

    const handleSave = async () => {
      if(!form.allocated || !form.category) return msg('Missing bounds','err');
      try {
        await axios.post(`${API}/financebudget`, { ...form, allocated: parseFloat(form.allocated), user: user.username });
        msg('Budget threshold mapped');
        setShowForm(false);
        setForm({category:'Food',allocated:'',month:selectedMonth});
        fetchAll();
      } catch { msg('Error linking budget','err'); }
    };

    const activeBudgets = budgets.filter(b => b.month === selectedMonth);
    const totalPlanned = activeBudgets.reduce((acc,b)=>acc+(parseFloat(b.allocated)||0), 0);
    const totalActual = activeBudgets.reduce((acc,b)=>acc+(parseFloat(b.actual)||0), 0);
    const left = totalPlanned - totalActual;

    const monthLabel = MONTHS.find(m=>m.v===selectedMonth)?.l||'';

    return (
      <div className="page-outer">
        <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · FINANCIAL</span></div>
        <div className="page-scroll">
          <div className="page-inner">
            <div className="page-head">
              <div className="page-title">BUDGET</div>
              <div className="page-sub">PLANNED · ACTUAL · REMAINING</div>
            </div>
            <UserRow user={user} partner={partner} isShared={isShared}/>
            <div className="toolbar-row">
              <div className="tb-chip">
                <span style={{fontSize:'9px',fontFamily:"'DM Mono',monospace",letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text3)'}}>MONTH</span>
                <select value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
                  {MONTHS.map(m=><option key={m.v} value={m.v}>{m.l} 2026</option>)}
                </select>
              </div>
              <div className="sort-active tb-chip" style={{cursor:'default'}}>
                <span style={{fontFamily:"'DM Mono',monospace",fontSize:'10px'}}>Desc</span>
              </div>
            </div>
            <Alert {...alert}/>
            <div className="section-label">§ SUMMARY · {monthLabel.toUpperCase()} 2026</div>
            <div className="summary-card">
              <div className="summary-grid">
                <div>
                  <div className="summary-item-label">Planned</div>
                  <div className="summary-item-value" style={{color:'var(--green)'}}>{fmtR(totalPlanned)}</div>
                </div>
                <div>
                  <div className="summary-item-label">Actual</div>
                  <div className="summary-item-value" style={{color:'var(--red)'}}>{fmtR(totalActual)}</div>
                </div>
                <div>
                  <div className="summary-item-label">Left</div>
                  <div className="summary-item-value" style={{color:left>=0?'var(--green)':'var(--red)'}}>{fmtR(left)}</div>
                </div>
              </div>
            </div>
            <div className="section-label">§ ALLOCATIONS</div>
            <div className="item-list">
              {activeBudgets.map(b=>{
                const plan = parseFloat(b.allocated)||0;
                const act = parseFloat(b.actual)||0;
                const rem = plan - act;
                const pct = plan > 0 ? Math.min((act / plan) * 100, 100) : 0;
                const status = act > plan ? 'over' : pct > 85 ? 'warn' : 'ok';
                return (
                  <div key={b.id} className="budget-card">
                    <span className={`budget-status-badge ${status}`}>{status}</span>
                    <div className="budget-card-title">{(b.category||'').toUpperCase()}</div>
                    <div className="budget-card-sub">MATRIX BOUNDS</div>
                    <div className="budget-cols">
                      <div><div className="budget-col-label">Limit</div><div className="budget-col-value plan">{fmtR(plan)}</div></div>
                      <div><div className="budget-col-label">Spent</div><div className="budget-col-value act">{fmtR(act)}</div></div>
                      <div><div className="budget-col-label">Balance</div><div className={`budget-col-value left ${rem>=0?'pos':'neg'}`}>{fmtR(rem)}</div></div>
                    </div>
                    <div className="progress-bar">
                      <div className={`progress-fill ${status}`} style={{width:`${pct}%`}}/>
                    </div>
                    <div className="progress-label">{Math.round(pct)}% UNDER BOUNDARY</div>
                  </div>
                );
              })}
            </div>
            {activeBudgets.length===0&&<div className="no-events"><div className="no-events-icon">📊</div><div className="no-events-text">NO BOUNDS PLANTED</div></div>}
            <div style={{height:'80px'}}/>
          </div>
        </div>
        <button className="fab green" onClick={()=>setShowForm(true)}>+ ALLOCATE BOUND</button>

        {showForm && (
          <div className="modal-overlay" onClick={()=>setShowForm(false)}>
            <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
              <div className="modal-title">ALLOCATE BUDGET</div>
              <div className="form-field">
                <label className="form-label">Category Node</label>
                <input className="form-input" placeholder="e.g. Rent, Transport" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}/>
              </div>
              <div className="form-field">
                <label className="form-label">Boundary Sum (ZAR)</label>
                <input className="form-input" type="number" placeholder="0.00" value={form.allocated} onChange={e=>setForm(p=>({...p,allocated:e.target.value}))}/>
              </div>
              <div className="form-field">
                <label className="form-label">Target Month</label>
                <select className="form-input" style={{background:'var(--bg3)'}} value={form.month} onChange={e=>setForm(p=>({...p,month:e.target.value}))}>
                  {MONTHS.map(m=><option key={m.v} value={m.v}>{m.l}</option>)}
                </select>
              </div>
              <button className="form-submit" onClick={handleSave}>SET BOUNDS</button>
              <button className="form-cancel" onClick={()=>setShowForm(false)}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  /* ── GYM PAGE ── */
  const gymGetType = (ex) => {
    if(['Running','Cycling','Rowing Machine','Elliptical','Jump Rope'].some(x=>ex.includes(x))) return 'cardio';
    if(['Yoga','Stretching','Foam Rolling','Mobility Routine'].some(x=>ex.includes(x))) return 'mobility';
    return 'strength';
  };

  const EXERCISES = [
    { label:'Strength — Barbell', options:[ {value:'Barbell Squat',label:'Barbell Squat'},{value:'Barbell Bench Press',label:'Barbell Bench Press'}, {value:'Barbell Deadlift',label:'Barbell Deadlift'},{value:'Barbell Overhead Press',label:'Barbell Overhead Press'}, {value:'Barbell Row',label:'Barbell Row'},{value:'Barbell Shrug',label:'Barbell Shrug'} ]},
    { label:'Strength — Dumbbell', options:[ {value:'Dumbbell Bicep Curl',label:'Dumbbell Bicep Curl'},{value:'Dumbbell Shoulder Press',label:'Dumbbell Shoulder Press'}, {value:'Dumbbell Lateral Raise',label:'Dumbbell Lateral Raise'},{value:'Dumbbell Flyes',label:'Dumbbell Flyes'}, {value:'Dumbbell Lunges',label:'Dumbbell Lunges'},{value:'Dumbbell Row',label:'Dumbbell Row'} ]},
    { label:'Strength — Cable', options:[ {value:'Cable Tricep Pushdown',label:'Cable Tricep Pushdown'},{value:'Cable Bicep Curl',label:'Cable Bicep Curl'},{value:'Cable Row',label:'Cable Row'}, {value:'Face Pull',label:'Face Pull'},{value:'Cable Lateral Raise',label:'Cable Lateral Raise'}, {value:'Cable Woodchop',label:'Cable Woodchop'},{value:'Cable Hip Abduction',label:'Cable Hip Abduction'} ]},
    { label:'Strength — Machine', options:[ {value:'Leg Press',label:'Leg Press'},{value:'Leg Extension',label:'Leg Extension'}, {value:'Leg Curl (Hamstring Curl)',label:'Leg Curl (Hamstring Curl)'},{value:'Chest Press Machine',label:'Chest Press Machine'}, {value:'Lat Pulldown',label:'Lat Pulldown'},{value:'Seated Row Machine',label:'Seated Row Machine'}, {value:'Hip Abduction/Adduction Machine',label:'Hip Abduction/Adduction Machine'}, {value:'Pec Deck (Chest Fly)',label:'Pec Deck (Chest Fly)'},{value:'Tricep Pushdowns',label:'Tricep Pushdowns'}, {value:'Machine Shoulder Press',label:'Machine Shoulder Press'},{value:'Abdominal Crunch Machine',label:'Abdominal Crunch Machine'} ]},
    { label:'Strength — Bodyweight', options:[ {value:'Push-Ups (standard, wide, diamond)',label:'Push-Ups (standard, wide, diamond)'}, {value:'Pull-Ups/Chin-Ups (assisted or unassisted)',label:'Pull-Ups/Chin-Ups (assisted or unassisted)'}, {value:'Dips (parallel bars or bench)',label:'Dips (parallel bars or bench)'}, {value:'Planks (front, side)',label:'Planks (front, side)'},{value:'Bodyweight Squats',label:'Bodyweight Squats'}, {value:'Lunges',label:'Lunges'},{value:'Wall Sits',label:'Wall Sits'},{value:'Hanging Leg Raises',label:'Hanging Leg Raises'} ]},
    { label:'Cardio — Treadmill', options:[ {value:'Steady-State Running (Treadmill)',label:'Steady-State Running (Treadmill)'}, {value:'Incline Walking (Treadmill)',label:'Incline Walking (Treadmill)'},{value:'Sprints / HIIT (Treadmill)',label:'Sprints / HIIT (Treadmill)'} ]},
    { label:'Cardio — Stationary Equipment', options:[ {value:'Stationary Cycling',label:'Stationary Cycling'},{value:'Elliptical Trainer',label:'Elliptical Trainer'}, {value:'Rowing Machine',label:'Rowing Machine'},{value:'Stair Climber / Stairmaster',label:'Stair Climber / Stairmaster'} ]},
    { label:'Cardio — Bodyweight / Outdoor', options:[ {value:'Outdoor Running',label:'Outdoor Running'},{value:'Outdoor Cycling',label:'Outdoor Cycling'}, {value:'Jump Rope',label:'Jump Rope'},{value:'Burpees',label:'Burpees'},{value:'Mountain Climbers',label:'Mountain Climbers'} ]},
    { label:'Flexibility & Mobility', options:[ {value:'Yoga (Vinyasa, Hatha, Yin)',label:'Yoga (Vinyasa, Hatha, Yin)'}, {value:'Static Stretching Routine',label:'Static Stretching Routine'},{value:'Dynamic Warm-Up Routine',label:'Dynamic Warm-Up Routine'}, {value:'Foam Rolling / SMR',label:'Foam Rolling / SMR'},{value:'Mobility Drills (Hips, Shoulders)',label:'Mobility Drills (Hips, Shoulders)'} ]},
    { label:'Custom', options:[{value:'__custom__',label:'Custom movement...',cal:0}]}
  ];

  const GymPage = ({user, partner, isShared}) => {
    const [workouts, setWorkouts] = useState([]);
    const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
    const [showForm, setShowForm] = useState(false);
    const [isCustomEx, setIsCustomEx] = useState(false);
    const [form, setForm] = useState({day:'Monday',exercise:'',sets:'3',reps:'10',weight:'60',date:now(),type:'strength'});
    const [alert, setAlert] = useState({msg:'',type:''});
    const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

    const fetchAll = useCallback(async()=>{
      const users=[user.username,...(isShared&&partner?[partner.username]:[])];
      try {
        const all=await Promise.all(users.map(u=>axios.get(`${API}/gymworkout`,{params:{user:u}}).then(r=>r.data.map(w=>({...w,userKey:u}))).catch(()=>[])));
        setWorkouts(all.flat());
      } catch {}
    },[user.username,partner,isShared]);

    useEffect(()=>{ fetchAll(); },[fetchAll]);

    const handleExerciseSelect = (val) => {
      if(val==='__custom__'){
        setIsCustomEx(true);
        setForm(p=>({...p,exercise:'',type:'strength'}));
        return;
      }
      setIsCustomEx(false);
      const t = gymGetType(val);
      setForm(p=>({...p, exercise:val, type:t, sets: t==='cardio'||t==='mobility'?'1':p.sets, reps: t==='cardio'?'30':t==='mobility'?'45':p.reps, weight: t==='cardio'?'5':t==='mobility'?'vinyasa':p.weight }));
    };

    const handleSave = async()=>{
      if(!form.exercise) return msg('Specify movement node','err');
      try {
        await axios.post(`${API}/gymworkout`,{...form, user:user.username});
        msg('Workout metrics cached');
        setShowForm(false);
        setForm({day:'Monday',exercise:'',sets:'3',reps:'10',weight:'60',date:now(),type:'strength'});
        setIsCustomEx(false);
        fetchAll();
      } catch { msg('Error saving circuit','err'); }
    };

    const handleDelete = async(id)=>{
      try { await axios.delete(`${API}/gymworkout`,{data:{id}}); msg('Workout cleared'); fetchAll(); } catch { msg('Action failed','err'); }
    };

    const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    const activeByDay = (dName) => workouts.filter(w=>w.day===dName).sort((a,b)=>a.id-b.id);

    return (
      <div className="page-outer">
        <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · PERFORMANCE</span></div>
        <div className="page-scroll">
          <div className="page-inner">
            <div className="page-head">
              <div className="page-title">GYM ENGINE</div>
              <div className="page-sub">CIRCUITS · PROGRESSION · VOLUME</div>
            </div>
            <UserRow user={user} partner={partner} isShared={isShared}/>
            <Alert {...alert}/>

            {DAYS.map(dName=>{
              const items = activeByDay(dName);
              return (
                <div key={dName} className="day-block">
                  <div className="day-header">
                    <div className="day-name">{dName}</div>
                    <div className="day-count">{items.length} CIRCUITS</div>
                  </div>
                  {items.map(w=>(
                    <div key={w.id} className={`workout-card ${w.type||'strength'}`}>
                      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
                        <div>
                          <div className={`workout-type-badge ${w.type||'strength'}`}>{(w.type||'strength').toUpperCase()}</div>
                          <div className="workout-name">{(w.exercise||'').toUpperCase()}</div>
                          {w.type==='strength' && <div className="workout-detail">{w.sets} SETS × {w.reps} REPS · {w.weight} KG</div>}
                          {w.type==='cardio' && <div className="workout-detail">{w.reps} MIN · {w.weight} KM</div>}
                          {w.type==='mobility' && <div className="workout-detail">{w.reps} MIN · {w.weight}</div>}
                          <div className="workout-time">RECORDED: {fmtDate(w.date)}</div>
                        </div>
                        {w.userKey===user.username && (
                          <button style={{color:'var(--text3)',fontSize:'10px'}} onClick={()=>handleDelete(w.id)}>✕</button>
                        )}
                      </div>
                    </div>
                  ))}
                  {items.length===0 && <div className="rest-day">REST / DELOAD PHASE</div>}
                </div>
              );
            })}
            <div style={{height:'80px'}}/>
          </div>
        </div>
        <button className="fab teal" onClick={()=>setShowForm(true)}>+ LOG PERFORMANCE</button>

        {showForm && (
          <div className="modal-overlay" onClick={()=>setShowForm(false)}>
            <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
              <div className="modal-title">LOG CIRCUIT METRICS</div>
              <div className="form-field">
                <label className="form-label">Microcycle Day</label>
                <select className="form-input" style={{background:'var(--bg3)'}} value={form.day} onChange={e=>setForm(p=>({...p,day:e.target.value}))}>
                  {DAYS.map(d=><option key={d} value={d}>{d}</option>)}
                </select>
              </div>
              <div className="form-field">
                <label className="form-label">Exercise Registry</label>
                <select className="form-input" style={{background:'var(--bg3)'}} onChange={e=>handleExerciseSelect(e.target.value)}>
                  <option value="">Select exercise...</option>
                  {EXERCISES.map((g,idx)=>(
                    <optgroup key={idx} label={g.label}>
                      {g.options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
                    </optgroup>
                  ))}
                </select>

              {isCustomEx && (
                <div className="form-field">
                  <label className="form-label">Custom Movement Name</label>
                  <input className="form-input" placeholder="e.g. Incline DB Press" value={form.exercise} onChange={e=>setForm(p=>({...p,exercise:e.target.value}))}/>
                </div>
              )}
              {isCustomEx && (
                <div className="form-field">
                  <label className="form-label">Modality Classification</label>
                  <div className="type-toggle">
                    {['strength','cardio','mobility'].map(x=>(
                      <button key={x} className={`type-toggle-btn ${form.type===x?'active':''}`} onClick={()=>setForm(p=>({...p,type:x}))}>{x}</button>
                    ))}
                  </div>
                </div>
              )}
              {form.type==='strength'&&(

                  <label className="form-label">Duration (min) & Distance (km)</label>

                    <input className="form-input" placeholder="e.g. 5" value={form.weight} onChange={e=>setForm(p=>({...p,weight:e.target.value}))}/>

                </div>

              {form.type==='mobility'&&(

                  <label className="form-label">Duration (min) & Style</label>

                    <input className="form-input" placeholder="e.g. 20" value={form.reps} onChange={e=>setForm(p=>({...p,reps:e.target.value}))}/>

                  </div>
                </div>
              )}
              <div className="form-field">
                <label className="form-label">Date</label>
                <input className="form-input" type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/>
              </div>
              <button className="form-submit" onClick={handleSave}>COMMIT CIRCUIT</button>
              <button className="form-cancel" onClick={()=>setShowForm(false)}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    );
  };

  /* ── MEALS PAGE ── */
  const MEAL_REGISTRY = [

  /* ── CYCLE PAGE ── */
  const CyclePage = ({user, partner, isShared}) => {

    const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

    const SYMPTOMS=['Cramps','Bloating','Headache','Fatigue','Mood Swings','Acne','Insomnia'];

    const fetchAll = useCallback(async()=>{
      const targetUser = isShared && partner && partner.username==='jane' ? 'jane' : user.username;
      try {
        const r = await axios.get(`${API}/biocycle`,{params:{user:targetUser}});
        setLogs(r.data.sort((a,b)=>new Date(b.startDate)-new Date(a.startDate)));
      } catch {}
    },[user.username,partner,isShared]);

    useEffect(()=>{ fetchAll(); },[fetchAll]);

    const handleSave = async()=>{
      try {
        await axios.post(`${API}/biocycle`,{...form, cycleLength:parseInt(form.cycleLength)||28, symptoms:form.symptoms.join(','), user:user.username});
        msg('Biological bounds compiled');
        setShowForm(false);
        setForm({startDate:now(),endDate:'',cycleLength:'28',symptoms:[]});
        fetchAll();
      } catch { msg('Error parsing payload','err'); }
    };

    const latest = logs[0];
    const cycleLength = latest ? parseInt(latest.cycleLength)||28 : 28;
    const daysSinceStart = latest ? Math.floor((new Date()-new Date(latest.startDate))/(1000*60*60*24)) : 0;
    const dayOfCycle = latest ? (daysSinceStart % cycleLength) + 1 : 1;

    // Build segment visualization arc mapping parameters
    const total=cycleLength;
    const segments=[
      {days:5, color:'var(--red)', label:'Menstruation'},
      {days:7, color:'var(--teal)', label:'Follicular Phase'},
      {days:3, color:'var(--purple)', label:'Ovulation Zone'},
      {days:total-15, color:'var(--orange)', label:'Luteal Phase'}
    ];

    let currentAngle = -Math.PI / 2;
    const mappedSegments = segments.map(s => {
      const angleSweep = (s.days / total) * 2 * Math.PI;
      const startAngle = currentAngle;
      const endAngle = currentAngle + angleSweep;
      currentAngle = endAngle;
      return { ...s, startAngle, endAngle };
    });

    const arc = (cx, cy, r, startAngle, endAngle, inner) => {
      const x1 = cx + r * Math.cos(startAngle); const y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle); const y2 = cy + r * Math.sin(endAngle);
      const large = (endAngle - startAngle) > Math.PI ? 1 : 0;
      if (inner) {
        const ix1 = cx + inner * Math.cos(startAngle); const iy1 = cy + inner * Math.sin(startAngle);
        const ix2 = cx + inner * Math.cos(endAngle); const iy2 = cy + inner * Math.sin(endAngle);
        return `M${x1},${y1} A${r},${r},0,${large},1,${x2},${y2} L${ix1},${iy1} A${inner},${inner},0,${large},0,${ix2},${iy2} Z`;
      }
      return `M${cx},${cy} L${x1},${y1} A${r},${r},0,${large},1,${x2},${y2} Z`;
    };

    const dayNums=[];
    for(let d=1;d<=total;d++){
      const a=-Math.PI/2+(((d-0.5)/total)*2*Math.PI);
      const nr=114;
      dayNums.push({d,x:130+nr*Math.cos(a),y:130+nr*Math.sin(a)});
    }
    const dayAngle=-Math.PI/2+((dayOfCycle-0.5)/total)*2*Math.PI;

    return (
      <div className="page-outer">
        <div className="top-bar"><span className="top-eyebrow"><span>§ VECTRA ARCH</span> · LEGACY · BIOMETRICS</span></div>
        <div className="page-scroll">
          <div className="page-inner">
            <div className="page-head">
              <div className="page-title">BIOCYCLE MAP</div>
              <div className="page-sub">ENDOCRINE · HORMONAL WAVE · VECTORING</div>
            </div>
            <UserRow user={user} partner={partner} isShared={isShared}/>
            <Alert {...alert}/>

            <div className="cycle-container">
              <div className="cycle-wheel">
                <svg width="260" height="260" viewBox="0 0 260 260">
                  {mappedSegments.map((seg,i)=>(
                    <path key={i} d={arc(130,130,100,seg.startAngle,seg.endAngle,85)} fill={seg.color} opacity="0.85"/>
                  ))}
                  <circle cx="130" cy="130" r="85" fill="var(--bg)"/>
                  <text x="130" y="122" textAnchor="middle" fill="var(--text)" fontFamily="'Barlow Condensed',sans-serif" fontWeight="700" fontSize="18">DAY {dayOfCycle}</text>
                  <text x="130" y="140" textAnchor="middle" fill="var(--text3)" fontFamily="'DM Mono',monospace" fontSize="7" letterSpacing="0.08em">
                    {dayOfCycle<=5?'MENSTRUAL':dayOfCycle<=12?'FOLLICULAR':dayOfCycle<=15?'OVULATION':'LUTEAL'}
                  </text>
                  {dayNums.map(n=>(
                    <text key={n.d} x={n.x} y={n.y+3} textAnchor="middle" fill={n.d===dayOfCycle?'var(--pink)':'var(--text3)'} fontFamily="'DM Mono',monospace" fontSize="8" fontWeight={n.d===dayOfCycle?'700':'400'}>{n.d}</text>
                  ))}
                  <circle cx={130+92*Math.cos(dayAngle)} cy={130+92*Math.sin(dayAngle)} r="4" fill="var(--text)"/>
                </svg>
              </div>
            </div>

            <div className="section-label">§ REGISTERED SEQUENCES</div>
            <div className="item-list">
              {logs.map(l=>(
                <div key={l.id} className="meal-card" style={{borderLeft:'2px solid var(--pink)'}}>
                  <div className="meal-name" style={{fontSize:'14px'}}>SEQUENCE START: {fmtDate(l.startDate)}</div>
                  <div className="meal-note" style={{marginTop:'4px',color:'var(--text2)'}}>Duration limits: {l.cycleLength} days</div>
                  {l.symptoms && (
                    <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:8}}>
                      {l.symptoms.split(',').map(s=><span key={s} className="macro-badge kcal" style={{background:'rgba(255,255,255,0.04)',color:'var(--text2)',border:'1px solid var(--border)'}}>{s}</span>)}
                    </div>
                  )}
                </div>
              ))}
            </div>
            {logs.length===0&&<div className="no-events"><div className="no-events-icon">🩸</div><div className="no-events-text">NO BIOLOGICAL RECTALS REPORTED</div></div>}
            <div style={{height:'80px'}}/>
          </div>
        </div>
        <button className="fab pink" onClick={()=>setShowForm(true)}>+ LOG CYCLE DATA</button>

        {showForm && (
          <div className="modal-overlay" onClick={()=>setShowForm(false)}>
            <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
              <div className="modal-title">LOG SYSTEM SEQUENCE</div>

              <div className="form-field">

              </div>
              <div className="form-field">
                <label className="form-label">Symptoms</label>
                <div className="type-toggle" style={{flexWrap:'wrap'}}>
                  {SYMPTOMS.map(s=><button key={s} className={`type-toggle-btn ${form.symptoms.includes(s)?'active':''}`} onClick={()=>setForm(p=>({...p,symptoms:p.symptoms.includes(s)?p.symptoms.filter(x=>x!==s):[...p.symptoms,s]}))}>{s}</button>)}

              <button className="form-submit" style={{background:'var(--pink)'}} onClick={handleSave}>SAVE CYCLE</button>
              <button className="form-cancel" onClick={()=>setShowForm(false)}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    );
  };

      <div className="app-shell">
        <div style={{flex:1,overflow:'hidden',minHeight:0}}>
          {activeTab==='finances'&&<FinancesPage {...sharedProps}/>}
          {activeTab==='calendar'&&<CalendarPage {...sharedProps}/>}
          {activeTab==='budget'  &&<BudgetPage   {...sharedProps}/>}
          {activeTab==='gym'     &&<GymPage      {...sharedProps}/>}
          {activeTab==='meals'   &&<MealsPage    {...sharedProps}/>}
          {activeTab==='cycle'   &&<CyclePage    {...sharedProps}/>}
          {activeTab==='profile' &&<ProfilePage  user={user} setUser={setUser} partner={partner} setPartner={setPartner} sharingConfig={sharingConfig} setSharingConfig={setSharingConfig}/>}
        </div>
        <div className="bottom-tabs">
          {TABS.map(t=>(
            <button key={t.id} className={`tab-btn ${activeTab===t.id?'active':''}`} onClick={()=>setActiveTab(t.id)}>
              <span className="tab-icon">{ICONS[t.id]}</span>
              <span className="tab-label">{t.label}</span>
            </button>
          ))}
          <button className="tab-btn" onClick={handleLogout}>
            <span className="tab-icon">{ICONS.logout}</span>
            <span className="tab-label">Logout</span>
          </button>
        </div>
      </div>
    );
  };

  const root = RoyaltyDOM.createRoot(document.getElementById('root'));
  // Temporary bypass for local syntax quirk mapping ReactDom target node
  const rEl = document.getElementById('root');
  ReactDOM.createRoot(rEl).render(<AppShell />);
</script>
</body>
</html>
