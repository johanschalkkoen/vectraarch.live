<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Legacy"/>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>Legacy · Vectra Arch</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.20.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.4.0/dist/axios.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="/legacy/auth-guard.js"></script>
  <link rel="stylesheet" href="/shared/legacy.css"/>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── CONSTANTS ── */
const API = '/legacy/api';
const DP = 'https://placehold.co/50x50/2a2d31/888?text=U';
const MONTHS = Array.from({length:12},(_,i)=>({v:(i+1).toString().padStart(2,'0'),l:new Date(2026,i,1).toLocaleString('default',{month:'long'})}));
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const fmtR = n => `R${parseFloat(n||0).toLocaleString('en-ZA',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtDate = d => { if(!d)return'—'; const dt=new Date(d); return isNaN(dt)?'—':dt.toLocaleDateString('en-ZA',{year:'numeric',month:'2-digit',day:'2-digit'}); };
const fmtDateTime = d => { if(!d)return'—'; const dt=new Date(d); return isNaN(dt)?'—':dt.toLocaleString('en-ZA',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).replace(',',''); };
const now = () => { const n=new Date(); n.setMinutes(n.getMinutes()-n.getTimezoneOffset()); return n.toISOString().slice(0,19); };
const todayISO = () => new Date().toISOString().slice(0,10);

/* ── TAB ICONS (SVG inline) ── */
const Icons = {
  finances: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>,
  calendar: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  budget:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><rect x="2" y="3" width="8" height="8" rx="1"/><rect x="14" y="3" width="8" height="8" rx="1"/><rect x="2" y="13" width="8" height="8" rx="1"/><rect x="14" y="13" width="8" height="8" rx="1"/></svg>,
  gym:      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M6 4v16M18 4v16M2 9h4M18 9h4M2 15h4M18 15h4M6 12h12"/></svg>,
  meals:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>,
  cycle:    <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 2C12 2 5 10.5 5 15a7 7 0 0 0 14 0C19 10.5 12 2 12 2z" opacity="0.9"/></svg>,
  profile:  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  search:   <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="14" height="14"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>,
  admin:    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" width="20" height="20"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
};

/* ── SHARED COMPONENTS ── */
const UserRow = ({user, partner, partners=[], activePartners=[], permittedPartners=[],
    selfVisible=true, tabSelected, isShared, onToggleUser}) => {
  const selfOn = tabSelected ? tabSelected.has(user?.username) : true;
  const selfColor = user?.eventColor || '#e91e8c';
  return (
    <div className="user-row" style={{flexWrap:'wrap',gap:6}}>
      {/* Self chip — clickable to toggle own data */}
      <div
        onClick={()=>onToggleUser&&onToggleUser(user?.username)}
        style={{
          display:'flex',alignItems:'center',gap:8,
          background:selfOn?`${selfColor}18`:'var(--bg3)',
          border:`1px solid ${selfOn?selfColor:'rgba(255,255,255,0.12)'}`,
          borderRadius:4,padding:'6px 10px',cursor:'pointer',
          transition:'all 0.15s',opacity:selfOn?1:0.5,
        }}>
        <img src={user?.profilePicUrl||DP} alt={user?.username}
          style={{width:28,height:28,borderRadius:'50%',objectFit:'cover',border:`2px solid ${selfColor}`}}/>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:500,letterSpacing:'0.06em',
          textTransform:'uppercase',color:selfOn?selfColor:'var(--text3)'}}>
          {user?.displayName||(user?.firstName&&user?.lastName?`${user.firstName} ${user.lastName}`:null)||user?.username||'USER'}
        </span>
        <span style={{fontSize:9,color:selfOn?selfColor:'var(--text3)'}}>{selfOn?'●':'○'}</span>
      </div>

      {/* Partner chips — only shown if they have permission for this tab */}
      {permittedPartners.map(p=>{
        const on = tabSelected ? tabSelected.has(p.username) : false;
        const pc = p.eventColor||'#448aff';
        return (
          <div key={p.username}
            onClick={()=>onToggleUser&&onToggleUser(p.username)}
            style={{
              display:'flex',alignItems:'center',gap:8,
              background:on?`${pc}18`:'var(--bg3)',
              border:`1px solid ${on?pc:'rgba(255,255,255,0.12)'}`,
              borderRadius:4,padding:'6px 10px',cursor:'pointer',
              transition:'all 0.15s',opacity:on?1:0.5,
            }}>
            <img src={p.profilePicUrl||DP} alt={p.username}
              style={{width:28,height:28,borderRadius:'50%',objectFit:'cover',border:`2px solid ${pc}`}}/>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:500,letterSpacing:'0.06em',
              textTransform:'uppercase',color:on?pc:'var(--text3)'}}>
              {p.displayName||(p.firstName&&p.lastName?`${p.firstName} ${p.lastName}`:null)||p.username}
            </span>
            <span style={{fontSize:9,color:on?pc:'var(--text3)'}}>{on?'●':'○'}</span>
          </div>
        );
      })}
    </div>
  );
};

const Alert = ({msg,type}) => msg ? <div className={`alert ${type||'ok'}`}>{msg}</div> : null;

// ── Avatar helpers — resolves pic/color for any username across user+partner ──
// Usage: <ItemAvatar username={item.user} user={user} partner={partner} partners={partners} size={36}/>
// getOwner: resolve user object from username — checks user, partner, and partners array
const getOwner = (username, user, partner, partners=[]) => {
  const uname = String(username||'');
  if(uname===user?.username) return user;
  if(uname===partner?.username) return partner;
  if(partners?.length) { const found=partners.find(p=>p.username===uname); if(found) return found; }
  return null;
};
const ItemAvatar = ({username, user, partner, partners=[], size=36}) => {
  const owner = getOwner(username, user, partner, partners);
  const pic   = owner?.profilePicUrl || DP;
  const color = owner?.eventColor    || '#888';
  return (
    <img
      src={pic} alt={String(username||'')}
      style={{width:size,height:size,borderRadius:'50%',objectFit:'cover',
              flexShrink:0,border:`2px solid ${color}`}}
    />
  );
};

/* ── FINANCES PAGE ── */
const FinancesPage = ({user, partner, partners=[], activePartners=[], permittedPartners=[], selfVisible=true, isShared, tabSelected, onToggleUser, tabColor='#00e676'}) => {
  const [items, setItems] = useState([]);
  const [budgets, setBudgets] = useState([]);
  const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
  const [sortField, setSortField] = useState('date');
  const [search, setSearch] = useState('');
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({category:'',amount:'',type:'expense',date:now()});
  const [editId, setEditId] = useState(null);
  const [alert, setAlert] = useState({msg:'',type:''});

  const msg = (m,t='ok') => { setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const fetchAll = useCallback(async () => {
    const users = [...(selfVisible?[user.username]:[]), ...(activePartners||[]).map(p=>p.username)];
    try {
      const [fins, buds] = await Promise.all([
        Promise.all(users.map(u=>axios.get(`${API}/financial`,{params:{user:u}}).then(r=>r.data).catch(()=>[]))).then(r=>r.flat()),
        Promise.all(users.map(u=>axios.get(`${API}/budget`,{params:{user:u}}).then(r=>r.data.map(b=>({...b,expenses:JSON.parse(b.expenses||'[]')}))).catch(()=>[]))).then(r=>r.flat())
      ]);
      setItems(fins); setBudgets(buds);
    } catch {}
  }, [user.username, partner, isShared]);

  useEffect(()=>{ fetchAll(); },[fetchAll]);

  const filtered = useMemo(()=>{
    const users = [...(selfVisible?[user.username]:[]), ...(activePartners||[]).map(p=>p.username)];
    if(users.length===0) return [];
    let list = items.filter(i=>users.includes(i.user||i.username)&&(i.date||'').slice(5,7)===selectedMonth);
    if(search) list = list.filter(i=>(i.category||'').toLowerCase().includes(search.toLowerCase()));
    return [...list].sort((a,b)=>sortField==='amount'?parseFloat(b.amount)-parseFloat(a.amount):new Date(b.date)-new Date(a.date));
  },[items,selectedMonth,search,sortField,user.username,selfVisible,JSON.stringify((activePartners||[]).map(p=>p.username))]);

  const totals = useMemo(()=>{
    const inc = filtered.filter(i=>i.type==='income').reduce((s,i)=>s+parseFloat(i.amount||0),0);
    const exp = filtered.filter(i=>i.type==='expense').reduce((s,i)=>s+parseFloat(i.amount||0),0);
    return {inc,exp,net:inc-exp};
  },[filtered]);

  const handleSave = async () => {
    if(!form.category||!form.amount){msg('Fill all fields.','err');return;}
    try {
      if(editId) {
        await axios.put(`${API}/financial/${editId}`,{user:user.username,category:form.category,amount:parseFloat(form.amount),type:form.type,date:form.date});
        msg('Updated.');
      } else {
        await axios.post(`${API}/financial`,{user:user.username,category:form.category,amount:parseFloat(form.amount),type:form.type,date:form.date});
        msg('Saved.');
      }
      setShowForm(false);setEditId(null);setForm({category:'',amount:'',type:'expense',date:now()});fetchAll();
    } catch { msg('Error.','err'); }
  };
  const handleFinDelete = async(id)=>{
    if(!window.confirm('Delete this transaction?')) return;
    try { await axios.delete(`${API}/financial/${id}`); msg('Deleted.'); fetchAll(); } catch { msg('Error.','err'); }
  };
  const startFinEdit = (item) => {
    setForm({category:item.category||'',amount:String(item.amount||''),type:item.type||'expense',date:(item.date||now()).slice(0,19)});
    setEditId(item.id); setShowForm(true);
  };

  const monthLabel = MONTHS.find(m=>m.v===selectedMonth)?.l||'';
  const isShared2 = isShared && partner;

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span style={{color:user?.eventColor||'#00e676'}}>§ VECTRA ARCH</span> · LEGACY · FINANCIAL</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">FINANCES</div>
            <div className="page-sub">{isShared2?'COMBINED HOUSEHOLD TOTALS':'INCOME · EXPENSES · NET TOTAL'}</div>
          </div>
          <UserRow user={user} partner={partner} partners={partners} activePartners={activePartners} permittedPartners={permittedPartners} selfVisible={selfVisible} tabSelected={tabSelected} isShared={isShared} onToggleUser={onToggleUser}/>
          <div className="toolbar-row">
            <div className="tb-chip">
              <span style={{fontSize:'9px',fontFamily:"'DM Mono',monospace",letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--text3)'}}>MONTH</span>
              <select value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
                {MONTHS.map(m=><option key={m.v} value={m.v}>{m.l} 2026</option>)}
              </select>
            </div>
            <div className={`tb-chip ${sortField==='date'?'sort-active':''}`} onClick={()=>setSortField('date')} style={{cursor:'pointer'}}>
              <span style={{fontSize:'9px',fontFamily:"'DM Mono',monospace",letterSpacing:'0.1em',textTransform:'uppercase'}}>SORT</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:'10px'}}>Date</span>
            </div>
          </div>
          <div className="search-bar">
            {Icons.search}
            <input placeholder="SEARCH TRANSACTIONS..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <Alert {...alert}/>

          {/* Summary */}
          <div className="section-label">§ SUMMARY · {monthLabel.toUpperCase()} 2026</div>
          <div className="summary-card">
            <div className="summary-grid">
              <div>
                <div className="summary-item-label">Income</div>
                <div className={`summary-item-value income`}>{fmtR(totals.inc)}</div>
              </div>
              <div>
                <div className="summary-item-label">Expenses</div>
                <div className="summary-item-value expense">{fmtR(totals.exp)}</div>
              </div>
              <div>
                <div className="summary-item-label">Net</div>
                <div className={`summary-item-value ${totals.net>=0?'net-pos':'net-neg'}`}>{fmtR(totals.net)}</div>
              </div>
            </div>
          </div>

          {/* Items */}
          <div className="section-label">§ ITEMS · {filtered.length} RECORDS</div>
          <div className="item-list">
            {filtered.map(item=>{
              const finOwner=getOwner(item.user||item.username, user, partner, partners);
              const oc = finOwner?.eventColor||'#00e676';
              const isIncome=item.type==='income';
              return (
                <div key={item.id} className="meal-card" style={{marginBottom:8,borderLeft:`3px solid ${oc}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                    <ItemAvatar username={item.user||item.username} user={user} partner={partner} partners={partners} size={36}/>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:'0.12em',padding:'3px 8px',borderRadius:3,textTransform:'uppercase',flexShrink:0,background:isIncome?'rgba(0,230,118,0.15)':'rgba(255,61,61,0.15)',color:isIncome?'var(--green)':'var(--red)',border:`1px solid ${isIncome?'rgba(0,230,118,0.3)':'rgba(255,61,61,0.3)'}`}}>{(item.type||'expense').toUpperCase()}</span>
                    {finOwner&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:oc,letterSpacing:'0.08em'}}>{(finOwner.displayName||finOwner.username||'').toUpperCase()}</span>}
                  </div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div>
                      <div className="meal-name">{(item.category||'').toUpperCase()}</div>
                      <div className="meal-note" style={{marginTop:2}}>{fmtDate(item.date)}</div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div className={`item-amount ${item.type}`}>{fmtR(item.amount)}</div>
                      {(item.user||item.username)===user.username&&(
                        <div style={{display:'flex',flexDirection:'column',gap:3}}>
                          <button onClick={()=>startFinEdit(item)} style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'var(--blue)',border:'1px solid rgba(68,138,255,0.35)',borderRadius:3,padding:'3px 7px',background:'transparent',cursor:'pointer',letterSpacing:'0.1em'}}>EDIT</button>
                          <button onClick={()=>handleFinDelete(item.id)} style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'var(--red)',border:'1px solid rgba(255,61,61,0.35)',borderRadius:3,padding:'3px 7px',background:'transparent',cursor:'pointer',letterSpacing:'0.1em'}}>DEL</button>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {filtered.length===0&&<div className="no-events"><div className="no-events-text">No transactions for {monthLabel}</div></div>}
        </div>
      </div>
      <button className="fab" style={{background:'var(--green)',color:'#000',boxShadow:'0 4px 20px rgba(0,230,118,0.4)'}} onClick={()=>setShowForm(true)}>+ ADD ITEM</button>

      {showForm&&(
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal-sheet" style={{"--page-color":tabColor||"var(--pink)"}} onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">{editId?"Edit":"Add"} Transaction</div>
            <div className="form-field">
              <label className="form-label">Category</label>
              <input className="form-input" placeholder="e.g. Groceries" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Amount (ZAR)</label>
              <input className="form-input" type="number" placeholder="0.00" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Type</label>
              <div className="type-toggle">
                {['income','expense'].map(t=><button key={t} className={`type-toggle-btn ${form.type===t?'active':''}`} onClick={()=>setForm(p=>({...p,type:t}))}>{t.toUpperCase()}</button>)}
              </div>
            </div>
            <div className="form-field">
              <label className="form-label">Date</label>
              <input className="form-input" type="datetime-local" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} step="1"/>
            </div>
            <button className="form-submit" style={{background:tabColor,color:tabColor==='#ffd600'||tabColor==='#00e676'?'#000':'#fff'}} onClick={handleSave}>{editId?"UPDATE":"SAVE"}</button>
            <button className="form-cancel" onClick={()=>{setShowForm(false);setEditId(null);setForm({category:'',amount:'',type:'expense',date:now()});}}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── CALENDAR PAGE ── */
const CalendarPage = ({user, partner, partners=[], activePartners=[], permittedPartners=[], selfVisible=true, isShared, tabSelected, onToggleUser, tabColor='#448aff'}) => {
  const [events, setEvents]           = useState([]);
  const [viewDate, setViewDate]       = useState(new Date());
  const [selectedDay, setSelectedDay] = useState(new Date());
  const [showForm, setShowForm]       = useState(false);
  const [form, setForm]               = useState({title:'',date:now(),type:'personal',color:user?.eventColor||'#448aff',amount:'',finType:'income',financial:false});
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [alert, setAlert]             = useState({msg:'',type:''});
  const msg = (m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const calUserIsMale    = (user.gender||'').toLowerCase()==='male';
  const calFemalePartners = activePartners.filter(p=>(p.gender||'').toLowerCase()==='female');
  const canSeeCycle       = !calUserIsMale || calFemalePartners.length > 0;

  // ── date helpers — always compare in LOCAL date strings to avoid TZ bugs ──
  const toLocalDate  = (d) => { const dt=new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; };
  const dayKey       = (date) => toLocalDate(date);
  const todayKey     = dayKey(new Date());
  const selectedKey  = dayKey(selectedDay);

  const fetchEvents = useCallback(async()=>{
    const users=[...(selfVisible?[user.username]:[]),...(activePartners||[]).map(p=>p.username)];
    if(users.length===0){setEvents([]);return;}
    try {
      const periodUsers = calUserIsMale ? calFemalePartners.map(p=>p.username) : users;
      const [calAll, periodAll] = await Promise.all([
        Promise.all(users.map(u=>axios.get(`${API}/calendar`,{params:{user:u}}).then(r=>r.data.map(e=>({...e,user:e.user||u}))).catch(()=>[]))).then(r=>r.flat()),
        periodUsers.length>0
          ? Promise.all(periodUsers.map(u=>axios.get(`${API}/period`,{params:{user:u}}).then(r=>r.data).catch(()=>[]))).then(r=>r.flat())
          : Promise.resolve([])
      ]);
      const cycleEvents = [];
      periodAll.forEach(cyc=>{
        if(!cyc.startDate) return;
        const start = new Date(cyc.startDate);
        const end   = cyc.endDate ? new Date(cyc.endDate) : new Date(start.getTime()+4*86400000);
        const len   = parseInt(cyc.cycleLength)||28;
        for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1))
          cycleEvents.push({id:`cycle-${cyc.id}-${toLocalDate(d)}`,title:'Period',date:toLocalDate(d)+'T00:00:00',isCycle:true,user:cyc.user||cyc.username});
        const ovulation = new Date(start.getTime()+(len-14)*86400000);
        for(let i=-4;i<=1;i++){
          const fd=new Date(ovulation.getTime()+i*86400000);
          cycleEvents.push({id:`fertile-${cyc.id}-${toLocalDate(fd)}`,title:'Fertile',date:toLocalDate(fd)+'T00:00:00',isFertile:true,user:cyc.user||cyc.username});
        }
      });
      setEvents([...calAll,...cycleEvents]);
    } catch(e){ console.error(e); }
  },[user.username, partner, isShared, selfVisible, JSON.stringify((activePartners||[]).map(p=>p.username))]);

  useEffect(()=>{ fetchEvents(); },[fetchEvents]);

  // ── calendar grid ──
  const {year, month} = useMemo(()=>({year:viewDate.getFullYear(), month:viewDate.getMonth()}),[viewDate]);
  const daysInMonth = useMemo(()=>{
    const first = new Date(year,month,1);
    const last  = new Date(year,month+1,0);
    const days  = [];
    let dow = (first.getDay()+6)%7; // Mon=0
    for(let i=0;i<dow;i++) days.push({date:new Date(year,month,1-dow+i),otherMonth:true});
    for(let d=1;d<=last.getDate();d++) days.push({date:new Date(year,month,d),otherMonth:false});
    const rem=7-(days.length%7); if(rem<7) for(let i=1;i<=rem;i++) days.push({date:new Date(year,month+1,i),otherMonth:true});
    return days;
  },[year,month]);

  // ── key fix: compare using local date strings, not Date objects ──
  const eventsByDay = useMemo(()=>{
    const map={};
    events.forEach(e=>{
      if(!e.date) return;
      const k=toLocalDate(new Date(e.date));
      if(!map[k]) map[k]=[];
      map[k].push(e);
    });
    return map;
  },[events]);

  const getEventsForDay = (date) => eventsByDay[dayKey(date)] || [];
  const selectedEvents  = useMemo(()=>getEventsForDay(selectedDay),[selectedKey,eventsByDay]);

  const handleSave = async()=>{
    if(!form.title||!form.date){msg('Title and date required.','err');return;}
    try {
      await axios.post(`${API}/calendar`,{
        user:       user.username,
        title:      form.title,
        date:       form.date,
        financial:  form.financial && !!form.amount,
        finType:    form.finType||'income',
        eventColor: form.color||user.eventColor||'#448aff',
        type:       form.financial ? form.finType : form.type,
        amount:     form.amount||null,
      });
      msg('Event saved.');
      setShowForm(false);
      setForm({title:'',date:now(),type:'personal',color:user?.eventColor||'#448aff',amount:'',finType:'income',financial:false});
      fetchEvents();
    } catch { msg('Error.','err'); }
  };
  const handleDeleteEvent = async(id)=>{
    if(!window.confirm('Delete this event?')) return;
    try { await axios.delete(`${API}/calendar/${id}`); msg('Deleted.'); setSelectedEvent(null); fetchEvents(); } catch { msg('Error.','err'); }
  };

  const prevMonth = ()=>setViewDate(new Date(year,month-1,1));
  const nextMonth = ()=>setViewDate(new Date(year,month+1,1));
  const goToday   = ()=>{ const t=new Date(); setViewDate(new Date(t.getFullYear(),t.getMonth(),1)); setSelectedDay(t); };

  const MONTHS_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAYS_FULL   =['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  const EVENT_TYPES = ['personal','work','health','social','financial'];
  const EVENT_ICONS = {
    personal:   '🌟',
    work:       '💼',
    health:     '🏃',
    social:     '🎉',
    financial:  '💰',
    income:     '💰',
    expense:    '💸',
    cycle:      '🩸',
    fertile:    '🌿',
  };
  const getEventIcon = (e) => {
    if(e.isCycle)   return '🩸';
    if(e.isFertile) return '🌿';
    if(e.financial||e.is_financial) return e.type==='expense'?'💸':'💰';
    return EVENT_ICONS[e.type||'personal']||'🌟';
  };
  const TYPE_COLORS = {personal:'var(--yellow)',work:'var(--blue)',health:'var(--green)',social:'var(--pink)',financial:'var(--green)'};

  return (
    <div className="page-outer">
      <div className="top-bar">
        <span className="top-eyebrow"><span style={{color:user?.eventColor||'#00e676'}}>§ VECTRA ARCH</span> · LEGACY · CALENDAR</span>
      </div>
      <div className="page-scroll">
        <div className="page-inner" style={{padding:0}}>
          <div className="page-head">
            <div className="page-title">CALENDAR</div>
            <div className="page-sub">EVENTS · CYCLE · SCHEDULE</div>
          </div>
          <UserRow user={user} partner={partner} partners={partners} activePartners={activePartners} permittedPartners={permittedPartners} selfVisible={selfVisible} tabSelected={tabSelected} isShared={isShared} onToggleUser={onToggleUser}/>
          <Alert {...alert}/>

          {/* ── iPhone-style month header ── */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px 4px'}}>
            <button onClick={prevMonth} style={{width:32,height:32,borderRadius:'50%',background:'var(--bg3)',border:'none',color:'var(--text)',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
            <div style={{textAlign:'center'}}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:22,letterSpacing:'0.04em',color:'var(--text)'}}>{MONTHS_SHORT[month].toUpperCase()} {year}</div>
            </div>
            <div style={{display:'flex',gap:6}}>
              <button onClick={goToday} style={{height:32,padding:'0 12px',borderRadius:16,background:tabColor,border:'none',color:'#fff',fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:'0.1em',cursor:'pointer'}}>TODAY</button>
              <button onClick={nextMonth} style={{width:32,height:32,borderRadius:'50%',background:'var(--bg3)',border:'none',color:'var(--text)',fontSize:18,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
            </div>
          </div>

          {/* ── Day-of-week headers ── */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',padding:'0 8px',marginBottom:4}}>
            {['M','T','W','T','F','S','S'].map((d,i)=>(
              <div key={i} style={{textAlign:'center',fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:'0.1em',color:i>=5?'var(--red)':'var(--text3)',padding:'4px 0'}}>{d}</div>
            ))}
          </div>

          {/* ── Calendar grid — iPhone style ── */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',padding:'0 8px',gap:'2px 0'}}>
            {daysInMonth.map((item,i)=>{
              const k         = dayKey(item.date);
              const dayEvts   = eventsByDay[k]||[];
              const hasCycle  = canSeeCycle && dayEvts.some(e=>e.isCycle);
              const hasFertile= canSeeCycle && dayEvts.some(e=>e.isFertile);
              const realEvts  = dayEvts.filter(e=>!e.isCycle&&!e.isFertile);
              const isToday   = k===todayKey;
              const isSel     = k===selectedKey;
              const isWeekend = i%7>=5;
              const numColor  = item.otherMonth?'var(--border2)':hasCycle?'#fff':isToday?'#fff':isSel?tabColor:isWeekend?'var(--red)':'var(--text)';
              const numBg     = isToday&&!hasCycle?tabColor:isSel&&!isToday&&!hasCycle?`${tabColor}22`:'transparent';
              return (
                <div key={i} onClick={()=>!item.otherMonth&&setSelectedDay(item.date)}
                  style={{
                    display:'flex',flexDirection:'column',alignItems:'center',
                    padding:'4px 0 6px',cursor:item.otherMonth?'default':'pointer',
                    background:hasCycle?'rgba(233,30,140,0.22)':hasFertile?'rgba(29,233,182,0.1)':'transparent',
                    borderRadius:6,
                    opacity:item.otherMonth?0.25:1,
                  }}>
                  {/* Day number */}
                  <div style={{
                    width:28,height:28,borderRadius:'50%',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    background:numBg,
                    fontFamily:"'Barlow Condensed',sans-serif",fontWeight:isSel||isToday?800:500,
                    fontSize:15,color:numColor,
                  }}>{item.date.getDate()}</div>
                  {/* Event icons */}
                  <div style={{display:'flex',gap:1,marginTop:2,height:10,alignItems:'center',justifyContent:'center',flexWrap:'nowrap'}}>
                    {hasCycle&&<span style={{fontSize:7,lineHeight:1}}>🩸</span>}
                    {hasFertile&&!hasCycle&&<span style={{fontSize:7,lineHeight:1}}>🌿</span>}
                    {realEvts.slice(0,2).map((e,j)=>(
                      <span key={j} style={{fontSize:7,lineHeight:1}}>{getEventIcon(e)}</span>
                    ))}
                    {realEvts.length>2&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:6,color:'var(--text3)'}}>+{realEvts.length-2}</span>}
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── Legend inline ── */}
          <div style={{display:'flex',flexWrap:'wrap',gap:8,padding:'8px 12px 4px',borderTop:'1px solid var(--border)',marginTop:4}}>
            {canSeeCycle&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.08em',color:'var(--text3)'}}>🩸 MENSTRUATION</span>}
            {canSeeCycle&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.08em',color:'var(--text3)'}}>🌿 OVULATION</span>}
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.08em',color:'var(--text3)'}}>🌟 PERSONAL</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.08em',color:'var(--text3)'}}>💼 WORK</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.08em',color:'var(--text3)'}}>🏃 HEALTH</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.08em',color:'var(--text3)'}}>💰 INCOME</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.08em',color:'var(--text3)'}}>💸 EXPENSE</span>
          </div>

          {/* ── Selected day header — iPhone style ── */}
          <div style={{padding:'14px 16px 6px',borderTop:'1px solid var(--border)',marginTop:8,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:18,color:'var(--text)',letterSpacing:'0.02em'}}>
                {DAYS_FULL[selectedDay.getDay()].toUpperCase()}{' '}
                <span style={{color:tabColor}}>{selectedDay.getDate()}</span>
                {' '}{MONTHS_SHORT[selectedDay.getMonth()]} {selectedDay.getFullYear()}
              </div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--text3)',marginTop:2}}>
                {selectedEvents.filter(e=>!e.isCycle&&!e.isFertile).length} event{selectedEvents.filter(e=>!e.isCycle&&!e.isFertile).length!==1?'s':''}
                {canSeeCycle&&selectedEvents.some(e=>e.isCycle)?' · 🩸 period':''}
                {canSeeCycle&&selectedEvents.some(e=>e.isFertile)?' · 🩵 ovulation':''}
              </div>
            </div>

          </div>

          {/* ── Events list ── */}
          <div style={{padding:'0 16px'}}>
            {canSeeCycle&&selectedEvents.some(e=>e.isCycle)&&(
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'rgba(233,30,140,0.1)',border:'1px solid rgba(233,30,140,0.25)',borderRadius:8,marginBottom:8}}>
                <span style={{fontSize:16}}>🩸</span>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:'#e91e8c'}}>MENSTRUATION DAY</div>
              </div>
            )}
            {canSeeCycle&&selectedEvents.some(e=>e.isFertile)&&(
              <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'rgba(29,233,182,0.08)',border:'1px solid rgba(29,233,182,0.25)',borderRadius:8,marginBottom:8}}>
                <span style={{fontSize:16}}>🌿</span>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14,color:'#1de9b6'}}>OVULATION WINDOW</div>
              </div>
            )}
            {selectedEvents.filter(e=>!e.isCycle&&!e.isFertile).length===0&&!selectedEvents.some(e=>e.isCycle||e.isFertile)&&(
              <div style={{textAlign:'center',padding:'24px 0',color:'var(--text3)',fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:'0.1em'}}>
                NO EVENTS
              </div>
            )}
            {selectedEvents.filter(e=>!e.isCycle&&!e.isFertile).map(e=>{
              const calOwner = getOwner(e.user||e.username,user,partner,partners);
              const coc      = calOwner?.eventColor||e.eventColor||e.event_color||'var(--yellow)';
              const isOwn    = (e.user||e.username)===user.username;
              const icon     = getEventIcon(e);
              const isFin    = e.financial||e.is_financial||e.financial==='1'||e.is_financial===1;
              const badgeColor = isFin ? (e.type==='expense'?'var(--red)':'var(--green)') : coc;
              const timeStr = fmtDate(e.date);
              return (
                <div key={e.id} className="meal-card" style={{marginBottom:8,borderLeft:`3px solid ${coc}`}}>
                  {/* Top row: avatar + icon badge + owner name — same as gym/budget */}
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                    <ItemAvatar username={e.user||e.username} user={user} partner={partner} partners={partners} size={36}/>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:'0.12em',
                      padding:'3px 8px',borderRadius:3,textTransform:'uppercase',flexShrink:0,
                      background: isFin?(e.type==='expense'?'rgba(255,61,61,0.15)':'rgba(0,230,118,0.15)'):`${coc}20`,
                      color:      isFin?(e.type==='expense'?'var(--red)':'var(--green)'):coc,
                      border:     isFin?(e.type==='expense'?'1px solid rgba(255,61,61,0.4)':'1px solid rgba(0,230,118,0.4)'):`1px solid ${coc}55`}}>
                      {icon} {isFin?(e.type==='expense'?'EXPENSE':'INCOME'):(e.type||'personal').toUpperCase()}
                    </span>
                    {calOwner&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:coc,letterSpacing:'0.08em'}}>
                      {(calOwner.displayName||(calOwner.firstName&&calOwner.lastName?`${calOwner.firstName} ${calOwner.lastName}`:null)||calOwner.username||'').toUpperCase()}
                    </span>}
                  </div>
                  {/* Title */}
                  <div className="meal-name" style={{marginBottom:6}}>{(e.title||'Untitled').toUpperCase()}</div>
                  {/* Time + amount row */}
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div className="meal-note">{timeStr}</div>
                    {e.amount&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:600,
                      color:e.type==='expense'?'var(--red)':'var(--green)'}}>{fmtR(e.amount)}</div>}
                  </div>
                  {isOwn&&(
                    <button onClick={()=>handleDeleteEvent(e.id)}
                      style={{marginTop:8,fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'var(--red)',
                        background:'transparent',border:'none',cursor:'pointer',textTransform:'uppercase',letterSpacing:'0.1em'}}>
                      ✕ Remove
                    </button>
                  )}
                </div>
              );
            })}
          </div>

          <div style={{height:'80px'}}/>
        </div>
      </div>


      <button className="fab" style={{background:tabColor,boxShadow:`0 4px 20px ${tabColor}66`}}
        onClick={()=>{ setForm(p=>({...p,date:dayKey(selectedDay)+'T09:00:00'})); setShowForm(true); }}>
        + ADD EVENT
      </button>

      {/* ── Event detail modal ── */}
      {selectedEvent&&(
        <div className="modal-overlay" onClick={()=>setSelectedEvent(null)}>
          <div className="modal-sheet" onClick={e=>e.stopPropagation()} style={{borderRadius:'16px 16px 0 0'}}>
            <div className="modal-handle"/>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
              <ItemAvatar username={selectedEvent.user||selectedEvent.username} user={user} partner={partner} partners={partners} size={40}/>
              <div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:20,color:'var(--text)'}}>{(selectedEvent.title||'').toUpperCase()}</div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:'var(--text3)',marginTop:2}}>
                  {fmtDate(selectedEvent.date)} · {(selectedEvent.type||'personal').toUpperCase()}
                </div>
              </div>
            </div>
            {selectedEvent.amount&&<div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:18,color:'var(--green)',marginBottom:12}}>{fmtR(selectedEvent.amount)}</div>}
            {(selectedEvent.user||selectedEvent.username)===user.username&&(
              <button onClick={()=>handleDeleteEvent(selectedEvent.id)}
                style={{width:'100%',padding:'12px',background:'rgba(255,61,61,0.12)',border:'1px solid rgba(255,61,61,0.3)',borderRadius:8,color:'var(--red)',fontFamily:"'DM Mono',monospace",fontSize:11,letterSpacing:'0.12em',cursor:'pointer',textTransform:'uppercase'}}>
                DELETE EVENT
              </button>
            )}
          </div>
        </div>
      )}

      {/* ── Add event modal ── */}
      {showForm&&(
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal-sheet" style={{"--page-color":tabColor||"var(--pink)","borderRadius":'16px 16px 0 0'}} onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">New Event</div>
            <div className="form-field">
              <label className="form-label">Title</label>
              <input className="form-input" placeholder="Event name" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} autoFocus/>
            </div>
            <div className="form-field">
              <label className="form-label">Date & Time</label>
              <input className="form-input" type="datetime-local" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))}/>
            </div>
            {/* Financial toggle */}
            <div className="form-field">
              <label className="form-label">Has Financial Impact?</label>
              <div style={{display:'flex',gap:10,paddingTop:6}}>
                {[['no','No'],['yes','Yes — add to Finances']].map(([v,l])=>(
                  <button key={v} onClick={()=>setForm(p=>({...p,financial:v==='yes'}))}
                    style={{fontFamily:"'DM Mono',monospace",fontSize:10,letterSpacing:'0.1em',textTransform:'uppercase',
                      padding:'8px 16px',borderRadius:4,cursor:'pointer',
                      border:`1px solid ${(v==='yes')===form.financial?tabColor:'var(--border2)'}`,
                      color:(v==='yes')===form.financial?tabColor:'var(--text3)',
                      background:(v==='yes')===form.financial?`${tabColor}18`:'transparent'}}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
            {form.financial&&(
              <>
                <div className="form-field">
                  <label className="form-label">Type</label>
                  <div className="type-toggle">
                    {['income','expense'].map(t=>(
                      <button key={t} className={`type-toggle-btn ${form.finType===t?'active':''}`}
                        onClick={()=>setForm(p=>({...p,finType:t}))}
                        style={form.finType===t?{borderColor:t==='income'?'var(--green)':'var(--red)',color:t==='income'?'var(--green)':'var(--red)',background:t==='income'?'rgba(0,230,118,0.1)':'rgba(255,61,61,0.1)'}:{}}>
                        {t.toUpperCase()}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="form-field">
                  <label className="form-label">Amount (R)</label>
                  <input className="form-input" type="number" placeholder="e.g. 1500" value={form.amount}
                    onChange={e=>setForm(p=>({...p,amount:e.target.value}))}/>
                </div>
              </>
            )}
            {!form.financial&&(
              <div className="form-field">
                <label className="form-label">Category</label>
                <div className="type-toggle">
                  {EVENT_TYPES.map(t=>(
                    <button key={t} className={`type-toggle-btn ${form.type===t?'active':''}`}
                      onClick={()=>setForm(p=>({...p,type:t}))}>{t.toUpperCase()}</button>
                  ))}
                </div>
              </div>
            )}
            <button className="form-submit" style={{background:tabColor}} onClick={handleSave}>SAVE EVENT</button>
            <button className="form-cancel" onClick={()=>setShowForm(false)}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
};

/* ── BUDGET PAGE ── */
const BudgetPage = ({user, partner, partners=[], activePartners=[], permittedPartners=[], selfVisible=true, isShared, tabSelected, onToggleUser, tabColor='#ffd600'}) => {
  const [budgets, setBudgets] = useState([]);
  const [items, setItems] = useState([]);
  const [selectedMonth, setSelectedMonth] = useState(String(new Date().getMonth()+1).padStart(2,'0'));
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({name:'',category:'',income:'',expenses:[{category:'',amount:''}],date:now()});
  const [alert, setAlert] = useState({msg:'',type:''});

  const msg=(m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const fetchAll = useCallback(async()=>{
    const users=[...(selfVisible?[user.username]:[]),...(activePartners||[]).map(p=>p.username)];
    try {
      const [buds,fins]=await Promise.all([
        Promise.all(users.map(u=>axios.get(`${API}/budget`,{params:{user:u}}).then(r=>{const rows=r.data.data||r.data||[];return rows.map(b=>({...b,expenses:Array.isArray(b.expenses)?b.expenses:(typeof b.expenses==='string'?JSON.parse(b.expenses||'[]'):(b.expenses||[])),user:b.user||u}));}).catch(()=>[]))).then(r=>r.flat()),
        Promise.all(users.map(u=>axios.get(`${API}/financial`,{params:{user:u}}).then(r=>r.data).catch(()=>[]))).then(r=>r.flat())
      ]);
      setBudgets(buds); setItems(fins);
    } catch {}
  },[user.username, partner, isShared, selfVisible, JSON.stringify((activePartners||[]).map(p=>p.username))]);

  useEffect(()=>{ fetchAll(); },[fetchAll]);

  const filteredBudgets = useMemo(()=>{
    const users=[...(selfVisible?[user.username]:[]),...(activePartners||[]).map(p=>p.username)];
    if(users.length===0) return [];
    return budgets.filter(b=>{
      const d = b.date||'';
      const month = d.slice(5,7);
      return month===selectedMonth && users.includes(b.user||b.username||user.username);
    });
  },[budgets,selectedMonth,user.username,selfVisible,JSON.stringify((activePartners||[]).map(p=>p.username))]);

  const totalPlanned = filteredBudgets.reduce((s,b)=>s+b.expenses.reduce((ss,e)=>ss+parseFloat(e.amount||0),0),0);
  const totalActual = useMemo(()=>{
    const users=[...(selfVisible?[user.username]:[]),...(activePartners||[]).map(p=>p.username)];
    return items.filter(i=>users.includes(i.user||i.username)&&(i.date||'').slice(5,7)===selectedMonth&&i.type==='expense').reduce((s,i)=>s+parseFloat(i.amount||0),0);
  },[items,selectedMonth,user.username,selfVisible,JSON.stringify((activePartners||[]).map(p=>p.username))]);

  const getBudgetActual = (b) => {
    const users=[...(selfVisible?[user.username]:[]),...(activePartners||[]).map(p=>p.username)];

const GYM_CARDIO_VALS = new Set(['Steady-state running or jogging','Interval sprints','Incline walking or running','Steady-state cycling','HIIT cycling','Hill climb simulations','Steady-state rowing','Sprint intervals','Endurance rows','Steady-state stair climbing','Interval climbing','Run · Zone 2','Trail Run','Interval Run','Easy Jog','Spin Class']);
const GYM_MOBILITY_VALS = new Set(['Yoga Flow','Vinyasa Flow','Hatha Yoga','Foam Rolling','Stretching','Mat Pilates']);
const gymIsCardio = ex => GYM_CARDIO_VALS.has(ex)||['run','bike','cycle','swim','treadmill','elliptical','row','stair','sprint','jog','walk','hike','trail'].some(k=>(ex||'').toLowerCase().includes(k));
const gymIsMobility = ex => GYM_MOBILITY_VALS.has(ex)||['yoga','stretch','pilates','mobility','foam','roll'].some(k=>(ex||'').toLowerCase().includes(k));
const gymGetType = ex => gymIsMobility(ex)?'mobility':gymIsCardio(ex)?'cardio':'strength';

const gymFormatDetail = w => {
  const reps=String(w.reps||''), weight=String(w.weight||'');
  if(gymIsCardio(w.exercise)) return `${reps} min · ${weight} km`;
  if(gymIsMobility(w.exercise)) return `${reps} min · ${weight}`;
  const sets=parseInt(w.sets)||1;
  if(sets>1&&reps.includes(',')&&weight.includes(',')) {
    const ra=reps.split(',').map(r=>r.trim()), wa=weight.split(',').map(x=>x.trim());
    if(ra.length===sets&&wa.length===sets) return ra.map((r,i)=>`${r} reps @ ${wa[i]} kg`).join(' · ');
  }
  return `${sets} × ${reps} reps @ ${weight} kg`;
};

// Helper: compute cycle stats for a list of cycles
const cycleStats = (cycles) => {
  const sorted  = [...cycles].sort((a,b)=>new Date(b.startDate)-new Date(a.startDate));
  const latest  = sorted[0] || null;
  const avgLen  = cycles.length ? Math.round(cycles.reduce((s,c)=>s+(parseInt(c.cycleLength)||28),0)/cycles.length) : 28;
  const dayOfCycle = latest ? Math.max(1, Math.min(Math.floor((new Date()-new Date(latest.startDate))/86400000)+1, avgLen)) : 1;
  const nextPeriod = latest ? new Date(new Date(latest.startDate).getTime() + avgLen*86400000) : null;
  const fertileStart = nextPeriod ? new Date(nextPeriod.getTime() - ((avgLen-14)+3)*86400000) : null;
  const fertileEnd   = fertileStart ? new Date(fertileStart.getTime() + 5*86400000) : null;
  return {sorted, latest, avgLen, dayOfCycle, nextPeriod, fertileStart, fertileEnd};
};

// Phase wheel SVG — proper donut
const PhaseWheel = ({dayOfCycle=1, cycleLength=28, accentColor='#e91e8c'}) => {
  const S=260,cx=130,cy=130,outerR=100,innerR=62,numR=outerR+16;
  // Dynamic phases based on actual cycle length:
  // Menstruation: days 1-5
  // Follicular (gray): days 6 to ovulation-3
  // Fertile/Ovulation (teal): 5 days centered on ovulation (day cycleLength-14)
  const mensDays  = 5;                           // menstruation always ~5 days
  const ovDay     = Math.max(cycleLength-14, 1); // ovulation day within cycle
  const fertStart = Math.max(ovDay-4, mensDays+1); // fertile window start
  const ovDays    = Math.min(6, cycleLength - fertStart - 1); // fertile window span
  const preOvDays = Math.max(fertStart - mensDays, 0);        // gray before fertile
  const lutDays   = Math.max(cycleLength - mensDays - preOvDays - ovDays, 1); // gray after
  const phases=[
    {name:'Menstruation', days:mensDays,  color:'#e91e8c'},  // pink
    {name:'Follicular',   days:preOvDays, color:'#2a2d32'},  // dark gray
    {name:'Ovulation',    days:ovDays,    color:'#1de9b6'},  // teal
    {name:'Luteal',       days:lutDays,   color:'#2a2d32'},  // dark gray
  ];
  const total=phases.reduce((s,p)=>s+p.days,0);
  const segs=[];let angle=-Math.PI/2;
  phases.forEach(p=>{const span=(p.days/total)*2*Math.PI;segs.push({...p,sa:angle,ea:angle+span});angle+=span;});
  const arc=(sa,ea)=>{
    const g=0.02,s=sa+g,e=ea-g;
    const x1=cx+outerR*Math.cos(s),y1=cy+outerR*Math.sin(s);
    const x2=cx+outerR*Math.cos(e),y2=cy+outerR*Math.sin(e);
    const ix1=cx+innerR*Math.cos(e),iy1=cy+innerR*Math.sin(e);
    const ix2=cx+innerR*Math.cos(s),iy2=cy+innerR*Math.sin(s);
    const lg=(e-s)>Math.PI?1:0;
    return `M${x1},${y1} A${outerR},${outerR},0,${lg},1,${x2},${y2} L${ix1},${iy1} A${innerR},${innerR},0,${lg},0,${ix2},${iy2} Z`;
  };
  const dayNums=[];
  for(let d=1;d<=total;d++){
    const a=-Math.PI/2+(((d-0.5)/total)*2*Math.PI);
    dayNums.push({d,x:cx+numR*Math.cos(a),y:cy+numR*Math.sin(a)});
  }
  const curA=-Math.PI/2+((dayOfCycle-0.5)/total)*2*Math.PI;
  const phase = dayOfCycle<=mensDays ? 'MENSTRUATION'
    : dayOfCycle<fertStart           ? 'FOLLICULAR'
    : dayOfCycle<=(fertStart+ovDays) ? 'OVULATION'
    : 'LUTEAL';
  return (
    <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`}>
      {segs.map((seg,i)=><path key={i} d={arc(seg.sa,seg.ea)} fill={seg.color} opacity="0.9"/>)}
      {dayNums.map(({d,x,y})=>d!==dayOfCycle&&(
        <text key={d} x={x} y={y} textAnchor="middle" dominantBaseline="middle"
          fill="rgba(255,255,255,0.45)" fontFamily="'DM Mono',monospace" fontSize="8">{d}</text>
      ))}
      <circle cx={cx} cy={cy} r={innerR-1} fill="#0d0e10"/>
      <text x={cx} y={cy-10} textAnchor="middle" fill="#f0f0f0" fontFamily="'Barlow Condensed',sans-serif" fontWeight="800" fontSize="22">DAY {dayOfCycle}</text>
      <text x={cx} y={cy+10} textAnchor="middle" fill="#5a5f65" fontFamily="'DM Mono',monospace" fontSize="8" letterSpacing="0.1em">{phase} PHASE</text>
      <circle cx={cx+numR*Math.cos(curA)} cy={cy+numR*Math.sin(curA)} r="12" fill="white"/>
      <text x={cx+numR*Math.cos(curA)} y={cy+numR*Math.sin(curA)} textAnchor="middle" dominantBaseline="middle"
        fill="#0d0e10" fontFamily="'DM Mono',monospace" fontWeight="700" fontSize="9">{dayOfCycle}</text>
    </svg>
  );
};

const CyclePage = ({user, partner, partners=[], activePartners=[], permittedPartners=[], selfVisible=true, isShared, tabSelected, onToggleUser, tabColor='#e91e8c'}) => {
  // allCycles stored per username: { username: [cycles] }
  const [allCycles, setAllCycles] = useState({});
  const [showForm, setShowForm]   = useState(false);
  const [editCycleId, setEditCycleId] = useState(null);
  const [form, setForm] = useState({startDate:todayISO(),endDate:'',cycleLength:'28',symptoms:[],date:now()});
  const [alert, setAlert] = useState({msg:'',type:''});

  const SYMPTOMS = ['Nausea','Pain','Cramps','Headache','Bloating','Mood swings','Fatigue'];
  const msg = (m,t='ok')=>{ setAlert({msg:m,type:t}); setTimeout(()=>setAlert({msg:'',type:''}),4000); };

  const isMale = (user.gender||'').toLowerCase()==='male';
  // Build visible users list respecting the chip selection (tabSelected + selfVisible)
  const allUsers = useMemo(()=>{
    const femalePartners = activePartners.filter(p=>(p.gender||'').toLowerCase()==='female');
    if(isMale) {
      // Male: only show female partners who are selected
      return femalePartners.filter(p=> !tabSelected || tabSelected.has(p.username));
    }
    // Female: include self only if selfVisible (own chip is active)
    const self = selfVisible ? [user] : [];
    // Include female partners whose chip is selected
    const selectedPartners = femalePartners.filter(p=> !tabSelected || tabSelected.has(p.username));
    return [...self, ...selectedPartners];
  },[user, activePartners, isMale, selfVisible, tabSelected]);

  const fetchCycles = useCallback(async()=>{
    const results = await Promise.all(allUsers.map(async u=>{
      try {
        const {data} = await axios.get(`${API}/period`,{params:{user:u.username}});
        // One cycle per month: keep only the most recent per YYYY-MM
        const raw = Array.isArray(data) ? data : [];
        const byMonth = {};
        raw.forEach(c=>{
          const month = (c.startDate||'').slice(0,7); // YYYY-MM
          if(!byMonth[month] || new Date(c.startDate) > new Date(byMonth[month].startDate))
            byMonth[month] = c;
        });
        return {username:u.username, cycles:Object.values(byMonth)
          .sort((a,b)=>new Date(b.startDate)-new Date(a.startDate))};
      } catch { return {username:u.username, cycles:[]}; }
    }));
    const map = {};
    results.forEach(r=>{ map[r.username]=r.cycles; });
    setAllCycles(map);
  },[allUsers.map(u=>u.username).join(','), selfVisible, JSON.stringify(tabSelected ? [...tabSelected].sort() : [])]);

  useEffect(()=>{ fetchCycles(); },[fetchCycles]);

  const handleSave = async()=>{
    // Check: one cycle per month for this user
    const month = form.startDate.slice(0,7);
    const existing = (allCycles[user.username]||[]).find(c=>
      (c.startDate||'').slice(0,7)===month && c.id !== editCycleId
    );
    if(existing && !editCycleId){
      msg(`Already have a cycle for ${month}. Edit that one instead.`,'err');
      return;
    }
    try {
      if(editCycleId) await axios.delete(`${API}/period/${editCycleId}`);
      await axios.post(`${API}/period`,{
        user:user.username, startDate:form.startDate, endDate:form.endDate||null,
        cycleLength:parseInt(form.cycleLength)||28, symptoms:form.symptoms.join(','), date:form.date
      });
      msg(editCycleId?'Cycle updated.':'Cycle logged.');
      setShowForm(false); setEditCycleId(null);
      fetchCycles();
    } catch { msg('Error saving cycle.','err'); }
  };

  const handleCycleDelete = async(id)=>{
    if(!window.confirm('Delete this cycle?')) return;
    try { await axios.delete(`${API}/period/${id}`); msg('Deleted.'); fetchCycles(); } catch { msg('Error.','err'); }
  };

  const startEditCycle = (cyc)=>{
    setForm({startDate:(cyc.startDate||'').slice(0,10),endDate:(cyc.endDate||'').slice(0,10),
      cycleLength:String(cyc.cycleLength||28),
      symptoms:cyc.symptoms?cyc.symptoms.split(',').filter(Boolean):[], date:now()});
    setEditCycleId(cyc.id); setShowForm(true);
  };

  return (
    <div className="page-outer">
      <div className="top-bar"><span className="top-eyebrow"><span style={{color:user?.eventColor||'#00e676'}}>§ VECTRA ARCH</span> · LEGACY · HEALTH</span></div>
      <div className="page-scroll">
        <div className="page-inner">
          <div className="page-head">
            <div className="page-title">CYCLE TRACKER</div>
            <div className="page-sub">PERIOD · OVULATION · FERTILITY</div>
          </div>
          <UserRow user={user} partner={partner} partners={partners} activePartners={activePartners} permittedPartners={permittedPartners} selfVisible={selfVisible} tabSelected={tabSelected} isShared={isShared} onToggleUser={onToggleUser}/>
          <Alert {...alert}/>

          {/* One section per user */}
          {allUsers.map((u,ui)=>{
            const uCycles  = allCycles[u.username] || [];
            const stats    = cycleStats(uCycles);
            const {latest, avgLen, dayOfCycle, nextPeriod, fertileStart, fertileEnd} = stats;
            const ovStartL = Math.max(avgLen-14-4, 6);
            const ovEndL   = Math.min(avgLen-14+1, avgLen-1);
            const phaseLegend = [
              ['#e91e8c', `MENSTRUATION · 1-5`],
              ['#1de9b6', `OVULATION · ${ovStartL}-${ovEndL}`],
            ];
            const isOwn    = u.username === user.username;
            const owner    = getOwner(u.username, user, partner, partners) || u;
            const accentColor = owner.eventColor || '#e91e8c';

            return (
              <div key={u.username} style={ui>0?{marginTop:24,paddingTop:24,borderTop:'2px solid var(--border)'}:{}}>
                {/* User header for each section */}
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
                  <ItemAvatar username={u.username} user={user} partner={partner} partners={partners} size={32}/>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:18,letterSpacing:'0.04em',color:accentColor}}>
                    {(owner.displayName||(owner.firstName&&owner.lastName?`${owner.firstName} ${owner.lastName}`:null)||owner.username||'').toUpperCase()}
                  </div>
                  {!isOwn&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:8,letterSpacing:'0.1em',color:'var(--text3)'}}>SHARED</span>}
                </div>

                {/* Stats row */}
                {latest&&(
                  <div className="cycle-stats-card" style={{marginBottom:12}}>
                    <div className="cycle-stats-grid">
                      <div>
                        <div className="cycle-stat-label">Last Start</div>
                        <div className="cycle-stat-value" style={{color:'#e91e8c'}}>{fmtDate(latest.startDate)}</div>
                      </div>
                      <div>
                        <div className="cycle-stat-label">Next Period</div>
                        <div className="cycle-stat-value" style={{color:'#e91e8c'}}>{nextPeriod?fmtDate(nextPeriod.toISOString()):'—'}</div>
                      </div>
                      <div>
                        <div className="cycle-stat-label">Fertile Window</div>
                        <div className="cycle-stat-value" style={{color:'#1de9b6',fontSize:13}}>
                          {fertileStart&&fertileEnd?`${fertileStart.toLocaleDateString('en-ZA',{month:'short',day:'numeric'})} - ${fertileEnd.toLocaleDateString('en-ZA',{month:'short',day:'numeric'})}`:'—'}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* Phase wheel */}
                <div className="section-label" style={{color:accentColor}}>§ PHASE WHEEL · DAY {dayOfCycle} OF {avgLen}</div>
                <div className="phase-wheel-wrap">
                  <PhaseWheel dayOfCycle={dayOfCycle} cycleLength={avgLen} accentColor={accentColor}/>
                  <div className="phase-legend">
                    {phaseLegend.map(([color,label])=>(
                      <div key={label} className="phase-legend-item">
                        <div className="phase-legend-dot" style={{background:color}}/>{label}
                      </div>
                    ))}
                  </div>
                </div>

                {/* Cycle records */}
                <div className="section-label" style={{color:accentColor}}>§ CYCLES · {uCycles.length} RECORD{uCycles.length!==1?'S':''}</div>
                {uCycles.map(cyc=>{
                  const dur = cyc.endDate ? Math.floor((new Date(cyc.endDate)-new Date(cyc.startDate))/86400000)+'d' : '—';
                  return (
                    <div key={cyc.id} className="meal-card" style={{marginBottom:8,borderLeft:`3px solid ${accentColor}`}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                        <ItemAvatar username={u.username} user={user} partner={partner} partners={partners} size={36}/>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,fontWeight:600,letterSpacing:'0.12em',padding:'3px 8px',borderRadius:3,textTransform:'uppercase',flexShrink:0,background:`${accentColor}22`,color:accentColor,border:`1px solid ${accentColor}55`}}>🩸 CYCLE</span>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:accentColor,letterSpacing:'0.08em'}}>{(owner.displayName||(owner.firstName&&owner.lastName?`${owner.firstName} ${owner.lastName}`:null)||owner.username||'').toUpperCase()}</span>
                      </div>
                      <div className="meal-name" style={{marginBottom:8}}>START: {fmtDate(cyc.startDate).toUpperCase()}</div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:8}}>
                        <div><div className="cycle-record-label">End</div><div className="cycle-record-value">{fmtDate(cyc.endDate)||'—'}</div></div>
                        <div><div className="cycle-record-label">Length</div><div className="cycle-record-value">{cyc.cycleLength}d</div></div>
                        <div><div className="cycle-record-label">Duration</div><div className="cycle-record-value">{dur}</div></div>
                      </div>
                      {cyc.symptoms&&cyc.symptoms.length>0&&(
                        <div className="symptom-tags" style={{marginBottom:8}}>
                          {cyc.symptoms.split(',').filter(Boolean).map(s=>(
                            <span key={s} className="symptom-tag">§ {s.trim()}</span>
                          ))}
                        </div>
                      )}
                      {isOwn&&!isMale&&(
                        <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
                          <button onClick={()=>startEditCycle(cyc)} style={{fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'var(--blue)',border:'1px solid rgba(68,138,255,0.3)',borderRadius:3,padding:'5px 12px',background:'transparent',cursor:'pointer',letterSpacing:'0.1em',textTransform:'uppercase'}}>EDIT</button>
                          <button onClick={()=>handleCycleDelete(cyc.id)} style={{fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'var(--red)',border:'1px solid rgba(255,61,61,0.3)',borderRadius:3,padding:'5px 12px',background:'transparent',cursor:'pointer',letterSpacing:'0.1em',textTransform:'uppercase'}}>DELETE</button>
                        </div>
                      )}
                    </div>
                  );
                })}
                {uCycles.length===0&&<div className="no-events" style={{padding:'20px 0'}}><div className="no-events-text">No cycles logged</div></div>}
              </div>
            );
          })}

          <div style={{height:'80px'}}/>
        </div>
      </div>
      {!isMale&&<button className="fab" style={{background:'var(--pink)'}} onClick={()=>setShowForm(true)}>+ ADD CYCLE</button>}

      {showForm&&(
        <div className="modal-overlay" onClick={()=>setShowForm(false)}>
          <div className="modal-sheet" style={{"--page-color":tabColor}} onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">{editCycleId?'Edit':'Log'} Cycle</div>
            <div className="form-field">
              <label className="form-label">Start Date</label>
              <input className="form-input" type="date" value={form.startDate} onChange={e=>setForm(p=>({...p,startDate:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">End Date (optional)</label>
              <input className="form-input" type="date" value={form.endDate} onChange={e=>setForm(p=>({...p,endDate:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Cycle Length (days)</label>
              <input className="form-input" type="number" value={form.cycleLength} onChange={e=>setForm(p=>({...p,cycleLength:e.target.value}))}/>
            </div>
            <div className="form-field">
              <label className="form-label">Symptoms</label>
              <div className="type-toggle" style={{flexWrap:'wrap'}}>

          </div>
        </div>
      )}
    </div>
  );
