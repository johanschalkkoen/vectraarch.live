<script type="text/babel">
  const { useState, useEffect, useRef, useCallback, useMemo } = React;

  class ErrorBoundary extends React.Component {
    state = { error: null };
    componentDidCatch(error) { this.setState({ error }); }
    render() {
      if (this.state.error) return (
        <div className="page-wrap">
          <div className="va-alert err">⚠ {this.state.error.toString()}</div>
          <button className="va-btn" onClick={()=>window.location.reload()}>Reload</button>
        </div>
      );
      return this.props.children;
    }
  }

  const API_BASE = '/legacy/api';
  const DEFAULT_PROFILE_PIC = 'https://placehold.co/50x50/808080/FFFFFF?text=U';
  const DEFAULT_EVENT_COLOR = '#00ff41';
  const MONTHS = Array.from({ length: 12 }, (_, i) => ({ value: (i + 1).toString().padStart(2, '0'), label: new Date(0, i).toLocaleString('default', { month: 'long' }) }));
  const YEARS = Array.from({length:5},(_,i)=>new Date().getFullYear()-2+i);
  const capitalize = str => str ? str.charAt(0).toUpperCase() + str.slice(1) : '';
  const getCurrentDateTime = () => { const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); return now.toISOString().slice(0, 19); };
  const formatDateTime = date => { if (!date) return '—'; const d = new Date(date); if (isNaN(d.getTime())) return 'Invalid'; return d.toLocaleString('en-ZA', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:false }).replace(/,/,''); };
  const formatDate = date => { if (!date) return ''; const d = new Date(date); return isNaN(d.getTime()) ? '' : d.toISOString().slice(0, 10); };

  const MEAL_TYPES = ['breakfast','lunch','dinner','snack'];
  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

  const MEAL_OPTIONS = [
    { label:'Weight Loss — Calorie-Controlled (1,500-2,000 cal/day)', options:[

    ]},
    { label:'Specialized — Vegan/Vegetarian', options:[
      {value:'Chia pudding with almond milk and fruit',label:'Breakfast: Chia pudding with almond milk and fruit'},
      {value:'Lentil soup with bread',label:'Lunch: Lentil soup with bread'},
      {value:'Tofu stir-fry with quinoa',label:'Dinner: Tofu stir-fry with quinoa'},
      {value:'Hummus with carrots',label:'Snack: Hummus with carrots'}
    ]},
    { label:'Specialized — Paleo', options:[
      {value:'Eggs with sweet potato hash',label:'Breakfast: Eggs with sweet potato hash'},
      {value:'Grilled chicken with salad',label:'Lunch: Grilled chicken with salad'},

    ]},
    { label:'Performance — Endurance Athlete', options:[

      {value:'Rice with lean protein',label:'Dinner: Rice with lean protein'},

    ]},
    { label:'Custom', options:[{value:'custom',label:'Enter custom meal'}]}
  ];

  const MEAL_TYPE_MAP = {'Breakfast':'breakfast','Lunch':'lunch','Dinner':'dinner','Snack':'snack','Snacks':'snack','Meal 1':'breakfast','Meal 2':'lunch','Meal 3':'dinner','Pre-Workout':'snack','Post-Workout':'snack','Main Meals':'dinner'};

  const formatMealDetails = meal => {
    const descs = String(meal.description||'').split(',').map(d=>d.trim());
    const cals = String(meal.calories||'').split(',').map(c=>parseInt(c.trim()));
    if(descs.length>1&&cals.length===descs.length) return descs.map((d,i)=>`${d} (${cals[i]} kcal)`).join(', ');
    return `${meal.description||'Unknown'} (${meal.calories||0} kcal)`;
  };

  const useAccessibleUsers = (user, setUserProfiles) => {
    const [targetUsers, setTargetUsers] = useState([]);
    const [selectedTargets, setSelectedTargets] = useState([]);
    const [error, setError] = useState('');
    const fetched = useRef(false);
    useEffect(() => {
      if (fetched.current || !user?.username) return;
      fetched.current = true;
      const fetchAccessList = async () => {
        try {
          const { data } = await axios.get(`${API_BASE}/get-access`, { params: { viewer: user.username, adminUsername: user.username } });
          if (data.success && Array.isArray(data.accessList)) {
            const users = data.accessList.filter(a => a.viewer === user.username).map(a => a.target);
            setTargetUsers(users); setSelectedTargets(users); setError('');
            const profilePromises = users.concat(user.username).map(async u => {
              try {
                const { data: pd } = await axios.get(`${API_BASE}/profile-pictures?username=${u}`).catch(() => ({ data: { profilePicUrl: DEFAULT_PROFILE_PIC, eventColor: DEFAULT_EVENT_COLOR, displayName: u } }));
                return [u, { pic: pd.profilePicUrl||DEFAULT_PROFILE_PIC, color: pd.eventColor||DEFAULT_EVENT_COLOR, displayName: pd.displayName||u }];
              } catch { return [u, { pic: DEFAULT_PROFILE_PIC, color: DEFAULT_EVENT_COLOR, displayName: u }]; }
            });
            const profiles = Object.fromEntries(await Promise.all(profilePromises));
            setUserProfiles(prev => ({ ...prev, ...profiles, [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } }));
          } else {
            setTargetUsers([]); setError(data.message||'Failed.');
            setUserProfiles({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } });
          }
        } catch (err) {
          setError(err.response?.data?.message||'Error.');
          setUserProfiles({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } });
        }
      };
      fetchAccessList();
    }, [user?.username, setUserProfiles]);
    return { targetUsers, selectedTargets, setSelectedTargets, error };
  };

  const MealPlan = ({ user, setPage, onLogout, setUser }) => {
    const [meals, setMeals] = useState([]);
    const [form, setForm] = useState({ id:null, day:new Date().toLocaleString('en-US',{weekday:'long'}), mealType:'breakfast', description:'', calories:'', date:getCurrentDateTime() });
    const [message, setMessage] = useState({ text:'', type:'' });
    const [showAddForm, setShowAddForm] = useState(false);
    const [bulkData, setBulkData] = useState('');
    const [importMessage, setImportMessage] = useState({ text:'', type:'' });
    const [showImportTool, setShowImportTool] = useState(false);
    const [selectedMonth, setSelectedMonth] = useState(()=>(new Date().getMonth()+1).toString().padStart(2,'0'));
    const [selectedYear, setSelectedYear] = useState(()=>new Date().getFullYear());
    const [sortField, setSortField] = useState('date');
    const [sortOrder, setSortOrder] = useState('desc');
    const [isCustom, setIsCustom] = useState(false);
    const { targetUsers, selectedTargets, setSelectedTargets, error } = useAccessibleUsers(user, profiles => setUserProfiles(profiles));
    const [userProfiles, setUserProfiles] = useState({ [user.username]: { pic: user.profilePicUrl||DEFAULT_PROFILE_PIC, color: user.eventColor||DEFAULT_EVENT_COLOR, displayName: user.displayName||user.username } });

    const msg = (text, type='ok') => { setMessage({text,type}); setTimeout(()=>setMessage({text:'',type:''}),5000); };
    const iMsg = (text, type='ok') => { setImportMessage({text,type}); setTimeout(()=>setImportMessage({text:'',type:''}),5000); };

    const fetchMeals = useCallback(async () => {
      try {
        const results = await Promise.all([user.username,...selectedTargets].map(u=>axios.get(`${API_BASE}/mealplan`,{params:{user:u}}).then(({data})=>data.map(m=>({...m,description:String(m.description||''),calories:String(m.calories||'')}))).catch(()=>[])));
        setMeals(results.flat());
      } catch { msg('Error fetching meals.','err'); }
    }, [user.username, selectedTargets]);

    const sortedMeals = useMemo(() => {
      const filtered = meals.filter(m=>m.date?.startsWith(`${selectedYear}-${selectedMonth}`));
      return [...filtered].sort((a,b)=>{
        const fa=sortField==='calories'?parseFloat(a.calories.split(',')[0])||0:a[sortField];
        const fb=sortField==='calories'?parseFloat(b.calories.split(',')[0])||0:b[sortField];
        if(sortField==='calories') return sortOrder==='asc'?fa-fb:fb-fa;
        return sortOrder==='asc'?new Date(fa)-new Date(fb):new Date(fb)-new Date(fa);
      });
    }, [meals,selectedMonth,sortField,sortOrder]);

    const handleInputChange = useCallback(e => {
      const { name, value } = e.target;
      if(name==='mealSelect'){
        if(value==='custom'){setIsCustom(true);setForm(p=>({...p,description:''}));}
        else{
          setIsCustom(false);setForm(p=>({...p,description:value}));
          const opt = MEAL_OPTIONS.flatMap(g=>g.options).find(o=>o.value===value);
          const label = opt?.label||'';
          const mTypeStr = label.split(':')[0]?.trim()||'';
          const mType = MEAL_TYPE_MAP[mTypeStr]||form.mealType;
          setForm(p=>({...p,mealType:mType}));
        }
      } else { setForm(p=>({...p,[name]:value})); }
    }, [form.mealType]);

    const handleSaveMeal = useCallback(async () => {
      if(!form.day||!form.mealType||!form.description||!form.calories){msg('Fill all fields.','err');return;}
      const calsArr = form.calories.split(',').map(c=>parseInt(c.trim()));
      const descArr = form.description.split(',').map(d=>d.trim());
      if(calsArr.some(c=>isNaN(c)||c<=0)){msg('Calories must be positive numbers.','err');return;}
      if(descArr.length!==calsArr.length){msg('Descriptions and calories must match.','err');return;}
      const md = { user:user.username, day:form.day, mealType:form.mealType, description:form.description, calories:form.calories, date:form.date };
      try {
        if(form.id){await axios.put(`${API_BASE}/mealplan/${form.id}`,md);msg('Meal updated.');}
        else{await axios.post(`${API_BASE}/mealplan`,md);msg('Meal saved.');}
        fetchMeals();
        setForm({id:null,day:new Date().toLocaleString('en-US',{weekday:'long'}),mealType:'breakfast',description:'',calories:'',date:getCurrentDateTime()});
        setShowAddForm(false);setIsCustom(false);
      } catch { msg('Error saving meal.','err'); }
    }, [form,user.username,fetchMeals]);

    const handleDeleteMeal = useCallback(async id => {
      try { await axios.delete(`${API_BASE}/mealplan/${id}`);msg('Meal deleted.');fetchMeals(); } catch { msg('Error deleting.','err'); }
    }, [fetchMeals]);

    const startEdit = useCallback(meal => {
      setForm({id:meal.id,day:meal.day,mealType:meal.mealType,description:String(meal.description||''),calories:String(meal.calories||''),date:meal.date.slice(0,16)});
      const isCustomMeal = !MEAL_OPTIONS.flatMap(g=>g.options).some(o=>o.value===meal.description);
      setIsCustom(isCustomMeal);setShowAddForm(true);
    }, []);

    const handleBulkImport = useCallback(async () => {
      if(!bulkData.trim()){iMsg('Paste data first.','err');return;}
      const toImport = bulkData.trim().split('\n').filter(l=>l.trim()).map(l=>{const[day,mealType,description,calories,date]=l.split(',').map(f=>f.trim());if(!day||!mealType||!description||!calories||!date)return null;const ca=calories.split(',').map(c=>parseInt(c.trim()));if(ca.some(c=>isNaN(c)||c<=0))return null;return{user:user.username,day,mealType,description,calories,date};}).filter(Boolean);
      if(!toImport.length){iMsg('No valid data.','err');return;}
      iMsg(`Importing ${toImport.length} meals...`,'warn');
      try { await Promise.all(toImport.map(m=>axios.post(`${API_BASE}/mealplan`,m)));iMsg(`Imported ${toImport.length} meals.`);setBulkData('');setShowImportTool(false);fetchMeals(); } catch { iMsg('Import failed.','err'); }
    }, [bulkData,user.username,fetchMeals]);

    useEffect(()=>{if(user?.username)fetchMeals();},[fetchMeals,user]);

    const month = MONTHS.find(m=>m.value===selectedMonth)?.label||'';

    return (
      <div className="page-wrap">
        <button className="back-btn" onClick={()=>setPage('menu')}>← Back to Menu</button>
        <div className="page-header">
          <div className="page-eyebrow">§ Vectra Arch · Legacy · Nutrition</div>
          <div className="page-title">Meal Plan</div>
          <div className="page-sub">Daily Nutrition · Calories · Weekly Schedule</div>
        </div>
        <div className="user-header">
          <img className="user-avatar" src={userProfiles[user.username]?.pic||DEFAULT_PROFILE_PIC} alt={user.username} style={{borderColor:userProfiles[user.username]?.color||DEFAULT_EVENT_COLOR}}/>
          <div className="user-display">{userProfiles[user.username]?.displayName||user.username}</div>
          <div style={{marginLeft:'auto'}}><button className="va-btn danger sm" onClick={onLogout}>Sign Out ×</button></div>
        </div>

        {message.text&&<div className={`va-alert ${message.type}`}>{message.type==='ok'?'✓ ':'⚠ '}{message.text}</div>}
        {error&&<div className="va-alert err">⚠ {error}</div>}

        <div className="toolbar">
          <span className="tb-label">Month</span>
          <select className="mf-select" value={selectedMonth} onChange={e=>setSelectedMonth(e.target.value)}>
            {MONTHS.map(m=><option key={m.value} value={m.value}>{m.label} {selectedYear}</option>)}
          </select>
          <span className="tb-label">Year</span>
          <select className="mf-select" value={selectedYear} onChange={e=>setSelectedYear(parseInt(e.target.value))}>
            {YEARS.map(y=><option key={y} value={y}>{y}</option>)}
          </select>
          <span className="tb-label">Sort</span>
          <select className="mf-select" value={sortField} onChange={e=>setSortField(e.target.value)}>
            <option value="date">Date</option><option value="calories">Calories</option>
          </select>
          <select className="mf-select" value={sortOrder} onChange={e=>setSortOrder(e.target.value)}>
            <option value="desc">Desc</option><option value="asc">Asc</option>
          </select>
          <div className="tb-spacer"/>
          <button className="va-btn sm" onClick={()=>setShowImportTool(!showImportTool)}>{showImportTool?'Hide Import':'Bulk Import'}</button>
          <button className="va-btn primary sm" onClick={()=>setShowAddForm(!showAddForm)}>{showAddForm?'Hide Form':'Add Meal ↗'}</button>
        </div>

        {targetUsers.length>0&&(
          <div className="user-toggles">
            {targetUsers.map(t=>(
              <button key={t} className={`user-toggle ${selectedTargets.includes(t)?'on':'off'}`} onClick={()=>setSelectedTargets(prev=>prev.includes(t)?prev.filter(u=>u!==t):[...prev,t])}>
                <img className="mini-avatar" src={userProfiles[t]?.pic||DEFAULT_PROFILE_PIC} alt={t} style={{border:`1px solid ${userProfiles[t]?.color||DEFAULT_EVENT_COLOR}`}}/>
                {userProfiles[t]?.displayName||t}
              </button>
            ))}
          </div>
        )}

        {showImportTool&&(
          <div className="import-box">
            <div className="section-label">§ Bulk Import</div>
            <div className="import-hint">Format: Day,MealType,Description,Calories,Date<br/>Example: Monday,breakfast,Oatmeal with berries,300,2026-08-01 08:00:00</div>
            <textarea className="mf-textarea" rows="5" value={bulkData} onChange={e=>setBulkData(e.target.value)} placeholder="Paste CSV data..."/>
            {importMessage.text&&<div className={`va-alert ${importMessage.type}`} style={{marginTop:'12px'}}>{importMessage.text}</div>}
            <div className="btn-row" style={{marginTop:'12px'}}>
              <button className="va-btn primary" onClick={handleBulkImport}>Import ↗</button>
              <button className="va-btn" onClick={()=>setShowImportTool(false)}>Cancel</button>
            </div>
          </div>
        )}

        {showAddForm&&(
          <div className="va-form">
            <div className="section-label">§ {form.id?'Edit Meal':'Add Meal'}</div>
            <div className="mf-label" style={{marginBottom:'8px'}}>Day</div>
            <div className="toggle-group" style={{marginBottom:'20px'}}>
              {DAYS.map(d=><button key={d} className={`toggle-chip ${form.day===d?'on':'off'}`} onClick={()=>setForm(p=>({...p,day:d}))}>{d}</button>)}
            </div>
            <div className="mf-label" style={{marginBottom:'8px'}}>Meal Type</div>
            <div className="toggle-group" style={{marginBottom:'20px'}}>
              {MEAL_TYPES.map(t=><button key={t} className={`toggle-chip ${form.mealType===t?'on':'off'}`} onClick={()=>setForm(p=>({...p,mealType:t}))}>{capitalize(t)}</button>)}
            </div>
            <div className="form-grid">
              <div className="mf-field full">
                <label className="mf-label">Meal Template</label>
                <select className="mf-field-select" name="mealSelect" value={isCustom?'custom':form.description} onChange={handleInputChange}>
                  <option value="">— Select a meal —</option>
                  {MEAL_OPTIONS.map(group=>(
                    <optgroup key={group.label} label={group.label}>
                      {group.options.map(opt=><option key={opt.value} value={opt.value}>{opt.label}</option>)}
                    </optgroup>
                  ))}
                </select>
              </div>
              {isCustom&&(
                <div className="mf-field full">
                  <label className="mf-label">Custom Description (comma-separated for multiple)</label>
                  <input className="mf-input" name="description" placeholder="e.g. Custom Salad,Fruit Bowl" value={form.description} onChange={handleInputChange}/>
                </div>
              )}
              <div className="mf-field">
                <label className="mf-label">Calories (comma-separated)</label>
                <input className="mf-input" name="calories" type="text" placeholder="e.g. 300,100" value={form.calories} onChange={handleInputChange}/>
              </div>
              <div className="mf-field">
                <label className="mf-label">Date & Time</label>
                <input className="mf-input" type="datetime-local" name="date" value={form.date} onChange={handleInputChange} step="1"/>
              </div>
            </div>
            <div className="btn-row">
              <button className="va-btn primary" onClick={handleSaveMeal}>{form.id?'Update ↗':'Save ↗'}</button>
              <button className="va-btn" onClick={()=>{setShowAddForm(false);setIsCustom(false);setForm({id:null,day:new Date().toLocaleString('en-US',{weekday:'long'}),mealType:'breakfast',description:'',calories:'',date:getCurrentDateTime()});}}>Cancel</button>
            </div>
          </div>
        )}

        <div className="section-label">§ Weekly Plan · {month} {selectedYear}</div>
        {DAYS.map(day=>{
          const dayMeals = sortedMeals.filter(m=>m.day===day&&[user.username,...selectedTargets].includes(m.user));
          return (
            <div key={day} className="day-section">
              <div className="day-header">
                <div className="day-name">{day}</div>
                <div className="day-count">{dayMeals.length} meals · {dayMeals.reduce((s,m)=>s+(parseFloat(m.calories.split(',')[0])||0),0)} kcal</div>
              </div>
              {dayMeals.length===0
                ? <div className="day-empty">§ No meals planned</div>
                : dayMeals.map(meal=>(
                    <div key={meal.id} className="meal-card">
                      <div className="meal-top">
                        <img className="meal-avatar" src={userProfiles[meal.user]?.pic||DEFAULT_PROFILE_PIC} alt={meal.user} style={{border:`1px solid ${userProfiles[meal.user]?.color||DEFAULT_EVENT_COLOR}`}}/>
                        <span className={`meal-type-badge ${meal.mealType}`}>{capitalize(meal.mealType)}</span>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'var(--text-dim)',letterSpacing:'0.1em'}}>{userProfiles[meal.user]?.displayName||meal.user}</span>
                      </div>
                      <div className="meal-desc">{formatMealDetails(meal)}</div>
                      <div className="meal-cal">{meal.calories} kcal · {formatDateTime(meal.date)}</div>
                      {meal.user===user.username&&(
                        <div className="meal-actions">
                          <button className="va-btn sm" onClick={()=>startEdit(meal)}>Edit</button>
                          <button className="va-btn danger sm" onClick={()=>handleDeleteMeal(meal.id)}>Delete</button>
                        </div>
                      )}
                    </div>
                  ))}
            </div>
          );
        })}

        <div className="notes-box">
          <div className="section-label">§ Notes</div>
          <div className="notes-list">
            <div className="note-item">Customise for age, gender, activity level, allergies, and preferences. Use tools like MyFitnessPal for tracking.</div>
            <div className="note-item">Portion sizes based on individual needs via TDEE calculators. Consult a nutritionist for personalisation.</div>
            <div className="note-item">Combine with workouts for best results. Include variety to prevent boredom.</div>
            <div className="note-item">These are general guidelines. For medical conditions, seek professional advice.</div>
          </div>
        </div>
      </div>
    );
  };

  const App = () => {
    const [user, setUser] = useState(null);
    useEffect(() => {
      const s = localStorage.getItem('user');
      if(s){try{setUser(JSON.parse(s));}catch{localStorage.removeItem('user');window.location.href='index.html';}}
      else window.location.href='index.html';
    }, []);
    const handleLogout = useCallback(()=>{localStorage.removeItem('user');window.location.href='index.html';},[]);
    if(!user)return null;
    return <ErrorBoundary><MealPlan user={user} setPage={()=>window.location.href='index.html'} onLogout={handleLogout} setUser={setUser}/></ErrorBoundary>;
  };
  ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
